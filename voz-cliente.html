<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#fcf9f8">
<title>Mystery Shopper · Prep!</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231e5af9'/><text x='50' y='70' font-family='sans-serif' font-weight='900' font-size='60' fill='%23fcf9f8' text-anchor='middle'>p!</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

<script src="/offline.js"></script>

<style>
:root{--primary:#1e5af9;--secondary:#ff3b30;--tertiary:#ffcc00;--bg:#fcf9f8;--surface:#fff;--ink:#171c20;--outline:#000;--primary-soft:#d6e2ff;--gray-soft:#dfe3e8;--green:#10b981;--green-soft:#d1fae5;--amber:#f59e0b;--amber-soft:#fef3c7;--red-soft:#fee2e2;--shadow-sm:4px 4px 0 0 #000;--shadow:6px 6px 0 0 #000;--font-display:'Bagel Fat One',system-ui,sans-serif;--font-body:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',ui-monospace,monospace;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh}
.material-symbols-outlined{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;font-feature-settings:'liga';-webkit-font-feature-settings:'liga';font-size:20px;line-height:1;vertical-align:middle;white-space:nowrap;word-wrap:normal;direction:ltr}.mono{font-family:var(--font-mono)}
.header{background:var(--bg);border-bottom:2px solid var(--outline);padding:10px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;min-height:60px}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{position:relative;width:92px;height:30px;flex-shrink:0;display:block;text-decoration:none}
.brand-logo .l{position:absolute;inset:0;-webkit-mask:url(/logo.png) left center/contain no-repeat;mask:url(/logo.png) left center/contain no-repeat;background:var(--ink)}
.brand-txt .cli{font-weight:700;font-size:14px;line-height:1.1}.brand-txt .mod{font-family:var(--font-mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;opacity:.6}
.header-info{display:flex;gap:8px;align-items:center;flex:1;flex-wrap:wrap;justify-content:flex-end}
.btn-ico{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);font-weight:600;font-size:13px;box-shadow:var(--shadow-sm);cursor:pointer}
.btn-ico:active{transform:translate(2px,2px);box-shadow:none}.btn-ico.primary{background:var(--primary);color:#fff}
.tabs{flex-shrink:0;display:flex;gap:8px;padding:10px 16px;background:var(--primary-soft);border-bottom:2px solid var(--outline);overflow-x:auto}
.tab{flex-shrink:0;display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);font-weight:600;font-size:13px;box-shadow:var(--shadow-sm);cursor:pointer;white-space:nowrap}
.tab.active{background:var(--ink);color:var(--bg);transform:translate(2px,2px);box-shadow:none}
.main{flex:1;overflow-y:auto;padding:16px;max-width:1100px;width:100%;margin:0 auto}
.section{margin:22px 0 0}
.section-h{display:flex;align-items:baseline;justify-content:space-between;gap:8px 14px;margin:0 0 10px;flex-wrap:wrap}
.section-h h3{font-family:var(--font-display);font-size:17px;line-height:1.15;flex:1;min-width:200px}
.section-h .hint{font-family:var(--font-mono);font-size:11px;opacity:.55;text-align:right;flex-shrink:0}
.up{color:var(--green)}.down{color:var(--secondary)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.kpi{background:var(--surface);border:2px solid var(--outline);border-radius:14px;box-shadow:var(--shadow-sm);padding:14px}
.kpi .lbl{font-family:var(--font-mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;opacity:.6;display:flex;align-items:center;gap:5px}
.kpi .val{font-family:var(--font-display);font-size:30px;line-height:1.1;margin-top:6px}
.kpi .sub{font-family:var(--font-mono);font-size:11px;opacity:.6;margin-top:2px}
.card{background:var(--surface);border:2px solid var(--outline);border-radius:14px;box-shadow:var(--shadow-sm);padding:16px;margin-bottom:12px}
.chartbox{position:relative;width:100%}
.barrow{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.barrow .nm{width:38%;font-size:13px;font-weight:600}
.bartrack{flex:1;height:18px;background:var(--gray-soft);border:2px solid var(--outline);border-radius:999px;overflow:hidden}
.barfill{height:100%;background:var(--primary)}
.barrow .pc{width:46px;text-align:right;font-family:var(--font-mono);font-size:12px;font-weight:700}
.perbar{display:flex;gap:7px;overflow-x:auto;padding:2px 0 10px;-webkit-overflow-scrolling:touch}
.pchip{flex-shrink:0;padding:6px 13px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);font-family:var(--font-mono);font-size:11px;font-weight:700;box-shadow:2px 2px 0 0 #000;cursor:pointer}
.pchip.on{background:var(--primary);color:#fff;transform:translate(2px,2px);box-shadow:none}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.pill{padding:5px 11px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);font-family:var(--font-mono);font-size:11px;font-weight:700;box-shadow:2px 2px 0 0 #000;cursor:pointer}
.pill.on{background:var(--ink);color:var(--bg);box-shadow:none;transform:translate(2px,2px)}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-family:var(--font-mono);font-size:11px;font-weight:600;margin-top:12px}
.legend span{display:inline-flex;align-items:center;gap:6px}.legend i{width:14px;height:14px;border:2px solid var(--outline);border-radius:4px}
.heatwrap{overflow-x:auto}
.heat{display:grid;gap:4px}
.heat .hc{display:flex;align-items:center;justify-content:center;min-height:34px;border:2px solid var(--outline);border-radius:8px;font-family:var(--font-mono);font-size:11px;font-weight:700}
.heat .rl{display:flex;align-items:center;justify-content:flex-end;text-align:right;font-size:12px;font-weight:600;padding-right:8px}
.heat .hc.dlt{font-size:11px;letter-spacing:-.02em}
.heat .cl{font-family:var(--font-mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;opacity:.6;text-align:center;align-self:end;padding-bottom:3px}
.dg .mh{display:flex;align-items:flex-end;gap:8px;font-family:var(--font-display);font-size:14px;margin:16px 0 4px;border-bottom:2px solid var(--outline);padding-bottom:3px}
.dg .mh:first-child{margin-top:0}
.dg .mh .mu{flex:1;min-width:0}
.dg .sqs{display:flex;gap:5px;flex-shrink:0}
.dg .vh{font-family:var(--font-mono);font-size:9px;font-weight:700;width:30px;text-align:center;opacity:.6}
.dg .drow{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #eef0f2;border-radius:6px;transition:background .1s}
.dg .drow:last-child{border-bottom:none}
.dg .drow:hover{background:#eef2f8}
.dg .drow:hover .it{font-weight:600}
.dg .it{flex:1;min-width:0;font-size:11.5px;line-height:1.25}
.dg .sq{width:30px;height:24px;flex:0 0 30px;border:2px solid var(--outline);border-radius:5px}
.dg .sq.empty{background:transparent;border-width:1.5px;border-style:dashed;border-color:#d9dce0}
.dg .drow.na{opacity:.45}
.dg .drow.na .it{font-style:italic}
.mg{overflow-x:auto;padding-bottom:6px}
.mg .grid{width:100%}
.mg .hrow,.mg .mrow{display:flex;align-items:center;gap:8px}
.mg .hrow{border-bottom:2px solid var(--outline);padding-bottom:5px;margin-bottom:4px;position:sticky;top:0;background:var(--surface);z-index:1}
.mg .mrow{padding:3px 0;border-bottom:1px solid #eef0f2;border-radius:6px;transition:background .1s}
.mg .mrow:last-child{border-bottom:none}
.mg .mrow:hover{background:#eef2f8}
.mg .mrow:hover .lbl{font-weight:600}
.mg .num{flex:0 0 22px;width:22px;font-family:var(--font-mono);font-size:10px;opacity:.5;text-align:right}
.mg .lbl{flex:3 1 0;min-width:190px;font-size:11px;line-height:1.22}
.mg .cg{flex:1 1 0;min-width:104px;display:flex;align-items:center;justify-content:flex-start;gap:3px;padding:0 9px;border-right:1px solid #e5e7eb;box-sizing:border-box}
.mg .cg:last-child{border-right:none}
.mg .cgh{flex:1 1 0;min-width:104px;padding:0 9px;font-family:var(--font-mono);font-size:11px;font-weight:700;text-align:left;box-sizing:border-box}
.mg .msq{width:18px;height:18px;flex:0 0 18px;border:2px solid var(--outline);border-radius:4px;box-sizing:border-box}
.mg .dind{flex:0 0 18px;width:18px;text-align:center;font-size:12px;font-weight:800;font-family:var(--font-mono);line-height:1;margin-left:1px}
.mg .muh{font-family:var(--font-display);font-size:14px;margin:16px 0 4px;border-bottom:2px solid var(--outline);padding-bottom:3px}
.mg .srow{display:flex;align-items:center;gap:8px;border-bottom:1.5px solid var(--outline);padding-bottom:3px;margin-bottom:2px}
.mg .scorerow{display:flex;align-items:center;gap:8px;border-top:1.5px solid var(--outline);padding-top:5px;margin:2px 0 6px}
.mg .scorerow .lbl{font-family:var(--font-mono);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.03em;opacity:.7}
.mg .scv{flex:1 1 0;min-width:104px;padding:0 9px;box-sizing:border-box;display:flex;align-items:center;gap:4px}
.mg .scv>span:first-child{display:inline-block;min-width:46px;text-align:center;padding:2px 0;border:2px solid var(--outline);border-radius:6px;font-family:var(--font-mono);font-size:11px;font-weight:700}
/* desglose por visita (un solo recorrido, ítem por ítem) */
.vmh{display:flex;justify-content:space-between;align-items:baseline;gap:10px;font-family:var(--font-display);font-size:15px;margin:18px 0 6px;border-bottom:2px solid var(--outline);padding-bottom:4px}
.vmh:first-child{margin-top:0}
.vmh .sc{font-family:var(--font-mono);font-size:11px;font-weight:700;opacity:.65;white-space:nowrap}
.vrow{display:grid;grid-template-columns:104px 1fr;gap:10px;align-items:center;padding:6px 0;border-bottom:1px solid var(--gray-soft);border-radius:6px;transition:background .1s}
.vrow:hover{background:#eef2f8}
.vbadge{font-family:var(--font-mono);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;text-align:center;padding:5px 4px;border:2px solid var(--outline);border-radius:999px;color:#fff;line-height:1.05}
.vbadge.na{background:#f1f1f1;color:#171c20;border-style:dashed;opacity:.6}
.vit{font-size:12.5px;line-height:1.3}
.vcom{grid-column:2;font-size:11.5px;color:var(--primary-dark);background:var(--primary-soft);border:2px solid var(--outline);border-radius:8px;padding:5px 9px;margin-top:4px;display:flex;gap:6px}
.vcom .material-symbols-outlined{font-size:15px}
.sedes{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.sedecard{border:2px solid var(--outline);border-radius:14px;box-shadow:var(--shadow-sm);padding:14px;background:var(--surface)}
.sedecard .rank{font-family:var(--font-mono);font-size:10px;font-weight:700;opacity:.5}
.sedecard .nm{font-weight:700;font-size:15px;margin:2px 0 8px}
.sedecard .big{font-family:var(--font-display);font-size:36px;line-height:1}
.sedecard .trend{font-family:var(--font-mono);font-size:11px;font-weight:700;margin-top:6px}
.input,.select,textarea.input{padding:10px 12px;border:2px solid var(--outline);border-radius:10px;background:var(--surface);font-family:var(--font-body);font-size:14px;box-shadow:var(--shadow-sm);width:100%}
textarea.input{min-height:80px;resize:vertical}
.field-lbl{font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;opacity:.6;margin:12px 0 6px;display:block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 18px;border:2px solid var(--outline);border-radius:14px;font-weight:600;font-size:14px;background:var(--surface);box-shadow:var(--shadow-sm);width:100%;min-height:50px;cursor:pointer}
.btn:active{transform:translate(2px,2px);box-shadow:none}.btn.primary{background:var(--primary);color:#fff}.btn.ghost{background:transparent;box-shadow:none;border-style:dashed}
.empty{text-align:center;padding:40px;font-family:var(--font-mono);font-size:12px;opacity:.55}
.crit{padding:12px 0;border-bottom:1px dashed var(--gray-soft)}.crit:last-child{border:none}
.crit .ct{font-size:14px;font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between;gap:10px}
.scale{display:flex;gap:6px;flex-wrap:wrap}
.dot{width:40px;height:40px;border:2px solid var(--outline);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;background:var(--surface);cursor:pointer;box-shadow:2px 2px 0 0 var(--outline)}
.dot.on{background:var(--ink);color:var(--bg);transform:translate(2px,2px);box-shadow:none}
.area-h{font-family:var(--font-display);font-size:16px;margin:16px 0 4px}
.row{background:var(--surface);border:2px solid var(--outline);border-radius:14px;box-shadow:var(--shadow-sm);padding:13px 15px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer}
.row:active{transform:translate(2px,2px);box-shadow:none}
.row .meta{font-family:var(--font-mono);font-size:11px;opacity:.65;margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}
.tagx{font-family:var(--font-mono);font-size:9px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:6px;border:1.5px solid var(--outline)}
.tagx.pend{background:var(--red-soft)}.tagx.proc{background:var(--amber-soft)}.tagx.hecho{background:var(--green);color:#fff}
.score-pill{font-family:var(--font-mono);font-weight:700;padding:4px 12px;border-radius:999px;border:2px solid var(--outline);font-size:14px}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:80;opacity:0;pointer-events:none;transition:opacity .18s}.backdrop.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:90;background:var(--surface);border-top:3px solid var(--outline);border-radius:24px 24px 0 0;box-shadow:0 -10px 0 0 var(--outline);transform:translateY(100%);transition:transform .25s cubic-bezier(.32,.72,0,1);max-height:94vh;display:flex;flex-direction:column}
.sheet.open{transform:translateY(0)}.sheet-handle{width:48px;height:5px;background:var(--outline);border-radius:999px;margin:12px auto 8px;opacity:.3}
.sheet-head{padding:6px 22px 14px;border-bottom:2px solid var(--outline);display:flex;align-items:center;gap:14px}
.sheet-title{flex:1}.sheet-title h2{font-family:var(--font-display);font-size:21px;line-height:1;margin-bottom:4px}.sheet-title .meta{font-family:var(--font-mono);font-size:11px;opacity:.65}
.sheet-close{width:40px;height:40px;border:2px solid var(--outline);border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);cursor:pointer;flex-shrink:0}
.sheet-body{padding:16px 22px 28px;overflow-y:auto}
.livescore{position:sticky;top:0;background:var(--surface);padding:8px 0;border-bottom:2px dashed var(--gray-soft);display:flex;align-items:center;justify-content:space-between;z-index:2}
.s-hi{background:var(--green);color:#fff}.s-mid{background:var(--amber-soft)}.s-lo{background:var(--red-soft)}
.toast-container{position:fixed;top:76px;right:16px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--ink);color:var(--bg);border:2px solid var(--outline);border-radius:12px;padding:12px 18px;font-size:14px;font-weight:600;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;max-width:340px}
.toast.ok{background:var(--primary);color:#fff}.toast.err{background:var(--secondary);color:#fff}.toast.warn{background:var(--tertiary)}
.boot{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:300;transition:opacity .3s}.boot.gone{opacity:0;pointer-events:none}
.boot .logo{position:relative;width:200px;height:66px}.boot .logo .l{position:absolute;inset:0;-webkit-mask:url(/logo.png) center/contain no-repeat;mask:url(/logo.png) center/contain no-repeat;background:var(--ink)}
.boot .spinner{width:34px;height:34px;border:4px solid var(--outline);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.boot .msg{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.12em;opacity:.6}
@media(prefers-reduced-motion:no-preference){.reveal{animation:rise .5s cubic-bezier(.2,.7,0,1) both}}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(max-width:560px){.barrow .nm{width:46%}}
.act{display:inline-flex;gap:8px;align-items:center}
.modes{flex-shrink:0;display:flex;gap:8px;padding:8px 16px;background:var(--ink);border-bottom:2px solid var(--outline);overflow-x:auto}
.mode-btn{flex-shrink:0;display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);font-weight:700;font-size:13px;box-shadow:var(--shadow-sm);cursor:pointer;white-space:nowrap}
.mode-btn.active{background:var(--tertiary);transform:translate(2px,2px);box-shadow:none}
.mode-wrap{flex:1;min-height:0;display:flex;flex-direction:column}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700}
.stars{display:inline-flex;gap:0}.stars .material-symbols-outlined{font-size:18px;color:#f59e0b;font-variation-settings:'FILL' 1}
.rv-card{background:var(--surface);border:2px solid var(--outline);border-radius:14px;box-shadow:var(--shadow-sm);padding:14px;margin-bottom:10px}
.rv-src{font-family:var(--font-mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border:1.5px solid var(--outline);border-radius:6px}
.q-card{background:var(--surface);border:2px solid var(--outline);border-radius:12px;box-shadow:var(--shadow-sm);padding:12px;margin-bottom:10px}
</style>
</head>
<body>
<div class="boot" id="boot"><div class="logo"><div class="l"></div></div><div class="spinner"></div><div class="msg">Mise en place…</div></div>

<header class="header">
  <a href="/" class="brand-logo" title="Hub"><div class="l"></div></a>
  <div class="brand-txt"><div class="cli" data-client-name>Casa Italia</div><div class="mod" id="modName">Mystery Shopper</div></div>
  <div class="header-info">
    <span class="act" id="act-mystery">
      <button class="btn-ico" onclick="exportarPDF()" title="Exportar reporte en PDF"><span class="material-symbols-outlined">picture_as_pdf</span>Exportar PDF</button>
      <button class="btn-ico primary" onclick="openNueva()"><span class="material-symbols-outlined">add</span>Nueva evaluación</button>
    </span>
    <span class="act" id="act-encuestas" style="display:none">
      <button class="btn-ico primary" onclick="openEncuesta()"><span class="material-symbols-outlined">add</span>Nueva encuesta</button>
    </span>
    <span class="act" id="act-resenas" style="display:none">
      <button class="btn-ico" onclick="loadResenas(true)" title="Actualizar reseñas"><span class="material-symbols-outlined">refresh</span>Actualizar</button>
    </span>
  </div>
</header>

<nav class="modes" id="modes">

/* ---- Chart.js mount ---- */
function chart(id,cfg,h){cfg.options=cfg.options||{};cfg.options.responsive=true;cfg.options.maintainAspectRatio=false;if(RM)cfg.options.animation=false;PENDING.push([id,cfg]);return `<div class="chartbox" style="height:${h||260}px"><canvas id="${id}"></canvas></div>`;}

/* ---- Tema brutalista para Chart.js (líneas gruesas, puntos con borde negro, grilla limpia, tooltip de marca) ---- */
function themeCharts(){
  if(!window.Chart)return;
  const C=Chart.defaults;
  C.font.family="'IBM Plex Sans',sans-serif";C.font.size=11;C.font.weight=500;C.color='#171c20';C.borderColor='#ece9e6';
  C.elements.line.borderWidth=3;C.elements.line.tension=.3;
  C.elements.point.radius=4;C.elements.point.hoverRadius=6;C.elements.point.borderColor='#171c20';C.elements.point.borderWidth=2;C.elements.point.hoverBorderWidth=2;
  C.elements.arc.borderColor='#171c20';C.elements.arc.borderWidth=2;
  C.elements.bar.borderColor='#171c20';C.elements.bar.borderWidth=2;
  C.plugins.legend.labels.font={weight:'600',size:11};C.plugins.legend.labels.boxWidth=14;C.plugins.legend.labels.boxHeight=14;C.plugins.legend.labels.padding=14;
  C.plugins.tooltip.backgroundColor='#171c20';C.plugins.tooltip.titleColor='#fff';C.plugins.tooltip.bodyColor='#fff';C.plugins.tooltip.borderColor='#000';C.plugins.tooltip.borderWidth=2;C.plugins.tooltip.cornerRadius=10;C.plugins.tooltip.padding=10;C.plugins.tooltip.titleFont={weight:'700',size:12};C.plugins.tooltip.bodyFont={weight:'600',size:12};C.plugins.tooltip.boxPadding=4;C.plugins.tooltip.usePointStyle=true;
  // defaults por tipo de escala (v4: viven en Chart.defaults.scales[tipo], no en .scale)
  try{['linear','category','logarithmic','time','timeseries','radialLinear'].forEach(k=>{
    const s=C.scales&&C.scales[k];if(!s)return;
    s.grid=Object.assign({},s.grid,{color:'#ece9e6',lineWidth:1,drawTicks:false});
    s.border=Object.assign({},s.border,{color:'#171c20',width:2});
    s.ticks=Object.assign({},s.ticks,{color:'#171c20',padding:6});
  });}catch(e){}
  if(window.ChartDataLabels){Chart.register(ChartDataLabels);C.plugins.datalabels.display=false;}
}

function heat(rowDefs,cols,valFn,opts){
  opts=opts||{};
  const dl=opts.delta;
  const gc=`minmax(84px,1.1fr) repeat(${cols.length},minmax(40px,1fr))`+(dl?` minmax(64px,1fr)`:``);
  let h=`<div class="heatwrap"><div class="heat" style="grid-template-columns:${gc};min-width:${110+cols.length*46+(dl?72:0)}px">`;
  h+=`<div></div>`+cols.map(c=>`<div class="cl">${escapeHtml(c.label)}</div>`).join('')+(dl?`<div class="cl">${escapeHtml(dl.label)}</div>`:``);
  rowDefs.forEach(r=>{h+=`<div class="rl">${escapeHtml(r.label)}</div>`;
    cols.forEach(c=>{const v=valFn(r,c);if(v==null){h+=`<div class="hc" style="background:var(--gray-soft);opacity:.35">${opts.nonum?'':'·'}</div>`;return;}const[bg,fg]=scoreColor(v);h+=`<div class="hc" style="background:${bg};color:${fg}">${opts.nonum?'':v.toFixed(0)+(opts.pct?'%':'')}</div>`;});
    if(dl)h+=deltaCell(dl.fn(r));});
  return h+`</div></div>`;
}
/* pill de tendencia vs mes anterior — coloreado por DIRECCIÓN (no por banda de score) */
function deltaCell(d){
  if(d==null)return `<div class="hc dlt" style="background:#f1f3f5;color:#9aa0a6;border-style:dashed" title="Sin mes anterior para comparar">·</div>`;
  const flat=Math.abs(d)<1.5, up=d>0;
  const col=flat?'#6b7280':(up?'var(--green)':'var(--secondary)');
  const lbl=flat?'=':(up?'▲ +':'▼ −')+Math.abs(d).toFixed(0);
  return `<div class="hc dlt" style="background:${col};color:#fff" title="${flat?'Se mantiene':(up?'Subió':'Bajó')} vs mes anterior">${lbl}</div>`;
}
function trendChip(d){
  const flat=Math.abs(d)<1.5, up=d>0;
  const col=flat?'#6b7280':(up?'var(--green)':'var(--secondary)');
  const lbl=flat?'= se mantiene':(up?'▲ +':'▼ −')+Math.abs(d).toFixed(1)+' pts';
  return `<span style="display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:12px;font-weight:700;color:#fff;background:${col};border:2px solid var(--outline);border-radius:999px;padding:2px 10px;box-shadow:2px 2px 0 0 #000;vertical-align:middle">${lbl}</span>`;
}
function lvlColor(v){if(v==null)return null;return ['#171c20','#ff3b30','#ffcc00','#10b981','#1e5af9'][v]||null;}

/* Matriz consolidada: 4 visitas de todas las sedes, ítem por ítem, por período */
function audMatrix(per){
  const locs=DB.locales;
  const rows=(DB.allDetalle||[]).filter(d=>d.periodo===per);
  if(!rows.length)return '<div class="empty">Sin detalle para este período.</div>';
  const periods=[...new Set((DB.allDetalle||[]).map(d=>d.periodo))].sort();
  const pi=periods.indexOf(per), prevPer=pi>0?periods[pi-1]:null;
  const mundos=[], itemsByMundo={};
  rows.slice().sort((a,b)=>(a.orden||0)-(b.orden||0)).forEach(d=>{
    if(!mundos.includes(d.mundo)){mundos.push(d.mundo);itemsByMundo[d.mundo]=[];}
    const key=(d.orden!=null?d.orden:'')+'␟'+d.item;
    if(!itemsByMundo[d.mundo].some(x=>x.key===key))itemsByMundo[d.mundo].push({key,orden:d.orden,item:d.item});
  });
  const cur={}, prev={};
  (DB.allDetalle||[]).forEach(d=>{const k=d.local_id+'|'+d.mundo+'|'+((d.orden!=null?d.orden:'')+'␟'+d.item);if(d.periodo===per)cur[k]=d;else if(prevPer&&d.periodo===prevPer)prev[k]=d;});
  const iavg=d=>{if(!d)return null;const xs=[d.v1,d.v2,d.v3,d.v4].filter(v=>v!=null);return xs.length?xs.reduce((a,b)=>a+b,0)/xs.length:null;};
  const dind=k=>{const ca=iavg(cur[k]),pa=prevPer?iavg(prev[k]):null;
    if(ca==null||pa==null)return `<div class="dind" style="color:#c8ccd0" title="sin comparación">·</div>`;
    const dd=ca-pa, flat=Math.abs(dd)<0.13, up=dd>0, col=flat?'#9aa0a6':(up?'var(--green)':'var(--secondary)');
    return `<div class="dind" style="color:${col}" title="${flat?'se mantiene':(up?'subió':'bajó')} vs ${prevPer}">${flat?'=':(up?'▲':'▼')}</div>`;};
  const sedeRow=`<div class="srow"><div class="num"></div><div class="lbl"></div>`+locs.map(l=>`<div class="cgh">${escapeHtml(l.nombre)}</div>`).join('')+`</div>`;
  const mScore=(mu,lid,src)=>{let s=0,c=0;itemsByMundo[mu].forEach(it=>{const d=src[lid+'|'+mu+'|'+it.key];if(d)[d.v1,d.v2,d.v3,d.v4].forEach(v=>{if(v!=null){s+=v;c++;}});});return c?s/c/4*100:null;};
  let body='';
  mundos.forEach(mu=>{
    body+=`<div class="muh">${escapeHtml(mu)}</div>`+sedeRow;
    itemsByMundo[mu].forEach(it=>{
      body+=`<div class="mrow"><div class="num">${it.orden!=null?it.orden:''}</div><div class="lbl">${escapeHtml(it.item)}</div>`
        +locs.map(l=>{const k=l.id+'|'+mu+'|'+it.key,d=cur[k];
          return `<div class="cg">`+[1,2,3,4].map(n=>{const v=d?d['v'+n]:null,col=lvlColor(v);return `<div class="msq" style="background:${col||'#fff'}${col?'':';border-color:#e8eaed'}"></div>`;}).join('')+dind(k)+`</div>`;}).join('')
        +`</div>`;
    });
    body+=`<div class="scorerow"><div class="num"></div><div class="lbl">Puntaje ${escapeHtml(mu)}</div>`
      +locs.map(l=>{const s=mScore(mu,l.id,cur);if(s==null)return `<div class="scv"></div>`;const sc=scoreColor(s),p=prevPer?mScore(mu,l.id,prev):null,dd=(p==null)?null:s-p;
        const arr=dd==null?'':(Math.abs(dd)<0.5?'<span style="color:#9aa0a6;font-weight:800">=</span>':dd>0?'<span style="color:var(--green);font-weight:800">▲</span>':'<span style="color:var(--secondary);font-weight:800">▼</span>');
        return `<div class="scv"><span style="background:${sc[0]};color:${sc[1]}">${Math.round(s)}%</span>${arr}</div>`;}).join('')
      +`</div>`;
  });
  return `<div class="mg"><div class="grid" style="min-width:${230+locs.length*118}px">${body}</div></div>`;
}
function barRow(nm,s){const c=scoreColor(s)[0];return `<div class="barrow"><div class="nm">${escapeHtml(nm)}</div><div class="bartrack"><div class="barfill" style="width:${Math.min(100,s)}%;background:${c}"></div></div><div class="pc">${s.toFixed(0)}</div></div>`;}
const LEGEND=[['≥90','#1e5af9'],['80–89','#10b981'],['70–79','#ffcc00'],['<70','#ff3b30']].map(([t,c])=>`<span><i style="background:${c}"></i>${t}</span>`).join('');
function periodBar(ms){return `<div class="perbar"><button class="pchip ${PER==='all'?'on':''}" onclick="setPer('all')">Todos</button>`+ms.map(m=>`<button class="pchip ${PER===m?'on':''}" onclick="setPer('${m}')">${mLabel(m)}</button>`).join('')+`</div>`;}

async function load(){
  themeCharts();
  const [loc,pl,vi,ac]=await Promise.all([
    sb.from('inv_locales').select('id,nombre').eq('marca_id',MARCA).order('orden',{nullsFirst:false}).order('id'),
    sb.from('mys_plantillas').select('*').eq('local_id',LOCAL).eq('activo',true).order('created_at').limit(1),
    sb.from('mys_visitas').select('*').eq('marca_id',MARCA).order('fecha',{ascending:false}),
    sb.from('mys_acciones').select('*').eq('local_id',LOCAL).order('created_at',{ascending:false})
  ]);
  DB.locales=loc.data||[];
  DB.plantilla=(pl.data||[])[0]||null;
  DB.allVisitas=vi.data||[];
  DB.visitas=DB.allVisitas.filter(v=>v.local_id===LOCAL);
  DB.acciones=ac.data||[];
  if(DB.plantilla){const cr=await sb.from('mys_criterios').select('*').eq('plantilla_id',DB.plantilla.id).order('orden');DB.criterios=cr.data||[];}
  if(DB.allVisitas.length){const rp=await sb.from('mys_respuestas').select('*').in('visita_id',DB.allVisitas.map(v=>v.id));DB.allResp=rp.data||[];}else DB.allResp=[];
  const locVis=new Set(DB.visitas.map(v=>v.id));
  DB.respuestas=DB.allResp.filter(r=>locVis.has(r.visita_id));
  try{let all=[],from=0;const page=1000;while(true){const r=await sb.from('mys_detalle').select('*').eq('marca_id',MARCA).order('orden').range(from,from+page-1);const d=r.data||[];all=all.concat(d);if(d.length<page)break;from+=page;}DB.allDetalle=all;DB.detalle=all.filter(d=>d.local_id===LOCAL);}catch(e){DB.allDetalle=[];DB.detalle=[];}
  if(!booted){booted=true;if(DB.locales.length>1)TAB='consolidado';}
  buildTabs();render();
  document.getElementById('boot').classList.add('gone');
}

function buildTabs(){
  const base=[{k:'resumen',ic:'insights',t:'Resumen'},{k:'tendencias',ic:'show_chart',t:'Tendencias'},{k:'radar',ic:'radar',t:'Radar'},{k:'detalle',ic:'table_rows',t:'Detalle'},{k:'acciones',ic:'checklist',t:'Plan'}];
  if(DB.detalle&&DB.detalle.length)base.splice(4,0,{k:'auditoria',ic:'grid_view',t:'Auditoría'});
  const tabs=DB.locales.length>1?[{k:'consolidado',ic:'stacked_bar_chart',t:'Todas las sedes'},...base]:base;
  document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tab ${TAB===t.k?'active':''}" onclick="setTab('${t.k}')"><span class="material-symbols-outlined">${t.ic}</span>${t.t}</button>`).join('');
}
function setTab(t){TAB=t;buildTabs();render();}
function render(){
  PENDING=[];
  const v=document.getElementById('view');
  if(TAB==='consolidado')v.innerHTML=vConsolidado();

}

/* ===== RESUMEN (por sede) ===== */
function vResumen(){
  const Vall=DB.visitas, Rall=DB.respuestas;
  if(!Vall.length)return '<div class="empty">Aún no hay evaluaciones para esta sede.<br>Toca «Nueva evaluación» para registrar la primera.</div>';
  const msAll=months(Vall);
  const V=perVis(Vall); const idsP=new Set(V.map(v=>v.id)); const R=Rall.filter(r=>idsP.has(r.visita_id));
  const crit=DB.criterios.map(c=>c.criterio);
  const cAvg=c=>{const x=R.filter(z=>z.criterio===c).map(z=>+z.puntaje||0);return x.length?avg(x):0;};
  const rows=crit.map(c=>({c,s:cAvg(c)})).sort((a,b)=>b.s-a.s);
  const best=rows[0]||{c:'—',s:0}, worst=rows[rows.length-1]||{c:'—',s:0};
  const lastM=msAll[msAll.length-1], lastScore=avg(Vall.filter(v=>(v.fecha||'').slice(0,7)===lastM).map(v=>+v.score_total||0));
  const anual=avg(Vall.map(v=>+v.score_total||0));
  const periodLbl=PER==='all'?'todos los meses':mLabel(PER);
  const barCfg={type:'bar',data:{labels:rows.map(r=>r.c),datasets:[{data:rows.map(r=>Math.round(r.s)),backgroundColor:rows.map(r=>scoreColor(r.s)[0]),borderColor:'#000',borderWidth:2,borderRadius:6}]},options:{indexAxis:'y',scales:{x:{min:0,max:100,ticks:{stepSize:20}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.x+'/100'}},datalabels:{display:true,anchor:'end',align:'start',offset:6,color:ctx=>{const v=ctx.dataset.data[ctx.dataIndex];return (v>=70&&v<80)?'#3a2e00':'#fff';},font:{weight:'700',size:11},formatter:v=>v}}}};
  const bands=[0,0,0,0];rows.forEach(r=>{bands[r.s>=90?0:r.s>=80?1:r.s>=70?2:3]++;});
  const donut={type:'doughnut',data:{labels:['Excelente','Bueno','Regular','A mejorar'],datasets:[{data:bands,backgroundColor:['#1e5af9','#10b981','#ffcc00','#ff3b30'],borderColor:'#000',borderWidth:2}]},options:{cutout:'58%',plugins:{legend:{position:'bottom'},datalabels:{display:true,color:ctx=>ctx.dataIndex===2?'#3a2e00':'#fff',font:{weight:'800',size:14},formatter:(v,ctx)=>{const t=ctx.dataset.data.reduce((a,b)=>a+(+b||0),0);return v>0&&t?Math.round(v/t*100)+'%':'';}}}}};
  return `
  ${periodBar(msAll)}
  <div class="kpis">
   <div class="kpi reveal"><div class="lbl"><span class="material-symbols-outlined" style="font-size:14px;color:var(--primary)">emoji_events</span>Mejor criterio</div><div class="val" style="font-size:18px">${escapeHtml(best.c)}</div><div class="sub">${best.s.toFixed(0)}/100</div></div>
   <div class="kpi reveal"><div class="lbl"><span class="material-symbols-outlined" style="font-size:14px;color:var(--secondary)">warning</span>Crítico</div><div class="val down" style="font-size:18px">${escapeHtml(worst.c)}</div><div class="sub">${worst.s.toFixed(0)}/100</div></div>
   <div class="kpi reveal"><div class="lbl"><span class="material-symbols-outlined" style="font-size:14px">event</span>Último mes</div><div class="val">${lastScore.toFixed(0)}</div><div class="sub">${mLabel(lastM)}</div></div>
   <div class="kpi reveal"><div class="lbl"><span class="material-symbols-outlined" style="font-size:14px">trending_up</span>Promedio</div><div class="val">${anual.toFixed(0)}</div><div class="sub">${msAll.length} meses</div></div>
  </div>
  <div class="section"><div class="section-h"><h3>Puntaje por criterio</h3><span class="hint">${periodLbl}</span></div><div class="card">${chart('rbar',barCfg,Math.max(300,crit.length*28))}</div></div>
  <div class="section"><div class="section-h"><h3>Distribución por nivel</h3><span class="hint">criterios en cada banda · ${periodLbl}</span></div><div class="card">${chart('rdon',donut,250)}</div></div>`;
}

/* ===== TENDENCIAS ===== */
function vTendencias(){
  const V=DB.visitas, R=DB.respuestas, crit=DB.criterios.map(c=>c.criterio), ms=months(V);
  if(!V.length)return '<div class="empty">Sin datos.</div>';
  const v2m={};V.forEach(v=>v2m[v.id]=(v.fecha||'').slice(0,7));
  const cAvgAll=c=>avg(R.filter(z=>z.criterio===c).map(z=>+z.puntaje||0));
  if(SELC===null)SELC=new Set([...crit].sort((a,b)=>cAvgAll(a)-cAvgAll(b)).slice(0,3));
  const sel=crit.filter(c=>SELC.has(c));
  const ds=sel.map(c=>{const col=CRIT_COLORS[crit.indexOf(c)%CRIT_COLORS.length];return {label:c,data:ms.map(m=>{const x=R.filter(z=>z.criterio===c&&v2m[z.visita_id]===m).map(z=>+z.puntaje||0);return x.length?Math.round(avg(x)):null;}),borderColor:col,backgroundColor:col,pointBackgroundColor:col,pointBorderColor:'#171c20',pointBorderWidth:2,borderWidth:3,tension:.3,spanGaps:true,pointRadius:4,pointHoverRadius:6};});
  const pills=`<div class="pills">${crit.map(c=>`<button class="pill ${SELC.has(c)?'on':''}" onclick="toggleCrit('${c.replace(/'/g,"\\'")}')">${escapeHtml(c)}</button>`).join('')}</div>`;
  const cfg={type:'line',data:{labels:ms.map(m=>MESN[+m.split('-')[1]]),datasets:ds},options:{scales:{y:{min:0,max:100,ticks:{stepSize:20}}},plugins:{legend:{position:'bottom'}}}};
  return `<div class="section"><div class="section-h"><h3>Evolución por criterio</h3><span class="hint">elige criterios</span></div>${pills}<div class="card">${sel.length?chart('tend',cfg,320):'<div class="empty">Selecciona al menos un criterio.</div>'}</div></div>`;
}
function toggleCrit(c){if(SELC===null)SELC=new Set();SELC.has(c)?SELC.delete(c):SELC.add(c);render();}

/* ===== RADAR ===== */
function vRadar(){
  const V=DB.visitas, R=DB.respuestas, crit=DB.criterios.map(c=>c.criterio), ms=months(V);

  const chips=`<div class="perbar"><button class="pchip ${RADSEL==='all'?'on':''}" onclick="setRad('all')">Todos</button>`+ms.map(m=>`<button class="pchip ${RADSEL===m?'on':''}" onclick="setRad('${m}')">${mLabel(m)}</button>`).join('')+`</div>`;
  const cfg={type:'radar',data:{labels:crit,datasets:ds},options:{scales:{r:{min:0,max:100,ticks:{stepSize:20,backdropColor:'transparent'}}},plugins:{legend:{position:'bottom'}}}};

function setRad(m){RADSEL=m;render();}

/* ===== DETALLE (4 visitas del mes juntas) ===== */
function vDetalle(){
  const V=DB.visitas, R=DB.respuestas, multi=DB.locales.length>1, ms=multi?months(DB.allVisitas):months(V);
  if(!V.length && !multi)return '<div class="empty">Sin datos.</div>';
  const v2m={};V.forEach(v=>v2m[v.id]=(v.fecha||'').slice(0,7));
  const crows=DB.criterios.map(c=>({key:c.criterio,label:c.criterio}));
  // ---- Vista general del mes (todas las sedes) — solo clientes multi-sede con un mes elegido ----
  const genMes=()=>{
    if(!multi||PER==='all')return '';
    const Va=DB.allVisitas, Ra=DB.allResp, a2m={}, a2l={};
    Va.forEach(v=>{a2m[v.id]=(v.fecha||'').slice(0,7);a2l[v.id]=v.local_id;});
    const msA=months(Va), mr=Ra.filter(z=>a2m[z.visita_id]===PER);
    const gcols=DB.locales.map(l=>({key:l.id,label:l.nombre})).concat([{key:'__g',label:'General'}]);
    const gval=(r,c)=>{const src=c.key==='__g'?mr:mr.filter(z=>a2l[z.visita_id]===c.key);const x=src.filter(z=>z.criterio===r.key).map(z=>+z.puntaje||0);return x.length?avg(x):null;};
    const idx=msA.indexOf(PER), pM=idx>0?msA[idx-1]:null;
    const gcur=r=>{const x=mr.filter(z=>z.criterio===r.key).map(z=>+z.puntaje||0);return x.length?avg(x):null;};
    const gprev=r=>{if(!pM)return null;const x=Ra.filter(z=>z.criterio===r.key&&a2m[z.visita_id]===pM).map(z=>+z.puntaje||0);return x.length?avg(x):null;};
    const gdelta=pM?{label:'vs '+MESN[+pM.split('-')[1]],fn:r=>{const c=gcur(r),p=gprev(r);return(c==null||p==null)?null:c-p;}}:null;
    const nv=Va.filter(v=>a2m[v.id]===PER).length;
    const gh=pM?`vs ${mLabel(pM)} en la última columna · ▲ mejoró · ▼ bajó · = se mantiene`:'primer mes · aún no hay comparación';
    return `<div class="section"><div class="section-h"><h3>Vista general del mes · todas las sedes</h3><span class="hint">${mLabel(PER)} · ${nv} evaluaciones · ${gh}</span></div><div class="card">${heat(crows,gcols,gval,{delta:gdelta})}<div class="legend">${LEGEND}</div></div></div>`;
  };
  if(PER==='all'){
    return periodBar(ms)+genMes()+`<div class="section"><div class="section-h"><h3>Puntaje por criterio y mes</h3><span class="hint">elige un mes para ver sus 4 visitas${multi?' y la vista general de sedes':''}</span></div><div class="card">${heat(crows,ms.map(m=>({key:m,label:MESN[+m.split('-')[1]]})),(r,c)=>{const x=R.filter(z=>z.criterio===r.key&&v2m[z.visita_id]===c.key).map(z=>+z.puntaje||0);return x.length?avg(x):null;})}<div class="legend">${LEGEND}</div></div></div>`;
  }
  const vis=V.filter(v=>(v.fecha||'').slice(0,7)===PER).sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||''));
  const pmap={};R.forEach(r=>{pmap[r.visita_id+'|'+r.criterio]=+r.puntaje||0;});
  const cols=vis.map((v,i)=>({key:v.id,label:'V'+(i+1)})).concat([{key:'__p',label:'Prom'}]);
  const valFn=(r,c)=>{if(c.key==='__p'){const x=vis.map(v=>pmap[v.id+'|'+r.key]).filter(z=>z!=null);return x.length?avg(x):null;}const z=pmap[c.key+'|'+r.key];return z==null?null:z;};
  // comparación vs mes anterior (por criterio y global)
  const idx=ms.indexOf(PER), prevM=idx>0?ms[idx-1]:null;
  const curCrit=r=>{const x=vis.map(v=>pmap[v.id+'|'+r.key]).filter(z=>z!=null);return x.length?avg(x):null;};
  const prevCrit=r=>{if(!prevM)return null;const x=R.filter(z=>z.criterio===r.key&&v2m[z.visita_id]===prevM).map(z=>+z.puntaje||0);return x.length?avg(x):null;};
  const delta=prevM?{label:'vs '+MESN[+prevM.split('-')[1]],fn:r=>{const c=curCrit(r),p=prevCrit(r);return(c==null||p==null)?null:c-p;}}:null;
  const totD=prevM?avg(vis.map(v=>+v.score_total||0))-avg(V.filter(v=>v2m[v.id]===prevM).map(v=>+v.score_total||0)):null;
  const hchip=totD==null?'':' '+trendChip(totD);
  const dhint=prevM?`vs ${mLabel(prevM)} en la última columna · ▲ subió · ▼ bajó · = se mantiene`:'primer mes del periodo · aún no hay comparación';
  const sedeName=(DB.locales.find(l=>l.id===LOCAL)||{}).nombre||'';
  const stitle=(multi&&vis.length?escapeHtml(sedeName)+' · ':'')+mLabel(PER)+' · '+vis.length+' visitas'+hchip;
  const perSede=vis.length?`<div class="section"><div class="section-h"><h3>${stitle}</h3><span class="hint">${dhint}</span></div><div class="card">${heat(crows,cols,valFn,{delta})}<div class="legend">${LEGEND}</div></div></div>`:'';
  return periodBar(ms)+genMes()+perSede;
}

/* ===== AUDITORÍA (detalle ítem por ítem, color) ===== */
function vAuditoria(){
  const det=DB.detalle||[];
  const V=DB.visitas,R=DB.respuestas,ms=months(V);
  const v2m={};V.forEach(v=>v2m[v.id]=(v.fecha||'').slice(0,7));
  let h=`<div class="section"><div class="section-h"><h3>Puntajes generales</h3><span class="hint">% alcanzado por criterio y mes</span></div>
    <div class="card">${heat(DB.criterios.map(c=>({key:c.criterio,label:c.criterio})),ms.map(m=>({key:m,label:MESN[+m.split('-')[1]]})),(r,c)=>{const x=R.filter(z=>z.criterio===r.key&&v2m[z.visita_id]===c.key).map(z=>+z.puntaje||0);return x.length?avg(x):null;},{pct:true})}<div class="legend">${LEGEND}</div></div></div>`;
  if(!det.length)return h+'<div class="empty">Sin detalle ítem por ítem cargado.</div>';
  const periodos=[...new Set(det.map(d=>d.periodo))].sort();
  const per=AUDPER||periodos[periodos.length-1];
  const items=det.filter(d=>d.periodo===per);
  const mundos=[];items.forEach(d=>{if(!mundos.includes(d.mundo))mundos.push(d.mundo);});
  const chips=periodos.length>1?`<div class="perbar">${periodos.map(p=>`<button class="pchip ${p===per?'on':''}" onclick="setAud('${p}')">${escapeHtml(p)}</button>`).join('')}</div>`:'';
  const lvlLeg=[['Sin evaluar','#f1f1f1'],['No cumple','#171c20'],['Bajo','#ff3b30'],['Medio','#ffcc00'],['Bueno','#10b981'],['Excelente','#1e5af9']].map(([t,c])=>`<span><i style="background:${c}"></i>${t}</span>`).join('');
  const LVLN=['No cumple','Bajo','Medio','Bueno','Excelente'];
  const visCols=[1,2,3,4].filter(n=>items.some(d=>d['v'+n]!=null));
  const multi=DB.locales.length>1;
  const sedesChip=multi?`<button class="pchip ${AUDVIS==='sedes'?'on':''}" onclick="setAudVis('sedes')"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:-2px">table_view</span> Todas las sedes</button>`:'';
  const visBar=`<div class="perbar">`+sedesChip+`<button class="pchip ${AUDVIS==null?'on':''}" onclick="setAudVis('all')"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:-2px">grid_view</span> Grilla</button>`
    +visCols.map(n=>`<button class="pchip ${AUDVIS===n?'on':''}" onclick="setAudVis('${n}')">Visita ${n}</button>`).join('')+`</div>`;
  // --- consolidado: 4 visitas de TODAS las sedes juntas, ítem por ítem ---
  if(AUDVIS==='sedes'&&multi){
    return h+`<div class="section"><div class="section-h"><h3>Detalle por sede · ${escapeHtml(per)}</h3><span class="hint">las 4 visitas de cada sede + ▲/▼ vs mes anterior, ítem por ítem</span></div>${chips}${visBar}<div class="legend" style="margin:0 0 10px">${lvlLeg}</div><div class="card">${audMatrix(per)}</div></div>`;
  }
  // --- desglose ítem por ítem de UNA visita, agrupado por sección ---
  if(AUDVIS!=null){
    const n=AUDVIS;
    let body='';
    mundos.forEach(mu=>{
      const muItems=items.filter(d=>d.mundo===mu);
      const scored=muItems.map(d=>d['v'+n]).filter(v=>v!=null);
      const sub=scored.length?`${avg(scored).toFixed(1)}/4 · ${scored.length} ítem${scored.length!==1?'s':''}`:'sin evaluar';
      body+=`<div class="vmh">${escapeHtml(mu)}<span class="sc">${sub}</span></div>`;
      muItems.forEach(d=>{
        const v=d['v'+n], col=lvlColor(v), lbl=v==null?'N/A':(LVLN[v]||v);
        const tc=(v===2)?';color:#3a2e00':'';
        body+=`<div class="vrow"><span class="vbadge${v==null?' na':''}"${col?` style="background:${col}${tc}"`:''}>${lbl}</span><span class="vit">${escapeHtml(d.item)}</span></div>`;
        const com=d.comentario||d['c'+n]||'';
        if(com)body+=`<div class="vcom"><span class="material-symbols-outlined">chat</span>${escapeHtml(com)}</div>`;
      });
    });
    const allScored=items.map(d=>d['v'+n]).filter(v=>v!=null);
    const tot=allScored.length?Math.round(avg(allScored)/4*100):0;
    return h+`<div class="section"><div class="section-h"><h3>Visita ${n} · ${escapeHtml(per)}</h3><span class="hint">${allScored.length} ítems evaluados · ${tot}/100</span></div>${chips}${visBar}<div class="legend" style="margin:0 0 10px">${lvlLeg}</div><div class="card">${body||'<div class="empty">Sin ítems.</div>'}</div></div>`;
  }
  // --- grilla: todas las visitas del período lado a lado ---
  let g='<div class="dg">';
  mundos.forEach(mu=>{
    g+=`<div class="mh"><span class="mu">${escapeHtml(mu)}</span><span class="sqs">`+visCols.map(c=>`<span class="vh">V${c}</span>`).join('')+`</span></div>`;
    items.filter(d=>d.mundo===mu).forEach(d=>{
      const naRow=visCols.every(c=>d['v'+c]==null);
      g+=`<div class="drow${naRow?' na':''}"><div class="it">${escapeHtml(d.item)}</div><div class="sqs">`
        +visCols.map(c=>{const v=d['v'+c],col=lvlColor(v);return `<div class="sq" style="background:${col||'#fff'}${col?'':';border-color:#e8eaed'}"></div>`;}).join('')+`</div></div>`;
    });
  });
  g+='</div>';
  return h+`<div class="section"><div class="section-h"><h3>Detalle por visita · ${escapeHtml(per)}</h3><span class="hint">${items.length} ítems · toca una visita para el desglose</span></div>${chips}${visBar}<div class="legend" style="margin:0 0 10px">${lvlLeg}</div><div class="card">${g}</div></div>`;
}

/* ===== CONSOLIDADO (todas las sedes) ===== */
function vConsolidado(){
  const Vall=DB.allVisitas, Rall=DB.allResp, locs=DB.locales;
  if(!Vall.length)return '<div class="empty">Sin datos.</div>';
  const msAll=months(Vall);
  const v2l={},v2m={};Vall.forEach(v=>{v2l[v.id]=v.local_id;v2m[v.id]=(v.fecha||'').slice(0,7);});
  const V=perVis(Vall); const idsP=new Set(V.map(v=>v.id)); const R=Rall.filter(r=>idsP.has(r.visita_id));
  const periodLbl=PER==='all'?'todos los meses':mLabel(PER);
  const sede=locs.map((l,i)=>{const vs=V.filter(v=>v.local_id===l.id);
    let delta;
    if(PER==='all'){const a=avg(Vall.filter(v=>v.local_id===l.id&&v2m[v.id]===msAll[0]).map(v=>+v.score_total||0));const b=avg(Vall.filter(v=>v.local_id===l.id&&v2m[v.id]===msAll[msAll.length-1]).map(v=>+v.score_total||0));delta=b-a;}
    else{const idx=msAll.indexOf(PER);const prev=idx>0?avg(Vall.filter(v=>v.local_id===l.id&&v2m[v.id]===msAll[idx-1]).map(v=>+v.score_total||0)):null;delta=prev==null?null:avg(vs.map(v=>+v.score_total||0))-prev;}
    return {l,n:vs.length,s:avg(vs.map(v=>+v.score_total||0)),delta,color:SEDE_COLORS[i%SEDE_COLORS.length]};
  }); // orden fijo (por inv_locales.orden); el ranking va solo como número
  const byScore=[...sede].sort((a,b)=>b.s-a.s);
  const rankOf={};byScore.forEach((x,i)=>{rankOf[x.l.id]=i+1;});
  const top=byScore[0], bot=byScore[byScore.length-1];
  const ds=locs.map((l,i)=>{const col=SEDE_COLORS[i%SEDE_COLORS.length];return {label:l.nombre,data:msAll.map(m=>{const vs=Vall.filter(v=>v.local_id===l.id&&v2m[v.id]===m);return vs.length?Math.round(avg(vs.map(v=>+v.score_total||0))):null;}),borderColor:col,backgroundColor:col,pointBackgroundColor:col,pointBorderColor:'#171c20',pointBorderWidth:2,borderWidth:3,tension:.3,spanGaps:true,pointRadius:4,pointHoverRadius:6};});
  const evoCfg={type:'line',data:{labels:msAll.map(m=>MESN[+m.split('-')[1]]),datasets:ds},options:{scales:{y:{min:40,max:100}},plugins:{legend:{position:'bottom'}}}};
  const crit=DB.criterios.map(c=>({key:c.criterio,label:c.criterio}));
  const cols=locs.map(l=>({key:l.id,label:l.nombre}));
  const cellCS=(r,c)=>{const x=R.filter(z=>z.criterio===r.key&&v2l[z.visita_id]===c.key).map(z=>+z.puntaje||0);return x.length?avg(x):null;};
  const tcols=sede.map(x=>({key:x.l.id,label:x.l.nombre}));
  const trows=[{key:'__all',label:'Score general'}].concat(areasOf().map(a=>({key:a,label:a})));
  const tval=(r,c)=>{if(r.key==='__all'){const vs=V.filter(v=>v.local_id===c.key);return vs.length?avg(vs.map(v=>+v.score_total||0)):null;}const rr=R.filter(z=>v2l[z.visita_id]===c.key&&z.area===r.key);return rr.length?wAvg(rr):null;};
  const critAvg=DB.criterios.map(c=>({k:c.criterio,s:avg(R.filter(z=>z.criterio===c.criterio).map(z=>+z.puntaje||0))})).sort((a,b)=>a.s-b.s);
  const wc=critAvg[0]||{k:'—',s:0};
  const tRank=(top&&bot)?`${top.l.nombre} lidera (${top.s.toFixed(0)}); ${bot.l.nombre} cierra el grupo (${bot.s.toFixed(0)})`:'Ranking de sedes';
  return `
  ${periodBar(msAll)}
  <div class="section"><div class="section-h"><h3>${tRank}</h3><span class="hint">${V.length} evaluaciones · ${periodLbl}</span></div>
    <div class="sedes">${sede.map((x,i)=>`<div class="sedecard reveal" style="border-top:6px solid ${scoreColor(x.s)[0]}">
      <div class="rank">#${rankOf[x.l.id]}</div><div class="nm">${escapeHtml(x.l.nombre)}</div>
      <div class="big">${x.s.toFixed(0)}<span style="font-size:15px;opacity:.4">/100</span></div>
      <div class="trend ${x.delta==null?'':x.delta>=0?'up':'down'}">${x.delta==null?(x.n+' visitas'):((x.delta>=0?'▲ +':'▼ ')+x.delta.toFixed(1)+' pts · '+x.n+' vis.')}</div></div>`).join('')}</div></div>
  <div class="section"><div class="section-h"><h3>Puntajes comparativos por sede</h3><span class="hint">general y por área · ${periodLbl}</span></div>
    <div class="card">${heat(trows,tcols,tval)}<div class="legend">${LEGEND}</div></div></div>
  <div class="section"><div class="section-h"><h3>Evolución por sede</h3><span class="hint">score mensual</span></div>
    <div class="card">${chart('evo',evoCfg,300)}</div></div>
  <div class="section"><div class="section-h"><h3>${wc.k} es la debilidad transversal (${wc.s.toFixed(0)}/100)</h3><span class="hint">criterio × sede · ${periodLbl}</span></div>
    <div class="card">${heat(crit,cols,cellCS)}<div class="legend">${LEGEND}</div></div></div>`;
}

/* ===== NUEVA EVALUACIÓN ===== */
let NEW={};
function openNueva(){
  if(!DB.plantilla){toast('No hay plantilla activa','err');return;}
  NEW={fecha:new Date().toISOString().slice(0,10),turno:'cena',canal:'presencial',evaluador:'',empleado:'',resumen:'',punt:{},com:{}};
  document.getElementById('shTitle').textContent='Nueva evaluación';
  document.getElementById('shMeta').textContent=DB.plantilla.nombre;
  renderNueva();openSheet();
}
function renderNueva(){
  const areas=areasOf();
  let h=`<div class="livescore"><div class="field-lbl" style="margin:0">Score en vivo</div><span class="score-pill ${sCls(liveScore())}" id="liveS" style="font-size:18px">${liveScore().toFixed(0)}/100</span></div>`;
  h+=`<div class="grid2"><div><label class="field-lbl">Fecha</label><input type="date" class="input" value="${NEW.fecha}" onchange="NEW.fecha=this.value"></div>
   <div><label class="field-lbl">Turno</label><select class="select" onchange="NEW.turno=this.value"><option value="almuerzo">Almuerzo</option><option value="cena" selected>Cena</option></select></div></div>`;
  h+=`<div class="grid2"><div><label class="field-lbl">Evaluador</label><input class="input" placeholder="Nombre" oninput="NEW.evaluador=this.value"></div>
   <div><label class="field-lbl">Canal</label><select class="select" onchange="NEW.canal=this.value"><option value="presencial">Presencial</option><option value="delivery">Delivery</option></select></div></div>`;
  areas.forEach(a=>{
    h+=`<div class="area-h">${escapeHtml(a)}</div>`;
    DB.criterios.filter(c=>c.area===a).forEach(c=>{
      const cur=NEW.punt[c.id];
      h+=`<div class="crit"><div class="ct"><span>${escapeHtml(c.criterio)}</span></div>
        <div class="scale" id="sc-${c.id}">${[0,25,50,75,100].map(n=>`<div class="dot ${cur===n?'on':''}" data-n="${n}" onclick="setPunt('${c.id}',${n})">${n}</div>`).join('')}</div>
        <input class="input" style="margin-top:6px;font-size:13px" placeholder="Comentario (opcional)" value="${(NEW.com[c.id]||'').replace(/"/g,'&quot;')}" oninput="NEW.com['${c.id}']=this.value"></div>`;
    });
  });
  h+=`<label class="field-lbl">Resumen / observaciones</label><textarea class="input" oninput="NEW.resumen=this.value" placeholder="Qué destacó y qué mejorar…"></textarea>`;
  h+=`<div style="height:14px"></div><button class="btn primary" onclick="saveVisita()"><span class="material-symbols-outlined">save</span>Guardar evaluación</button>`;
  document.getElementById('shBody').innerHTML=h;
}
function setPunt(cid,n){NEW.punt[cid]=n;const sc=document.getElementById('sc-'+cid);if(sc)sc.querySelectorAll('.dot').forEach(d=>d.classList.toggle('on',+d.dataset.n===n));renderNuevaScores();}
function renderNuevaScores(){const s=liveScore();const el=document.getElementById('liveS');if(el){el.textContent=s.toFixed(0)+'/100';el.className='score-pill '+sCls(s);el.style.fontSize='18px';}}
function liveScore(){let n=0,d=0;DB.criterios.forEach(c=>{if(NEW.punt&&NEW.punt[c.id]!=null){const p=+c.peso||1;n+=NEW.punt[c.id]*p;d+=p;}});return d?n/d:0;}
async function saveVisita(){
  const answered=DB.criterios.filter(c=>NEW.punt[c.id]!=null);
  if(!answered.length){toast('Califica al menos un criterio','warn');return;}
  const score=liveScore();
  const {data:vi,error}=await sb.from('mys_visitas').insert({marca_id:MARCA,local_id:LOCAL,plantilla_id:DB.plantilla.id,
    fecha:NEW.fecha,turno:NEW.turno,evaluador:NEW.evaluador||null,canal:NEW.canal,
    score_total:Math.round(score*10)/10,resumen:NEW.resumen||null}).select().single();
  if(error){toast('Error al guardar','err');return;}

const PDFC={primary:[30,90,249],second:[255,59,48],tert:[255,204,0],green:[16,185,129],ink:[23,28,32],cream:[252,249,248],gray:[223,227,232],mut:[120,120,120]};
function pdfScoreRGB(s){if(s>=90)return PDFC.primary;if(s>=80)return PDFC.green;if(s>=70)return PDFC.tert;return PDFC.second;}
function pdfScoreFG(s){return (s>=70&&s<80)?[58,46,0]:[255,255,255];}
function lvlRGB(v){return [[23,28,32],[255,59,48],[255,204,0],[16,185,129],[30,90,249]][v]||null;}
function offChart(cfg,w,h){
  return new Promise(res=>{
    const wrap=document.createElement('div');wrap.style.cssText='position:fixed;left:-99999px;top:0;background:#fff';
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.style.width=w+'px';cv.style.height=h+'px';
    wrap.appendChild(cv);document.body.appendChild(wrap);
    cfg.options=cfg.options||{};cfg.options.responsive=false;cfg.options.maintainAspectRatio=false;cfg.options.animation=false;cfg.options.devicePixelRatio=2;
    cfg.plugins=(cfg.plugins||[]).concat([{id:'wbg',beforeDraw:c=>{const x=c.ctx;x.save();x.globalCompositeOperation='destination-over';x.fillStyle='#fff';x.fillRect(0,0,c.width,c.height);x.restore();}}]);
    let ch;try{ch=new Chart(cv.getContext('2d'),cfg);}catch(e){wrap.remove();res(null);return;}
    requestAnimationFrame(()=>requestAnimationFrame(()=>{let u=null;try{u=cv.toDataURL('image/png');}catch(e){}try{ch.destroy()}catch(e){}wrap.remove();res(u);}));
  });
}
function loadImg(src){return new Promise(res=>{const i=new Image();i.onload=()=>res(i);i.onerror=()=>res(null);i.src=src;});}

async function buildReportPDF(scopeLocal,detArg,scopeMonth){
  const {jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4',compress:true});
  const W=210,H=297,M=16,CW=W-2*M;
  const cliEl=document.querySelector('[data-client-name]');

  const multi=!scopeLocal&&locs.length>1;                 // secciones comparativas solo en el consolidado
  const scopeName=sedeObj?sedeObj.nombre:(locs.length>1?'Todas las sedes':((locs[0]&&locs[0].nombre)||''));
  const Vall=scopeLocal?DB.allVisitas.filter(v=>v.local_id===scopeLocal):DB.allVisitas;
  const _sids=new Set(Vall.map(v=>v.id));
  const Rall=DB.allResp.filter(r=>_sids.has(r.visita_id));
  const msAll=months(Vall);
  const PERX=(scopeMonth==null?PER:scopeMonth);

  const crit=DB.criterios.map(c=>c.criterio);
  const cAvg=c=>{const x=scopeR.filter(z=>z.criterio===c).map(z=>+z.puntaje||0);return x.length?avg(x):0;};
  const critRows=crit.map(c=>({k:c,s:cAvg(c)})).sort((a,b)=>b.s-a.s);
  const best=critRows[0]||{k:'—',s:0},worst=critRows[critRows.length-1]||{k:'—',s:0};
  const overall=avg(scopeV.map(v=>+v.score_total||0));
  const firstM=msAll[0],lastM=msAll[msAll.length-1];
  const fScore=avg(Vall.filter(v=>(v.fecha||'').slice(0,7)===firstM).map(v=>+v.score_total||0));

  const delta=(msAll.length>1)?(lScore-fScore):0;
  const perLbl=PERX==='all'?(msAll.length?`${mLabel(firstM)} a ${mLabel(lastM)}`:'Histórico'):mLabel(PERX);
  const genDate=new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'long',year:'numeric'});
  const v2m={},v2l={};Vall.forEach(v=>{v2m[v.id]=(v.fecha||'').slice(0,7);v2l[v.id]=v.local_id;});

  let page=0,y=0;
  function footer(){page++;doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(...PDFC.mut);

  function np(){footer();doc.addPage();doc.setFillColor(...PDFC.cream);doc.rect(0,0,W,H,'F');y=22;}
  function ensure(h){if(y+h>H-16)np();}
  function sectionTitle(t,sub,reserve){ensure(26+(reserve||0));doc.setFillColor(...PDFC.primary);doc.rect(M,y,4,12,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(...PDFC.ink);
    const tl=doc.splitTextToSize(t,CW-8);doc.text(tl,M+8,y+5);let yy=y+5+(tl.length-1)*6;

    y=yy+9;}

      doc.setFont(opt.boldRow&&r.bold?'helvetica':'helvetica',r.bold?'bold':'normal');doc.setFontSize(8.5);doc.setTextColor(...PDFC.ink);
      doc.text(doc.splitTextToSize(String(r.label),labW-2)[0],M,yy+rh/2+1.4);
      cols.forEach((c,i)=>{const v=valFn(r,c),cx=M+labW+i*cellW;
        if(v==null){doc.setFillColor(...PDFC.gray);doc.roundedRect(cx+1,yy+1,cellW-2,rh-2,1.3,1.3,'F');}
        else{const bg=pdfScoreRGB(v),fg=pdfScoreFG(v);doc.setFillColor(...bg);doc.roundedRect(cx+1,yy+1,cellW-2,rh-2,1.3,1.3,'F');
          if(!opt.nonum){doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(...fg);doc.text(String(Math.round(v)),cx+cellW/2,yy+rh/2+1.4,{align:'center'});}}});
      yy+=rh;});

  /* ---------- PORTADA ---------- */
  doc.setFillColor(...PDFC.cream);doc.rect(0,0,W,H,'F');
  doc.setFillColor(...PDFC.primary);doc.rect(0,0,W,9,'F');

  const prepLogo=await loadImg('/logo.png');
  if(prepLogo){const lw=50,lh=lw*((prepLogo.height||346)/(prepLogo.width||1044));try{doc.addImage(prepLogo,'PNG',M,26,lw,lh);}catch(e){}}

  doc.setFont('helvetica','bold');doc.setFontSize(13.5);doc.setTextColor(...PDFC.primary);doc.text((scopeIsSede?'Sede: ':'Alcance: ')+scopeName,nx,ny+10);

  cov.forEach((it,i)=>{const bx=M+(i%2)*bw,byy=by+Math.floor(i/2)*(bh+6);
    doc.setFillColor(255,255,255);doc.setDrawColor(...PDFC.ink);doc.setLineWidth(0.5);doc.roundedRect(bx,byy,bw-6,bh,3,3,'FD');
    doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(...PDFC.mut);doc.text(it[0].toUpperCase(),bx+6,byy+8);
    doc.setFont('helvetica','bold');doc.setFontSize(12.5);doc.setTextColor(...PDFC.ink);doc.text(doc.splitTextToSize(it[1],bw-14)[0],bx+6,byy+16);});
  footer();

  /* ---------- RESUMEN EJECUTIVO ---------- */
  doc.addPage();doc.setFillColor(...PDFC.cream);doc.rect(0,0,W,H,'F');y=22;
  let head;

  doc.setFont('helvetica','normal');doc.setFontSize(10.5);doc.setTextColor(...PDFC.ink);

      doc.setFillColor(...est[1]);doc.roundedRect(M,y,22,6,1.5,1.5,'F');doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(...est[2]);doc.text(est[0],M+11,y+4,{align:'center'});
      doc.setFont('helvetica','normal');doc.setFontSize(9.5);doc.setTextColor(...PDFC.ink);

  /* ---------- ANEXO: AUDITORÍA ÍTEM POR ÍTEM (color) ---------- */
  const det=(detArg!=null?detArg:DB.detalle)||[];

        doc.setFont('helvetica','normal');doc.setFontSize(7.8);doc.setTextColor(...PDFC.ink);

        y+=rh;});
      y+=2;});

    /* ---------- ANEXO: DESGLOSE POR VISITA (ítem por ítem, con nivel) ---------- */

      y=38;

          const fg=v==null?PDFC.ink:(v===2?[58,46,0]:[255,255,255]);

let MODE='mystery';
let ENC={loaded:false,lista:[],preg:{},pregById:{},resp:{},items:{},sel:null,build:null,view:'lista',alertCount:0};
let RES={loaded:false,lista:[],fSrc:'all',fEst:'all'};

function setMode(m){

    const a=document.getElementById('act-'+x); if(a)a.style.display=(x===m?'inline-flex':'none');
  });

/* ========== ENCUESTAS ========== */
async function loadEncuestas(){
  const e=await sb.from('vc_encuestas').select('*').eq('marca_id',MARCA).order('created_at',{ascending:false});
  ENC.lista=e.data||[];
  const ids=ENC.lista.map(x=>x.id);
  ENC.preg={};ENC.resp={};ENC.items={};
  if(ids.length){
    const [pq,rs]=await Promise.all([
      sb.from('vc_preguntas').select('*').in('encuesta_id',ids).order('orden'),
      sb.from('vc_respuestas').select('*').in('encuesta_id',ids)
    ]);
    (pq.data||[]).forEach(p=>{(ENC.preg[p.encuesta_id]=ENC.preg[p.encuesta_id]||[]).push(p);ENC.pregById[p.id]=p;});
    (rs.data||[]).forEach(r=>{(ENC.resp[r.encuesta_id]=ENC.resp[r.encuesta_id]||[]).push(r);});
    const rids=(rs.data||[]).map(r=>r.id);
    if(rids.length){const it=await sb.from('vc_resp_items').select('*').in('respuesta_id',rids);
      (it.data||[]).forEach(x=>{(ENC.items[x.respuesta_id]=ENC.items[x.respuesta_id]||[]).push(x);});}
  }
  const prevAlerts=ENC.alertCount; ENC.alertCount=alertResponses().length;
  ENC.loaded=true; renderEncuestas(); subscribeEncuestas();
  return ENC.alertCount>prevAlerts;   // true si llegaron nuevas alertas
}
// Realtime: refresca el dashboard al llegar una respuesta nueva y avisa si es negativa
function subscribeEncuestas(){
  if(ENC_RT)return;
  ENC_RT=sb.channel('vc-resp-'+MARCA)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'vc_respuestas',filter:'marca_id=eq.'+MARCA},function(){
      setTimeout(async function(){ const masAlertas=await loadEncuestas(); if(masAlertas){try{navigator.vibrate&&navigator.vibrate(200)}catch(e){} toast('⚠️ Nueva respuesta negativa — revisa Alertas','warn');} else { toast('Nueva respuesta recibida'); } },700);
    }).subscribe();
}
// Score resumido de una respuesta (nps, csat mínimo, comentario, diagnóstico, contacto)
function respScore(r){
  let nps=null,csats=[],comment='',diag='';
  (ENC.items[r.id]||[]).forEach(it=>{const p=ENC.pregById[it.pregunta_id];if(!p)return;
    if(p.tipo==='nps'&&it.valor_num!=null)nps=it.valor_num;
    else if((p.tipo==='csat'||p.tipo==='escala5')&&it.valor_num!=null)csats.push(it.valor_num);
    else if(p.tipo==='abierta'&&it.valor_texto)comment=it.valor_texto;
    else if(p.tipo==='opciones'&&it.valor_texto)diag=it.valor_texto;});
  return {nps,csatMin:csats.length?Math.min.apply(null,csats):null,comment,diag};
}
function esAlerta(s){return (s.nps!=null&&s.nps<=6)||(s.csatMin!=null&&s.csatMin<=2);}
// Respuestas que disparan alerta (detractor o puntaje bajo) y NO atendidas
function alertResponses(){
  const out=[];
  ENC.lista.forEach(e=>(ENC.resp[e.id]||[]).forEach(r=>{if(r.atendida)return;const s=respScore(r);if(esAlerta(s))out.push({r,s,enc:e});}));
  out.sort((a,b)=>(b.r.created_at||'').localeCompare(a.r.created_at||''));
  return out;
}
function encItemsTipo(encId,tipo){
  const ids=(ENC.preg[encId]||[]).filter(p=>p.tipo===tipo).map(p=>p.id);
  if(!ids.length)return [];
  const out=[];(ENC.resp[encId]||[]).forEach(r=>(ENC.items[r.id]||[]).forEach(it=>{if(ids.includes(it.pregunta_id)&&it.valor_num!=null)out.push(it.valor_num);}));
  return out;
}
function encNPS(encId){const a=encItemsTipo(encId,'nps');if(!a.length)return 0;const p=a.filter(x=>x>=9).length,d=a.filter(x=>x<=6).length;return Math.round((p-d)/a.length*100);}
function encCSAT(encId){const a=encItemsTipo(encId,'csat');return a.length?avg(a):0;}
function npsColor(n){return n>=50?'var(--green)':n>=0?'var(--amber)':'var(--secondary)';}

function fmtDT(d){if(!d)return'—';try{return new Date(d).toLocaleString('es-PE',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}catch(e){return d;}}
