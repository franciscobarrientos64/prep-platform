<style>
:root{--primary:#1e5af9;--secondary:#ff3b30;--tertiary:#ffcc00;--bg:#fcf9f8;--surface:#fff;--ink:#171c20;--outline:#000;--primary-soft:#d6e2ff;--gray-soft:#dfe3e8;--green:#10b981;--green-soft:#d1fae5;--amber-soft:#fef3c7;--red-soft:#fee2e2;--shadow-sm:4px 4px 0 0 #000;--shadow:6px 6px 0 0 #000;--font-display:'Bagel Fat One',system-ui,sans-serif;--font-body:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',ui-monospace,monospace;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh}

.btn-ico{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);font-weight:600;font-size:13px;box-shadow:var(--shadow-sm)}
.btn-ico:active{transform:translate(2px,2px);box-shadow:none}.btn-ico.primary{background:var(--primary);color:#fff}
.tabs{flex-shrink:0;display:flex;gap:8px;padding:10px 16px;background:var(--primary-soft);border-bottom:2px solid var(--outline);overflow-x:auto}
.tab{flex-shrink:0;display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);font-weight:600;font-size:13px;box-shadow:var(--shadow-sm)}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}

.av{width:46px;height:46px;border-radius:50%;border:2px solid var(--outline);background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;background-size:cover;background-position:center}
.emp .info{flex:1;min-width:0}.emp .info h3{font-size:15px;font-weight:700}.emp .info .meta{font-family:var(--font-mono);font-size:11px;opacity:.7;display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
.emp .right{text-align:right;flex-shrink:0}
.badge{font-family:var(--font-mono);font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 9px;border-radius:999px;border:2px solid var(--outline)}
.badge.activo{background:var(--green);color:#fff}.badge.inactivo{background:var(--gray-soft);opacity:.7}

.arow{background:var(--surface);border:2px solid var(--outline);border-radius:14px;box-shadow:var(--shadow-sm);padding:11px 13px;margin-bottom:8px;display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center}
.mini-btn{display:inline-flex;align-items:center;gap:4px;padding:7px 11px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);font-weight:600;font-size:12px;box-shadow:2px 2px 0 0 var(--outline)}
.mini-btn.primary{background:var(--primary);color:#fff}.mini-btn.danger{background:var(--secondary);color:#fff}.mini-btn.ghost{background:transparent;box-shadow:none;border-style:dashed}
.pl{background:var(--surface);border:2px solid var(--outline);border-radius:16px;box-shadow:var(--shadow-sm);overflow:hidden}
.pl table{width:100%;border-collapse:collapse;font-size:13px}.pl th{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;opacity:.6;text-align:right;padding:8px 12px;border-bottom:2px solid var(--outline)}.pl th:first-child{text-align:left}

.pl tr.tot td{font-weight:700;border-top:2px solid var(--outline)}
.input,.select{padding:10px 12px;border:2px solid var(--outline);border-radius:10px;background:var(--surface);font-family:var(--font-body);font-size:14px;box-shadow:var(--shadow-sm);width:100%}
.field-lbl{font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;opacity:.6;margin-bottom:6px;display:block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 12px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);font-size:12px;font-weight:600;box-shadow:2px 2px 0 0 var(--outline)}.chip.active{background:var(--ink);color:var(--bg)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 18px;border:2px solid var(--outline);border-radius:14px;font-weight:600;font-size:14px;background:var(--surface);box-shadow:var(--shadow-sm);width:100%;min-height:50px}
.btn:active{transform:translate(2px,2px);box-shadow:none}.btn.primary{background:var(--primary);color:#fff}.btn.danger{background:var(--secondary);color:#fff}.btn.ghost{background:transparent;box-shadow:none;border-style:dashed}
.empty{text-align:center;padding:40px;font-family:var(--font-mono);font-size:12px;opacity:.55}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:80;opacity:0;pointer-events:none;transition:opacity .18s}.backdrop.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:90;background:var(--surface);border-top:3px solid var(--outline);border-radius:24px 24px 0 0;box-shadow:0 -10px 0 0 var(--outline);transform:translateY(100%);transition:transform .25s cubic-bezier(.32,.72,0,1);max-height:92vh;display:flex;flex-direction:column}
.sheet.open{transform:translateY(0)}.sheet-handle{width:48px;height:5px;background:var(--outline);border-radius:999px;margin:12px auto 8px;opacity:.3}
.sheet-head{padding:6px 24px 14px;border-bottom:2px solid var(--outline);display:flex;align-items:center;gap:14px}
.sheet-mark{width:52px;height:52px;border:2px solid var(--outline);border-radius:50%;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;background-size:cover;background-position:center}
.sheet-title{flex:1}.sheet-title h2{font-family:var(--font-display);font-size:22px;line-height:1;margin-bottom:4px}.sheet-title .meta{font-family:var(--font-mono);font-size:11px;opacity:.65}
.sheet-close{width:40px;height:40px;border:2px solid var(--outline);border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
.sheet-body{padding:18px 24px 28px;overflow-y:auto}.sheet-section+.sheet-section{margin-top:14px}
.info-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--gray-soft);font-size:14px;gap:10px}.info-row strong{font-family:var(--font-mono);text-align:right}
.toast-container{position:fixed;top:76px;right:16px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--ink);color:var(--bg);border:2px solid var(--outline);border-radius:12px;padding:12px 18px;font-size:14px;font-weight:600;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;max-width:340px}
.toast.ok{background:var(--primary);color:#fff}.toast.err{background:var(--secondary);color:#fff}.toast.warn{background:var(--tertiary)}
.boot{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:300;transition:opacity .3s}.boot.gone{opacity:0;pointer-events:none}
.boot .logo{position:relative;width:220px;height:73px}.boot .logo .l{position:absolute;inset:0;-webkit-mask:url(/logo.png) center/contain no-repeat;mask:url(/logo.png) center/contain no-repeat;background:var(--ink)}
.boot .spinner{width:34px;height:34px;border:4px solid var(--outline);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.boot .msg{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.12em;opacity:.6}
</style>

<body>
<div id="boot" class="boot"><div class="logo"><span class="l"></span></div><div class="spinner"></div><div class="msg">Oído · pasando lista</div></div>

<script>
const SB_URL='https://jmkvphayyhwzootlybde.supabase.co',SB_KEY='sb_publishable_0-znERv1Ok0Dw-Re44eksw_QAOqDc8M',MARCA=(window.PREP_MARCA||'m6'),LOCAL=(window.PREP_LOCAL||'l11');
const sb=supabase.createClient(SB_URL,SB_KEY);
const AREAS=[['Cocina','restaurant'],['Salón','room_service'],['Bar','local_bar'],['Admin','badge'],['Gerencia','workspace_premium'],['Mantenimiento','cleaning_services']];
const CONTRATOS=['planilla','recibos','part-time','practicante'];
const state={emp:[],roles:[],asis:[],docs:[],prog:[],view:'equipo',semana:lunesDe(new Date()),channel:null};
const DIAS=['lunes','martes','miercoles','jueves','viernes','sabado','domingo'];
const TURNOS=[['mañana','07:00','15:00'],['tarde','15:00','23:00'],['noche','18:00','01:00'],['partido','12:00','22:00']];
function lunesDe(d){const x=new Date(d);const dw=(x.getDay()+6)%7;x.setDate(x.getDate()-dw);x.setHours(0,0,0,0);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0')}
function addDias(iso,n){const[y,m,d]=iso.split('-').map(Number);const dt=new Date(y,m-1,d);dt.setDate(dt.getDate()+n);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')}
function diaSemana(iso){const[y,m,d]=iso.split('-').map(Number);return DIAS[(new Date(y,m-1,d).getDay()+6)%7]}
function turnoData(k){return TURNOS.find(t=>t[0]===k)}
const $=s=>document.querySelector(s),$$=s=>Array.from(document.querySelectorAll(s));
function money(n){return 'S/ '+Number(n||0).toLocaleString('en-US',{maximumFractionDigits:0})}
function hoyISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function nowISO(){return new Date().toISOString()}
function hhmm(ts){if(!ts)return'—';const d=new Date(ts);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function iniciales(e){return((e.nombre||'?')[0]+(e.apellidos||' ')[0]).toUpperCase()}
function normArea(a){const m={cocina:'Cocina','salón':'Salón',salon:'Salón',bar:'Bar',barra:'Bar',admin:'Admin',gerencia:'Gerencia',mantenimiento:'Mantenimiento'};return m[(a||'').toLowerCase()]||a||'Otros'}
function antiguedad(f){if(!f)return'—';const d=new Date(f),n=new Date();let m=(n.getFullYear()-d.getFullYear())*12+(n.getMonth()-d.getMonth());if(m<0)m=0;const a=Math.floor(m/12);return a>0?(a+'a '+(m%12)+'m'):(m+' meses')}
function toast(m,t=''){const e=document.createElement('div');e.className='toast '+t;const i=t==='ok'?'check_circle':t==='err'?'error':t==='warn'?'warning':'info';e.innerHTML='<span class="material-symbols-outlined">'+i+'</span><span>'+m+'</span>';$('#toasts').appendChild(e);setTimeout(()=>{e.style.transition='opacity .3s,transform .3s';e.style.opacity='0';e.style.transform='translateX(120%)';setTimeout(()=>e.remove(),300)},2800)}
function openSheet(){$('#backdrop').classList.add('open');$('#sheet').classList.add('open')}
function closeSheet(){$('#backdrop').classList.remove('open');$('#sheet').classList.remove('open')}
function setHead(mk,t,m,foto){const el=$('#sheet-mark');if(foto){el.style.backgroundImage='url('+foto+')';el.textContent=''}else{el.style.backgroundImage='';el.textContent=mk}$('#sheet-title').textContent=t;$('#sheet-meta').textContent=m||''}

async function loadEmp(){const{data}=await sb.from('rrhh_empleados').select('*').eq('local_id',LOCAL).order('area').order('nombre');state.emp=data||[]}
async function loadRoles(){const{data}=await sb.from('rrhh_roles').select('*').order('area');state.roles=data||[]}
async function loadAsis(){const desde=new Date();desde.setDate(desde.getDate()-30);const d=desde.toISOString().slice(0,10);const{data}=await sb.from('rrhh_asistencia').select('*').eq('local_id',LOCAL).gte('fecha',d).order('fecha',{ascending:false});state.asis=data||[]}
async function loadDocs(){const{data}=await sb.from('rrhh_documentos').select('*').eq('archivado',false).order('fecha_vencimiento');state.docs=data||[]}
async function loadProg(){const fin=addDias(state.semana,7);const{data}=await sb.from('rrhh_programacion').select('*').eq('local_id',LOCAL).gte('fecha',state.semana).lt('fecha',fin);state.prog=data||[]}
async function loadPermisos(){const{data}=await sb.from('rrhh_permisos').select('*').eq('local_id',LOCAL).order('fecha_inicio',{ascending:false});state.permisos=data||[]}
async function loadVentas(){const ini=hoyISO().slice(0,8)+'01';const{data}=await sb.from('ca_pedidos').select('total,estado,abierta_at').eq('local_id',LOCAL).gte('abierta_at',ini+'T00:00:00');state.ventasMes=(data||[]).filter(p=>!['abierta','suspended','cancelada'].includes(p.estado)).reduce((s,p)=>s+Number(p.total||0),0)}
async function loadPostulantes(){const{data}=await sb.from('rrhh_postulantes').select('*').eq('local_id',LOCAL).order('created_at',{ascending:false});state.postulantes=data||[]}
async function loadTalks(){const{data}=await sb.from('rrhh_the_talk').select('*').order('fecha',{ascending:false}).limit(100);state.talks=data||[]}
async function loadEvals(){const{data}=await sb.from('rrhh_evaluaciones').select('*').order('fecha',{ascending:false}).limit(100);state.evals=data||[]}
async function loadPropinas(){const ini=hoyISO().slice(0,8)+'01';const{data}=await sb.from('ca_propinas').select('*').gte('created_at',ini+'T00:00:00');state.propinas=data||[]}
async function loadAll(){await Promise.all([loadEmp(),loadRoles(),loadAsis(),loadDocs(),loadProg(),loadPermisos(),loadVentas(),loadPropinas(),loadPostulantes(),loadTalks(),loadEvals()]);render();subscribe();$('#boot').classList.add('gone')}
function empById(id){return state.emp.find(e=>e.id===id||String(e.id)===String(id))}
function nomEmp(id){const e=empById(id);return e?((e.nombre||'')+' '+(e.apellidos||'')).trim():'—'}

const activos=()=>state.emp.filter(e=>e.estado==='activo');
const asisHoy=id=>state.asis.find(a=>a.empleado_id===id&&a.fecha===hoyISO());
function statusAsis(id){const a=asisHoy(id);if(!a||!a.hora_entrada)return{k:'sin',t:'Sin marcar'};if(!a.hora_salida)return{k:'trab',t:'Trabajando',a};return{k:'salio',t:'Salió',a}}

function render(){
  const act=activos();
  const planilla=act.reduce((s,e)=>s+Number(e.sueldo||0),0);
  const presentes=act.filter(e=>statusAsis(e.id).k==='trab').length;
  $('#hinfo').innerHTML=`<span class="pill">${act.length} activos</span><span class="pill">${money(planilla)}/mes</span><span class="pill">${presentes} presentes</span>`;
  const pend=(state.permisos||[]).filter(p=>p.estado==='pendiente').length;
  $('#tabs').innerHTML=[['equipo','Equipo','groups'],['turnos','Turnos','calendar_month'],['asistencia','Asistencia','schedule'],['permisos','Permisos','event_available'],['reclutamiento','Reclutamiento','person_search'],['desempeno','Desempeño','trending_up'],['propinas','Propinas','volunteer_activism'],['planilla','Planilla','payments']].map(([k,l,i])=>`<button class="tab ${state.view===k?'active':''}" data-v="${k}"><span class="material-symbols-outlined" style="font-size:16px">${i}</span>${l}${k==='permisos'&&pend?` <span class="badge" style="background:var(--tertiary);margin-left:2px">${pend}</span>`:''}</button>`).join('');
  $$('#tabs .tab').forEach(b=>b.onclick=()=>{state.view=b.dataset.v;render()});
  if(state.view==='equipo')renderEquipo();else if(state.view==='turnos')renderTurnos();else if(state.view==='asistencia')renderAsistencia();else if(state.view==='permisos')renderPermisos();else if(state.view==='reclutamiento')renderReclutamiento();else if(state.view==='desempeno')renderDesempeno();else if(state.view==='propinas')renderPropinas();else renderPlanilla();
}

const TIPOPERM={vacaciones:'🌴 Vacaciones',permiso:'📋 Permiso',descanso_medico:'🏥 Descanso médico',falta_justificada:'📝 Falta justificada'};
function permBadge(e){const c=e==='aprobado'?'var(--green)':e==='rechazado'?'var(--secondary)':'var(--tertiary)';return `<span class="badge" style="background:${c};color:${e==='pendiente'?'var(--ink)':'#fff'}">${e}</span>`}
function renderPermisos(){
  const ps=state.permisos||[];const pend=ps.filter(p=>p.estado==='pendiente');
  const mes=hoyISO().slice(0,7);
  const vacMes=ps.filter(p=>p.estado==='aprobado'&&p.tipo==='vacaciones'&&(p.fecha_inicio||'').slice(0,7)===mes).reduce((s,p)=>s+Number(p.dias||0),0);
  $('#screen').innerHTML=`
    <div class="kpis">
      <div class="kpi ${pend.length?'':'good'}"><div class="v">${pend.length}</div><div class="l">Solicitudes pendientes</div></div>
      <div class="kpi"><div class="v">${ps.filter(p=>p.estado==='aprobado').length}</div><div class="l">Aprobadas</div></div>
      <div class="kpi"><div class="v">${vacMes}</div><div class="l">Días de vacaciones este mes</div></div>
    </div>

  if(error){toast('Atrás: '+error.message,'err');return}await loadAsis();render();toast('Va · entrada marcada','ok');
}
async function marcarSalida(id){
  const a=asisHoy(id);if(!a)return;const horas=Math.max(0,(Date.now()-new Date(a.hora_entrada).getTime())/3600000);
  const{error}=await sb.from('rrhh_asistencia').update({hora_salida:nowISO(),horas_trabajadas:Number(horas.toFixed(2))}).eq('id',a.id);
  if(error){toast('Atrás: '+error.message,'err');return}await loadAsis();render();toast('Servido · salida ('+horas.toFixed(1)+'h)','ok');
}

function renderPlanilla(){
  const act=activos();const areas=[...new Set(act.map(e=>normArea(e.area)))];
  const total=act.reduce((s,e)=>s+Number(e.sueldo||0),0);
  let rows='';areas.forEach(ar=>{const es=act.filter(e=>normArea(e.area)===ar);const sub=es.reduce((s,e)=>s+Number(e.sueldo||0),0);
    rows+=es.map(e=>`<tr><td>${e.nombre} ${e.apellidos||''}</td><td style="opacity:.6">${ar}</td><td>${e.tipo_contrato||'—'}</td><td>${money(e.sueldo)}</td></tr>`).join('');
    rows+=`<tr class="tot"><td colspan="3">Subtotal ${ar}</td><td>${money(sub)}</td></tr>`;});
  const dia=new Date().getDate();const planillaMTD=total/30*dia;const ventasMes=Number(state.ventasMes||0);
  const laborPct=ventasMes>0?(planillaMTD/ventasMes*100):0;const alto=laborPct>30;
  $('#screen').innerHTML=`
    <div class="kpis"><div class="kpi"><div class="v">${money(total)}</div><div class="l">Planilla mensual</div></div>
      <div class="kpi"><div class="v">${act.length}</div><div class="l">Colaboradores</div></div>
      <div class="kpi ${alto?'':'good'}" style="${alto?'border-color:var(--secondary)':''}"><div class="v" style="${alto?'color:var(--secondary)':''}">${laborPct?laborPct.toFixed(1)+'%':'—'}</div><div class="l">Labor cost ${alto?'⚠ >30%':'(mes)'}</div></div></div>
    ${ventasMes>0?`<div style="background:${alto?'var(--red-soft)':'var(--green-soft)'};border:2px solid var(--outline);border-radius:12px;padding:10px 14px;margin-bottom:12px;font-size:13px">Costo laboral al día de hoy: <strong>${money(planillaMTD)}</strong> sobre ventas del mes <strong>${money(ventasMes)}</strong> = <strong style="color:${alto?'var(--secondary)':'var(--green)'}">${laborPct.toFixed(1)}%</strong>. ${alto?'Por encima del 30% recomendado — revisa turnos/horas.':'Dentro del rango saludable (≤30%).'}</div>`:''}
    <div class="pl"><table><tr><th>Colaborador</th><th>Área</th><th>Contrato</th><th>Sueldo</th></tr>${rows}<tr class="tot"><td colspan="3">TOTAL PLANILLA</td><td>${money(total)}</td></tr></table></div>
    <div style="font-family:var(--font-mono);font-size:11px;opacity:.55;text-align:center;padding:10px">Esta planilla alimenta el grupo "Personal" del módulo Finanzas.</div>`;
}

/* ====== TURNOS / PROGRAMACIÓN ====== */
function horasTurno(p){if(!p.hora_ini||!p.hora_fin)return 0;let a=p.hora_ini.split(':').map(Number),b=p.hora_fin.split(':').map(Number);let ini=a[0]+a[1]/60,fin=b[0]+b[1]/60;if(fin<=ini)fin+=24;return +(fin-ini).toFixed(2)}
function sueldoHora(e){return Number(e.sueldo||0)/192}
function progDia(fecha){return state.prog.filter(p=>p.fecha===fecha)}
function empById(id){return state.emp.find(e=>e.id===id)}
function violaRestriccion(e,fecha,turno){const r=e&&e.restricciones||{};const out=[];if(Array.isArray(r.dias_no)&&r.dias_no.includes(diaSemana(fecha)))out.push('no disponible '+diaSemana(fecha));if(Array.isArray(r.turnos)&&r.turnos.length&&turno&&!r.turnos.includes(turno))out.push('no hace turno '+turno);return out}
function renderTurnos(){
  const dias=Array.from({length:7},(_,i)=>addDias(state.semana,i));
  const horasSem=state.prog.reduce((a,p)=>a+horasTurno(p),0);
  const costo=state.prog.reduce((a,p)=>{const e=empById(p.empleado_id);return a+(e?horasTurno(p)*sueldoHora(e):0)},0);
  const finSem=addDias(state.semana,6);
  $('#screen').innerHTML=`
    <div class="toolbar"><button class="mini-btn" id="sem-prev">‹</button><span class="pill">${state.semana.slice(5)} – ${finSem.slice(5)}</span><button class="mini-btn" id="sem-next">›</button><button class="mini-btn ghost" id="sem-hoy">Hoy</button></div>
    <div class="kpis"><div class="kpi"><div class="v">${state.prog.length}</div><div class="l">Turnos asignados</div></div><div class="kpi"><div class="v">${horasSem.toFixed(0)}h</div><div class="l">Horas semana</div></div><div class="kpi"><div class="v">${money(costo)}</div><div class="l">Costo laboral est.</div></div></div>
    ${dias.map(f=>{const ps=progDia(f);const esHoy=f===hoyISO();
      return `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div class="grp-t" style="margin:0;text-transform:capitalize">${diaSemana(f)} <span style="font-family:var(--font-mono);font-size:11px;opacity:.55">${f.slice(8)}/${f.slice(5,7)}${esHoy?' · hoy':''}</span></div><button class="mini-btn primary" data-add="${f}">+ turno</button></div>
        ${ps.map(p=>{const e=empById(p.empleado_id);const v=e?violaRestriccion(e,p.fecha,p.turno):[];return `<div class="arow" data-pid="${p.id}" style="${v.length?'border-color:var(--secondary)':''}"><div class="av" style="width:36px;height:36px;font-size:13px">${e?iniciales(e):'?'}</div><div><div style="font-weight:700;font-size:14px">${e?(e.nombre+' '+(e.apellidos||'')):'—'}</div><div style="font-family:var(--font-mono);font-size:11px;opacity:.7">${p.turno||''} · ${p.hora_ini}-${p.hora_fin} · ${horasTurno(p)}h${v.length?' · ⚠ '+v.join(', '):''}</div></div><button class="mini-btn" data-del="${p.id}">✕</button></div>`}).join('')||'<div style="font-family:var(--font-mono);font-size:11px;opacity:.45;padding:4px 0">Sin turnos</div>'}
      </div>`}).join('')}`;
  $('#sem-prev').onclick=async()=>{state.semana=addDias(state.semana,-7);await loadProg();render()};
  $('#sem-next').onclick=async()=>{state.semana=addDias(state.semana,7);await loadProg();render()};
  $('#sem-hoy').onclick=async()=>{state.semana=lunesDe(new Date());await loadProg();render()};
  $$('#screen [data-add]').forEach(b=>b.onclick=()=>abrirTurno(b.dataset.add));
  $$('#screen [data-del]').forEach(b=>b.onclick=()=>eliminarTurno(b.dataset.del));
}
function abrirTurno(fecha){
  let empId='',turno='noche';const tt=turnoData(turno);let ini=tt[1],fin=tt[2];
  setHead('🗓️','Asignar turno',diaSemana(fecha)+' '+fecha.slice(5));
  const draw=()=>{const e=empById(empId);const v=e?violaRestriccion(e,fecha,turno):[];
    $('#sheet-body').innerHTML=`
      <div class="sheet-section"><div class="field-lbl">Colaborador</div><select class="select" id="t-emp"><option value="">— elegir —</option>${activos().map(x=>`<option value="${x.id}" ${empId===x.id?'selected':''}>${x.nombre} ${x.apellidos||''} · ${x.rol||''}</option>`).join('')}</select></div>
      ${v.length?`<div class="sheet-section"><div style="background:var(--red-soft);border:2px solid var(--secondary);border-radius:10px;padding:10px;font-size:13px;font-weight:600">⚠ ${e.nombre}: ${v.join(' · ')}</div></div>`:''}
      ${e&&e.restricciones&&(e.restricciones.dias_no||e.restricciones.turnos)?`<div class="sheet-section"><div style="font-family:var(--font-mono);font-size:11px;opacity:.6">Disponibilidad: ${(e.restricciones.turnos||[]).join('/')||'cualquier turno'}${e.restricciones.dias_no&&e.restricciones.dias_no.length?(' · libre: '+e.restricciones.dias_no.join(', ')):''}</div></div>`:''}
      <div class="sheet-section"><div class="field-lbl">Turno</div><div class="chips" id="t-turno">${TURNOS.map(t=>`<button class="chip ${turno===t[0]?'active':''}" data-t="${t[0]}">${t[0]}</button>`).join('')}</div></div>
      <div class="sheet-section grid2"><div><div class="field-lbl">Entra</div><input class="input" id="t-ini" type="time" value="${ini}"></div><div><div class="field-lbl">Sale</div><input class="input" id="t-fin" type="time" value="${fin}"></div></div>
      <div class="sheet-section"><button class="btn primary" id="t-save"><span class="material-symbols-outlined">save</span>Asignar turno</button></div>`;
    $('#t-emp').onchange=ev=>{empId=ev.target.value;draw()};
    $$('#t-turno .chip').forEach(b=>b.onclick=()=>{turno=b.dataset.t;const d=turnoData(turno);ini=d[1];fin=d[2];draw()});
    $('#t-ini').onchange=ev=>ini=ev.target.value;$('#t-fin').onchange=ev=>fin=ev.target.value;
    $('#t-save').onclick=()=>guardarTurno(fecha,empId,turno,$('#t-ini').value,$('#t-fin').value);
  };draw();openSheet();
}
async function guardarTurno(fecha,empId,turno,ini,fin){
  if(!empId){toast('Elige colaborador','warn');return}
  const e=empById(empId);const v=violaRestriccion(e,fecha,turno);
  if(v.length&&!confirm('⚠ '+e.nombre+': '+v.join(', ')+'. ¿Asignar igual?'))return;
  const{error}=await sb.from('rrhh_programacion').insert({marca_id:MARCA,local_id:LOCAL,empleado_id:empId,fecha,turno,hora_ini:ini,hora_fin:fin,rol:e.rol||null,estado:'programado'});
  if(error){toast('Atrás: '+error.message,'err');return}closeSheet();await loadProg();render();toast('Servido · turno asignado','ok');
}
async function eliminarTurno(id){const{error}=await sb.from('rrhh_programacion').delete().eq('id',id);if(error){toast('Atrás','err');return}await loadProg();render();toast('Turno quitado','warn')}

function abrirFicha(e){
  const docs=state.docs.filter(d=>d.empleado_id===e.id);
  const asis=state.asis.filter(a=>a.empleado_id===e.id).slice(0,8);
  setHead(iniciales(e),e.nombre+' '+(e.apellidos||''),(e.rol||'')+' · '+normArea(e.area),e.foto_url);
  $('#sheet-body').innerHTML=`
    <div class="kpis" style="margin-bottom:12px"><div class="kpi"><div class="v">${money(e.sueldo)}</div><div class="l">Sueldo</div></div>
      <div class="kpi"><div class="v" style="font-size:18px">${antiguedad(e.fecha_ingreso)}</div><div class="l">Antigüedad</div></div>
      <div class="kpi"><div class="v" style="font-size:16px">${e.tipo_contrato||'—'}</div><div class="l">Contrato</div></div></div>
    <div class="sheet-section"><div class="field-lbl">Datos</div>
      <div class="info-row"><span>DNI</span><strong>${e.dni||'—'}</strong></div>
      <div class="info-row"><span>Teléfono</span><strong>${e.telefono||'—'}</strong></div>
      <div class="info-row"><span>Email</span><strong>${e.email||'—'}</strong></div>
      <div class="info-row"><span>Ingreso</span><strong>${e.fecha_ingreso||'—'}</strong></div>
      <div class="info-row"><span>Estado</span><strong>${e.estado}</strong></div></div>
    ${(e.banco||e.cuenta)?`<div class="sheet-section"><div class="field-lbl">Pago</div><div class="info-row"><span>Banco</span><strong>${e.banco||'—'}</strong></div><div class="info-row"><span>Cuenta</span><strong>${e.cuenta||'—'}</strong></div>${e.cci?`<div class="info-row"><span>CCI</span><strong>${e.cci}</strong></div>`:''}</div>`:''}
    ${e.contacto_emergencia_nombre?`<div class="sheet-section"><div class="field-lbl">Emergencia</div><div class="info-row"><span>${e.contacto_emergencia_nombre} (${e.contacto_emergencia_relacion||'—'})</span><strong>${e.contacto_emergencia_telefono||''}</strong></div></div>`:''}
    <div class="sheet-section"><div class="field-lbl">Documentos (${docs.length})</div>${docs.length?docs.map(d=>`<div class="info-row"><span>${d.titulo||d.tipo}${d.fecha_vencimiento?(' · vence '+d.fecha_vencimiento):''}</span>${d.url?`<a href="${d.url}" target="_blank" rel="noopener">ver ↗</a>`:''}</div>`).join(''):'<div style="opacity:.5;font-size:12px">Sin documentos</div>'}</div>
    <div class="sheet-section"><div class="field-lbl">Asistencia reciente</div>${asis.length?asis.map(a=>`<div class="info-row"><span>${a.fecha}</span><strong>${hhmm(a.hora_entrada)}–${hhmm(a.hora_salida)} · ${Number(a.horas_trabajadas||0).toFixed(1)}h</strong></div>`).join(''):'<div style="opacity:.5;font-size:12px">Sin registros</div>'}</div>
    <div class="sheet-section"><div class="grid2"><button class="btn ghost" id="fc-edit"><span class="material-symbols-outlined">edit</span>Editar</button><button class="btn ghost" id="fc-wa"><span class="material-symbols-outlined">chat</span>WhatsApp</button></div></div>`;
  openSheet();
  $('#fc-edit').onclick=()=>abrirEditor(e);
  $('#fc-wa').onclick=()=>{if(!e.telefono){toast('Sin teléfono','warn');return}const t=(e.telefono||'').replace(/\D/g,'');window.open('https://wa.me/'+(t.length<=9?'51'+t:t),'_blank')};
}

function abrirEditor(e){
  const ed=!!e;const c=Object.assign({nombre:'',apellidos:'',dni:'',telefono:'',email:'',rol:'',area:'Cocina',sueldo:'',tipo_contrato:'planilla',fecha_ingreso:hoyISO(),estado:'activo',banco:'',cuenta:'',cci:'',contacto_emergencia_nombre:'',contacto_emergencia_telefono:'',notas:'',restricciones:{}},e||{});
  if(!c.restricciones||typeof c.restricciones!=='object')c.restricciones={};if(!Array.isArray(c.restricciones.dias_no))c.restricciones.dias_no=[];if(!Array.isArray(c.restricciones.turnos))c.restricciones.turnos=[];
  setHead(ed?iniciales(c):'➕',ed?'Editar empleado':'Nuevo empleado','RRHH',ed?c.foto_url:null);
  const draw=()=>{
    $('#sheet-body').innerHTML=`
      <div class="sheet-section grid2"><div><div class="field-lbl">Nombre</div><input class="input" id="e-nom" value="${c.nombre||''}"></div><div><div class="field-lbl">Apellidos</div><input class="input" id="e-ape" value="${c.apellidos||''}"></div></div>
      <div class="sheet-section"><div class="field-lbl">Rol</div><select class="select" id="e-rol">${state.roles.map(r=>`<option value="${r.nombre}" data-area="${r.area}" ${c.rol===r.nombre?'selected':''}>${r.emoji||''} ${r.nombre} (${normArea(r.area)})</option>`).join('')}</select></div>
      <div class="sheet-section grid2"><div><div class="field-lbl">Área</div><select class="select" id="e-area">${AREAS.map(a=>`<option ${normArea(c.area)===a[0]?'selected':''}>${a[0]}</option>`).join('')}</select></div><div><div class="field-lbl">Sueldo (S/)</div><input class="input" id="e-sueldo" type="number" value="${c.sueldo||''}"></div></div>
      <div class="sheet-section grid2"><div><div class="field-lbl">Contrato</div><select class="select" id="e-contrato">${CONTRATOS.map(x=>`<option ${c.tipo_contrato===x?'selected':''}>${x}</option>`).join('')}</select></div><div><div class="field-lbl">Ingreso</div><input class="input" id="e-ingreso" type="date" value="${c.fecha_ingreso||''}"></div></div>
      <div class="sheet-section grid2"><div><div class="field-lbl">DNI</div><input class="input" id="e-dni" value="${c.dni||''}"></div><div><div class="field-lbl">Teléfono</div><input class="input" id="e-tel" value="${c.telefono||''}"></div></div>
      <div class="sheet-section"><div class="field-lbl">Email</div><input class="input" id="e-email" value="${c.email||''}"></div>
      <div class="sheet-section grid2"><div><div class="field-lbl">Banco</div><input class="input" id="e-banco" value="${c.banco||''}"></div><div><div class="field-lbl">Cuenta</div><input class="input" id="e-cuenta" value="${c.cuenta||''}"></div></div>
      <div class="sheet-section grid2"><div><div class="field-lbl">Emergencia (nombre)</div><input class="input" id="e-emn" value="${c.contacto_emergencia_nombre||''}"></div><div><div class="field-lbl">Emergencia (tel)</div><input class="input" id="e-emt" value="${c.contacto_emergencia_telefono||''}"></div></div>
      <div class="sheet-section"><div class="field-lbl">Días que NO puede trabajar</div><div class="chips" id="e-diasno">${DIAS.map(d=>`<button class="chip ${c.restricciones.dias_no.includes(d)?'active':''}" data-d="${d}" style="text-transform:capitalize">${d}</button>`).join('')}</div></div>
      <div class="sheet-section"><div class="field-lbl">Turnos permitidos (vacío = cualquiera)</div><div class="chips" id="e-turnos">${TURNOS.map(t=>`<button class="chip ${c.restricciones.turnos.includes(t[0])?'active':''}" data-t="${t[0]}">${t[0]}</button>`).join('')}</div></div>
      <div class="sheet-section"><div class="field-lbl">Estado</div><div class="chips" id="e-estado">${['activo','inactivo'].map(s=>`<button class="chip ${c.estado===s?'active':''}" data-s="${s}">${s}</button>`).join('')}</div></div>
      <div class="sheet-section"><div class="grid2"><button class="btn ghost" id="e-cancel">Atrás</button><button class="btn primary" id="e-save"><span class="material-symbols-outlined">save</span>Guardar</button></div></div>`;
    $('#e-rol').onchange=ev=>{c.rol=ev.target.value;const ar=ev.target.selectedOptions[0].dataset.area;if(ar){c.area=normArea(ar);$('#e-area').value=normArea(ar)}const r=state.roles.find(x=>x.nombre===c.rol);if(r&&!$('#e-sueldo').value){$('#e-sueldo').value=r.sueldo_referencia_min;c.sueldo=r.sueldo_referencia_min}};
    $$('#e-estado .chip').forEach(b=>b.onclick=()=>{c.estado=b.dataset.s;draw()});
    $$('#e-diasno .chip').forEach(b=>b.onclick=()=>{const a=c.restricciones.dias_no,i=a.indexOf(b.dataset.d);i>=0?a.splice(i,1):a.push(b.dataset.d);b.classList.toggle('active')});
    $$('#e-turnos .chip').forEach(b=>b.onclick=()=>{const a=c.restricciones.turnos,i=a.indexOf(b.dataset.t);i>=0?a.splice(i,1):a.push(b.dataset.t);b.classList.toggle('active')});
    $('#e-cancel').onclick=()=>ed?abrirFicha(e):closeSheet();
    $('#e-save').onclick=()=>guardarEmp(ed?e.id:null,c);
  };draw();openSheet();
}
async function guardarEmp(id,c){
  const g=k=>{const el=$('#'+k);return el?el.value:''};
  const payload={marca_id:MARCA,local_id:LOCAL,nombre:g('e-nom'),apellidos:g('e-ape'),rol:g('e-rol'),area:g('e-area'),sueldo:Number(g('e-sueldo'))||0,tipo_contrato:g('e-contrato'),fecha_ingreso:g('e-ingreso')||null,dni:g('e-dni'),telefono:g('e-tel'),email:g('e-email'),banco:g('e-banco'),cuenta:g('e-cuenta'),contacto_emergencia_nombre:g('e-emn'),contacto_emergencia_telefono:g('e-emt'),estado:c.estado,restricciones:c.restricciones||{},updated_at:nowISO()};
  if(!payload.nombre){toast('Falta el nombre','warn');return}
  let error;
  if(id){({error}=await sb.from('rrhh_empleados').update(payload).eq('id',id))}
  else{payload.id='e_l11_'+Date.now();payload.created_at=nowISO();({error}=await sb.from('rrhh_empleados').insert(payload))}
  if(error){toast('Atrás: '+error.message,'err');return}
  closeSheet();await loadEmp();render();toast('Servido · empleado guardado','ok');
}

function subscribe(){if(state.channel)sb.removeChannel(state.channel);state.channel=sb.channel('rrhh_'+LOCAL).on('postgres_changes',{event:'*',schema:'public',table:'rrhh_asistencia',filter:'local_id=eq.'+LOCAL},async()=>{await loadAsis();render()}).subscribe()}
$('#sheet-close').addEventListener('click',closeSheet);$('#backdrop').addEventListener('click',closeSheet);$('#h-add').addEventListener('click',()=>abrirEditor(null));
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSheet()});
loadAll().catch(err=>{console.error(err);$('#boot .msg').textContent='Atrás · '+(err.message||'fallo')});
</script>
