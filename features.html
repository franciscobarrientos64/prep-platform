.mod-h::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:var(--ac)}
.mod-ic{width:46px;height:46px;border:2px solid var(--outline);border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--ac);color:#fff;flex-shrink:0}

.mod-h .nm{font-family:var(--font-display);font-size:21px;line-height:1}

.mod-h .nn{margin-left:auto;font-family:var(--font-display);font-size:30px;opacity:.12}

let TIER='all', Q='';
function tierCls(t){return t==='MVP'?'t-mvp':t==='F2'?'t-f2':'t-f3'}

    if(!feats.length)return '';
    return `<section class="mod" style="--ac:${m.ac}">
      <div class="mod-h"><div class="mod-ic"><span class="material-symbols-outlined">${m.ic}</span></div>
        <div><div class="nm">${m.n}</div><div class="tl">${m.sub} · ${feats.length} features</div></div>
        <div class="nn">${m.nn}</div></div>
      <div class="feats">${feats.map(f=>`<div class="feat"><div class="id">${f[0]}</div><div class="bd"><div class="ft">${f[2]}</div><div class="fd">${f[3]}</div></div><span class="tier ${tierCls(f[1])}">${f[1]}</span></div>`).join('')}</div>
    </section>`;
  }).join('')||'<div style="text-align:center;padding:40px;font-family:var(--font-mono);opacity:.5">Sin resultados.</div>';
  document.getElementById('counts').textContent=`${MODS.length} módulos · ${shown} features${q||TIER!=='all'?' (filtrados)':''}`;
}
document.getElementById('q').oninput=e=>{Q=e.target.value;render()};
document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{TIER=b.dataset.t;document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('on',x===b));render()});
render();
</script>
</body>
</html>
