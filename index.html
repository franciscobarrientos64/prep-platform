<style>
:root{--primary:#1e5af9;--secondary:#ff3b30;--tertiary:#ffcc00;--bg:#fcf9f8;--surface:#fff;--ink:#171c20;--outline:#000;--primary-soft:#d6e2ff;--gray-soft:#dfe3e8;--green:#10b981;--green-soft:#d1fae5;--amber-soft:#fef3c7;--red-soft:#fee2e2;--shadow-sm:4px 4px 0 0 #000;--shadow:6px 6px 0 0 #000;--shadow-lg:10px 10px 0 0 #000;--font-display:'Bagel Fat One',system-ui,sans-serif;--font-body:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',ui-monospace,monospace;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;min-height:100vh}
.material-symbols-outlined{font-size:20px;line-height:1;vertical-align:middle}
.mono{font-family:var(--font-mono)}
.header{background:var(--bg);border-bottom:2px solid var(--outline);padding:12px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.brand{display:flex;align-items:center;gap:12px}
.brand-logo{position:relative;width:104px;height:34px;flex-shrink:0;display:block}
.brand-logo .l{position:absolute;inset:0;-webkit-mask:url(/logo.png) left center/contain no-repeat;mask:url(/logo.png) left center/contain no-repeat;background:var(--ink)}
.brand-txt .cli{font-weight:700;font-size:15px;line-height:1.1}
.brand-txt .mod{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;opacity:.6}
.header-info{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.acct-menu{position:absolute;right:0;top:40px;background:var(--surface);border:2px solid var(--outline);border-radius:14px;box-shadow:var(--shadow);min-width:240px;padding:12px;display:none;z-index:50}
.acct-menu.open{display:block}
.acct-menu .who{font-weight:700;font-size:15px}
.acct-menu .role{font-family:var(--font-mono);font-size:11px;opacity:.6;margin-bottom:8px;text-transform:capitalize}
.acct-menu .mi{display:flex;align-items:center;gap:8px;padding:10px 8px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
.acct-menu .mi:hover{background:var(--gray-soft)}
.acct-menu .lbl{font-family:var(--font-mono);font-size:10px;opacity:.55;text-transform:uppercase;letter-spacing:.06em;margin:4px 0 4px}
.acct-menu select{width:100%;padding:9px 10px;border:2px solid var(--outline);border-radius:10px;font-family:var(--font-body);font-size:13px}
.acct-menu hr{border:none;border-top:1px dashed var(--gray-soft);margin:8px 0}
.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:11px;font-family:var(--font-mono)}
.pill.live{background:var(--primary);color:#fff}.pill.live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--tertiary);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.wrap{max-width:1180px;margin:0 auto;padding:20px 18px 60px}
.section-t{font-family:var(--font-display);font-size:22px;margin:24px 0 14px;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.section-t .sub{font-family:var(--font-mono);font-size:12px;font-weight:400;opacity:.55;text-transform:none;letter-spacing:0}
.mods-band{
  background:
    repeating-linear-gradient(0deg, transparent 0 23px, rgba(30,90,249,.10) 23px 24px),
    repeating-linear-gradient(90deg, transparent 0 23px, rgba(30,90,249,.10) 23px 24px),
    var(--surface);
  border:2px solid var(--outline);border-radius:20px;box-shadow:var(--shadow-sm);padding:18px;margin-bottom:8px}
.mods{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.mod-card{background:var(--surface);border:2px solid var(--outline);border-radius:16px;box-shadow:var(--shadow-sm);padding:16px 16px 14px;display:flex;flex-direction:column;gap:5px;text-decoration:none;color:var(--ink);transition:transform .12s,box-shadow .12s;position:relative;overflow:hidden;min-height:120px}
.mod-card .material-symbols-outlined{font-size:30px}
.mod-card.on .material-symbols-outlined{color:var(--ac,var(--primary))}
.mod-card.on::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:var(--ac,var(--primary))}
.mod-card.on:hover{transform:translate(-2px,-2px);box-shadow:var(--shadow)}
.mod-card.off{opacity:.5;border-style:dashed;box-shadow:none}
.mod-card .nm{font-weight:700;font-size:15px}
.mod-card .ds{font-size:11px;font-family:var(--font-mono);opacity:.6;line-height:1.3}
.mod-card .tag{position:absolute;top:10px;right:10px;font-family:var(--font-mono);font-size:9px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:999px;border:1.5px solid var(--outline)}
.mod-card .tag.activo{background:var(--green);color:#fff}
.mod-card .tag.pronto{background:var(--gray-soft)}
.mod-card .tag.locked{background:var(--ink);color:#fff;display:inline-flex;align-items:center;gap:3px}
.mod-card.lock{opacity:.92;cursor:pointer;border-style:solid;background:repeating-linear-gradient(135deg,var(--surface),var(--surface) 12px,#f4f1f0 12px,#f4f1f0 24px)}
.mod-card.lock .material-symbols-outlined{color:#9aa3ab}
.mod-card.lock .nm{color:#6b7280}
.mod-card.lock:hover{transform:translate(-2px,-2px);box-shadow:var(--shadow)}
.feat-bd{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:120;display:none;align-items:center;justify-content:center;padding:20px}
.feat-bd.open{display:flex}
.feat-card{background:var(--surface);border:3px solid var(--outline);border-radius:20px;box-shadow:var(--shadow-lg);max-width:440px;width:100%;padding:22px}
.feat-head{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.feat-t{font-family:var(--font-display);font-size:22px;line-height:1}
.feat-s{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;opacity:.6;margin-top:4px}
.feat-list{list-style:none;padding:0;margin:0 0 14px}
.feat-list li{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px dashed var(--gray-soft);font-size:14px}
.feat-cta{background:var(--primary-soft);border:2px solid var(--outline);border-radius:12px;padding:12px 14px;font-size:13px}
.feat-x{margin-top:14px;width:100%;padding:12px;border:2px solid var(--outline);border-radius:12px;background:var(--ink);color:#fff;font-weight:600;cursor:pointer;box-shadow:var(--shadow-sm)}
.mod-card .num{position:absolute;bottom:8px;right:12px;font-family:var(--font-display);font-size:22px;opacity:.1}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.kpi{background:var(--surface);border:2px solid var(--outline);border-radius:16px;box-shadow:var(--shadow-sm);padding:14px 16px;cursor:pointer;transition:transform .12s,box-shadow .12s}
.kpi:hover{transform:translate(-2px,-2px);box-shadow:var(--shadow)}
.kpi .v{font-family:var(--font-display);font-size:28px;line-height:1;color:var(--primary)}
.kpi .l{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;opacity:.6;margin-top:6px}
.kpi.alert .v{color:var(--secondary)}
.kpi .ico{float:right;font-size:22px;opacity:.25}
.grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;align-items:start;margin-top:16px}
@media(max-width:820px){.grid2{grid-template-columns:1fr}}
.panel{background:var(--surface);border:2px solid var(--outline);border-radius:16px;box-shadow:var(--shadow-sm);padding:16px}
.panel h3{font-family:var(--font-display);font-size:17px;margin-bottom:12px}
.chart{display:flex;align-items:flex-end;gap:8px;height:150px;padding-top:10px}
.chart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.chart .bar{width:100%;background:var(--primary);border:2px solid var(--outline);border-radius:6px 6px 0 0;min-height:3px;transition:height .4s}
.chart .col.today .bar{background:var(--tertiary)}
.chart .cap{font-family:var(--font-mono);font-size:9px;opacity:.6}
.chart .val{font-family:var(--font-mono);font-size:9px;font-weight:600}
.li{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--gray-soft);font-size:13px}
.li:last-child{border:none}
.li .t{font-family:var(--font-display);font-size:15px;min-width:48px}
.li .nm{flex:1;font-weight:600}
.li .badge{font-family:var(--font-mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;border:1.5px solid var(--outline)}
.alerta{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px dashed var(--gray-soft);font-size:13px;cursor:pointer}
.alerta:last-child{border:none}
.alerta .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.empty{font-family:var(--font-mono);font-size:12px;opacity:.5;padding:16px 0;text-align:center}
.boot{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:300;transition:opacity .3s}
.boot.gone{opacity:0;pointer-events:none}
.boot .logo{position:relative;width:240px;height:80px}
.boot .logo .l{position:absolute;inset:0;-webkit-mask:url(/logo.png) center/contain no-repeat;mask:url(/logo.png) center/contain no-repeat;background:var(--ink)}
.boot .spinner{width:34px;height:34px;border:4px solid var(--outline);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.boot .msg{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.12em;opacity:.6}
</style>
</head>
<body>
<div id="boot" class="boot"><div class="logo"><span class="l"></span></div><div class="spinner"></div><div class="msg">Oído · mise en place</div></div>
<header class="header">
  <div class="brand"><div class="brand-logo"><span class="l"></span></div><div class="brand-txt"><div class="cli"></div><div class="mod">Inicio · Sistema operativo</div></div></div>

    <span class="pill live" id="p-fecha">—</span>

<main class="wrap">

  </div>

  </div>
</main>
<script>
const SB_URL='https://jmkvphayyhwzootlybde.supabase.co';
const SB_KEY='sb_publishable_0-znERv1Ok0Dw-Re44eksw_QAOqDc8M';
const MARCA=(window.PREP_MARCA||'m6'),LOCAL=(window.PREP_LOCAL||'l11');
const sb=supabase.createClient(SB_URL,SB_KEY);
const $=s=>document.querySelector(s);
function money(n){return 'S/ '+Number(n||0).toLocaleString('en-US',{maximumFractionDigits:0})}
function hoyISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function addD(iso,n){const[y,m,d]=iso.split('-').map(Number);const dt=new Date(y,m-1,d);dt.setDate(dt.getDate()+n);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')}
function hhmm(t){return(t||'').slice(0,5)}
function fechaLarga(){const d=new Date();const dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];const mes=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];return dias[d.getDay()]+' '+d.getDate()+' '+mes[d.getMonth()]}

const MODULOS=[
  {n:'Pase',d:'Dashboard ejecutivo',ico:'dashboard',href:'/pase'},
  {n:'POS',d:'Punto de venta',ico:'point_of_sale',href:'/pos',ac:'#1e5af9'},
  {n:'Línea',d:'KDS de cocina',ico:'soup_kitchen',href:'/kds',ac:'#ff3b30'},
  {n:'Bienvenida',d:'Reservas + hospitalidad',ico:'concierge',href:'/bienvenida',ac:'#ff3b30'},
  {n:'Mercado',d:'Compras + inventario',ico:'inventory_2',href:'/mercado',ac:'#10b981'},

  {n:'RRHH',d:'Equipo + asistencia + planilla',ico:'badge',href:'/rrhh',ac:'#e8735a'},
  {n:'Delivery',d:'Pedidos + repartidores + zonas',ico:'delivery_dining',href:'/delivery',ac:'#7c3aed'},

  {n:'Carta QR',d:'Menú digital + pedido en mesa',ico:'qr_code_2',href:'/carta',ac:'#1e5af9'},
];
const MODKEY={'Pase':'pase','POS':'pos','Línea':'linea','Bienvenida':'bienvenida','Mercado':'mercado','Recetas':'recetas','Carta QR':'carta','RRHH':'rrhh','Delivery':'delivery','Contabilidad':'contabilidad','Vuelto':'vuelto','El Libro':'libro','Directorio':'directorio','Engagement':'engagement','Predicción':'prediccion','Voz del Cliente':'mystery'};
// Features principales por módulo (para el teaser de upsell cuando el módulo no está en el paquete del cliente)
const MODFEAT={
  pase:['Cubiertos, ventas y food cost en vivo','Menu engineering (estrellas/perros)','Comparativo entre sedes','Alertas al celular del dueño'],
  pos:['Toma de pedido por mozo','Course timing y split de cuenta','Cobro multipago (Yape/Plin/tarjeta)','Plano del salón en tiempo real'],
  linea:['KDS de cocina por estación','Colores por tiempo de preparación','Estados Oído→Va→En fuego→Servido','Sonido al recibir comanda'],
  bienvenida:['Reservas con widget 0% comisión','Ficha del comensal + historial','Waitlist con WhatsApp','Plano con drag & drop'],
  mercado:['Comparativo de precios entre proveedores','Inventario por sede con PAR','Mermas y vencimientos (FEFO)','Órdenes de compra con aprobación'],
  recetas:['Costeo automático y food cost','Escalado de recetas','Ficha técnica imprimible','Ingeniería de menú'],
  carta:['Carta digital por QR','Pedido en mesa','Multilenguaje','Sin comisión de terceros'],
  delivery:['Pedidos con KDS dedicado','Marketplace propio 0% comisión','Zonas de cobertura y tarifas','Tracking de estado'],
  contabilidad:['Registro automático de facturas','Libro de ventas/compras','Presupuesto vs real','Cierre mensual'],
  vuelto:['Caja chica por voz/foto','Centro de costo','Aprobación de supervisor','Cierre diario'],
  engagement:['Loyalty con niveles y puntos','CRM 360 del comensal','Campañas por WhatsApp','Reseñas'],
  prediccion:['Pronóstico de demanda a 7 días','Qué preparar mañana','Horas pico','Detección de días atípicos']
};
const access={user:null,mm:[],roles:[],usuarios:[],authed:false,authEmail:null};
async function loadAccess(){
  const[us,mm,ro]=await Promise.all([sb.from('prep_usuarios').select('*').eq('activo',true).order('rol_sistema'),sb.from('prep_marca_modulos').select('*'),sb.from('prep_roles').select('*')]);
  access.usuarios=us.data||[];access.mm=mm.data||[];access.roles=ro.data||[];
  let sess=null;try{sess=(await sb.auth.getSession()).data.session;}catch(e){}
  if(sess&&sess.user&&sess.user.email){
    access.authed=true;access.authEmail=sess.user.email;
    access.user=access.usuarios.find(u=>(u.email||'').toLowerCase()===sess.user.email.toLowerCase())||{id:'_auth',nombre:sess.user.email,email:sess.user.email,rol_sistema:'operativo',marca_id:'m6'};
  }else{
    const uid=localStorage.getItem('prep_uid');
    access.user=access.usuarios.find(u=>u.id===uid)||access.usuarios.find(u=>u.rol_sistema==='superadmin')||access.usuarios[0]||null;
  }
}
function nivelDeMod(k){const u=access.user;if(!u)return'admin';if(u.rol_sistema==='superadmin')return'admin';if(u.rol_sistema==='admin_marca'||u.rol_sistema==='gerente')return'admin';const r=access.roles.find(x=>x.id===u.rol_id);return (r&&r.permisos&&r.permisos[k])||'ninguno'}
function moduloActivo(k){const u=access.user;if(!u||u.rol_sistema==='superadmin')return true;return access.mm.some(x=>x.marca_id===u.marca_id&&x.modulo===k&&x.activo)}
// Paquete del cliente activo (por marca en pantalla). null = sin config => todo permitido.
function enPaquete(k){const rows=access.mm.filter(x=>x.marca_id===MARCA);if(!rows.length)return true;return rows.some(x=>x.modulo===k&&x.activo)}
function canSee(m){const k=MODKEY[m.n];if(!k)return true;return nivelDeMod(k)!=='ninguno'}
async function cambiarClave(){
  const np=prompt('Nueva contraseña (mínimo 6 caracteres):');if(np==null)return;
  if(np.length<6){alert('Debe tener al menos 6 caracteres');return}
  const{error}=await sb.auth.updateUser({password:np});
  if(error){alert('No se pudo: '+error.message);return}
  alert('Contraseña actualizada ✓');
}
const ROLLBL={superadmin:'Super Admin',admin_marca:'Admin restaurante',gerente:'Gerente',operativo:'Operativo'};
function renderUserSwitcher(){
  const btn=$('#p-acct'),menu=$('#acct-menu');if(!btn||!menu)return;
  const u=access.user;
  let html=`<div class="who">${u?u.nombre:'Invitado'}</div><div class="role">${u?(ROLLBL[u.rol_sistema]||u.rol_sistema)+(u.marca_id?(' · '+u.marca_id):'')+(access.authed?'':' · demo'):'sin sesión'}</div>`;
  if(access.authed){
    let adm='';
    if(u&&u.rol_sistema==='superadmin')adm=`<div class="mi" data-act="portal"><span class="material-symbols-outlined">grid_view</span> Panel Prep (super admin)</div>`;
    else if(u&&['admin_marca','gerente'].includes(u.rol_sistema))adm=`<div class="mi" data-act="usuarios"><span class="material-symbols-outlined">group</span> Usuarios y permisos</div>`;
    if(u&&['superadmin','admin_marca','gerente'].includes(u.rol_sistema))adm+=`<div class="mi" data-act="ajustes"><span class="material-symbols-outlined">settings</span> Ajustes del local</div>`;
    if(adm)adm+='<hr>';
    html+=adm+`<div class="mi" data-act="pass"><span class="material-symbols-outlined">key</span> Cambiar contraseña</div><hr><div class="mi" data-act="logout"><span class="material-symbols-outlined">logout</span> Cerrar sesión</div>`;
  }else{
    html+=`<div class="lbl">Ver como (demo)</div><select id="acct-ver">${access.usuarios.map(x=>`<option value="${x.id}" ${u&&u.id===x.id?'selected':''}>${x.nombre} · ${ROLLBL[x.rol_sistema]||x.rol_sistema}</option>`).join('')}</select><hr><div class="mi" data-act="login"><span class="material-symbols-outlined">login</span> Iniciar sesión</div>`;
  }
  menu.innerHTML=html;
  btn.innerHTML=`<span style="display:inline-flex;align-items:center;gap:7px"><span class="material-symbols-outlined" style="font-size:18px">account_circle</span><span style="display:flex;flex-direction:column;line-height:1.05;text-align:left"><span style="font-weight:700">${u?u.nombre.split(' ')[0]:'Ajustes'}</span><span style="font-size:9px;opacity:.7;font-family:var(--font-mono);text-transform:uppercase">${u?(ROLLBL[u.rol_sistema]||u.rol_sistema):'invitado'}</span></span></span>`;
  btn.onclick=e=>{e.stopPropagation();menu.classList.toggle('open')};
  menu.onclick=e=>e.stopPropagation();
  document.addEventListener('click',()=>menu.classList.remove('open'));
  const ver=$('#acct-ver');if(ver)ver.onchange=()=>{localStorage.setItem('prep_uid',ver.value);location.reload()};
  menu.querySelectorAll('[data-act]').forEach(el=>el.onclick=()=>{const a=el.dataset.act;
    if(a==='pass')cambiarClave();
    else if(a==='logout')sb.auth.signOut().then(()=>{localStorage.removeItem('prep_uid');try{document.cookie='prep_sso=; domain=.prep.rest; path=/; max-age=0; secure; samesite=lax'}catch(e){};location.reload()});
    else if(a==='login')location.href='/login';
    else if(a==='portal')location.href='/portal';
    else if(a==='usuarios')location.href='/admin';
    else if(a==='ajustes')location.href='/ajustes';});
}
function renderMods(){
  const visibles=MODULOS.filter(canSee);
  let cards=visibles.map((m,i)=>{
    const k=MODKEY[m.n];
    const built=!!m.href;
    const incl=enPaquete(k);            // ¿está en el paquete del cliente?
    let estado;                          // 'activo' | 'locked' | 'pronto'
    if(!built)estado='pronto';
    else if(!incl)estado='locked';
    else estado='activo';
    const tag=estado==='activo'?'<span class="tag activo">activo</span>'
      :estado==='locked'?'<span class="tag locked"><span class="material-symbols-outlined" style="font-size:13px">lock</span> no incluido</span>'
      :'<span class="tag pronto">pronto</span>';
    const inner=`<span class="material-symbols-outlined" style="font-size:30px">${m.ico}</span>
      <span class="nm">${m.n}</span><span class="ds">${m.d}</span>
      ${tag}<span class="num">${String(i).padStart(2,'0')}</span>`;
    if(estado==='activo')return `<a class="mod-card on" href="${m.href}" style="--ac:${m.ac||'var(--primary)'}">${inner}</a>`;
    if(estado==='locked')return `<div class="mod-card lock" data-feat="${k}" data-nm="${m.n.replace(/"/g,'&quot;')}" data-ico="${m.ico}" style="--ac:${m.ac||'var(--primary)'}">${inner}</div>`;
    return `<div class="mod-card off">${inner}</div>`;
  });
  $('#mods').innerHTML=cards.join('');
  document.querySelectorAll('#mods .mod-card.lock').forEach(c=>c.onclick=()=>openFeat(c.dataset.feat,c.dataset.nm,c.dataset.ico));
}
function openFeat(key,nombre,ico){
  const feats=MODFEAT[key]||[];
  const bd=document.getElementById('feat-bd');
  document.getElementById('feat-body').innerHTML=
    `<div class="feat-head"><span class="material-symbols-outlined" style="font-size:34px;color:var(--primary)">${ico||'lock'}</span>
       <div><div class="feat-t">${nombre}</div><div class="feat-s">No incluido en tu plan actual</div></div></div>
     <ul class="feat-list">${feats.map(f=>`<li><span class="material-symbols-outlined" style="font-size:18px;color:var(--green)">check_circle</span>${f}</li>`).join('')}</ul>
     <div class="feat-cta">¿Quieres activar <b>${nombre}</b>? Habla con tu ejecutivo Prep! para sumarlo a tu plan.</div>`;
  bd.classList.add('open');
}

async function load(){
  try{await loadAccess();}catch(e){console.error(e)}
  try{const{data:mk}=await sb.from('inv_marcas').select('nombre').eq('id',MARCA).maybeSingle();if(mk&&mk.nombre){const el=document.querySelector('.brand-txt .cli');if(el)el.textContent=mk.nombre;}}catch(e){}
  renderUserSwitcher();
  renderMods();
  $('#p-fecha').textContent=fechaLarga();
  const hoy=hoyISO();
  try{
    const desde7=addD(hoy,-6);
    const [rRes,rWait,rPedAb,rVentas,rProd,rStock,rMermas,rClientes,rTurno]=await Promise.all([
      sb.from('ms_reservas').select('hora,comensales,estado,cliente_id,mesa_id').eq('local_id',LOCAL).eq('fecha',hoy),
      sb.from('ms_waitlist').select('id,estado').eq('local_id',LOCAL).in('estado',['esperando','avisado']),
      sb.from('ca_pedidos').select('id,total,estado,mesa_id').eq('local_id',LOCAL).eq('estado','abierta'),
      sb.from('ca_pedidos').select('total,cerrada_at').eq('local_id',LOCAL).eq('estado','cerrada').gte('cerrada_at',desde7+'T00:00:00'),
      sb.from('inv_productos').select('id,costo,par_level').eq('marca_id',MARCA),
      sb.from('inv_stock_actual').select('producto_id,stock').eq('local_id',LOCAL),
      sb.from('inv_mermas').select('valor_perdido,fecha').eq('local_id',LOCAL).gte('fecha',desde7),
      sb.from('ms_clientes').select('id,tags').eq('marca_id',MARCA),
      sb.from('ca_turnos').select('nombre,estado').eq('local_id',LOCAL).eq('estado','abierto').order('fecha',{ascending:false}).limit(1),
    ]);
    const reservas=rRes.data||[], wait=rWait.data||[], pedAb=rPedAb.data||[], ventas=rVentas.data||[];
    const prods=rProd.data||[], stockRows=rStock.data||[], mermas=rMermas.data||[], clientes=rClientes.data||[];
    const turno=(rTurno.data&&rTurno.data[0])||null;
    $('#p-turno').textContent=turno?turno.nombre:'Sin turno';

    const sm={};stockRows.forEach(r=>sm[r.producto_id]=Number(r.stock||0));
    let valorInv=0, bajoPar=[];
    prods.forEach(p=>{const s=sm[p.id]||0;valorInv+=s*Number(p.costo||0);if(s<Number(p.par_level||0))bajoPar.push(p);});
    const cubiertos=reservas.filter(r=>['confirmada','sentada','completada'].includes(r.estado)).reduce((a,r)=>a+(r.comensales||0),0);
    const ventasHoy=ventas.filter(v=>(v.cerrada_at||'').slice(0,10)===hoy).reduce((a,v)=>a+Number(v.total||0),0);
    const ventaAbierta=pedAb.reduce((a,p)=>a+Number(p.total||0),0);
    const vips=clientes.filter(c=>(c.tags||[]).some(t=>/vip/i.test(t))).length;

    const kpi=(v,l,href,cls,ico)=>`<div class="kpi ${cls||''}" ${href?`onclick="location.href='${href}'"`:''}>${ico?`<span class="ico material-symbols-outlined">${ico}</span>`:''}<div class="v">${v}</div><div class="l">${l}</div></div>`;
    $('#kpis').innerHTML=
      kpi(reservas.filter(r=>r.estado==='confirmada').length,'Reservas por llegar','/bienvenida','','event')+
      kpi(cubiertos,'Cubiertos esperados','/bienvenida','','restaurant')+
      kpi(wait.length,'En lista de espera','/bienvenida#waitlist',wait.length?'alert':'','hourglass_top')+
      kpi(pedAb.length,'Mesas abiertas','/pos','','table_restaurant')+
      kpi(money(ventasHoy),'Ventas de hoy','/pos','','payments')+
      kpi(money(valorInv),'Valor inventario','/mercado#reportes','','inventory_2')+
      kpi(bajoPar.length,'Insumos bajo par','/mercado#inventario',bajoPar.length?'alert':'','warning');

    const dias={};for(let i=6;i>=0;i--){dias[addD(hoy,-i)]=0;}
    ventas.forEach(v=>{const d=(v.cerrada_at||'').slice(0,10);if(d in dias)dias[d]+=Number(v.total||0)});
    const max=Math.max(1,...Object.values(dias));
    const dn=['D','L','M','M','J','V','S'];
    $('#chart').innerHTML=Object.entries(dias).map(([d,v])=>{const dd=new Date(d+'T00:00:00');const h=Math.round(v/max*100);
      return `<div class="col ${d===hoy?'today':''}"><div class="val">${v?money(v).replace('S/ ','S/'):''}</div><div class="bar" style="height:${h}%"></div><div class="cap">${dn[dd.getDay()]} ${dd.getDate()}</div></div>`;}).join('');

    const prox=reservas.filter(r=>r.estado==='confirmada').sort((a,b)=>hhmm(a.hora).localeCompare(hhmm(b.hora))).slice(0,6);
    $('#proximas').innerHTML=prox.length?prox.map(r=>`<div class="li"><span class="t">${hhmm(r.hora)}</span><span class="nm">${r.comensales} comensal${r.comensales===1?'':'es'}${r.mesa_id?' · '+r.mesa_id.replace('t_','').toUpperCase():''}</span><span class="badge" style="background:var(--primary-soft)">${r.estado}</span></div>`).join(''):'<div class="empty">Sin reservas próximas hoy</div>';

    const al=[];
    if(bajoPar.length)al.push({c:'var(--secondary)',t:`${bajoPar.length} insumo(s) bajo par — revisar compras`,h:'/mercado'});
    const noShow=reservas.filter(r=>r.estado==='no_show').length;
    if(noShow)al.push({c:'var(--secondary)',t:`${noShow} no-show hoy`,h:'/bienvenida'});
    if(wait.length)al.push({c:'var(--tertiary)',t:`${wait.length} en lista de espera`,h:'/bienvenida'});
    const mermaHoy=mermas.filter(m=>m.fecha===hoy).reduce((a,m)=>a+Number(m.valor_perdido||0),0);
    if(mermaHoy>0)al.push({c:'var(--secondary)',t:`Merma de hoy: ${money(mermaHoy)}`,h:'/mercado'});
    if(!turno)al.push({c:'var(--tertiary)',t:'No hay turno abierto en el POS',h:'/pos'});
    $('#alertas').innerHTML=al.length?al.map(a=>`<div class="alerta" onclick="location.href='${a.h}'"><span class="dot" style="background:${a.c}"></span><span style="flex:1">${a.t}</span><span class="material-symbols-outlined" style="opacity:.4;font-size:16px">chevron_right</span></div>`).join(''):'<div class="empty">Todo en orden ✅</div>';

    $('#inv').innerHTML=`
      <div class="li"><span class="nm">Valor total en stock</span><strong class="mono">${money(valorInv)}</strong></div>
      <div class="li"><span class="nm">Productos</span><strong class="mono">${prods.length}</strong></div>
      <div class="li"><span class="nm">Bajo par</span><strong class="mono" style="color:${bajoPar.length?'var(--secondary)':''}">${bajoPar.length}</strong></div>
      <div class="li"><span class="nm">Merma últimos 7 días</span><strong class="mono">${money(mermas.reduce((a,m)=>a+Number(m.valor_perdido||0),0))}</strong></div>
      <div class="li"><span class="nm">Comensales · VIP</span><strong class="mono">${clientes.length} · ${vips}</strong></div>
      <div class="li"><span class="nm">Cuenta abierta en mesas</span><strong class="mono">${money(ventaAbierta)}</strong></div>`;
  }catch(err){console.error(err);$('#kpis').innerHTML='<div class="empty">No se pudo cargar el panel · '+(err.message||'')+'</div>';}
  $('#boot').classList.add('gone');
}
load();
</script>
<div class="feat-bd" id="feat-bd" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="feat-card"><div id="feat-body"></div>
    <button class="feat-x" onclick="document.getElementById('feat-bd').classList.remove('open')">Entendido</button>
  </div>
</div>
