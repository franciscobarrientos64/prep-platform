<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#fcf9f8">
<title>POS · Casa Italia · Prep!</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231e5af9'/><text x='50' y='70' font-family='sans-serif' font-weight='900' font-size='60' fill='%23fcf9f8' text-anchor='middle'>p!</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ============ TOKENS ============ */
:root {
  --primary: #1e5af9;
  --secondary: #ff3b30;
  --tertiary: #ffcc00;
  --bg: #fcf9f8;
  --surface: #ffffff;
  --ink: #171c20;
  --outline: #000000;
  --primary-soft: #d6e2ff;
  --primary-dark: #001a47;
  --gray-soft: #dfe3e8;
  --green: #10b981;
  --green-soft: #d1fae5;
  --amber-soft: #fef3c7;
  --red-soft: #fee2e2;
  --shadow-sm: 4px 4px 0 0 #000;
  --shadow: 6px 6px 0 0 #000;
  --shadow-lg: 10px 10px 0 0 #000;
  --font-display: 'Bagel Fat One', system-ui, sans-serif;
  --font-body: 'IBM Plex Sans', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
  --canvas-scale: 1.6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  display: flex;
  flex-direction: column;
  touch-action: manipulation;
}
button { font-family: inherit; cursor: pointer; }
.material-symbols-outlined { font-size: 20px; line-height: 1; user-select: none; }

/* ============ HEADER ============ */
.header {
  flex-shrink: 0;
  background: var(--bg);
  border-bottom: 2px solid var(--outline);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  min-height: 64px;
}
.brand { display: flex; align-items: baseline; gap: 8px; flex-shrink: 0; }
.brand .logo { font-family: var(--font-display); font-size: 28px; color: var(--primary); line-height: 0.9; }
.brand .logo .accent { color: var(--secondary); }
.brand .mod {
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.55;
}
.header-info {
  display: flex; align-items: center; gap: 10px; flex: 1;
  font-family: var(--font-mono); font-size: 12px;
}
.pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  border: 2px solid var(--outline); border-radius: 999px;
  background: var(--surface);
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
  font-size: 11px;
}
.pill.live { background: var(--primary); color: white; }
.pill.live::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--tertiary); animation: pulse 1.4s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.3 } }

.btn-ico {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  border: 2px solid var(--outline); border-radius: 999px;
  background: var(--surface); color: var(--ink);
  font-family: var(--font-body); font-weight: 600; font-size: 13px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.1s, box-shadow 0.1s;
}
.btn-ico:active { transform: translate(2px,2px); box-shadow: none; }
.btn-ico.dark { background: var(--ink); color: var(--bg); }
.btn-ico.warn { background: var(--tertiary); color: var(--ink); }
.btn-ico.primary { background: var(--primary); color: white; }
.btn-ico.danger { background: var(--secondary); color: white; }
.btn-ico.ghost { background: transparent; box-shadow: none; border-style: dashed; }

/* ============ ZONE TABS ============ */
.zonas {
  flex-shrink: 0;
  display: flex; gap: 8px;
  padding: 12px 16px;
  background: var(--bg);
  border-bottom: 2px solid var(--outline);
  overflow-x: auto; scrollbar-width: none;
}
.zonas::-webkit-scrollbar { display: none; }
.zona-tab {
  flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 18px;
  border: 2px solid var(--outline); border-radius: 999px;
  background: var(--surface);
  font-family: var(--font-body); font-weight: 600; font-size: 13px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.1s, box-shadow 0.1s;
}
.zona-tab.active {
  background: var(--ink); color: var(--bg);
  transform: translate(2px,2px); box-shadow: none;
}
.zona-tab .count {
  font-family: var(--font-mono); font-size: 11px;
  background: var(--tertiary); color: var(--ink);
  padding: 1px 7px; border-radius: 999px;
  border: 1.5px solid var(--outline);
}

/* ============ FLOOR CANVAS ============ */
.floor-wrap {
  flex: 1; overflow: auto; position: relative; padding: 24px;
}
.floor-canvas {
  position: relative;
  width: calc(580px * var(--canvas-scale));
  height: calc(320px * var(--canvas-scale));
  margin: 0 auto;
  background: var(--surface);
  border: 2px solid var(--outline);
  border-radius: 16px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}
.floor-canvas.editing {
  background:
    repeating-linear-gradient(0deg, transparent 0, transparent calc(20px * var(--canvas-scale) - 1px), rgba(30,90,249,0.1) calc(20px * var(--canvas-scale) - 1px), rgba(30,90,249,0.1) calc(20px * var(--canvas-scale))),
    repeating-linear-gradient(90deg, transparent 0, transparent calc(20px * var(--canvas-scale) - 1px), rgba(30,90,249,0.1) calc(20px * var(--canvas-scale) - 1px), rgba(30,90,249,0.1) calc(20px * var(--canvas-scale))),
    var(--surface);
}

/* Canvas inner: aplica el scale transform en lugar de manualmente en cada elemento */
.canvas-inner {
  position: absolute;
  inset: 0;
  transform: scale(var(--canvas-scale));
  transform-origin: 0 0;
  width: 580px;
  height: 320px;
}

/* ZONA backgrounds */
.zona-bg {
  position: absolute;
  pointer-events: none;
}
.zona-label {
  position: absolute;
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  opacity: 0.5;
  pointer-events: none;
  color: var(--ink);
}

/* MUEBLES */
.mueble {
  position: absolute;
  pointer-events: none;
  font-family: var(--font-mono);
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink);
  overflow: hidden;
}
.mueble.pared {
  background: repeating-linear-gradient(45deg, var(--ink) 0, var(--ink) 3px, #333 3px, #333 6px);
}
.mueble.entrada {
  background: var(--tertiary);
  border: 1px solid var(--outline);
  font-size: 7px;
}
.mueble.cocina {
  background: var(--red-soft);
  border: 1.5px solid var(--secondary);
  font-size: 11px;
  color: var(--secondary);
  font-weight: 800;
}
.mueble.pase {
  background: var(--ink);
  color: var(--bg);
  border: 1px solid var(--outline);
  font-size: 7px;
}
.mueble.baño {
  background: var(--gray-soft);
  border: 1.5px solid var(--outline);
  color: var(--ink);
}
.mueble.columna {
  background: var(--ink);
  border-radius: 50%;
}
.mueble.planta {
  background: var(--green-soft);
  border: 1.5px solid var(--green);
  border-radius: 50%;
}
.mueble.barra_fisica {
  background: var(--primary-dark);
  color: var(--bg);
  border: 1px solid var(--outline);
}
/* En modo edit, los muebles son interactivos */
.editing .mueble { pointer-events: auto; cursor: grab; }
.editing .mueble:active { cursor: grabbing; }
.editing .mueble.selected {
  outline: 3px dashed var(--primary);
  outline-offset: 2px;
  z-index: 50;
}

/* MESAS */
.mesa {
  position: absolute;
  border: 2px solid var(--outline);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
  cursor: pointer;
  transition: box-shadow 0.12s, background 0.15s;
  padding: 3px;
  overflow: hidden;
  text-align: center;
  font-family: var(--font-body);
  -webkit-touch-callout: none;
}
.mesa:active { transform: translate(2px,2px); box-shadow: none; }
.mesa .num { font-family: var(--font-display); font-size: 16px; line-height: 0.9; }
.mesa .cap { font-family: var(--font-mono); font-size: 8px; font-weight: 600; opacity: 0.6; text-transform: uppercase; }
.mesa .timer {
  font-family: var(--font-mono); font-size: 10px; font-weight: 700;
  background: var(--ink); color: var(--bg);
  padding: 1px 5px; border-radius: 999px; margin-top: 1px;
}
.mesa .badge-com {
  position: absolute; top: -7px; right: -7px;
  width: 18px; height: 18px;
  background: var(--tertiary); border: 2px solid var(--outline);
  border-radius: 50%;
  font-family: var(--font-mono); font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.mesa.circular { border-radius: 50%; }
.mesa.rectangular { border-radius: 8px; }
.mesa.barra { border-radius: 8px; background: var(--primary-dark); color: var(--bg); }
.mesa.barra .cap { opacity: 0.8; }

.mesa[data-estado="libre"] { background: var(--surface); }
.mesa[data-estado="abierta"] { background: var(--primary-soft); border-color: var(--primary); }
.mesa[data-estado="marchada"] { background: var(--tertiary); }
.mesa[data-estado="cuenta_pedida"] { background: var(--secondary); color: white; }
.mesa[data-estado="cuenta_pedida"] .cap { opacity: 0.85; }
.mesa[data-estado="cuenta_pedida"] .timer { background: white; color: var(--ink); }
.mesa[data-estado="suspendida"] { background: var(--surface); border-style: dashed; opacity: 0.7; }

.editing .mesa { cursor: grab; }
.editing .mesa:active { cursor: grabbing; transform: none; box-shadow: var(--shadow-sm); }
.editing .mesa.selected { outline: 3px dashed var(--primary); outline-offset: 3px; z-index: 50; }
.editing .mesa:hover { box-shadow: var(--shadow); }

/* LEGEND */
.legend {
  display: flex; gap: 14px; flex-wrap: wrap;
  padding: 12px 16px;
  background: var(--bg);
  font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  border-top: 1px solid var(--gray-soft);
}
.legend-item { display: inline-flex; align-items: center; gap: 6px; }
.legend-dot { width: 14px; height: 14px; border: 1.5px solid var(--outline); border-radius: 4px; }
.legend-dot.libre { background: var(--surface); }
.legend-dot.abierta { background: var(--primary-soft); }
.legend-dot.marchada { background: var(--tertiary); }
.legend-dot.cuenta { background: var(--secondary); }
.legend-dot.suspendida { background: var(--surface); border-style: dashed; }

/* ============ FAB EN EDIT MODE ============ */
.fab-stack {
  position: fixed;
  right: 20px;
  bottom: 24px;
  z-index: 60;
  display: flex; flex-direction: column; gap: 10px;
}
.fab {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 12px 16px;
  border: 2px solid var(--outline);
  border-radius: 14px;
  background: var(--surface);
  box-shadow: var(--shadow);
  font-family: var(--font-body); font-weight: 700; font-size: 13px;
  transition: transform 0.1s, box-shadow 0.1s;
}
.fab:active { transform: translate(2px,2px); box-shadow: var(--shadow-sm); }
.fab.primary { background: var(--primary); color: white; }
.fab.dark { background: var(--ink); color: var(--bg); }
.fab.warn { background: var(--tertiary); color: var(--ink); }

/* ============ BOTTOM SHEET ============ */
.sheet-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 80;
  opacity: 0; pointer-events: none;
  transition: opacity 0.18s;
}
.sheet-backdrop.open { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 90;
  background: var(--surface);
  border-top: 3px solid var(--outline);
  border-radius: 24px 24px 0 0;
  box-shadow: 0 -10px 0 0 var(--outline);
  transform: translateY(100%);
  transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: 85vh;
  display: flex; flex-direction: column;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 48px; height: 5px;
  background: var(--outline);
  border-radius: 999px;
  margin: 12px auto 8px;
  opacity: 0.3;
}
.sheet-head {
  padding: 8px 24px 16px;
  border-bottom: 2px solid var(--outline);
  display: flex; align-items: center; gap: 14px;
}
.sheet-mesa-mark {
  width: 52px; height: 52px;
  border: 2px solid var(--outline);
  border-radius: 12px;
  background: var(--primary-soft);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 20px;
  flex-shrink: 0;
}
.sheet-title { flex: 1; }
.sheet-title h2 { font-family: var(--font-display); font-size: 22px; line-height: 1; margin-bottom: 4px; }
.sheet-title .meta {
  font-family: var(--font-mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.65;
  display: flex; gap: 10px; flex-wrap: wrap;
}
.sheet-close {
  width: 40px; height: 40px;
  border: 2px solid var(--outline); border-radius: 50%;
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-sm);
}
.sheet-close:active { transform: translate(2px,2px); box-shadow: none; }

.sheet-body { padding: 20px 24px 24px; overflow-y: auto; flex: 1; }
.sheet-section + .sheet-section { margin-top: 18px; }
.sheet-section-label {
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.55;
  margin-bottom: 8px;
}
.sheet-info-row {
  display: flex; justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px dashed var(--gray-soft);
  font-size: 14px;
}
.sheet-info-row strong { font-family: var(--font-mono); font-weight: 600; }

/* COMENSALES STEPPER */
.com-stepper { display: flex; align-items: center; gap: 12px; justify-content: center; margin: 12px 0; }
.com-stepper button {
  width: 56px; height: 56px;
  border: 2px solid var(--outline); border-radius: 50%;
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  font-size: 28px; font-weight: 700; font-family: var(--font-display);
  display: flex; align-items: center; justify-content: center;
  line-height: 0;
}
.com-stepper button:active { transform: translate(2px,2px); box-shadow: none; }
.com-stepper button:disabled { opacity: 0.3; }
.com-stepper .com-num {
  font-family: var(--font-display); font-size: 56px; line-height: 1;
  min-width: 80px; text-align: center;
}

/* BUTTON BANK */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 18px;
  border: 2px solid var(--outline); border-radius: 14px;
  font-family: var(--font-body); font-weight: 600; font-size: 14px;
  background: var(--surface); color: var(--ink);
  box-shadow: var(--shadow-sm);
  transition: transform 0.1s, box-shadow 0.1s;
  width: 100%;
  min-height: 52px;
}
.btn:active { transform: translate(2px,2px); box-shadow: none; }
.btn.primary { background: var(--primary); color: white; }
.btn.danger { background: var(--secondary); color: white; }
.btn.warn { background: var(--tertiary); color: var(--ink); }
.btn.dark { background: var(--ink); color: var(--bg); }
.btn.ghost { background: transparent; box-shadow: none; border-style: dashed; }
.btn[disabled] { opacity: 0.4; pointer-events: none; }
.btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
.btn-grid .btn.span-2 { grid-column: span 2; }

/* PROP EDITOR (modo edit) */
.prop-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0;
  border-bottom: 1px dashed var(--gray-soft);
}
.prop-row label {
  flex: 1; font-size: 13px; font-weight: 600;
}
.stepper-mini {
  display: inline-flex; align-items: center; gap: 8px;
}
.stepper-mini button {
  width: 36px; height: 36px;
  border: 2px solid var(--outline); border-radius: 50%;
  background: var(--surface); box-shadow: var(--shadow-sm);
  font-size: 18px; font-weight: 700; line-height: 0;
}
.stepper-mini button:active { transform: translate(1px,1px); box-shadow: none; }
.stepper-mini .val {
  font-family: var(--font-mono); font-weight: 700; min-width: 30px; text-align: center;
}
.select {
  padding: 8px 12px;
  border: 2px solid var(--outline); border-radius: 10px;
  background: var(--surface); font-family: var(--font-body); font-weight: 600;
  font-size: 13px;
  box-shadow: var(--shadow-sm);
}
.input {
  padding: 8px 12px;
  border: 2px solid var(--outline); border-radius: 10px;
  background: var(--surface);
  font-family: var(--font-body); font-size: 14px;
  box-shadow: var(--shadow-sm);
  width: 100%;
}

/* MOZO PICKER (dialog) */
.dialog-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 100;
  display: none;
  align-items: center; justify-content: center;
  padding: 24px;
}
.dialog-backdrop.open { display: flex; }
.dialog {
  background: var(--surface);
  border: 3px solid var(--outline); border-radius: 18px;
  box-shadow: var(--shadow-lg);
  width: 100%; max-width: 480px; max-height: 80vh;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.dialog-head {
  padding: 16px 20px;
  border-bottom: 2px solid var(--outline);
  display: flex; align-items: center; gap: 10px;
}
.dialog-head h3 { font-family: var(--font-display); font-size: 20px; flex: 1; }
.dialog-body { padding: 16px; overflow-y: auto; flex: 1; }
.mozo-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px;
  border: 2px solid var(--outline); border-radius: 12px;
  background: var(--surface);
  margin-bottom: 8px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.1s, box-shadow 0.1s;
}
.mozo-item:active { transform: translate(2px,2px); box-shadow: none; }
.mozo-item.active { background: var(--primary); color: white; }
.mozo-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  border: 2px solid var(--outline);
  background: var(--tertiary);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 16px; color: var(--ink);
  flex-shrink: 0;
}
.mozo-info { flex: 1; }
.mozo-info .name { font-weight: 700; font-size: 15px; }
.mozo-info .rol {
  font-family: var(--font-mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.7;
}

/* ============ PEDIDO SCREEN ============ */
.pedido-screen {
  flex: 1;
  display: grid;
  grid-template-columns: minmax(320px, 1fr) minmax(360px, 1.2fr);
  grid-template-rows: auto 1fr auto;
  grid-template-areas:
    "head head"
    "items menu"
    "foot foot";
  background: var(--bg);
  overflow: hidden;
}
.pedido-head {
  grid-area: head;
  background: var(--surface);
  border-bottom: 2px solid var(--outline);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
  flex-wrap: wrap;
}
.pedido-head .ticket-mark {
  width: 52px; height: 52px;
  border: 2px solid var(--outline); border-radius: 12px;
  background: var(--primary-soft);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 18px;
  flex-shrink: 0;
}
.pedido-head .info { flex: 1; min-width: 180px; }
.pedido-head h2 { font-family: var(--font-display); font-size: 22px; line-height: 1; }
.pedido-head .meta {
  font-family: var(--font-mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.65;
  display: flex; gap: 10px; flex-wrap: wrap;
  margin-top: 2px;
}
.pedido-head .actions {
  display: flex; gap: 8px; align-items: center;
}

/* Items column */
.items-col {
  grid-area: items;
  background: var(--bg);
  border-right: 2px solid var(--outline);
  overflow-y: auto;
  padding: 16px;
}
.silla-group {
  background: var(--surface);
  border: 2px solid var(--outline);
  border-radius: 14px;
  box-shadow: var(--shadow-sm);
  margin-bottom: 12px;
  overflow: hidden;
}
.silla-head {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: var(--primary-soft);
  border-bottom: 2px solid var(--outline);
}
.silla-head .badge {
  width: 28px; height: 28px;
  border: 2px solid var(--outline); border-radius: 50%;
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 14px;
}
.silla-head .badge.centro { background: var(--tertiary); }
.silla-head h3 {
  font-family: var(--font-body); font-size: 14px; font-weight: 700; flex: 1;
}
.silla-head .total {
  font-family: var(--font-mono); font-weight: 700; font-size: 13px;
}
.silla-head .alergias {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px;
  background: var(--secondary); color: white;
  padding: 2px 8px; border-radius: 999px;
  font-family: var(--font-mono); text-transform: uppercase;
  border: 1px solid var(--outline);
}
.item-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px dashed var(--gray-soft);
}
.item-row:last-child { border-bottom: none; }
.item-row .qty {
  font-family: var(--font-mono); font-weight: 700; font-size: 13px;
  background: var(--ink); color: var(--bg);
  padding: 3px 8px; border-radius: 6px;
  flex-shrink: 0;
}
.item-row .emoji { font-size: 18px; flex-shrink: 0; }
.item-row .nm { flex: 1; font-size: 14px; font-weight: 600; }
.item-row .nm .notas {
  display: block;
  font-family: var(--font-mono); font-size: 10px;
  font-weight: 500; opacity: 0.7;
  margin-top: 2px;
}
.item-row .price {
  font-family: var(--font-mono); font-weight: 600; font-size: 13px;
  text-align: right;
}
.item-row .estado {
  font-family: var(--font-mono); font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.05em;
  padding: 2px 7px; border-radius: 999px; border: 1.5px solid var(--outline);
}
.item-row .estado.pendiente { background: var(--tertiary); color: var(--ink); }
.item-row .estado.enviado   { background: var(--secondary); color: white; }
.item-row .estado.servido   { background: var(--green); color: white; }
.item-row.urgente {
  background: var(--red-soft);
  border-left: 4px solid var(--secondary);
}
.item-row .ico-btn {
  width: 32px; height: 32px;
  border: 2px solid var(--outline); border-radius: 50%;
  background: var(--surface); box-shadow: var(--shadow-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.item-row .ico-btn:active { transform: translate(1px,1px); box-shadow: none; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  font-family: var(--font-mono);
  font-size: 12px;
  opacity: 0.55;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* Menu column */
.menu-col {
  grid-area: menu;
  background: var(--bg);
  overflow: hidden;
  display: flex; flex-direction: column;
}
.menu-tabs {
  display: flex; gap: 6px;
  padding: 12px 14px 0;
  background: var(--surface);
  border-bottom: 2px solid var(--outline);
}
.menu-tab {
  flex: 1;
  padding: 10px 12px;
  border: 2px solid var(--outline);
  border-bottom: none;
  border-radius: 12px 12px 0 0;
  background: var(--gray-soft);
  font-family: var(--font-display); font-size: 14px;
  font-weight: 700; letter-spacing: 0.04em;
  text-transform: uppercase;
}
.menu-tab.active { background: var(--ink); color: var(--bg); }

.menu-subtabs {
  display: flex; gap: 6px; padding: 10px 14px;
  background: var(--surface);
  border-bottom: 2px solid var(--outline);
  overflow-x: auto; scrollbar-width: none;
}
.menu-subtabs::-webkit-scrollbar { display: none; }
.menu-subtab {
  flex-shrink: 0;
  padding: 6px 12px;
  border: 2px solid var(--outline); border-radius: 999px;
  background: var(--surface);
  font-family: var(--font-body); font-weight: 600; font-size: 12px;
  box-shadow: 2px 2px 0 0 var(--outline);
}
.menu-subtab.active {
  background: var(--primary); color: white;
  transform: translate(1px,1px); box-shadow: none;
}

.menu-grid {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  align-content: start;
}
.menu-item {
  background: var(--surface);
  border: 2px solid var(--outline);
  border-radius: 12px;
  box-shadow: var(--shadow-sm);
  padding: 12px 10px 10px;
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
  cursor: pointer;
  text-align: center;
  transition: transform 0.1s, box-shadow 0.1s;
}
.menu-item:active { transform: translate(2px,2px); box-shadow: none; }
.menu-item .emoji { font-size: 32px; line-height: 1; }
.menu-item .name {
  font-family: var(--font-body); font-weight: 700; font-size: 13px;
  line-height: 1.2;
  flex: 1;
}
.menu-item .price {
  font-family: var(--font-mono); font-weight: 700; font-size: 13px;
  color: var(--primary);
}
.menu-item .alergenos {
  display: flex; gap: 3px; flex-wrap: wrap; justify-content: center;
}
.menu-item .alergenos span {
  font-family: var(--font-mono); font-size: 8px; font-weight: 700;
  padding: 1px 5px; border-radius: 999px;
  background: var(--amber-soft); color: var(--ink);
  border: 1px solid var(--outline);
  text-transform: uppercase;
}

/* Footer totals */
.pedido-foot {
  grid-area: foot;
  background: var(--surface);
  border-top: 2px solid var(--outline);
  padding: 12px 18px;
  display: flex; align-items: center; gap: 18px;
  flex-wrap: wrap;
}
.totals { display: flex; gap: 18px; flex-wrap: wrap; flex: 1; font-family: var(--font-mono); font-size: 12px; }
.totals .t { display: flex; flex-direction: column; }
.totals .t .lbl { opacity: 0.55; text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; }
.totals .t .val { font-weight: 700; font-size: 14px; }
.totals .t.big .val { font-family: var(--font-display); font-size: 22px; color: var(--primary); }

/* Item picker modal */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 110;
  display: none;
  align-items: flex-end; justify-content: center;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--surface);
  border-top: 3px solid var(--outline);
  border-radius: 24px 24px 0 0;
  box-shadow: 0 -10px 0 0 var(--outline);
  width: 100%;
  max-width: 560px;
  max-height: 88vh;
  overflow: hidden;
  display: flex; flex-direction: column;
  padding-bottom: env(safe-area-inset-bottom, 0);
  animation: slide-up 0.25s cubic-bezier(0.32, 0.72, 0, 1);
}
@keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-head {
  padding: 14px 20px;
  border-bottom: 2px solid var(--outline);
  display: flex; align-items: center; gap: 12px;
}
.modal-head .icon { font-size: 32px; }
.modal-head h3 { font-family: var(--font-display); font-size: 20px; flex: 1; line-height: 1; }
.modal-head .price {
  font-family: var(--font-mono); font-weight: 700; font-size: 16px; color: var(--primary);
}
.modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
.modal-foot {
  padding: 12px 20px;
  border-top: 2px solid var(--outline);
  display: flex; gap: 10px;
}

.silla-picker { display: flex; flex-wrap: wrap; gap: 8px; }
.silla-pick-btn {
  min-width: 52px; height: 52px;
  border: 2px solid var(--outline); border-radius: 12px;
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  font-family: var(--font-display); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 10px;
  flex-direction: column; line-height: 1;
}
.silla-pick-btn .sub { font-family: var(--font-mono); font-size: 8px; font-weight: 600; opacity: 0.6; margin-top: 2px; }
.silla-pick-btn:active { transform: translate(2px,2px); box-shadow: none; }
.silla-pick-btn.active { background: var(--primary); color: white; }
.silla-pick-btn.centro { background: var(--tertiary); }
.silla-pick-btn.centro.active { background: var(--primary); color: white; }

.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  padding: 6px 12px;
  border: 2px solid var(--outline); border-radius: 999px;
  background: var(--surface);
  font-family: var(--font-body); font-size: 12px; font-weight: 600;
  box-shadow: 2px 2px 0 0 var(--outline);
}
.chip:active { transform: translate(1px,1px); box-shadow: none; }
.chip.active { background: var(--ink); color: var(--bg); }

/* TOASTS */
.toast-container {
  position: fixed; top: 80px; right: 16px; z-index: 200;
  display: flex; flex-direction: column; gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--ink); color: var(--bg);
  border: 2px solid var(--outline); border-radius: 12px;
  padding: 12px 18px;
  font-size: 14px; font-weight: 600;
  box-shadow: var(--shadow);
  animation: toast-in 0.3s ease-out;
  display: flex; align-items: center; gap: 10px;
  max-width: 320px;
}
.toast.ok { background: var(--primary); color: white; }
.toast.err { background: var(--secondary); color: white; }
.toast.warn { background: var(--tertiary); color: var(--ink); }
@keyframes toast-in { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* LOADING SCREEN */
.boot {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  z-index: 300;
  transition: opacity 0.3s;
}
.boot.gone { opacity: 0; pointer-events: none; }
.boot .logo { font-family: var(--font-display); font-size: 72px; color: var(--primary); line-height: 1; }
.boot .logo .accent { color: var(--secondary); }
.boot .msg { font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; opacity: 0.6; }
.boot .spinner {
  width: 36px; height: 36px;
  border: 4px solid var(--outline);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ============ COBRO SCREEN (BLOQUE 3) ============ */
.cobro-screen {
  flex: 1;
  display: grid;
  grid-template-columns: minmax(340px, 0.9fr) minmax(420px, 1.1fr);
  grid-template-rows: auto 1fr auto;
  grid-template-areas:
    "head head"
    "left right"
    "foot foot";
  background: var(--bg);
  overflow: hidden;
}
.cobro-head {
  grid-area: head;
  background: var(--secondary);
  color: white;
  border-bottom: 2px solid var(--outline);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
}
.cobro-head .ticket-mark {
  width: 52px; height: 52px;
  border: 2px solid var(--outline); border-radius: 12px;
  background: var(--tertiary); color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 18px;
}
.cobro-head .info { flex: 1; min-width: 180px; }
.cobro-head h2 { font-family: var(--font-display); font-size: 22px; line-height: 1; }
.cobro-head .meta {
  font-family: var(--font-mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.85;
  display: flex; gap: 10px; flex-wrap: wrap; margin-top: 2px;
}

.cobro-left {
  grid-area: left;
  border-right: 2px solid var(--outline);
  background: var(--bg);
  overflow-y: auto;
  padding: 16px;
}
.cobro-right {
  grid-area: right;
  background: var(--bg);
  overflow-y: auto;
  padding: 16px 18px;
}

.cobro-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: var(--surface);
  border: 2px solid var(--outline); border-radius: 12px;
  margin-bottom: 8px;
  font-size: 13px;
}
.cobro-item.cortesia { background: var(--green-soft); }
.cobro-item.cortesia .price { text-decoration: line-through; opacity: 0.5; }
.cobro-item .qty {
  font-family: var(--font-mono); font-weight: 700; font-size: 12px;
  background: var(--ink); color: var(--bg);
  padding: 2px 7px; border-radius: 6px; flex-shrink: 0;
}
.cobro-item .nm { flex: 1; font-weight: 600; }
.cobro-item .price { font-family: var(--font-mono); font-weight: 700; font-size: 13px; }
.cobro-item .cortesia-tag {
  font-family: var(--font-mono); font-size: 9px; font-weight: 700;
  background: var(--green); color: white;
  padding: 2px 6px; border-radius: 999px; border: 1.5px solid var(--outline);
  text-transform: uppercase;
}
.cobro-item .ico-btn {
  width: 28px; height: 28px;
  border: 2px solid var(--outline); border-radius: 50%;
  background: var(--surface); box-shadow: 2px 2px 0 0 var(--outline);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* PAYMENT METHODS GRID */
.pay-methods {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 10px;
}
.pay-method-btn {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  padding: 14px 8px;
  min-height: 80px;
  border: 2px solid var(--outline); border-radius: 12px;
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  font-family: var(--font-body); font-weight: 700; font-size: 12px;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
}
.pay-method-btn:active { transform: translate(2px,2px); box-shadow: none; }
.pay-method-btn .emoji { font-size: 26px; line-height: 1; }
.pay-method-btn .lbl { line-height: 1.1; }
.pay-method-btn.active {
  background: var(--primary); color: white;
  transform: translate(2px,2px); box-shadow: none;
}

/* Numpad estilo POS */
.numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-top: 10px;
}
.numpad button {
  padding: 16px;
  border: 2px solid var(--outline); border-radius: 10px;
  background: var(--surface); box-shadow: var(--shadow-sm);
  font-family: var(--font-display); font-size: 22px;
  cursor: pointer;
  min-height: 56px;
}
.numpad button:active { transform: translate(2px,2px); box-shadow: none; }
.numpad button.action { background: var(--tertiary); }
.numpad button.del { background: var(--secondary); color: white; }

.monto-display {
  background: var(--ink); color: var(--bg);
  border: 2px solid var(--outline); border-radius: 12px;
  padding: 14px 18px;
  text-align: right;
  font-family: var(--font-display);
  font-size: 32px;
  margin-top: 10px;
  letter-spacing: 0.02em;
}
.monto-display.warn { background: var(--secondary); color: white; }
.monto-display .currency {
  font-family: var(--font-mono); font-size: 14px;
  opacity: 0.55; margin-right: 8px;
}

.vuelto-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 8px 0;
  font-family: var(--font-mono); font-size: 13px;
}
.vuelto-row strong {
  font-family: var(--font-display); font-size: 22px; color: var(--green);
}

.pagos-list { margin-top: 10px; }
.pago-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: var(--green-soft);
  border: 2px solid var(--green);
  border-radius: 10px;
  margin-bottom: 6px;
  font-size: 13px;
}
.pago-row .met { font-weight: 700; flex-shrink: 0; }
.pago-row .det { font-family: var(--font-mono); font-size: 11px; opacity: 0.75; flex: 1; }
.pago-row .mon { font-family: var(--font-mono); font-weight: 700; }
.pago-row .del {
  background: transparent; border: none;
  color: var(--secondary); cursor: pointer; padding: 2px 4px;
  font-size: 18px;
}

.propina-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.propina-chip {
  padding: 10px 14px;
  border: 2px solid var(--outline); border-radius: 999px;
  background: var(--surface); box-shadow: var(--shadow-sm);
  font-family: var(--font-body); font-weight: 700; font-size: 13px;
}
.propina-chip:active { transform: translate(1px,1px); box-shadow: none; }
.propina-chip.active { background: var(--tertiary); }

.split-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.split-chip {
  width: 44px; height: 44px;
  border: 2px solid var(--outline); border-radius: 12px;
  background: var(--surface); box-shadow: var(--shadow-sm);
  font-family: var(--font-display); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
.split-chip.active {
  background: var(--primary); color: white;
  transform: translate(2px,2px); box-shadow: none;
}

.comprobante-tabs {
  display: flex; gap: 6px; margin-top: 8px;
}
.comprobante-tab {
  flex: 1;
  padding: 10px;
  border: 2px solid var(--outline); border-radius: 10px;
  background: var(--surface); box-shadow: var(--shadow-sm);
  font-family: var(--font-body); font-weight: 700; font-size: 12px;
  text-align: center;
}
.comprobante-tab.active {
  background: var(--ink); color: var(--bg);
  transform: translate(2px,2px); box-shadow: none;
}

.cobro-foot {
  grid-area: foot;
  background: var(--surface);
  border-top: 2px solid var(--outline);
  padding: 12px 18px;
  display: flex; align-items: center; gap: 18px;
  flex-wrap: wrap;
}
.cobro-foot .totals { display: flex; gap: 18px; flex-wrap: wrap; flex: 1; font-family: var(--font-mono); font-size: 12px; }
.cobro-foot .totals .t { display: flex; flex-direction: column; }
.cobro-foot .totals .t .lbl { opacity: 0.55; text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; }
.cobro-foot .totals .t .val { font-weight: 700; font-size: 14px; }
.cobro-foot .totals .t.big .val { font-family: var(--font-display); font-size: 24px; color: var(--primary); }
.cobro-foot .totals .t.pendiente .val { color: var(--secondary); }
.cobro-foot .totals .t.cubierto .val { color: var(--green); }
.cobro-foot .btn { width: auto; min-width: 200px; }

/* RESPONSIVE */
@media (max-width: 900px) {
  .pedido-screen {
    grid-template-columns: 1fr;
    grid-template-areas: "head" "menu" "items" "foot";
  }
  .items-col { border-right: none; border-top: 2px solid var(--outline); max-height: 38vh; }
  .menu-col { max-height: 50vh; }
  .cobro-screen {
    grid-template-columns: 1fr;
    grid-template-areas: "head" "right" "left" "foot";
  }
  .cobro-left { border-right: none; border-top: 2px solid var(--outline); max-height: 32vh; }
  .cobro-right { max-height: 55vh; }
  .pay-methods { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 640px) {
  :root { --canvas-scale: 1.2; }
  .header { padding: 8px 12px; gap: 8px; }
  .brand .logo { font-size: 22px; }
  .brand .mod { display: none; }
  .pill { font-size: 10px; padding: 4px 8px; }
  .floor-wrap { padding: 12px; }
  .btn-ico span:not(.material-symbols-outlined) { display: none; }
  .btn-ico { padding: 8px; }
}
@media (min-width: 1200px) { :root { --canvas-scale: 2.0; } }
</style>

  <div class="logo">prep<span class="accent">!</span></div>
  <div class="spinner"></div>

</div>

<!-- HEADER -->

<!-- MAIN SCREEN MOUNT -->

<script>
/* =========================================================================
   PREP! POS v2 · Bloque 2
   Floor plan + Editor + Toma de pedido (CA-01, CA-02 básico, CA-10 básico,
   CA-19, CA-20, CA-21, CA-22 lectura)
   ========================================================================= */
const SB_URL = 'https://jmkvphayyhwzootlybde.supabase.co';
const SB_KEY = 'sb_publishable_0-znERv1Ok0Dw-Re44eksw_QAOqDc8M';
const MARCA = 'm6';

/* ========= STATE ========= */
const state = {
  // catálogo
  mesas: [],
  empleados: [],
  recetas: [],
  estaciones: [],
  floorPlan: null,
  muebles: [],
  zonas: [],

  // operación
  turno: null,
  pedidos: [],
  pedidoItemsCache: {}, // pedido_id → items[]
  mozoId: localStorage.getItem('prep_pos_mozo') || null,
  zonaActiva: 'todas',

  // UI

  // cobro (Bloque 3)
  cobro: {

    cortesias: [],          // [{ item_id, monto, motivo, tmp_id }] — sólo locales hasta confirmar

};

/* ========= UTILS ========= */
const $ = (s, root = document) => root.querySelector(s);
const $$ = (s, root = document) => Array.from(root.querySelectorAll(s));

function timeAgo(dateStr) {
  if (!dateStr) return '—';
  const ms = Date.now() - new Date(dateStr).getTime();
  const min = Math.floor(ms / 60000);
  if (min < 1) return 'ahora';
  if (min < 60) return min + ' min';
  const h = Math.floor(min / 60);
  return h + 'h ' + (min % 60) + 'm';
}
function fmtMozo(emp) { if (!emp) return '—'; const a = (emp.apellidos||'').split(' ')[0]; return emp.nombre + (a ? ' '+a : ''); }
function avatarLetters(emp) { return ((emp.nombre||'?').charAt(0) + (emp.apellidos||'').charAt(0)).toUpperCase(); }
function money(n) { return 'S/ ' + Number(n||0).toFixed(2); }
function uuid() { return crypto.randomUUID ? crypto.randomUUID() : 'tmp_' + Math.random().toString(36).slice(2); }

function toast(msg, tipo='') {
  const el = document.createElement('div');
  el.className = 'toast ' + tipo;
  const ico = tipo==='ok'?'check_circle':tipo==='err'?'error':tipo==='warn'?'warning':'info';
  el.innerHTML = `<span class="material-symbols-outlined">${ico}</span><span>${msg}</span>`;
  $('#toasts').appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity 0.3s, transform 0.3s';
    el.style.opacity = '0';
    el.style.transform = 'translateX(120%)';
    setTimeout(() => el.remove(), 300);
  }, 2800);
}

/* ========= DATA LOAD ========= */
async function loadAll() {
  await Promise.all([
    loadMesas(), loadEmpleados(), loadTurno(),
    loadRecetas(), loadEstaciones(), loadFloorPlan(),
  ]);
  await loadPedidos();
  // determinar subtab default del menú
  const cats = subcategoriasMenu('cocina');
  state.menuSubtab = cats[0] || null;
  render();
  subscribe();
  setInterval(updateTimers, 30000);
  $('#boot').classList.add('gone');
}

async function loadMesas() {
  const { data, error } = await sb.from('ca_mesas').select('*')
    .eq('marca_id', MARCA).eq('local_id', LOCAL);
  if (error) return toast('Atrás: ' + error.message, 'err');
  state.mesas = (data || []).filter(m => m.activa !== false);
}
async function loadPedidos() {
  const { data, error } = await sb.from('ca_pedidos')
    .select('id, mesa_id, mozo_id, estado, estado_servicio, comensales, abierta_at, ticket_num, total, subtotal, servicio_monto, igv, alergias_por_silla')
    .eq('marca_id', MARCA).eq('local_id', LOCAL)
    .in('estado', ['abierta', 'suspended']);
  if (error) return toast('Atrás: ' + error.message, 'err');
  state.pedidos = data || [];
}
async function loadEmpleados() {
  const { data, error } = await sb.from('rrhh_empleados')
    .select('id, nombre, apellidos, rol, area')
    .eq('marca_id', MARCA).eq('local_id', LOCAL).eq('estado', 'activo')
    .in('area', ['Salón', 'Bar']);
  if (error) return toast('Atrás: ' + error.message, 'err');
  state.empleados = data || [];
}
async function loadTurno() {
  const { data, error } = await sb.from('ca_turnos')
    .select('id, nombre, fecha, estado, hora_inicio')
    .eq('marca_id', MARCA).eq('local_id', LOCAL).eq('estado', 'abierto')
    .order('fecha', { ascending: false }).limit(1);
  if (error) return toast('Atrás: ' + error.message, 'err');
  state.turno = (data && data[0]) || null;
}
async function loadRecetas() {
  const { data, error } = await sb.from('inv_recetas')
    .select('id, nombre, precio_venta, tipo, categoria_menu, sub_categoria, modulo, emoji, estacion_id, alergenos, activo, orden_menu, descripcion')
    .eq('marca_id', MARCA);
  if (error) return toast('Atrás: ' + error.message, 'err');
  state.recetas = (data || []).filter(r => r.activo !== false);
}
async function loadEstaciones() {
  const { data, error } = await sb.from('li_estaciones')
    .select('id, nombre, emoji, color, es_delivery, orden_pase')
    .eq('marca_id', MARCA).eq('local_id', LOCAL);
  if (error) return toast('Atrás: ' + error.message, 'err');
  state.estaciones = data || [];
}
async function loadFloorPlan() {
  const { data, error } = await sb.from('ms_floor_plans')
    .select('*')
    .eq('marca_id', MARCA).eq('local_id', LOCAL).eq('activo', true)
    .limit(1);
  if (error) return toast('Atrás: ' + error.message, 'err');
  state.floorPlan = (data && data[0]) || null;
  if (state.floorPlan && state.floorPlan.layout) {
    state.muebles = state.floorPlan.layout.muebles || [];
    state.zonas = state.floorPlan.layout.zonas || [];
  }
}
async function loadPedidoItems(pedidoId) {
  const { data, error } = await sb.from('ca_pedido_items')
    .select('*')
    .eq('pedido_id', pedidoId)
    .order('created_at', { ascending: true });
  if (error) { toast('Atrás: ' + error.message, 'err'); return []; }
  state.pedidoItemsCache[pedidoId] = data || [];
  return data || [];
}

/* ========= DERIVED ========= */
function pedidoDeMesa(mesaId) { return state.pedidos.find(p => p.mesa_id === mesaId); }
function estadoMesa(mesa) {
  const p = pedidoDeMesa(mesa.id);
  if (!p) return 'libre';
  if (p.estado === 'suspended') return 'suspendida';
  return p.estado_servicio || 'abierta';
}
function zonasCount() {
  const map = { todas: state.mesas.length };
  state.mesas.forEach(m => { const z = m.zona || 'sin_zona'; map[z] = (map[z]||0) + 1; });
  return map;
}
function subcategoriasMenu(modulo) {
  const set = new Set();
  state.recetas.filter(r => r.modulo === modulo).forEach(r => set.add(r.sub_categoria || r.categoria_menu || 'Otros'));
  return Array.from(set);
}
function recetasDe(modulo, subcategoria) {
  return state.recetas
    .filter(r => r.modulo === modulo && (r.sub_categoria || r.categoria_menu) === subcategoria)
    .sort((a,b) => (a.orden_menu||0) - (b.orden_menu||0) || a.nombre.localeCompare(b.nombre));
}

/* ========= ROUTER ========= */
function render() {
  renderHeader();
  if (state.screen === 'floor' || state.screen === 'edit') {
    renderFloorScreen();
  } else if (state.screen === 'pedido') {
    renderPedidoScreen();
  } else if (state.screen === 'cobro') {
    renderCobroScreen();
  }
}

/* ========= HEADER ========= */
function renderHeader() {
  const h = $('#app-header');

    const ped = state.pedidos.find(p => p.id === state.pedidoAbiertoId);

        <span class="material-symbols-outlined">arrow_back</span>
        <span>Volver al pedido</span>
      </button>

      <div class="header-info">
        <span class="pill" style="background:var(--secondary);color:white;border-color:var(--outline)">
          <span class="material-symbols-outlined" style="font-size:14px">point_of_sale</span>
          ${mesa ? 'Mesa '+mesa.numero : 'Pedido'}
        </span>
      </div>
    `;
    $('#back-to-pedido').onclick = () => { state.screen = 'pedido'; render(); };
    return;
  }
  if (state.screen === 'pedido') {
    const ped = state.pedidos.find(p => p.id === state.pedidoAbiertoId);
    const mesa = ped ? state.mesas.find(m => m.id === ped.mesa_id) : null;
    const mozo = ped ? state.empleados.find(e => e.id === ped.mozo_id) : null;
    h.innerHTML = `
      <button class="btn-ico" id="back-floor">
        <span class="material-symbols-outlined">arrow_back</span>
        <span>Floor</span>
      </button>
      <div class="brand"><span class="logo">prep<span class="accent">!</span></span><span class="mod">PEDIDO #${ped?.ticket_num||'?'}</span></div>
      <div class="header-info">
        <span class="pill"><span class="material-symbols-outlined" style="font-size:14px">table_restaurant</span>${mesa?'Mesa '+mesa.numero:'—'}</span>
        <span class="pill"><span class="material-symbols-outlined" style="font-size:14px">person</span>${fmtMozo(mozo)}</span>
        <span class="pill"><span class="material-symbols-outlined" style="font-size:14px">group</span>${ped?.comensales||'—'}</span>
        <span class="pill live"><span id="ped-timer">${timeAgo(ped?.abierta_at)}</span></span>
      </div>
      <button class="btn-ico warn" id="btn-marchar-todo">
        <span class="material-symbols-outlined">local_fire_department</span>
        <span>Marchar todo</span>
      </button>
      <button class="btn-ico danger" id="btn-cobrar-ped">
        <span class="material-symbols-outlined">point_of_sale</span>
        <span>Cobrar</span>
      </button>
    `;
    $('#back-floor').onclick = () => { state.screen = 'floor'; state.pedidoAbiertoId = null; render(); };
    $('#btn-marchar-todo').onclick = () => marcharTodoPendientes();
    $('#btn-cobrar-ped').onclick = () => abrirCobroScreen(state.pedidoAbiertoId);
    return;
  }

  // floor o edit
  const editing = state.screen === 'edit';
  h.innerHTML = `
    <div class="brand">
      <span class="logo">prep<span class="accent">!</span></span>
      <span class="mod">POS · Casa Italia</span>
    </div>
    <div class="header-info">
      <span class="pill" id="turno-pill">
        <span class="material-symbols-outlined" style="font-size:14px">schedule</span>
        <span id="turno-label">${state.turno ? state.turno.nombre+' · '+state.turno.fecha : 'Sin turno'}</span>
      </span>
      <span class="pill live"><span id="abiertas-count">${state.pedidos.filter(p => p.estado==='abierta').length}</span> abiertas</span>
    </div>
    ${editing
      ? `<button class="btn-ico ghost" id="btn-discard-edit"><span class="material-symbols-outlined">undo</span><span>Descartar</span></button>
         <button class="btn-ico primary" id="btn-save-edit"><span class="material-symbols-outlined">save</span><span>Guardar plano</span></button>`
      : `<button class="btn-ico" id="btn-edit-floor"><span class="material-symbols-outlined">edit</span><span>Editar plano</span></button>
         <button class="btn-ico dark" id="mozo-select"><span class="material-symbols-outlined">person</span><span id="mozo-label">${
           (() => { const m = state.empleados.find(e => e.id === state.mozoId); return m ? fmtMozo(m) : 'Elegir mozo'; })()
         }</span></button>`
    }
  `;
  if (!state.turno) { $('#turno-pill').style.background = 'var(--secondary)'; $('#turno-pill').style.color = 'white'; }
  if (editing) {
    $('#btn-discard-edit').onclick = () => exitEditMode(false);
    $('#btn-save-edit').onclick = () => exitEditMode(true);
  } else {
    $('#btn-edit-floor').onclick = enterEditMode;
    $('#mozo-select').onclick = abrirPickerMozo;
  }
}

/* ========= FLOOR SCREEN ========= */
function renderFloorScreen() {
  const editing = state.screen === 'edit';
  const counts = zonasCount();
  const orden = ['todas', 'salón', 'terraza', 'reservado', 'barra'];
  const labels = { todas:'Todas', 'salón':'Salón', terraza:'Terraza', reservado:'Reservado', barra:'Barra' };
  const zonaTabsHtml = editing ? '' : `
    <nav class="zonas">
      ${orden.filter(z => z === 'todas' || counts[z]).map(z => `
        <button class="zona-tab ${state.zonaActiva===z?'active':''}" data-z="${z}">
          ${labels[z]} <span class="count">${counts[z]||0}</span>
        </button>
      `).join('')}
    </nav>
  `;

  // Render canvas con muebles + zonas + mesas
  const mueblesHtml = state.muebles.map(mu => renderMuebleEl(mu, editing)).join('');
  const zonasHtml = state.zonas.map(z => {
    if (z.x == null) return '';
    const isActive = !editing && (state.zonaActiva === 'todas' || state.zonaActiva === z.nombre);
    return `<div class="zona-bg" style="
      left:${z.x}px; top:${z.y}px; width:${z.w}px; height:${z.h}px;
      background:${z.color||'transparent'};
      opacity:${isActive?0.7:0.25};
      transition:opacity 0.2s;
    "></div>
    <div class="zona-label" style="left:${z.x+8}px; top:${z.y+6}px">${z.nombre}</div>`;
  }).join('');
  const mesasHtml = state.mesas.map(m => renderMesaEl(m, editing)).join('');

  $('#screen').innerHTML = `
    ${zonaTabsHtml}
    <div class="floor-wrap">
      <div class="floor-canvas ${editing ? 'editing' : ''}" id="floor-canvas">
        <div class="canvas-inner" id="canvas-inner">
          ${zonasHtml}
          ${mueblesHtml}
          ${mesasHtml}
        </div>
      </div>
    </div>
  `;
  $('#legend').style.display = editing ? 'none' : 'flex';

  // FAB stack en edit
  if (editing) {
    $('#fab-stack').style.display = 'flex';
    $('#fab-stack').innerHTML = `
      <button class="fab primary" id="fab-add-mesa">
        <span class="material-symbols-outlined">table_restaurant</span>+ Mesa
      </button>
      <button class="fab dark" id="fab-add-mueble">
        <span class="material-symbols-outlined">view_in_ar</span>+ Mueble
      </button>
      <button class="fab warn" id="fab-edit-help">
        <span class="material-symbols-outlined">help</span>Ayuda
      </button>
    `;
    $('#fab-add-mesa').onclick = addMesa;
    $('#fab-add-mueble').onclick = addMueble;
    $('#fab-edit-help').onclick = mostrarAyudaEditor;
  } else {
    $('#fab-stack').style.display = 'none';
  }

  // Wire interactions
  $$('#screen .zona-tab').forEach(b => b.onclick = () => { state.zonaActiva = b.dataset.z; render(); });

  $$('#canvas-inner .mesa').forEach(b => {
    b.addEventListener('click', () => {
      if (editing) openEditPanel('mesa', b.dataset.id);
      else openSheet(b.dataset.id);
    });
  });
  $$('#canvas-inner .mueble').forEach(b => {
    if (editing) b.addEventListener('click', (e) => {
      if (b.dataset.justDragged) { delete b.dataset.justDragged; return; }
      openEditPanel('mueble', b.dataset.id);
    });
  });

  if (editing) setupDragAndDrop();
}

function renderMesaEl(m, editing) {
  const ped = pedidoDeMesa(m.id);
  const est = estadoMesa(m);
  const visible = editing || state.zonaActiva === 'todas' || (m.zona || 'sin_zona') === state.zonaActiva;
  const selected = editing && state.edit.selected && state.edit.selected.kind === 'mesa' && state.edit.selected.id === m.id;
  return `
    <button class="mesa ${m.forma || 'rectangular'} ${selected?'selected':''}" data-id="${m.id}" data-estado="${est}" data-kind="mesa"
            style="left:${m.pos_x}px; top:${m.pos_y}px; width:${m.ancho}px; height:${m.alto}px; ${visible?'':'display:none'}">
      <span class="num">${m.numero}</span>
      <span class="cap">×${m.capacidad}</span>
      ${ped && !editing ? `<span class="timer">${timeAgo(ped.abierta_at)}</span>` : ''}
      ${ped && ped.comensales && !editing ? `<span class="badge-com">${ped.comensales}</span>` : ''}
    </button>
  `;
}

function renderMuebleEl(mu, editing) {
  const selected = editing && state.edit.selected && state.edit.selected.kind === 'mueble' && state.edit.selected.id === mu.id;
  return `<div class="mueble ${mu.tipo} ${selected?'selected':''}" data-id="${mu.id}" data-kind="mueble"
       style="left:${mu.x}px; top:${mu.y}px; width:${mu.w}px; height:${mu.h}px">${mu.label||''}</div>`;
}

function updateTimers() {
  if (state.screen !== 'floor') return;
  state.mesas.forEach(m => {
    const ped = pedidoDeMesa(m.id); if (!ped) return;
    const btn = $(`.mesa[data-id="${m.id}"]`); if (!btn) return;
    const t = btn.querySelector('.timer'); if (t) t.textContent = timeAgo(ped.abierta_at);
  });
  if (state.screen === 'pedido' && state.pedidoAbiertoId) {
    const ped = state.pedidos.find(p => p.id === state.pedidoAbiertoId);
    if (ped && $('#ped-timer')) $('#ped-timer').textContent = timeAgo(ped.abierta_at);
  }
}

/* ========= BOTTOM SHEET (floor mode) ========= */
function openSheet(mesaId) {
  const mesa = state.mesas.find(m => m.id === mesaId); if (!mesa) return;
  state.mesaAbierta = mesa;
  const ped = pedidoDeMesa(mesaId);
  const est = estadoMesa(mesa);
  $('#sheet-mark').textContent = mesa.numero;
  $('#sheet-mark').style.background = est==='libre'?'var(--primary-soft)':est==='abierta'?'var(--primary-soft)':est==='marchada'?'var(--tertiary)':est==='cuenta_pedida'?'var(--secondary)':'var(--surface)';
  $('#sheet-mark').style.color = est==='cuenta_pedida'?'white':'var(--ink)';
  $('#sheet-title').textContent = mesa.zona === 'barra' ? 'Barra' : 'Mesa ' + mesa.numero;
  const meta = [(mesa.zona||'').toUpperCase(), 'CAP '+mesa.capacidad];
  if (ped) meta.push('TICKET #' + (ped.ticket_num||'?'));
  $('#sheet-meta').textContent = meta.join(' · ');
  if (est === 'libre') renderSheetLibre(mesa);
  else renderSheetOcupada(mesa, ped);
  $('#sheet-backdrop').classList.add('open');
  $('#sheet').classList.add('open');
}
function closeSheet() {
  $('#sheet-backdrop').classList.remove('open');
  $('#sheet').classList.remove('open');
  state.mesaAbierta = null;
}
function renderSheetLibre(mesa) {
  const cap = mesa.capacidad;
  const maxCom = Math.max(cap + 4, 12);
  $('#sheet-body').innerHTML = `
    <div class="sheet-section">
      <div class="sheet-section-label">Estado</div>
      <div class="sheet-info-row"><span>Libre — lista para abrir</span><strong>${cap} ${cap===1?'silla':'sillas'}</strong></div>
    </div>
    <div class="sheet-section">
      <div class="sheet-section-label">¿Cuántos comensales?</div>
      <div class="com-stepper">
        <button id="com-minus">−</button>
        <span class="com-num" id="com-num">${Math.min(2, cap)}</span>
        <button id="com-plus">+</button>
      </div>
    </div>
    <div class="sheet-section">
      <div class="btn-grid">
        <button class="btn ghost span-2" id="btn-cancel">Atrás</button>
        <button class="btn primary span-2" id="btn-abrir">
          <span class="material-symbols-outlined">play_arrow</span>
          Abrir pedido · Va
        </button>
      </div>
    </div>
  `;
  let com = Math.min(2, cap);
  const upd = () => { $('#com-num').textContent = com; };
  $('#com-minus').onclick = () => { if (com > 1) com--; upd(); };
  $('#com-plus').onclick = () => { if (com < maxCom) com++; upd(); };
  $('#btn-cancel').onclick = closeSheet;
  $('#btn-abrir').onclick = () => abrirPedido(mesa, com);
}
function renderSheetOcupada(mesa, ped) {
  const mozo = state.empleados.find(e => e.id === ped.mozo_id);
  const sus = ped.estado === 'suspended';
  $('#sheet-body').innerHTML = `
    <div class="sheet-section">
      <div class="sheet-section-label">Pedido actual</div>

/* ========= ACCIONES DB (pedido shell) ========= */
async function abrirPedido(mesa, comensales) {
  if (!state.mozoId) { closeSheet(); abrirPickerMozo(); toast('Primero elige el mozo en turno', 'warn'); return; }
  if (!state.turno) { toast('No hay turno abierto', 'err'); return; }
  const intentar = async () => {
    const { data: nums } = await sb.from('ca_pedidos')
      .select('ticket_num').eq('local_id', LOCAL).eq('turno_id', state.turno.id)
      .order('ticket_num',{ascending:false}).limit(1);
    const nextTicket = ((nums && nums[0]?.ticket_num) || 0) + 1;
    return await sb.from('ca_pedidos').insert({
      ticket_num: nextTicket, marca_id: MARCA, local_id: LOCAL, turno_id: state.turno.id,
      mesa_id: mesa.id, comensales, mozo_id: state.mozoId,
      estado:'abierta', estado_servicio:'abierta', origen:'salon',
      abierta_at: new Date().toISOString(),
      subtotal:0, igv:0, servicio_pct:10, servicio_monto:0,
      descuento:0, propina_monto:0, total:0,
      moneda:'PEN', alergias_por_silla:{},
    }).select().single();
  };
  let { data, error } = await intentar();
  if (error && error.code === '23505') ({ data, error } = await intentar());
  if (error) { toast('Atrás: ' + error.message, 'err'); return; }
  state.pedidos.push(data);
  toast('Va · pedido #' + data.ticket_num + ' en mesa ' + mesa.numero, 'ok');
  closeSheet();
  // Pasar directo a la pantalla de pedido
  abrirPedidoScreen(data.id);
}
async function suspender(pedidoId) {
  const { error } = await sb.from('ca_pedidos').update({
    estado:'suspended', suspended_at:new Date().toISOString(),
  }).eq('id', pedidoId);

async function reanudar(pedidoId) {

async function cancelar(pedidoId) {

  const { error } = await sb.from('ca_pedidos').update({
    estado:'cancelada', cerrada_at:new Date().toISOString(),
  }).eq('id', pedidoId);

function enterEditMode() {

  state.edit = { selected:null, dirtyMesas:{}, dirtyMuebles:false, deletedMesas:new Set(), nuevasMesas:[] };
  render();

}

async function exitEditMode(save) {
  if (!save) {
    if (state.edit.dirtyMuebles || Object.keys(state.edit.dirtyMesas).length || state.edit.deletedMesas.size || state.edit.nuevasMesas.length) {
      if (!confirm('Descartar cambios al plano?')) return;
    }
    await loadMesas(); await loadFloorPlan();
    state.screen = 'floor';
    state.edit = { selected:null, dirtyMesas:{}, dirtyMuebles:false, deletedMesas:new Set(), nuevasMesas:[] };
    render();
    closeSheet();
    return;
  }
  await saveLayout();
}

async function saveLayout() {
  const tasks = [];
  // UPDATE mesas dirty
  for (const id in state.edit.dirtyMesas) {
    tasks.push(sb.from('ca_mesas').update(state.edit.dirtyMesas[id]).eq('id', id));
  }
  // DELETE-style: soft delete via activa=false
  state.edit.deletedMesas.forEach(id => {
    tasks.push(sb.from('ca_mesas').update({ activa: false }).eq('id', id));
  });
  // INSERT nuevas mesas
  for (const m of state.edit.nuevasMesas) {
    tasks.push(sb.from('ca_mesas').insert({ ...m, marca_id: MARCA, local_id: LOCAL, activa: true }));
  }
  // UPSERT layout
  if (state.edit.dirtyMuebles && state.floorPlan) {
    const newLayout = {
      ...(state.floorPlan.layout || {}),
      muebles: state.muebles,
      canvas: { ancho: 580, alto: 320 },
    };
    if (state.zonas) newLayout.zonas = state.zonas;
    tasks.push(sb.from('ms_floor_plans').update({
      layout: newLayout, updated_at: new Date().toISOString(),
    }).eq('id', state.floorPlan.id));
  }

  if (tasks.length === 0) {
    toast('Sin cambios', 'warn');
    state.screen = 'floor'; render(); closeSheet(); return;
  }

  const results = await Promise.all(tasks);
  const failed = results.find(r => r.error);
  if (failed) { toast('Atrás: ' + failed.error.message, 'err'); return; }

  toast('Servido · plano guardado · ' + tasks.length + ' cambio(s)', 'ok');
  await loadMesas(); await loadFloorPlan();
  state.screen = 'floor';
  state.edit = { selected:null, dirtyMesas:{}, dirtyMuebles:false, deletedMesas:new Set(), nuevasMesas:[] };
  render();
  closeSheet();
}

function setupDragAndDrop() {
  const canvas = $('#canvas-inner');
  if (!canvas) return;
  let drag = null;
  const SNAP = 5; // snap a 5px

  canvas.addEventListener('pointerdown', (e) => {
    const target = e.target.closest('.mesa, .mueble');
    if (!target) return;
    e.preventDefault();
    const scale = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--canvas-scale')) || 1;
    drag = {
      el: target,
      kind: target.dataset.kind,
      id: target.dataset.id,
      startX: e.clientX, startY: e.clientY,
      origX: parseFloat(target.style.left), origY: parseFloat(target.style.top),
      scale,
      moved: false,
    };
    try { target.setPointerCapture(e.pointerId); } catch(_) {}
  });
  canvas.addEventListener('pointermove', (e) => {
    if (!drag) return;
    const dx = (e.clientX - drag.startX) / drag.scale;
    const dy = (e.clientY - drag.startY) / drag.scale;
    if (Math.abs(dx) > 1 || Math.abs(dy) > 1) drag.moved = true;
    let nx = Math.round((drag.origX + dx) / SNAP) * SNAP;
    let ny = Math.round((drag.origY + dy) / SNAP) * SNAP;
    drag.el.style.left = nx + 'px';
    drag.el.style.top  = ny + 'px';
  });
  canvas.addEventListener('pointerup', (e) => {
    if (!drag) return;
    if (drag.moved) {
      const nx = parseFloat(drag.el.style.left);
      const ny = parseFloat(drag.el.style.top);
      if (drag.kind === 'mesa') {
        const m = state.mesas.find(x => x.id === drag.id);
        if (m) { m.pos_x = nx; m.pos_y = ny; }
        state.edit.dirtyMesas[drag.id] = { ...(state.edit.dirtyMesas[drag.id]||{}), pos_x: nx, pos_y: ny };
      } else {
        const mu = state.muebles.find(x => x.id === drag.id);
        if (mu) { mu.x = nx; mu.y = ny; state.edit.dirtyMuebles = true; }
      }
      drag.el.dataset.justDragged = '1'; // bloquea el click subsiguiente
    }
    drag = null;
  });
  canvas.addEventListener('pointercancel', () => { drag = null; });
}

async function agregarItem(r, qty, seat, notas, urgente, ped) {
  const precio_unit = Number(r.precio_venta) || 0;
  const payload = {
    pedido_id: ped.id,
    receta_id: r.id,
    nombre: r.nombre,
    qty,
    precio_unit,
    precio_total: precio_unit * qty,
    modificadores: {},
    estado: 'pendiente',
    station: r.estacion_id || null,
    course_step: 1,
    es_cortesia: false,
    notas: notas || null,
    seat_position: seat === 0 ? null : seat, // null = centro/compartido
    urgente: !!urgente,
  };
  const { data, error } = await sb.from('ca_pedido_items').insert(payload).select().single();
  if (error) { toast('Atrás: ' + error.message, 'err'); return; }
  state.pedidoItemsCache[ped.id] = [...(state.pedidoItemsCache[ped.id]||[]), data];
  await recalcularYPersistirTotales(ped.id);
  await loadPedidos();
  render();
  toast('Va · ' + r.nombre + (seat?' · silla '+seat:' · centro'), 'ok');
}

async function eliminarItem(itemId, pedidoId) {
  if (!confirm('Eliminar este ítem?')) return;
  const { error } = await sb.from('ca_pedido_items').delete().eq('id', itemId);
  if (error) { toast('Atrás: ' + error.message, 'err'); return; }
  state.pedidoItemsCache[pedidoId] = (state.pedidoItemsCache[pedidoId]||[]).filter(x => x.id !== itemId);
  await recalcularYPersistirTotales(pedidoId);
  await loadPedidos();
  render();
  toast('Servido · ítem eliminado', 'ok');
}

async function marcharTodoPendientes() {
  const ped = state.pedidos.find(p => p.id === state.pedidoAbiertoId);
  if (!ped) return;
  const items = state.pedidoItemsCache[ped.id] || [];
  const pendientes = items.filter(it => it.estado === 'pendiente');
  if (!pendientes.length) { toast('Nada que marchar', 'warn'); return; }
  // Update todos a 'enviado'
  const now = new Date().toISOString();
  const { error } = await sb.from('ca_pedido_items').update({
    estado: 'enviado', enviado_cocina_at: now,
  }).in('id', pendientes.map(it => it.id));
  if (error) { toast('Atrás: ' + error.message, 'err'); return; }
  // Si el pedido estaba en 'abierta', pasar a 'marchada' (estado_servicio)
  if (ped.estado_servicio === 'abierta') {
    await sb.from('ca_pedidos').update({ estado_servicio: 'marchada' }).eq('id', ped.id);
  }
  toast('En fuego · ' + pendientes.length + ' ítem(s) a cocina', 'ok');
  await loadPedidoItems(ped.id);
  await loadPedidos();
  render();
}

async function recalcularYPersistirTotales(pedidoId) {
  const items = state.pedidoItemsCache[pedidoId] || [];
  const sub = items.filter(it => !it.es_cortesia).reduce((a, it) => a + Number(it.precio_total||0), 0);
  const servicio_monto = +(sub * 0.10).toFixed(2);
  const igv = +(sub * 18 / 118).toFixed(2); // IGV ya incluido en sub
  const total = +(sub + servicio_monto).toFixed(2);
  await sb.from('ca_pedidos').update({
    subtotal: sub, servicio_monto, igv, total,
  }).eq('id', pedidoId);
}

/* ========= COBRO (BLOQUE 3) ========= */

async function abrirCobroScreen(pedidoId) {
  if (!pedidoId) return;
  if (!state.pedidoItemsCache[pedidoId]) await loadPedidoItems(pedidoId);
  // Cargar pagos / cortesías previamente persistidos (en caso de pagos parciales)
  const [pagosRes, cortesiasRes] = await Promise.all([
    sb.from('ca_pagos').select('*').eq('pedido_id', pedidoId),
    sb.from('ca_cortesias').select('*').eq('pedido_id', pedidoId),
  ]);
  state.cobro = {
    pagos: [],
    pagosPersistidos: pagosRes.data || [],
    cortesias: [],
    cortesiasPersistidas: cortesiasRes.data || [],
    propina_pct: 10,
    propina_custom: null,
    comprobante: { tipo: 'sin_comprobante', doc: '', nombre: '', email: '' },
    split_n: 1,
    metodo_actual: 'efectivo',
    monto_input: '',
    ref_input: '',
    recibido_input: '',
    gift_input: { codigo:'', saldo:null, gift_id:null, error:null },
  };
  // Si el pedido aún no está en 'cuenta_pedida' y no está pagado, marcarlo
  const ped = state.pedidos.find(p => p.id === pedidoId);
  if (ped && ped.estado_servicio !== 'cuenta_pedida' && ped.estado_servicio !== 'pagada') {
    await sb.from('ca_pedidos').update({ estado_servicio: 'cuenta_pedida' }).eq('id', pedidoId);
    ped.estado_servicio = 'cuenta_pedida';
  }
  state.pedidoAbiertoId = pedidoId;
  state.screen = 'cobro';
  render();
}

function calcularTotalesCobro(ped) {
  const items = state.pedidoItemsCache[ped.id] || [];
  const todasCortesias = [...state.cobro.cortesiasPersistidas, ...state.cobro.cortesias];
  const cortesiasMontoPorItem = {};
  todasCortesias.forEach(c => {
    if (c.item_id) cortesiasMontoPorItem[c.item_id] = (cortesiasMontoPorItem[c.item_id]||0) + Number(c.monto);
  });
  const cortesiasGlobalMonto = todasCortesias.filter(c => !c.item_id).reduce((a,c)=>a+Number(c.monto),0);

  const sub_bruto = items.reduce((a,it) => a + Number(it.precio_total||0), 0);
  const cortesias_total = items.reduce((a,it) => a + (cortesiasMontoPorItem[it.id]||0), 0) + cortesiasGlobalMonto;
  const sub_neto = Math.max(0, +(sub_bruto - cortesias_total).toFixed(2));
  const servicio_monto = +(sub_neto * 0.10).toFixed(2);
  const igv_incl = +(sub_neto * 18 / 118).toFixed(2);
  let propina;
  if (state.cobro.propina_custom != null) propina = +(Number(state.cobro.propina_custom) || 0).toFixed(2);
  else propina = +(sub_neto * (state.cobro.propina_pct/100)).toFixed(2);
  const total = +(sub_neto + servicio_monto + propina).toFixed(2);
  const pagado_persistido = state.cobro.pagosPersistidos.reduce((a,p)=>a+Number(p.monto),0);
  const pagado_local = state.cobro.pagos.reduce((a,p)=>a+Number(p.monto),0);
  const pagado = +(pagado_persistido + pagado_local).toFixed(2);
  const pendiente = Math.max(0, +(total - pagado).toFixed(2));
  return { sub_bruto, cortesias_total, sub_neto, servicio_monto, igv_incl, propina, total, pagado, pendiente, cortesiasMontoPorItem };
}

  const map = { efectivo:'💵 Efectivo', yape:'📱 Yape', plin:'📱 Plin', visa:'💳 Visa', mastercard:'💳 MC', amex:'💳 Amex', mercadopago:'🟦 MP', izipay:'📲 Izipay', gift_card:'🎫 GC' };
