/* ========= ITEM PICKER (modal) ========= */
// CA-22: detecta alérgenos en conflicto entre un plato y las alergias registradas.
// Si el ítem va al centro (compartido) revisa TODAS las sillas (extrapolación).
function normAlerg(s) { return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }
function conflictoAlergenos(recetaAlergenos, seat, ped) {
  const ra = (recetaAlergenos || []).map(normAlerg);
  if (!ra.length) return [];
  const map = (ped && ped.alergias_por_silla) || {};
  const sillas = (seat === 0 || seat == null) ? Object.keys(map) : [String(seat)];
  const hits = new Set();
  sillas.forEach(s => (map[s] || []).forEach(al => {
    const na = normAlerg(al);
    if (na && ra.some(x => x.includes(na) || na.includes(x))) hits.add(al);
  }));
  return Array.from(hits);
}

function openItemPicker(r, ped) {
  let qty = 1;
  let seat = state.sillaActiva;
  let urgente = false;
  let course = courseSugerido(r);          // CA-02
  const selMods = new Set();               // CA-10: ids de modificadores activos
  const catalogoMods = modsDe(r.modulo || state.menuTab);
  const precioBase = Number(r.precio_venta) || 0;

  // términos de carne / vuelta para platos relevantes
  const esCarne = /carne|osso|carpaccio|prosciutto|risotto|bistec|lomo|filete/i.test(r.nombre + ' ' + (r.categoria_menu||''));
  const terminos = ['Jugoso','A punto','Bien cocido','Sin sal','Para llevar'];

  const sillaPicker = [
    `<button class="silla-pick-btn centro ${seat===0?'active':''}" data-s="0">★<span class="sub">CENTRO</span></button>`,
    ...Array.from({length: ped.comensales || 1}, (_, i) => i + 1).map(s =>
      `<button class="silla-pick-btn ${seat===s?'active':''}" data-s="${s}">${s}</button>`)
  ].join('');

  const courseBtns = COURSES.map(c =>
    `<button class="chip ${course===c.step?'active':''}" data-course="${c.step}">${c.emoji} ${c.label}</button>`).join('');

  const modBtns = catalogoMods.map(m => {
    const etiq = m.pct ? `+${Math.round(m.pct*100)}%` : (m.precio>0 ? '+'+money(m.precio) : 'gratis');
    return `<button class="chip" data-mod="${m.id}">${m.nombre} <span style="opacity:.6">${etiq}</span></button>`;
  }).join('');

  $('#item-modal-inner').innerHTML = `
    <div class="modal-head">
      <span class="icon">${r.emoji || '🍽️'}</span>
      <h3>${r.nombre}</h3>
      <span class="price" id="im-price-live">${money(precioBase)}</span>
      <button class="sheet-close" id="im-close"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div class="modal-body">
      <div class="sheet-section">
        <div class="sheet-section-label">Para qué silla</div>
        <div class="silla-picker">${sillaPicker}</div>
        <div id="im-alerg-warn" style="display:none;margin-top:10px;font-size:12px;font-weight:600;background:var(--red-soft);color:var(--secondary);border:2px solid var(--secondary);border-radius:10px;padding:8px 12px"></div>
      </div>
      <div class="sheet-section">
        <div class="sheet-section-label">Tiempo / curso</div>
        <div class="chips" id="im-course">${courseBtns}</div>
      </div>
      <div class="sheet-section">
        <div class="sheet-section-label">Cantidad</div>
        <div class="com-stepper">
          <button id="im-minus">−</button>
          <span class="com-num" id="im-qty">1</span>
          <button id="im-plus">+</button>
        </div>
      </div>
      <div class="sheet-section">
        <div class="sheet-section-label">Modificadores</div>
        <div class="chips" id="im-mods">${modBtns}</div>
      </div>
      ${esCarne ? `
        <div class="sheet-section">
          <div class="sheet-section-label">Término / preferencia</div>
          <div class="chips" id="im-chips">
            ${terminos.map(t => `<button class="chip" data-t="${t}">${t}</button>`).join('')}
          </div>
        </div>
      ` : ''}
      <div class="sheet-section">
        <div class="sheet-section-label">Notas de cocina (opcional)</div>
        <textarea class="input" id="im-notas" rows="2" placeholder="Sin cebolla, en pan aparte..."></textarea>
      </div>
      <div class="sheet-section">
        <div class="prop-row">
          <label>Marcar como urgente</label>
          <button class="chip" id="im-urgente">Normal</button>
        </div>
      </div>
      ${(r.alergenos&&r.alergenos.length)?`
        <div class="sheet-section">
          <div class="sheet-section-label">⚠ Alérgenos del plato</div>
          <div class="chips">${r.alergenos.map(a=>`<span class="chip" style="background:var(--amber-soft)">${a}</span>`).join('')}</div>
        </div>
      `:''}
    </div>
    <div class="modal-foot">
      <button class="btn ghost" id="im-cancel">Atrás</button>
      <button class="btn primary" id="im-add" style="flex:1">
        <span class="material-symbols-outlined">add_circle</span>
        <span id="im-add-lbl">Agregar</span>
      </button>
    </div>
  `;
  $('#item-modal').classList.add('open');

  const modsActivos = () => catalogoMods.filter(m => selMods.has(m.id));
  const precioUnit = () => +(precioBase + deltaModificadores(modsActivos(), precioBase)).toFixed(2);
  const refrescarPrecio = () => {
    const pu = precioUnit();
    $('#im-price-live').textContent = money(pu);
    $('#im-add-lbl').textContent = 'Agregar · ' + money(pu * qty);
  };
  const refrescarAlerg = () => {
    const hits = conflictoAlergenos(r.alergenos, seat, ped);
    const w = $('#im-alerg-warn');
    if (hits.length) {
      w.style.display = 'block';
      w.innerHTML = `<span class="material-symbols-outlined" style="font-size:14px;vertical-align:-2px">warning</span> Alerta alergia: ${hits.join(', ')} ${seat===0?'(alguna silla la registró · plato compartido)':'en silla '+seat}`;
    } else w.style.display = 'none';
  };

  const updQty = () => { $('#im-qty').textContent = qty; refrescarPrecio(); };
  const updSillas = () => $$('#item-modal-inner .silla-picker .silla-pick-btn').forEach(b => {
    b.classList.toggle('active', +b.dataset.s === seat);
  });
  $('#im-minus').onclick = () => { if (qty>1) qty--; updQty(); };
  $('#im-plus').onclick = () => { if (qty<20) qty++; updQty(); };
  $$('#item-modal-inner .silla-picker .silla-pick-btn').forEach(b => b.onclick = () => { seat = +b.dataset.s; updSillas(); refrescarAlerg(); });
  $$('#im-course .chip').forEach(b => b.onclick = () => {
    course = +b.dataset.course;
    $$('#im-course .chip').forEach(x => x.classList.toggle('active', +x.dataset.course === course));
  });
  $$('#im-mods .chip').forEach(b => b.onclick = () => {
    const id = b.dataset.mod;
    if (selMods.has(id)) selMods.delete(id); else selMods.add(id);
    b.classList.toggle('active', selMods.has(id));
    refrescarPrecio();
  });
  if ($('#im-chips')) $$('#im-chips .chip').forEach(b => b.onclick = () => {
    b.classList.toggle('active');
    const sel = $$('#im-chips .chip.active').map(x => x.dataset.t).join(' · ');
    const taNotas = $('#im-notas').value.split(' || ')[0] || '';
    $('#im-notas').value = sel ? (sel + (taNotas && taNotas!==sel ? ' || ' + taNotas : '')) : taNotas;
  });
  $('#im-urgente').onclick = () => {
    urgente = !urgente;
    $('#im-urgente').textContent = urgente ? 'Urgente · va primero' : 'Normal';
    $('#im-urgente').classList.toggle('active', urgente);
    $('#im-urgente').style.background = urgente ? 'var(--secondary)' : '';
    $('#im-urgente').style.color = urgente ? 'white' : '';
  };
  $('#im-cancel').onclick = () => $('#item-modal').classList.remove('open');
  $('#im-close').onclick = () => $('#item-modal').classList.remove('open');
  $('#im-add').onclick = async () => {
    const notasFinal = $('#im-notas').value.trim();
    await agregarItem(r, qty, seat, notasFinal, urgente, ped, modsActivos(), course);
    $('#item-modal').classList.remove('open');
    state.sillaActiva = seat;
  };
  refrescarPrecio();
  refrescarAlerg();
}

async function agregarItem(r, qty, seat, notas, urgente, ped, mods = [], course = 2) {
  const precio_unit = +((Number(r.precio_venta) || 0) + deltaModificadores(mods, Number(r.precio_venta) || 0)).toFixed(2);
  // CA-22: confirmar si el plato choca con una alergia registrada
  const hits = conflictoAlergenos(r.alergenos, seat, ped);
  if (hits.length && !confirm('⚠ ALERGIA: ' + r.nombre + ' contiene ' + hits.join(', ') + '.\n¿Agregar de todas formas?')) return;
  const modsLimpios = (mods || []).map(m => ({ id: m.id, nombre: m.nombre, precio: +(Number(m.precio||0) + (m.pct ? (Number(r.precio_venta)||0) * m.pct : 0)).toFixed(2) }));
  const payload = {
    pedido_id: ped.id,
    receta_id: r.id,
    nombre: r.nombre,
    qty,
    precio_unit,
    precio_total: +(precio_unit * qty).toFixed(2),
    modificadores: modsLimpios,
    estado: 'oido',
    station: r.estacion_id || null,
    course_step: course || 2,
    es_cortesia: false,
    notas: notas || null,
    seat_position: seat === 0 ? null : seat, // null = centro/compartido
    urgente: !!urgente,
  };
  payload.id = PrepSync.uuid();
  payload.created_at = new Date().toISOString();
  const { error, queued } = await PrepSync.write('ca_pedido_items', 'insert', { values: payload });
  if (error) { toast('Atrás: ' + error.message, 'err'); return; }
  state.pedidoItemsCache[ped.id] = [...(state.pedidoItemsCache[ped.id]||[]), payload];
  PrepSync.cacheSet('items_' + ped.id, state.pedidoItemsCache[ped.id]);
  logAudit('agregar_item', r.nombre + ' ×' + qty, ped.id, payload.precio_total);
  await recalcularYPersistirTotales(ped.id);
  if (PrepSync.online()) await loadPedidos();
  render();
  toast((queued?'Sin conexión · ':'Va · ') + r.nombre + (seat?' · silla '+seat:' · centro') + ' · ' + courseDe(course).label, queued?'warn':'ok');
}

async function eliminarItem(itemId, pedidoId) {
  if (!confirm('Eliminar este ítem?')) return;
  const { error } = await sb.from('ca_pedido_items').delete().eq('id', itemId);
  if (error) { toast('Atrás: ' + error.message, 'err'); return; }
  state.pedidoItemsCache[pedidoId] = (state.pedidoItemsCache[pedidoId]||[]).filter(x => x.id !== itemId);
  await recalcularYPersistirTotales(pedidoId);
  await loadPedidos();
  render();
  toast('Servido · ítem eliminado', 'ok');
}

// Núcleo de marcha: pasa ítems 'oido' a cocina, sella course_marchar_at e imprime comandas por estación (CA-06)
async function marcharItems(ped, oidos, etiqueta) {
  if (!oidos.length) { toast('Nada que marchar', 'warn'); return; }
  const now = new Date().toISOString();
  const urgentes = oidos.filter(it => it.urgente).map(it => it.id);
  const normales = oidos.filter(it => !it.urgente).map(it => it.id);
  if (urgentes.length) {
    const r = await sb.from('ca_pedido_items').update({ estado: 'fuego', enviado_cocina_at: now, course_marchar_at: now }).in('id', urgentes);
    if (r.error) { toast('Atrás: ' + r.error.message, 'err'); return; }
  }
  if (normales.length) {
    const r = await sb.from('ca_pedido_items').update({ estado: 'va', enviado_cocina_at: now, course_marchar_at: now }).in('id', normales);
    if (r.error) { toast('Atrás: ' + r.error.message, 'err'); return; }
  }
  // estado_servicio: BD acepta abierta|ordenando|comiendo|cuenta_pedida|pagando
  if (['abierta','ordenando'].includes(ped.estado_servicio)) {
    await sb.from('ca_pedidos').update({ estado_servicio: 'comiendo' }).eq('id', ped.id);
  }
  // CA-06: imprime comandas ruteadas por estación
  imprimirComandasEstacion(ped, oidos, etiqueta);
  toast('En fuego · ' + oidos.length + ' ítem(s) a cocina' + (etiqueta ? ' · ' + etiqueta : ''), 'ok');
  await loadPedidoItems(ped.id);
  await loadPedidos();
  render();
}

async function marcharTodoPendientes() {
  const ped = state.pedidos.find(p => p.id === state.pedidoAbiertoId);
  if (!ped) return;
  const oidos = (state.pedidoItemsCache[ped.id] || []).filter(it => it.estado === 'oido');
  await marcharItems(ped, oidos, null);
}

// CA-02: marchar solo los ítems de un tiempo/curso
async function marcharCurso(step) {
  const ped = state.pedidos.find(p => p.id === state.pedidoAbiertoId);
  if (!ped) return;
  const oidos = (state.pedidoItemsCache[ped.id] || []).filter(it => it.estado === 'oido' && (it.course_step || 2) === step);
  await marcharItems(ped, oidos, courseDe(step).label);
}

// Totales rápidos para pre-cuenta desde la pantalla de pedido (sin depender de state.cobro)
function totalesBasicos(ped) {
  const items = (state.pedidoItemsCache[ped.id] || []).filter(it => it.estado !== 'cancelado');
  const sub_bruto = items.reduce((a, it) => a + Number(it.precio_total || 0), 0);
  const servicio_monto = +(sub_bruto * 0.10).toFixed(2);
  return { sub_bruto, cortesias_total: 0, sub_neto: sub_bruto, servicio_monto, igv_incl: +(sub_bruto * 18 / 118).toFixed(2), cortesiasMontoPorItem: {} };
}

/* ========= ALERGIAS POR SILLA (CA-22) ========= */
function abrirDialogoAlergias(ped) {
  const num = ped.comensales || 1;
  const work = JSON.parse(JSON.stringify(ped.alergias_por_silla || {}));
  $('#sheet-mark').textContent = '⚕';
  $('#sheet-mark').style.background = 'var(--red-soft)';
  $('#sheet-mark').style.color = 'var(--secondary)';
  $('#sheet-title').textContent = 'Alergias por silla';
  $('#sheet-meta').textContent = 'Pedido #' + ped.ticket_num + ' · ' + num + ' comensal(es)';
  const seatsHtml = Array.from({ length: num }, (_, i) => i + 1).map(s => {
    const cur = work[String(s)] || [];
    const chips = ALERGENOS_COMUNES.map(a => `<button class="chip ${cur.includes(a) ? 'active' : ''}" data-seat="${s}" data-al="${a}">${a}</button>`).join('');
    const otras = cur.filter(a => !ALERGENOS_COMUNES.includes(a));
    return `<div class="sheet-section">
      <div class="sheet-section-label">Silla ${s}${cur.length ? ' · ' + cur.length + ' alerta(s)' : ''}</div>
      <div class="chips">${chips}</div>
      <input class="input" style="margin-top:8px" data-otras="${s}" placeholder="Otras alergias (separa con coma)" value="${otras.join(', ')}">
    </div>`;
  }).join('');
  $('#sheet-body').innerHTML = `
    <div style="font-size:12px;font-family:var(--font-mono);opacity:.7;margin-bottom:10px">
      Las alergias advierten al agregar platos. En platos del centro (compartidos) se revisan todas las sillas.
    </div>
    ${seatsHtml}
    <div class="sheet-section"><div class="btn-grid">
      <button class="btn ghost" id="al-cancel">Atrás</button>
      <button class="btn primary" id="al-save"><span class="material-symbols-outlined">save</span>Guardar alergias</button>
    </div></div>`;
  $('#sheet-backdrop').classList.add('open');
  $('#sheet').classList.add('open');
  $$('#sheet-body .chip[data-al]').forEach(b => b.onclick = () => {
    const s = b.dataset.seat, a = b.dataset.al;
    work[s] = work[s] || [];
    if (work[s].includes(a)) work[s] = work[s].filter(x => x !== a); else work[s].push(a);
    b.classList.toggle('active');
  });
  $('#al-cancel').onclick = closeSheet;
  $('#al-save').onclick = () => guardarAlergias(ped, work);
}
async function guardarAlergias(ped, work) {
  $$('#sheet-body [data-otras]').forEach(inp => {
    const s = inp.dataset.otras;
    const otras = inp.value.split(',').map(x => x.trim()).filter(Boolean);
    const comunes = (work[s] || []).filter(a => ALERGENOS_COMUNES.includes(a));
    const merged = [...comunes, ...otras];
    if (merged.length) work[s] = merged; else delete work[s];
  });
  const { error } = await sb.from('ca_pedidos').update({ alergias_por_silla: work }).eq('id', ped.id);
  if (error) { toast('Atrás: ' + error.message, 'err'); return; }
  ped.alergias_por_silla = work;
  const p = state.pedidos.find(x => x.id === ped.id); if (p) p.alergias_por_silla = work;
  closeSheet();
  render();
  toast('Servido · alergias actualizadas', 'ok');
}

async function recalcularYPersistirTotales(pedidoId) {
  const items = state.pedidoItemsCache[pedidoId] || [];
  const sub = items.filter(it => !it.es_cortesia).reduce((a, it) => a + Number(it.precio_total||0), 0);
  const servicio_monto = +(sub * 0.10).toFixed(2);
  const igv = +(sub * 18 / 118).toFixed(2); // IGV ya incluido en sub
  const total = +(sub + servicio_monto).toFixed(2);
  const p = state.pedidos.find(x => x.id === pedidoId);
  if (p) { p.subtotal = sub; p.servicio_monto = servicio_monto; p.igv = igv; p.total = total; PrepSync.cacheSet('pedidos', state.pedidos); }
  await PrepSync.write('ca_pedidos', 'update', { values: { subtotal: sub, servicio_monto, igv, total }, match: { id: pedidoId } });
}

/* ========= COBRO (BLOQUE 3) ========= */

async function abrirCobroScreen(pedidoId) {
  if (!pedidoId) return;
  if (!state.pedidoItemsCache[pedidoId]) await loadPedidoItems(pedidoId);
  // Cargar pagos / cortesías previamente persistidos (en caso de pagos parciales)
  const [pagosRes, cortesiasRes] = await Promise.all([
    sb.from('ca_pagos').select('*').eq('pedido_id', pedidoId),
    sb.from('ca_cortesias').select('*').eq('pedido_id', pedidoId),
  ]);
  state.cobro = {
    pagos: [],
    pagosPersistidos: pagosRes.data || [],
    cortesias: [],
    cortesiasPersistidas: cortesiasRes.data || [],
    propina_pct: 10,
    propina_custom: null,
    comprobante: { tipo: 'sin_comprobante', doc: '', nombre: '', email: '' },
    split_n: 1,
    split_mode: 'proporcion',  // 'proporcion' | 'item' (CA-03)
    sel_items: [],             // ítems seleccionados para la cuenta actual
    pagados_items: [],         // ítems ya cubiertos por un pago en modo por-ítem
    metodo_actual: 'efectivo',
    monto_input: '',
    ref_input: '',
    recibido_input: '',
    gift_input: { codigo:'', saldo:null, gift_id:null, error:null },
  };
  // Si el pedido aún no está en 'cuenta_pedida' y no está pagado, marcarlo
  const ped = state.pedidos.find(p => p.id === pedidoId);
  if (ped && ped.estado_servicio !== 'cuenta_pedida' && ped.estado_servicio !== 'pagando') {
    await sb.from('ca_pedidos').update({ estado_servicio: 'cuenta_pedida' }).eq('id', pedidoId);
    ped.estado_servicio = 'cuenta_pedida';
  }
  state.pedidoAbiertoId = pedidoId;
  state.screen = 'cobro';
  render();
}

function calcularTotalesCobro(ped) {
  const items = state.pedidoItemsCache[ped.id] || [];
  const todasCortesias = [...state.cobro.cortesiasPersistidas, ...state.cobro.cortesias];
  const cortesiasMontoPorItem = {};
  todasCortesias.forEach(c => {
    if (c.item_id) cortesiasMontoPorItem[c.item_id] = (cortesiasMontoPorItem[c.item_id]||0) + Number(c.monto);
  });
  const cortesiasGlobalMonto = todasCortesias.filter(c => !c.item_id).reduce((a,c)=>a+Number(c.monto),0);

  const sub_bruto = items.reduce((a,it) => a + Number(it.precio_total||0), 0);
  const cortesias_total = items.reduce((a,it) => a + (cortesiasMontoPorItem[it.id]||0), 0) + cortesiasGlobalMonto;
  const sub_neto = Math.max(0, +(sub_bruto - cortesias_total).toFixed(2));
  const servicio_monto = +(sub_neto * 0.10).toFixed(2);
  const igv_incl = +(sub_neto * 18 / 118).toFixed(2);
  let propina;
  if (state.cobro.propina_custom != null) propina = +(Number(state.cobro.propina_custom) || 0).toFixed(2);
  else propina = +(sub_neto * (state.cobro.propina_pct/100)).toFixed(2);
  const total = +(sub_neto + servicio_monto + propina).toFixed(2);
  const pagado_persistido = state.cobro.pagosPersistidos.reduce((a,p)=>a+Number(p.monto),0);
  const pagado_local = state.cobro.pagos.reduce((a,p)=>a+Number(p.monto),0);
  const pagado = +(pagado_persistido + pagado_local).toFixed(2);
  const pendiente = Math.max(0, +(total - pagado).toFixed(2));
  return { sub_bruto, cortesias_total, sub_neto, servicio_monto, igv_incl, propina, total, pagado, pendiente, cortesiasMontoPorItem };
}

function pagoLabel(m) {
  const map = { efectivo:'💵 Efectivo', yape:'📱 Yape', plin:'📱 Plin', visa:'💳 Visa', mastercard:'💳 MC', amex:'💳 Amex', mercado_pago:'🟦 MP', izipay:'📲 Izipay', gift_card:'🎫 GC' };
  return map[m] || m;
}

function renderCobroScreen() {
  const ped = state.pedidos.find(p => p.id === state.pedidoAbiertoId);
  if (!ped) { state.screen = 'floor'; render(); return; }
  const items = state.pedidoItemsCache[ped.id] || [];
  const T = calcularTotalesCobro(ped);
  const porItem = state.cobro.split_mode === 'item';

  // CA-03: neto por ítem (precio menos cortesía aplicada) y total de la selección actual
  const netoItem = (it) => Math.max(0, +(Number(it.precio_total||0) - (T.cortesiasMontoPorItem[it.id]||0)).toFixed(2));
  const selNetoConServicio = +(state.cobro.sel_items.reduce((a, iid) => {
    const it = items.find(x => x.id === iid); return a + (it ? netoItem(it) : 0);
  }, 0) * 1.10).toFixed(2);

  let sugerido;
  if (porItem) sugerido = state.cobro.sel_items.length ? Math.min(T.pendiente, selNetoConServicio) : T.pendiente;
  else sugerido = state.cobro.split_n > 1 ? +(T.pendiente / state.cobro.split_n).toFixed(2) : T.pendiente;

  $$('.pay-method-btn').forEach(b => b.onclick = () => {

async function validarGiftCard() {
  const codigo = (state.cobro.gift_input.codigo || '').trim().toUpperCase();
  if (!codigo) { state.cobro.gift_input.error = 'Ingresa un código'; render(); return; }
  const { data, error } = await sb.from('ca_gift_cards')
    .select('id, saldo, estado, expira_at')
    .eq('marca_id', MARCA).eq('codigo', codigo).maybeSingle();
  if (error || !data) {
    state.cobro.gift_input = { codigo, saldo:null, gift_id:null, error:'No existe esta gift card' }; render(); return;
  }
  if (data.estado !== 'activa') {
    state.cobro.gift_input = { codigo, saldo:null, gift_id:null, error:'Gift card ' + data.estado }; render(); return;
  }
  if (data.expira_at && new Date(data.expira_at) < new Date()) {
    state.cobro.gift_input = { codigo, saldo:null, gift_id:null, error:'Gift card expirada' }; render(); return;
  }
  if (Number(data.saldo) <= 0) {
    state.cobro.gift_input = { codigo, saldo:0, gift_id:data.id, error:'Sin saldo' }; render(); return;
  }
  state.cobro.gift_input = { codigo, saldo:Number(data.saldo), gift_id:data.id, error:null };
  render();
}

function agregarPagoLocal(monto, recibido, vuelto) {
  if (monto <= 0) { toast('Monto inválido', 'warn'); return; }
  const M = state.cobro.metodo_actual;
  const pago = { metodo: M, monto: +monto.toFixed(2) };
  if (M === 'efectivo') {
    if (recibido < monto) { toast('Recibido menor al monto', 'warn'); return; }
    pago.recibido = +recibido.toFixed(2);
    pago.vuelto = +vuelto.toFixed(2);
  } else if (M === 'gift_card') {
    const G = state.cobro.gift_input;
    if (!G.gift_id) { toast('Valida la gift card primero', 'warn'); return; }
    if (monto > G.saldo) { toast('Monto excede el saldo de la gift card', 'warn'); return; }
    pago.gift_card = { id: G.gift_id, codigo: G.codigo, saldo_previo: G.saldo };
  } else if (['yape','plin','mercado_pago','izipay'].includes(M)) {
    if (!state.cobro.ref_input) { toast('Ingresa el código de operación', 'warn'); return; }
    pago.ref_externa = state.cobro.ref_input;
  } else if (['visa','mastercard','amex'].includes(M)) {
    pago.ref_externa = state.cobro.ref_input || null;
  }
  state.cobro.pagos.push(pago);
  // CA-03: en modo por-ítem, los ítems seleccionados quedan cubiertos por este pago
  if (state.cobro.split_mode === 'item' && state.cobro.sel_items.length) {
    state.cobro.pagados_items = [...new Set([...state.cobro.pagados_items, ...state.cobro.sel_items])];
    state.cobro.sel_items = [];
  }
  state.cobro.monto_input = '';
  state.cobro.ref_input = '';
  state.cobro.recibido_input = '';
  state.cobro.gift_input = { codigo:'', saldo:null, gift_id:null, error:null };
  toast('Va · pago de ' + money(monto) + ' (' + pagoLabel(M) + ')', 'ok');
  render();
}

function abrirDialogoCortesia(itemId) {
  const ped = state.pedidos.find(p => p.id === state.pedidoAbiertoId);
  const items = state.pedidoItemsCache[ped.id] || [];
  const item = items.find(it => it.id === itemId);
  if (!item) return;

  const cortesiaLocal = state.cobro.cortesias.find(c => c.item_id === itemId);
  const cortesiaPersist = state.cobro.cortesiasPersistidas.find(c => c.item_id === itemId);

  if (cortesiaLocal) {
    if (confirm('Quitar cortesía de "' + item.nombre + '"?')) {
      state.cobro.cortesias = state.cobro.cortesias.filter(c => c.item_id !== itemId);
      render();
    }
    return;
  }
  if (cortesiaPersist) {
    toast('Esta cortesía ya fue aprobada y registrada', 'warn');
    return;
  }

  $('#sheet-mark').textContent = '🎁';
  $('#sheet-mark').style.background = 'var(--green-soft)';
  $('#sheet-mark').style.color = 'var(--ink)';
  $('#sheet-title').textContent = 'Cortesía';
  $('#sheet-meta').textContent = item.nombre + ' · ' + money(item.precio_total);
  const motivos = ['Cumpleaños', 'Cliente recurrente', 'Demora en cocina', 'Plato no satisfactorio', 'Cortesía de la casa', 'Promoción', 'Otra'];
  $('#sheet-body').innerHTML = `
    <div class="sheet-section">
      <div class="sheet-section-label">¿Por qué se invita este ítem?</div>
      <div class="chips" id="motivo-chips">
        ${motivos.map(m => `<button class="chip" data-m="${m}">${m}</button>`).join('')}
      </div>
      <textarea class="input" id="motivo-notas" rows="2" placeholder="Notas adicionales (opcional)" style="margin-top:10px"></textarea>
    </div>
    <div class="sheet-section">
      <div class="sheet-section-label">Monto a invitar</div>
      <div class="prop-row">
        <label>Invitar 100% (${money(item.precio_total)})</label>
        <button class="btn primary" style="width:auto;min-width:120px" id="cort-full">Aplicar</button>
      </div>
      <div class="prop-row" style="gap:8px">
        <label style="flex:0 0 auto">Parcial</label>
        <input class="input" id="cort-parcial" type="number" step="0.10" max="${item.precio_total}" placeholder="0.00" style="max-width:120px">
        <button class="btn warn" id="cort-parcial-go" style="width:auto;min-width:100px">Aplicar</button>
      </div>
    </div>
    <div class="sheet-section">
      <div style="font-size:11px;font-family:var(--font-mono);opacity:0.65;padding:10px;background:var(--amber-soft);border:1px dashed var(--outline);border-radius:8px">
        ⚠ Toda cortesía requiere aprobación de un gerente. Queda registrada en auditoría: mozo solicitante + gerente aprobador.
      </div>
    </div>
    <div class="sheet-section">
      <button class="btn ghost" id="cort-cancel">Atrás</button>
    </div>
  `;
  $('#sheet-backdrop').classList.add('open');
  $('#sheet').classList.add('open');

  let motivoSel = null;
  $$('#motivo-chips .chip').forEach(b => b.onclick = () => {
    $$('#motivo-chips .chip').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    motivoSel = b.dataset.m;
  });
  const aplicar = (montoCort) => {
    if (!motivoSel) { toast('Selecciona un motivo', 'warn'); return; }
    if (!(montoCort > 0) || montoCort > Number(item.precio_total) + 0.01) { toast('Monto inválido', 'warn'); return; }
    const notas = $('#motivo-notas').value;
    // CA-07: paso de aprobación de gerente antes de aplicar
    pedirAprobacionGerente({
      item, itemId,
      monto: +montoCort.toFixed(2),
      motivo: motivoSel + (notas ? ' · ' + notas : ''),
    });
  };
  $('#cort-full').onclick = () => aplicar(Number(item.precio_total));
  $('#cort-parcial-go').onclick = () => aplicar(+$('#cort-parcial').value);
  $('#cort-cancel').onclick = closeSheet;
}

// CA-07: selección del gerente que aprueba la cortesía (solicitante ≠ aprobador)
function pedirAprobacionGerente(cort) {
  const aprobadores = (state.gerentes || []).filter(g => g.id !== state.mozoId);
  $('#sheet-mark').textContent = '🔑';
  $('#sheet-mark').style.background = 'var(--tertiary)';
  $('#sheet-mark').style.color = 'var(--ink)';
  $('#sheet-title').textContent = 'Aprobación de gerente';
  $('#sheet-meta').textContent = 'Cortesía ' + money(cort.monto) + ' · ' + cort.item.nombre;
  const lista = aprobadores.map(g => `
    <button class="mozo-item" data-gid="${g.id}">
      <span class="mozo-avatar">${avatarLetters(g)}</span>
      <span class="mozo-info">
        <span class="name">${g.nombre} ${g.apellidos||''}</span>
        <span class="rol">${g.rol}</span>
      </span>
      <span class="material-symbols-outlined">verified_user</span>
    </button>
  `).join('');
  $('#sheet-body').innerHTML = `
    <div class="sheet-section">
      <div class="sheet-section-label">¿Quién autoriza esta cortesía?</div>
      ${lista || '<p style="text-align:center;padding:16px;opacity:0.6">No hay gerentes registrados</p>'}
    </div>
    <div class="sheet-section">
      <button class="btn ghost" id="aprob-cancel">Atrás</button>
    </div>
  `;
  $('#sheet-backdrop').classList.add('open');
  $('#sheet').classList.add('open');
  $$('#sheet-body .mozo-item[data-gid]').forEach(b => b.onclick = () => {
    aplicarCortesiaAprobada(cort, b.dataset.gid);
  });
  $('#aprob-cancel').onclick = () => abrirDialogoCortesia(cort.itemId);
}
function aplicarCortesiaAprobada(cort, gerenteId) {
  const g = (state.gerentes || []).find(x => x.id === gerenteId);
  state.cobro.cortesias.push({
    tmp_id: 'cort_' + Date.now(),
    item_id: cort.itemId,
    monto: cort.monto,
    motivo: cort.motivo,
    aprobada_por: gerenteId,
  });
  closeSheet();
  render();
  toast('Va · cortesía aprobada por ' + fmtMozo(g), 'ok');
}

async function confirmarCobro() {
  const ped = state.pedidos.find(p => p.id === state.pedidoAbiertoId);
  if (!ped) return;
  const T = calcularTotalesCobro(ped);
  if (T.pendiente > 0.01) { toast('Aún falta ' + money(T.pendiente), 'warn'); return; }

  const C = state.cobro.comprobante;
  if (C.tipo === 'factura') {
    if (!(C.doc||'').match(/^\d{11}$/)) { toast('RUC inválido (11 dígitos)', 'err'); return; }
    if (!(C.nombre||'').trim()) { toast('Razón social requerida', 'err'); return; }
  }
  if (C.tipo === 'boleta' && C.doc && !(C.doc||'').match(/^\d{8}$/)) {
    toast('DNI inválido (8 dígitos) — déjalo vacío si no aplica', 'err'); return;
  }
  if (!confirm('Cerrar mesa y registrar cobro?\nTotal: ' + money(T.total) + '\nPagos: ' + (state.cobro.pagos.length+state.cobro.pagosPersistidos.length))) return;

  const pagado_at = new Date().toISOString();
  try {
    // 1. ca_pagos
    const pagosInsert = state.cobro.pagos.map(p => ({
      pedido_id: ped.id,
      metodo: p.metodo,
      monto: p.monto,
      moneda: 'PEN',
      ref_externa: p.ref_externa || null,
      gift_card_id: p.gift_card ? p.gift_card.id : null,
      recibido: p.recibido || null,
      vuelto: p.vuelto || null,
      pagado_at,
    }));
    if (pagosInsert.length) {
      const r = await sb.from('ca_pagos').insert(pagosInsert);
      if (r.error) throw new Error('Pagos: ' + r.error.message);
    }
    // 2. Gift cards (decrementar saldo)
    for (const p of state.cobro.pagos) {
      if (p.gift_card) {
        const nuevoSaldo = +(p.gift_card.saldo_previo - p.monto).toFixed(2);
        const r = await sb.from('ca_gift_cards').update({
          saldo: nuevoSaldo,
          estado: nuevoSaldo <= 0.01 ? 'agotada' : 'activa',
        }).eq('id', p.gift_card.id);
        if (r.error) throw new Error('Gift card: ' + r.error.message);
      }
    }
    // 3. ca_cortesias (CA-07: solicitante = mozo, aprobador = gerente)
    const cortesiasInsert = state.cobro.cortesias.map(c => ({
      pedido_id: ped.id,
      item_id: c.item_id || null,
      tipo: c.item_id ? 'item' : 'total_pedido',
      monto: c.monto,
      motivo: c.motivo,
      solicitada_por: state.mozoId || null,
      aprobada_por: c.aprobada_por || null,
      aprobada_at: pagado_at,
    }));
    if (cortesiasInsert.length) {
      const r = await sb.from('ca_cortesias').insert(cortesiasInsert);
      if (r.error) throw new Error('Cortesías: ' + r.error.message);
      // CA-12: auditar cada cortesía (solicitante + gerente aprobador)
      const nombreEmp = id => { const e = state.empleados.find(x => x.id === id); return e ? (e.nombre + ' ' + (e.apellidos || '')).trim() : '—'; };
      cortesiasInsert.forEach(c => {
        const det = (c.tipo === 'item' ? 'ítem' : 'pedido completo') + ' · ' + (c.motivo || 'sin motivo') + ' · aprob: ' + nombreEmp(c.aprobada_por);
        logAudit('cortesia', det, ped.id, c.monto);
      });
    }
    // 4. ca_propinas
    if (T.propina > 0) {
      const metodoPropina = state.cobro.pagos[0]?.metodo || 'mixto';
      const r = await sb.from('ca_propinas').insert({
        pedido_id: ped.id,
        mozo_id: ped.mozo_id,
        turno_id: state.turno?.id || null,
        monto: T.propina,
        metodo: metodoPropina,
      });
      if (r.error) throw new Error('Propina: ' + r.error.message);
    }
    // 5. Cierre del pedido
    const updPed = {
      subtotal: T.sub_neto,
      descuento: T.cortesias_total,
      igv: T.igv_incl,
      servicio_monto: T.servicio_monto,
      propina_monto: T.propina,
      total: T.total,
      // BD: ca_pedidos.estado IN (abierta|cerrada|suspended|cancelada)
      // BD: estado_servicio IN (abierta|ordenando|comiendo|cuenta_pedida|pagando)
      estado: 'cerrada',
      estado_servicio: 'pagando',
      cerrada_at: pagado_at,
      pagado_at,
      comprobante_tipo: C.tipo,
      comprobante_doc: C.doc || null,
      comprobante_nombre: C.nombre || null,
      comprobante_email: C.email || null,
      comprobante_emitido: false,
    };
    const r5 = await sb.from('ca_pedidos').update(updPed).eq('id', ped.id);
    if (r5.error) throw new Error('Pedido: ' + r5.error.message);

    logAudit('cobro', 'mesa cerrada' + (T.propina>0?(' · propina '+money(T.propina)):''), ped.id, T.total);
    toast('Servido · mesa cerrada · ' + money(T.total), 'ok');
    await loadPedidos();
    state.screen = 'floor';
    state.pedidoAbiertoId = null;
    render();
  } catch (err) {
    console.error(err);
    toast('Atrás · ' + (err.message || 'fallo al cobrar'), 'err');
  }
}

/* ========= REALTIME ========= */
function subscribe() {
  if (state.channel) sb.removeChannel(state.channel);
  state.channel = sb.channel('pos_v2_floor_' + LOCAL)
    .on('postgres_changes', { event: '*', schema:'public', table:'ca_pedidos', filter:'local_id=eq.'+LOCAL },
        async () => {
          await loadPedidos();
          render();
          if (state.mesaAbierta && $('#sheet').classList.contains('open')) openSheet(state.mesaAbierta.id);
        })
    .on('postgres_changes', { event: '*', schema:'public', table:'ca_mesas', filter:'local_id=eq.'+LOCAL },
        async () => { if (state.screen !== 'edit') { await loadMesas(); render(); } })
    .on('postgres_changes', { event: '*', schema:'public', table:'ca_pedido_items' },
        async (payload) => {
          // Solo reaccionar si el pedido afectado está en cache o abierto
          const pedidoId = payload.new?.pedido_id || payload.old?.pedido_id;
          if (state.pedidoItemsCache[pedidoId] || state.pedidoAbiertoId === pedidoId) {
            await loadPedidoItems(pedidoId);
            if (state.screen === 'pedido' && state.pedidoAbiertoId === pedidoId) render();
          }
        })
    .subscribe();
}

/* ========= WIRE UP ========= */
$('#sheet-backdrop').addEventListener('click', () => { closeSheet(); if (state.screen==='edit') { state.edit.selected=null; renderFloorScreen(); } });
$('#sheet-close').addEventListener('click', () => { closeSheet(); if (state.screen==='edit') { state.edit.selected=null; renderFloorScreen(); } });
$('#mozo-dialog-close').addEventListener('click', () => $('#mozo-dialog').classList.remove('open'));
$('#mozo-dialog').addEventListener('click', (e) => { if (e.target === $('#mozo-dialog')) $('#mozo-dialog').classList.remove('open'); });
$('#item-modal').addEventListener('click', (e) => { if (e.target === $('#item-modal')) $('#item-modal').classList.remove('open'); });
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeSheet();
    $('#mozo-dialog').classList.remove('open');
    $('#item-modal').classList.remove('open');
    if (state.screen==='edit') { state.edit.selected=null; renderFloorScreen(); }
  }
});

/* ========= BOOT ========= */
loadAll().catch(err => {
  console.error(err);
  $('#boot .msg').textContent = 'Atrás · ' + (err.message || 'fallo de conexión');
  $('#boot .spinner').style.borderTopColor = 'var(--secondary)';
});
</script>
