<style>
/* ============ TOKENS ============ */
:root {
  --primary: #1e5af9;
  --secondary: #ff3b30;
  --tertiary: #ffcc00;
  --bg: #fcf9f8;
  --surface: #ffffff;
  --ink: #171c20;
  --outline: #000000;
  --primary-soft: #d6e2ff;
  --primary-dark: #001a47;
  --gray-soft: #dfe3e8;
  --green: #10b981;
  --green-soft: #d1fae5;
  --amber-soft: #fef3c7;
  --red-soft: #fee2e2;
  --shadow-sm: 4px 4px 0 0 #000;
  --shadow: 6px 6px 0 0 #000;
  --shadow-lg: 10px 10px 0 0 #000;
  --font-display: 'Bagel Fat One', system-ui, sans-serif;
  --font-body: 'IBM Plex Sans', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
  --canvas-scale: 1.6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  display: flex;
  flex-direction: column;
  touch-action: manipulation;
}
button { font-family: inherit; cursor: pointer; }
.material-symbols-outlined { font-size: 20px; line-height: 1; user-select: none; }

/* ============ HEADER ============ */
.header {
  flex-shrink: 0;
  background: var(--bg);
  border-bottom: 2px solid var(--outline);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  min-height: 64px;
}
.brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.brand-logo { position:relative; width: 100px; height: 32px; flex-shrink: 0; display:block; text-decoration:none; }
.brand-logo .l, .boot .logo .l { position:absolute; inset:0; -webkit-mask: url(/logo.png) left center/contain no-repeat; mask: url(/logo.png) left center/contain no-repeat; }
.brand-logo .l.base, .boot .logo .l.base { background: var(--ink); }
.brand-logo .l.bang, .boot .logo .l.bang { background: var(--ink); clip-path: inset(0 0 0 86%); }
.brand-txt .cli { font-weight: 700; font-size: 14px; line-height: 1.1; }
.brand .logo { font-family: var(--font-display); font-size: 28px; color: var(--primary); line-height: 0.9; }
.brand .logo .accent { color: var(--secondary); }
.brand .mod, .brand-txt .mod {
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.6; line-height: 1.15;
}
.header-info {
  display: flex; align-items: center; gap: 10px; flex: 1;
  font-family: var(--font-mono); font-size: 12px;
}
.pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  border: 2px solid var(--outline); border-radius: 999px;
  background: var(--surface);
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
  font-size: 11px;
}
.pill.live { background: var(--primary); color: white; }
.pill.live::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--tertiary); animation: pulse 1.4s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.3 } }

.btn-ico {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  border: 2px solid var(--outline); border-radius: 999px;
  background: var(--surface); color: var(--ink);
  font-family: var(--font-body); font-weight: 600; font-size: 13px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.1s, box-shadow 0.1s;
}
.btn-ico:active { transform: translate(2px,2px); box-shadow: none; }
.btn-ico.dark { background: var(--ink); color: var(--bg); }
.btn-ico.warn { background: var(--tertiary); color: var(--ink); }
.btn-ico.primary { background: var(--primary); color: white; }
.btn-ico.danger { background: var(--secondary); color: white; }
.btn-ico.ghost { background: transparent; box-shadow: none; border-style: dashed; }

/* ============ ZONE TABS ============ */
.zonas {
  flex-shrink: 0;
  display: flex; gap: 8px;
  padding: 12px 16px;
  background: var(--bg);
  border-bottom: 2px solid var(--outline);
  overflow-x: auto; scrollbar-width: none;
}
.zonas::-webkit-scrollbar { display: none; }
.zona-tab {
  flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 18px;
  border: 2px solid var(--outline); border-radius: 999px;
  background: var(--surface);
  font-family: var(--font-body); font-weight: 600; font-size: 13px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.1s, box-shadow 0.1s;
}
.zona-tab.active {
  background: var(--ink); color: var(--bg);
  transform: translate(2px,2px); box-shadow: none;
}
.zona-tab .count {
  font-family: var(--font-mono); font-size: 11px;
  background: var(--tertiary); color: var(--ink);
  padding: 1px 7px; border-radius: 999px;
  border: 1.5px solid var(--outline);
}

/* ============ FLOOR CANVAS ============ */
.floor-wrap {
  flex: 1; overflow: auto; position: relative; padding: 24px;
}
.floor-canvas {
  position: relative;
  width: calc(580px * var(--canvas-scale));
  height: calc(320px * var(--canvas-scale));
  margin: 0 auto;
  background: var(--surface);
  border: 2px solid var(--outline);
  border-radius: 16px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}
.floor-canvas.editing {
  background:
    repeating-linear-gradient(0deg, transparent 0, transparent calc(20px * var(--canvas-scale) - 1px), rgba(30,90,249,0.1) calc(20px * var(--canvas-scale) - 1px), rgba(30,90,249,0.1) calc(20px * var(--canvas-scale))),
    repeating-linear-gradient(90deg, transparent 0, transparent calc(20px * var(--canvas-scale) - 1px), rgba(30,90,249,0.1) calc(20px * var(--canvas-scale) - 1px), rgba(30,90,249,0.1) calc(20px * var(--canvas-scale))),
    var(--surface);
}

/* Canvas inner: aplica el scale transform en lugar de manualmente en cada elemento */
.canvas-inner {
  position: absolute;
  inset: 0;
  transform: scale(var(--canvas-scale));
  transform-origin: 0 0;
  width: 580px;
  height: 320px;
}

/* ZONA backgrounds */
.zona-bg {
  position: absolute;
  pointer-events: none;
}
.zona-label {
  position: absolute;
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  opacity: 0.5;
  pointer-events: none;
  color: var(--ink);
}

/* MUEBLES */
.mueble {
  position: absolute;
  pointer-events: none;
  font-family: var(--font-mono);
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink);
  overflow: hidden;
}
.mueble.pared {
  background: repeating-linear-gradient(45deg, var(--ink) 0, var(--ink) 3px, #333 3px, #333 6px);
}
.mueble.entrada {
  background: var(--tertiary);
  border: 1px solid var(--outline);
  font-size: 7px;
}
.mueble.cocina {
  background: var(--red-soft);
  border: 1.5px solid var(--secondary);
  font-size: 11px;
  color: var(--secondary);
  font-weight: 800;
}
.mueble.pase {
  background: var(--ink);
  color: var(--bg);
  border: 1px solid var(--outline);
  font-size: 7px;
}
.mueble.baño {
  background: var(--gray-soft);
  border: 1.5px solid var(--outline);
  color: var(--ink);
}
.mueble.columna {
  background: var(--ink);
  border-radius: 50%;
}
.mueble.planta {
  background: var(--green-soft);
  border: 1.5px solid var(--green);
  border-radius: 50%;
}
.mueble.barra_fisica {
  background: var(--primary-dark);
  color: var(--bg);
  border: 1px solid var(--outline);
}
/* En modo edit, los muebles son interactivos */
.editing .mueble { pointer-events: auto; cursor: grab; }
.editing .mueble:active { cursor: grabbing; }
.editing .mueble.selected {
  outline: 3px dashed var(--primary);
  outline-offset: 2px;
  z-index: 50;
}

/* MESAS */
.mesa {
  position: absolute;
  border: 2px solid var(--outline);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
  cursor: pointer;
  transition: box-shadow 0.12s, background 0.15s;
  padding: 3px;
  overflow: hidden;
  text-align: center;
  font-family: var(--font-body);
  -webkit-touch-callout: none;
}
.mesa:active { transform: translate(2px,2px); box-shadow: none; }
.mesa .num { font-family: var(--font-display); font-size: 16px; line-height: 0.9; }
.mesa .cap { font-family: var(--font-mono); font-size: 8px; font-weight: 600; opacity: 0.6; text-transform: uppercase; }
.mesa .timer {
  font-family: var(--font-mono); font-size: 10px; font-weight: 700;
  background: var(--ink); color: var(--bg);
  padding: 1px 5px; border-radius: 999px; margin-top: 1px;
}
.mesa .badge-com {
  position: absolute; top: -7px; right: -7px;
  width: 18px; height: 18px;
  background: var(--tertiary); border: 2px solid var(--outline);
  border-radius: 50%;
  font-family: var(--font-mono); font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.mesa.circular { border-radius: 50%; }
.mesa.rectangular { border-radius: 8px; }
.mesa.barra { border-radius: 8px; background: var(--primary-dark); color: var(--bg); }
.mesa.barra .cap { opacity: 0.8; }

.mesa[data-estado="libre"] { background: var(--surface); }
.mesa[data-estado="abierta"] { background: var(--primary-soft); border-color: var(--primary); }
.mesa[data-estado="marchada"] { background: var(--tertiary); }
.mesa[data-estado="cuenta_pedida"] { background: var(--secondary); color: white; }
.mesa[data-estado="cuenta_pedida"] .cap { opacity: 0.85; }
.mesa[data-estado="cuenta_pedida"] .timer { background: white; color: var(--ink); }
.mesa[data-estado="suspendida"] { background: var(--surface); border-style: dashed; opacity: 0.7; }

.editing .mesa { cursor: grab; }
.editing .mesa:active { cursor: grabbing; transform: none; box-shadow: var(--shadow-sm); }
.editing .mesa.selected { outline: 3px dashed var(--primary); outline-offset: 3px; z-index: 50; }
.editing .mesa:hover { box-shadow: var(--shadow); }

/* LEGEND */
.legend {
  display: flex; gap: 14px; flex-wrap: wrap;
  padding: 12px 16px;
  background: var(--bg);
  font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  border-top: 1px solid var(--gray-soft);
}
.legend-item { display: inline-flex; align-items: center; gap: 6px; }
.legend-dot { width: 14px; height: 14px; border: 1.5px solid var(--outline); border-radius: 4px; }
.legend-dot.libre { background: var(--surface); }
.legend-dot.abierta { background: var(--primary-soft); }
.legend-dot.marchada { background: var(--tertiary); }
.legend-dot.cuenta { background: var(--secondary); }
.legend-dot.suspendida { background: var(--surface); border-style: dashed; }

/* ============ FAB EN EDIT MODE ============ */
.fab-stack {
  position: fixed;
  right: 20px;
  bottom: 24px;
  z-index: 60;
  display: flex; flex-direction: column; gap: 10px;
}
.fab {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 12px 16px;
  border: 2px solid var(--outline);
  border-radius: 14px;
  background: var(--surface);
  box-shadow: var(--shadow);
  font-family: var(--font-body); font-weight: 700; font-size: 13px;
  transition: transform 0.1s, box-shadow 0.1s;
}
.fab:active { transform: translate(2px,2px); box-shadow: var(--shadow-sm); }
.fab.primary { background: var(--primary); color: white; }
.fab.dark { background: var(--ink); color: var(--bg); }
.fab.warn { background: var(--tertiary); color: var(--ink); }

/* ============ BOTTOM SHEET ============ */
.sheet-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 80;
  opacity: 0; pointer-events: none;
  transition: opacity 0.18s;
}
.sheet-backdrop.open { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 90;
  background: var(--surface);
  border-top: 3px solid var(--outline);
  border-radius: 24px 24px 0 0;
  box-shadow: 0 -10px 0 0 var(--outline);
  transform: translateY(100%);
  transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: 85vh;
  display: flex; flex-direction: column;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 48px; height: 5px;
  background: var(--outline);
  border-radius: 999px;
  margin: 12px auto 8px;
  opacity: 0.3;
}
.sheet-head {
  padding: 8px 24px 16px;
  border-bottom: 2px solid var(--outline);
  display: flex; align-items: center; gap: 14px;
}
.sheet-mesa-mark {
  width: 52px; height: 52px;
  border: 2px solid var(--outline);
  border-radius: 12px;
  background: var(--primary-soft);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 20px;
  flex-shrink: 0;
}
.sheet-title { flex: 1; }
.sheet-title h2 { font-family: var(--font-display); font-size: 22px; line-height: 1; margin-bottom: 4px; }
.sheet-title .meta {
  font-family: var(--font-mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.65;
  display: flex; gap: 10px; flex-wrap: wrap;
}
.sheet-close {
  width: 40px; height: 40px;
  border: 2px solid var(--outline); border-radius: 50%;
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-sm);
}
.sheet-close:active { transform: translate(2px,2px); box-shadow: none; }

.sheet-body { padding: 20px 24px 24px; overflow-y: auto; flex: 1; }
.sheet-section + .sheet-section { margin-top: 18px; }
.sheet-section-label {
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.55;
  margin-bottom: 8px;
}
.sheet-info-row {
  display: flex; justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px dashed var(--gray-soft);
  font-size: 14px;
}
.sheet-info-row strong { font-family: var(--font-mono); font-weight: 600; }

/* COMENSALES STEPPER */
.com-stepper { display: flex; align-items: center; gap: 12px; justify-content: center; margin: 12px 0; }
.com-stepper button {
  width: 56px; height: 56px;
  border: 2px solid var(--outline); border-radius: 50%;
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  font-size: 28px; font-weight: 700; font-family: var(--font-display);
  display: flex; align-items: center; justify-content: center;
  line-height: 0;
}
.com-stepper button:active { transform: translate(2px,2px); box-shadow: none; }
.com-stepper button:disabled { opacity: 0.3; }
.com-stepper .com-num {
  font-family: var(--font-display); font-size: 56px; line-height: 1;
  min-width: 80px; text-align: center;
}

/* BUTTON BANK */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 18px;
  border: 2px solid var(--outline); border-radius: 14px;
  font-family: var(--font-body); font-weight: 600; font-size: 14px;
  background: var(--surface); color: var(--ink);
  box-shadow: var(--shadow-sm);
  transition: transform 0.1s, box-shadow 0.1s;
  width: 100%;
  min-height: 52px;
}
.btn:active { transform: translate(2px,2px); box-shadow: none; }
.btn.primary { background: var(--primary); color: white; }
.btn.danger { background: var(--secondary); color: white; }
.btn.warn { background: var(--tertiary); color: var(--ink); }
.btn.dark { background: var(--ink); color: var(--bg); }
.btn.ghost { background: transparent; box-shadow: none; border-style: dashed; }
.btn[disabled] { opacity: 0.4; pointer-events: none; }
.btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
.btn-grid .btn.span-2 { grid-column: span 2; }

/* PROP EDITOR (modo edit) */
.prop-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0;
  border-bottom: 1px dashed var(--gray-soft);
}
.prop-row label {
  flex: 1; font-size: 13px; font-weight: 600;
}
.stepper-mini {
  display: inline-flex; align-items: center; gap: 8px;
}
.stepper-mini button {
  width: 36px; height: 36px;
  border: 2px solid var(--outline); border-radius: 50%;
  background: var(--surface); box-shadow: var(--shadow-sm);
  font-size: 18px; font-weight: 700; line-height: 0;
}
.stepper-mini button:active { transform: translate(1px,1px); box-shadow: none; }
.stepper-mini .val {
  font-family: var(--font-mono); font-weight: 700; min-width: 30px; text-align: center;
}
.select {
  padding: 8px 12px;
  border: 2px solid var(--outline); border-radius: 10px;
  background: var(--surface); font-family: var(--font-body); font-weight: 600;
  font-size: 13px;
  box-shadow: var(--shadow-sm);
}
.input {
  padding: 8px 12px;
  border: 2px solid var(--outline); border-radius: 10px;
  background: var(--surface);
  font-family: var(--font-body); font-size: 14px;
  box-shadow: var(--shadow-sm);
  width: 100%;
}

/* MOZO PICKER (dialog) */
.dialog-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 100;
  display: none;
  align-items: center; justify-content: center;
  padding: 24px;
}
.dialog-backdrop.open { display: flex; }
.dialog {
  background: var(--surface);
  border: 3px solid var(--outline); border-radius: 18px;
  box-shadow: var(--shadow-lg);
  width: 100%; max-width: 480px; max-height: 80vh;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.dialog-head {
  padding: 16px 20px;
  border-bottom: 2px solid var(--outline);
  display: flex; align-items: center; gap: 10px;
}
.dialog-head h3 { font-family: var(--font-display); font-size: 20px; flex: 1; }
.dialog-body { padding: 16px; overflow-y: auto; flex: 1; }
.mozo-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px;
  border: 2px solid var(--outline); border-radius: 12px;
  background: var(--surface);
  margin-bottom: 8px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.1s, box-shadow 0.1s;
}
.mozo-item:active { transform: translate(2px,2px); box-shadow: none; }
.mozo-item.active { background: var(--primary); color: white; }
.mozo-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  border: 2px solid var(--outline);
  background: var(--tertiary);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 16px; color: var(--ink);
  flex-shrink: 0;
}
.mozo-info { flex: 1; }
.mozo-info .name { font-weight: 700; font-size: 15px; }
.mozo-info .rol {
  font-family: var(--font-mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.7;
}

/* ============ PEDIDO SCREEN ============ */
.pedido-screen {
  flex: 1;
  display: grid;
  grid-template-columns: minmax(320px, 1fr) minmax(360px, 1.2fr);
  grid-template-rows: auto 1fr auto;
  grid-template-areas:
    "head head"
    "items menu"
    "foot foot";
  background: var(--bg);
  overflow: hidden;
}
.pedido-head {
  grid-area: head;
  background: var(--surface);
  border-bottom: 2px solid var(--outline);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
  flex-wrap: wrap;
}
.pedido-head .ticket-mark {
  width: 52px; height: 52px;
  border: 2px solid var(--outline); border-radius: 12px;
  background: var(--primary-soft);
  display: flex; align-items: center; justify-content: center;

/* ========= STATE ========= */

/* ========= UTILS ========= */
const $ = (s, root = document) => root.querySelector(s);
const $$ = (s, root = document) => Array.from(root.querySelectorAll(s));

function timeAgo(dateStr) {
  if (!dateStr) return '—';
  const ms = Date.now() - new Date(dateStr).getTime();
  const min = Math.floor(ms / 60000);
  if (min < 1) return 'ahora';
  if (min < 60) return min + ' min';
  const h = Math.floor(min / 60);
  return h + 'h ' + (min % 60) + 'm';
}
function fmtMozo(emp) { if (!emp) return '—'; const a = (emp.apellidos||'').split(' ')[0]; return emp.nombre + (a ? ' '+a : ''); }
function avatarLetters(emp) { return ((emp.nombre||'?').charAt(0) + (emp.apellidos||'').charAt(0)).toUpperCase(); }
function money(n) { return 'S/ ' + Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function nombreClientePOS(c) { return c ? (c.nombre + (c.apellidos ? ' '+c.apellidos.split(' ')[0] : '')) : '—'; }
async function cargarClienteCache(id) {
  if (!id || state.clientesCache[id]) return state.clientesCache[id];
  const { data } = await sb.from('ms_clientes').select('id,nombre,apellidos,telefono,alergias,tags,segmento,total_visitas,ticket_promedio,platos_favoritos').eq('id', id).maybeSingle();
  if (data) state.clientesCache[id] = data;
  return data;
}
function uuid() { return crypto.randomUUID ? crypto.randomUUID() : 'tmp_' + Math.random().toString(36).slice(2); }

function toast(msg, tipo='') {
  const el = document.createElement('div');
  el.className = 'toast ' + tipo;
  const ico = tipo==='ok'?'check_circle':tipo==='err'?'error':tipo==='warn'?'warning':'info';
  el.innerHTML = `<span class="material-symbols-outlined">${ico}</span><span>${msg}</span>`;
  $('#toasts').appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity 0.3s, transform 0.3s';
    el.style.opacity = '0';
    el.style.transform = 'translateX(120%)';
    setTimeout(() => el.remove(), 300);
  }, 2800);
}

/* ========= CATÁLOGOS (cursos · modificadores · alérgenos) ========= */
// CA-02: tiempos / cursos del servicio
const COURSES = [
  { step: 1, label: 'Entrada', short: 'ENT', emoji: '🥗' },
  { step: 2, label: 'Fondo',   short: 'FON', emoji: '🍝' },
  { step: 3, label: 'Postre',  short: 'POS', emoji: '🍰' },
];
function courseDe(step) { return COURSES.find(c => c.step === step) || COURSES[1]; }
function courseSugerido(r) {
  const s = ((r.sub_categoria || r.categoria_menu || '') + ' ' + (r.nombre || '')).toLowerCase();
  if (/entrada|antipast|ensalada|sopa|crema|starter|appetiz|bruschet|carpacc/.test(s)) return 1;
  if (/postre|dolc|dessert|helado|tiramis|torta|cheesecake|panna|gelato/.test(s)) return 3;
  if (r.modulo === 'bar') return 1; // bebidas entran con el primer tiempo
  return 2; // fondos por defecto
}

// CA-10: modificadores priceados (catálogo genérico Casa Italia)
// precio = delta fijo en S/ · pct = delta proporcional al precio base (0.6 = +60%)
const MODIFICADORES = {
  cocina: [
    { id: 'extra_queso',  nombre: 'Extra queso',     precio: 4 },
    { id: 'extra_salsa',  nombre: 'Extra salsa',     precio: 3 },
    { id: 'sin_gluten',   nombre: 'Pasta sin gluten', precio: 6 },
    { id: 'porcion_doble',nombre: 'Porción doble',   precio: 0, pct: 0.6 },
    { id: 'pan_extra',    nombre: 'Pan extra',       precio: 2 },
    { id: 'sin_lactosa',  nombre: 'Sin lactosa',     precio: 0 },
  ],
  bar: [
    { id: 'doble_shot',   nombre: 'Doble shot',          precio: 8 },
    { id: 'sin_alcohol',  nombre: 'Versión sin alcohol', precio: 0 },
    { id: 'hielo_aparte', nombre: 'Hielo aparte',        precio: 0 },
    { id: 'jugo_natural', nombre: 'Con jugo natural',    precio: 3 },
  ],
};
function modsDe(modulo) { return MODIFICADORES[modulo] || MODIFICADORES.cocina; }
// delta total de un set de modificadores aplicado a un precio base unitario
function deltaModificadores(mods, precioBase) {
  if (!Array.isArray(mods)) return 0;
  return +mods.reduce((acc, m) => acc + Number(m.precio || 0) + (m.pct ? precioBase * m.pct : 0), 0).toFixed(2);
}

// CA-22: alérgenos comunes para captura por silla
const ALERGENOS_COMUNES = ['Gluten', 'Lácteos', 'Maní', 'Frutos secos', 'Mariscos', 'Pescado', 'Huevo', 'Soya', 'Sésamo'];

/* ========= IMPRESIÓN TÉRMICA (CA-06 · CA-23) ========= */
// Imprime en formato ticket 80mm vía iframe oculto (evita bloqueo de pop-ups).
function imprimirTermico(titulo, htmlBody) {
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:fixed;right:0;bottom:0;width:0;height:0;border:0;';
  document.body.appendChild(iframe);
  const doc = iframe.contentWindow.document;
  doc.open();
  doc.write(`<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><title>${titulo}</title>
    <style>
      @page { size: 80mm auto; margin: 0; }
      * { margin:0; padding:0; box-sizing:border-box; }
      body { width:80mm; font-family:'IBM Plex Mono','Courier New',monospace; color:#000; padding:5mm 4mm; font-size:12px; line-height:1.35; }
      .center{text-align:center} .right{text-align:right}
      .b{font-weight:700} .lg{font-size:15px} .xl{font-size:20px} .muted{opacity:.7}
      hr{border:none;border-top:1px dashed #000;margin:6px 0}
      table{width:100%;border-collapse:collapse} td{vertical-align:top;padding:1px 0}
      .seccion{page-break-after:always}
      .seccion:last-child{page-break-after:auto}
    </style></head><body>${htmlBody}</body></html>`);
  doc.close();
  let removed = false;
  const cleanup = () => { if (removed) return; removed = true; setTimeout(() => iframe.remove(), 300); };
  iframe.contentWindow.onafterprint = cleanup;
  setTimeout(() => {
    try { iframe.contentWindow.focus(); iframe.contentWindow.print(); } catch (_) {}
    setTimeout(cleanup, 3000);
  }, 250);
}
function nombreEstacion(stationId) {
  const e = state.estaciones.find(x => x.id === stationId);
  return e ? ((e.emoji ? e.emoji + ' ' : '') + e.nombre) : 'COCINA';
}
function impresoraEstacion(stationId) {
  const e = state.estaciones.find(x => x.id === stationId);
  return e ? (e.impresora_nombre || e.impresora_ip || null) : null;
}
function horaCorta() { return new Date().toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit' }); }

// CA-06: una comanda por estación (page-break entre estaciones = un slip por impresora)
function imprimirComandasEstacion(ped, items, etiqueta) {
  const its = items.filter(it => it.estado !== 'cancelado');
  if (!its.length) { toast('Nada para imprimir', 'warn'); return; }
  const mesa = state.mesas.find(m => m.id === ped.mesa_id);
  const porEst = {};
  its.forEach(it => { const k = it.station || 'sin_estacion'; (porEst[k] = porEst[k] || []).push(it); });
  const secciones = Object.keys(porEst).map(st => {
    const imp = impresoraEstacion(st);
    const filas = porEst[st].map(it => {
      const mods = (Array.isArray(it.modificadores) ? it.modificadores : []).map(m => m.nombre).join(', ');
      const cs = courseDe(it.course_step || 2);
      return `<tr><td class="b lg" style="width:34px">${it.qty}×</td><td class="b lg">${it.nombre}
        <div class="muted">${it.seat_position ? 'Silla ' + it.seat_position : 'Centro · compartido'} · [${cs.short}]${it.urgente ? ' · ¡URGENTE!' : ''}</div>
        ${mods ? `<div>+ ${mods}</div>` : ''}
        ${it.notas ? `<div class="b">» ${it.notas}</div>` : ''}
        </td></tr>`;
    }).join('');
    return `<div class="seccion">
      <div class="center b xl">${nombreEstacion(st)}</div>
      <div class="center muted">${imp ? '🖨 ' + imp : 'sin impresora asignada'}</div>
      <hr>
      <table>
        <tr><td class="b lg">Mesa ${mesa ? mesa.numero : '—'}</td><td class="right b lg">#${ped.ticket_num}</td></tr>
        <tr><td class="muted">${(mesa && mesa.zona) || ''}${etiqueta ? ' · ' + etiqueta : ''}</td><td class="right muted">${horaCorta()}</td></tr>
      </table>
      <hr>
      <table>${filas}</table>
      <hr>
      <div class="center muted">prep! · ${porEst[st].length} ítem(s) · ${nombreEstacion(st)}</div>
    </div>`;
  }).join('');
  imprimirTermico('Comanda #' + ped.ticket_num, secciones);
}

// CA-23: pre-cuenta (sin valor fiscal)
function imprimirPreCuenta(ped, T) {
  const mesa = state.mesas.find(m => m.id === ped.mesa_id);
  const items = state.pedidoItemsCache[ped.id] || [];
  const filas = items.filter(it => it.estado !== 'cancelado').map(it => {
    const cMonto = (T.cortesiasMontoPorItem && T.cortesiasMontoPorItem[it.id]) || 0;
    return `<tr>
      <td style="width:28px">${it.qty}×</td>
      <td>${it.nombre}${cMonto > 0 ? ' <span class="muted">(cortesía)</span>' : ''}</td>
      <td class="right">${money(it.precio_total)}</td>
    </tr>`;
  }).join('');
  const body = `
    <div class="center xl b">Casa Italia</div>
    <div class="center muted">PRE-CUENTA · no es comprobante de pago</div>
    <hr>
    <table>
      <tr><td class="b">Mesa ${mesa ? mesa.numero : '—'}</td><td class="right b">#${ped.ticket_num}</td></tr>
      <tr><td class="muted">${(mesa && mesa.zona) || ''}</td><td class="right muted">${horaCorta()}</td></tr>
      <tr><td class="muted">${ped.comensales || 1} comensal(es)</td><td class="right muted">${ped.tab_nombre ? 'Tab: ' + ped.tab_nombre : ''}</td></tr>
    </table>
    <hr>
    <table>${filas}</table>
    <hr>
    <table>
      <tr><td>Subtotal</td><td class="right">${money(T.sub_bruto)}</td></tr>
      ${T.cortesias_total > 0 ? `<tr><td>Cortesías</td><td class="right">−${money(T.cortesias_total)}</td></tr>` : ''}
      <tr><td>Servicio 10%</td><td class="right">${money(T.servicio_monto)}</td></tr>
      <tr><td class="b lg">TOTAL</td><td class="right b lg">${money(T.sub_neto + T.servicio_monto)}</td></tr>
    </table>
    <hr>
    <div class="center muted">Propina sugerida no incluida</div>
    <div class="center muted">Gracias por su visita · prep!</div>`;
  // Inserto con QR de la encuesta (Voz del Cliente). Precargamos la imagen para que
  // imprima sí o sí en la térmica (el iframe imprime ~250ms después de escribir el HTML).
  const printPre = (qr) => imprimirTermico('Pre-cuenta #' + ped.ticket_num, body + qr);
  if (ENCUESTA_TICKET_ID) {
    const qrSrc = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&margin=0&data=' +
      encodeURIComponent(location.origin + '/encuesta?id=' + ENCUESTA_TICKET_ID + (mesa ? '&mesa=' + encodeURIComponent(mesa.numero) : ''));
    const qrHtml = `<hr><div class="center b">¿Cómo estuvo todo?</div><div class="center muted">Escanéa y cuéntanos · 30 seg</div>` +
      `<div class="center" style="margin:6px 0"><img src="${qrSrc}" alt="Encuesta" style="width:38mm;height:38mm"></div>` +
      `<div class="center muted">Tu opinión mejora Casa Italia 🍝</div>`;
    const im = new Image();
    im.onload = () => printPre(qrHtml);
    im.onerror = () => printPre('');
    im.src = qrSrc;
  } else {
    printPre('');
  }
}

async function loadAll() {
  await Promise.all([
    loadMesas(), loadEmpleados(), loadGerentes(), loadTurno(),
    loadRecetas(), loadEstaciones(), loadFloorPlan(),
  ]);
  await loadPedidos();
  // determinar subtab default del menú
  const cats = subcategoriasMenu('cocina');
  state.menuSubtab = cats[0] || null;
  render();
  subscribe();
  setInterval(updateTimers, 30000);
  $('#boot').classList.add('gone');
}

async function loadMesas() {
  try {
    const { data, error } = await sb.from('ca_mesas').select('*')
      .eq('marca_id', MARCA).eq('local_id', LOCAL);
    if (error) throw error;
    state.mesas = (data || []).filter(m => m.activa !== false);

}

function pedidosDeMesa(mesaId) { return state.pedidos.filter(p => p.mesa_id === mesaId); }
function esBarra(mesa) { return !!mesa && (mesa.zona === 'barra' || mesa.forma === 'barra'); }
const ESTADO_SERV_MAP = { abierta:'abierta', ordenando:'abierta', comiendo:'marchada', cuenta_pedida:'cuenta_pedida', pagando:'cuenta_pedida' };
function estadoMesa(mesa) {
  const ps = pedidosDeMesa(mesa.id);
  if (!ps.length) return 'libre';
  if (esBarra(mesa)) {
    if (ps.every(p => p.estado === 'suspended')) return 'suspendida';
    const activos = ps.filter(p => p.estado !== 'suspended');
    if (activos.some(p => ['cuenta_pedida','pagando'].includes(p.estado_servicio))) return 'cuenta_pedida';
    if (activos.some(p => p.estado_servicio === 'comiendo')) return 'marchada';
    return 'abierta';
  }
  const p = ps[0];
  if (p.estado === 'suspended') return 'suspendida';
  return ESTADO_SERV_MAP[p.estado_servicio] || 'abierta';
}
function zonasCount() {
  const map = { todas: state.mesas.length };
  state.mesas.forEach(m => { const z = m.zona || 'sin_zona'; map[z] = (map[z]||0) + 1; });
  return map;
}
function subcategoriasMenu(modulo) {
  const set = new Set();
  state.recetas.filter(r => r.modulo === modulo).forEach(r => set.add(r.sub_categoria || r.categoria_menu || 'Otros'));
  return Array.from(set);
}
function recetasDe(modulo, subcategoria) {
  return state.recetas
    .filter(r => r.modulo === modulo && (r.sub_categoria || r.categoria_menu) === subcategoria)
    .sort((a,b) => (a.orden_menu||0) - (b.orden_menu||0) || a.nombre.localeCompare(b.nombre));
}

/* ========= FLOOR SCREEN ========= */
function renderFloorScreen() {
  const editing = state.screen === 'edit';
  const counts = zonasCount();
  const orden = ['todas', 'salón', 'terraza', 'reservado', 'barra'];
  const labels = { todas:'Todas', 'salón':'Salón', terraza:'Terraza', reservado:'Reservado', barra:'Barra' };
  const zonaTabsHtml = editing ? '' : `
    <nav class="zonas">
      ${orden.filter(z => z === 'todas' || counts[z]).map(z => `
        <button class="zona-tab ${state.zonaActiva===z?'active':''}" data-z="${z}">
          ${labels[z]} <span class="count">${counts[z]||0}</span>
        </button>
      `).join('')}
    </nav>
  `;

  // Render canvas con muebles + zonas + mesas
  const mueblesHtml = state.muebles.map(mu => renderMuebleEl(mu, editing)).join('');
  const zonasHtml = state.zonas.map(z => {
    if (z.x == null) return '';
    const isActive = !editing && (state.zonaActiva === 'todas' || state.zonaActiva === z.nombre);
    return `<div class="zona-bg" style="
      left:${z.x}px; top:${z.y}px; width:${z.w}px; height:${z.h}px;
      background:${z.color||'transparent'};
      opacity:${isActive?0.7:0.25};
      transition:opacity 0.2s;
    "></div>
    <div class="zona-label" style="left:${z.x+8}px; top:${z.y+6}px">${z.nombre}</div>`;
  }).join('');
  const mesasHtml = state.mesas.map(m => renderMesaEl(m, editing)).join('');

  $('#screen').innerHTML = `
    ${zonaTabsHtml}
    <div class="floor-wrap">
      <div class="floor-canvas ${editing ? 'editing' : ''}" id="floor-canvas">
        <div class="canvas-inner" id="canvas-inner">
          ${zonasHtml}
          ${mueblesHtml}
          ${mesasHtml}
        </div>
      </div>
    </div>
  `;
  $('#legend').style.display = editing ? 'none' : 'flex';

  // FAB stack en edit
  if (editing) {
    $('#fab-stack').style.display = 'flex';
    $('#fab-stack').innerHTML = `
      <button class="fab primary" id="fab-add-mesa">
        <span class="material-symbols-outlined">table_restaurant</span>+ Mesa
      </button>
      <button class="fab dark" id="fab-add-mueble">
        <span class="material-symbols-outlined">view_in_ar</span>+ Mueble
      </button>
      <button class="fab warn" id="fab-edit-help">
        <span class="material-symbols-outlined">help</span>Ayuda
      </button>
    `;
    $('#fab-add-mesa').onclick = addMesa;
    $('#fab-add-mueble').onclick = addMueble;
    $('#fab-edit-help').onclick = mostrarAyudaEditor;
  } else {
    $('#fab-stack').style.display = 'none';
  }

  // Wire interactions
  $$('#screen .zona-tab').forEach(b => b.onclick = () => { state.zonaActiva = b.dataset.z; render(); });

  $$('#canvas-inner .mesa').forEach(b => {
    b.addEventListener('click', () => {
      if (editing) openEditPanel('mesa', b.dataset.id);
      else openSheet(b.dataset.id);
    });
  });
  $$('#canvas-inner .mueble').forEach(b => {
    if (editing) b.addEventListener('click', (e) => {
      if (b.dataset.justDragged) { delete b.dataset.justDragged; return; }
      openEditPanel('mueble', b.dataset.id);
    });
  });

  if (editing) setupDragAndDrop();
}

function renderMesaEl(m, editing) {
  const est = estadoMesa(m);
  const visible = editing || state.zonaActiva === 'todas' || (m.zona || 'sin_zona') === state.zonaActiva;
  const selected = editing && state.edit.selected && state.edit.selected.kind === 'mesa' && state.edit.selected.id === m.id;
  // CA-04: la barra muestra nº de tabs; mesas normales muestran comensales
  const barra = esBarra(m);
  const tabs = barra ? pedidosDeMesa(m.id) : [];
  const ped = barra ? null : pedidoDeMesa(m.id);
  const desde = barra ? tabs.map(t => t.abierta_at).filter(Boolean).sort()[0] : (ped && ped.abierta_at);
  const badgeNum = barra ? (tabs.length || null) : (ped && ped.comensales);
  return `
    <button class="mesa ${m.forma || 'rectangular'} ${selected?'selected':''}" data-id="${m.id}" data-estado="${est}" data-kind="mesa"
            style="left:${m.pos_x}px; top:${m.pos_y}px; width:${m.ancho}px; height:${m.alto}px; ${visible?'':'display:none'}">
      <span class="num">${m.numero}</span>
      <span class="cap">${barra ? (tabs.length ? tabs.length+' tab'+(tabs.length===1?'':'s') : '×'+m.capacidad) : '×'+m.capacidad}</span>
      ${desde && !editing ? `<span class="timer">${timeAgo(desde)}</span>` : ''}
      ${badgeNum && !editing ? `<span class="badge-com">${badgeNum}</span>` : ''}
    </button>
  `;
}

function renderMuebleEl(mu, editing) {
  const selected = editing && state.edit.selected && state.edit.selected.kind === 'mueble' && state.edit.selected.id === mu.id;
  return `<div class="mueble ${mu.tipo} ${selected?'selected':''}" data-id="${mu.id}" data-kind="mueble"
       style="left:${mu.x}px; top:${mu.y}px; width:${mu.w}px; height:${mu.h}px">${mu.label||''}</div>`;
}

function updateTimers() {
  if (state.screen !== 'floor') return;
  state.mesas.forEach(m => {
    const ped = pedidoDeMesa(m.id); if (!ped) return;
    const btn = $(`.mesa[data-id="${m.id}"]`); if (!btn) return;
    const t = btn.querySelector('.timer'); if (t) t.textContent = timeAgo(ped.abierta_at);
  });
  if (state.screen === 'pedido' && state.pedidoAbiertoId) {
    const ped = state.pedidos.find(p => p.id === state.pedidoAbiertoId);
    if (ped && $('#ped-timer')) $('#ped-timer').textContent = timeAgo(ped.abierta_at);
  }
}

/* ========= BOTTOM SHEET (floor mode) ========= */
function openSheet(mesaId) {
  const mesa = state.mesas.find(m => m.id === mesaId); if (!mesa) return;
  state.mesaAbierta = mesa;
  const est = estadoMesa(mesa);
  $('#sheet-mark').textContent = mesa.numero;
  $('#sheet-mark').style.background = est==='libre'?'var(--primary-soft)':est==='abierta'?'var(--primary-soft)':est==='marchada'?'var(--tertiary)':est==='cuenta_pedida'?'var(--secondary)':'var(--surface)';
  $('#sheet-mark').style.color = est==='cuenta_pedida'?'white':'var(--ink)';
  $('#sheet-title').textContent = esBarra(mesa) ? 'Barra' : 'Mesa ' + mesa.numero;
  // CA-04: la barra gestiona múltiples tabs
  if (esBarra(mesa)) {
    const tabs = pedidosDeMesa(mesaId);
    $('#sheet-meta').textContent = ['BARRA', 'CAP ' + mesa.capacidad, tabs.length + ' tab(s)'].join(' · ');
    renderSheetBarra(mesa, tabs);
    $('#sheet-backdrop').classList.add('open');
    $('#sheet').classList.add('open');
    return;
  }
  const ped = pedidoDeMesa(mesaId);
  const meta = [(mesa.zona||'').toUpperCase(), 'CAP '+mesa.capacidad];
  if (ped) meta.push('TICKET #' + (ped.ticket_num||'?'));
  $('#sheet-meta').textContent = meta.join(' · ');
  if (est === 'libre') renderSheetLibre(mesa);
  else renderSheetOcupada(mesa, ped);
  $('#sheet-backdrop').classList.add('open');
  $('#sheet').classList.add('open');
}
// CA-04/CA-18: lista de tabs de la barra + abrir nueva tab
function renderSheetBarra(mesa, tabs) {
  const tabsHtml = tabs.length === 0
    ? '<div class="empty-state">Sin tabs abiertas en la barra.</div>'
    : tabs.map(t => {
        const mozo = state.empleados.find(e => e.id === t.mozo_id);
        const sus = t.estado === 'suspended';
        const nom = t.tab_nombre || ('Tab #' + t.ticket_num);
        return `<button class="mozo-item" data-tab="${t.id}">
          <span class="mozo-avatar" style="background:${sus?'var(--gray-soft)':'var(--primary-soft)'}">${(nom).charAt(0).toUpperCase()}</span>
          <span class="mozo-info">
            <span class="name">${nom}${sus?' · ⏸':''}</span>
            <span class="rol">#${t.ticket_num} · ${fmtMozo(mozo)} · ${t.comensales||1} asiento(s) · ${money(t.total)}</span>
          </span>
          <span class="material-symbols-outlined">chevron_right</span>
        </button>`;
      }).join('');
  $('#sheet-body').innerHTML = `
    <div class="sheet-section">
      <div class="sheet-section-label">Tabs abiertas en la barra</div>
      ${tabsHtml}
    </div>
    <div class="sheet-section">
      <button class="btn primary" id="btn-nueva-tab">
        <span class="material-symbols-outlined">add_circle</span>
        Abrir nueva tab
      </button>

  `;

    const t = tabs.find(x => x.id === b.dataset.tab);

    closeSheet();
    abrirPedidoScreen(b.dataset.tab);
  });

    <div class="sheet-section">
      <div class="sheet-section-label">Elegir nueva mesa</div>
      <div class="btn-grid">
        ${libres.map(m => `
          <button class="btn" data-target="${m.id}">
            <span class="material-symbols-outlined">table_restaurant</span>
            ${m.numero} · ${m.zona} · ${m.capacidad}p
          </button>
        `).join('')}

      </div>

/* ========= ACCIONES DB (pedido shell) ========= */
async function abrirPedido(mesa, comensales, tabNombre = null) {
  if (!state.mozoId) { closeSheet(); abrirPickerMozo(); toast('Primero elige el mozo en turno', 'warn'); return; }
  if (!state.turno) { toast('No hay turno abierto', 'err'); return; }
  const barra = esBarra(mesa);
  // Ticket: online consulta el último; offline usa el mayor local + 1
  let nextTicket = 1;
  if (PrepSync.online()) {
    try {
      const { data: nums } = await sb.from('ca_pedidos')
        .select('ticket_num').eq('local_id', LOCAL).eq('turno_id', state.turno.id)
        .order('ticket_num',{ascending:false}).limit(1);
      nextTicket = ((nums && nums[0]?.ticket_num) || 0) + 1;
    } catch (e) { nextTicket = (state.pedidos.reduce((m,p)=>Math.max(m, Number(p.ticket_num)||0), 0)) + 1; }
  } else {
    nextTicket = (state.pedidos.reduce((m,p)=>Math.max(m, Number(p.ticket_num)||0), 0)) + 1;
  }
  const row = {
    id: PrepSync.uuid(),
    ticket_num: nextTicket, marca_id: MARCA, local_id: LOCAL, turno_id: state.turno.id,
    mesa_id: mesa.id, comensales, mozo_id: state.mozoId,
    estado:'abierta', estado_servicio:'abierta', origen: barra ? 'barra' : 'salon',
    tab_nombre: tabNombre, abierta_at: new Date().toISOString(),
    subtotal:0, igv:0, servicio_pct:10, servicio_monto:0,
    descuento:0, propina_monto:0, total:0, moneda:'PEN', alergias_por_silla:{},
  };
  const { error, queued } = await PrepSync.write('ca_pedidos', 'insert', { values: row });
  if (error) { toast('Atrás: ' + error.message, 'err'); return; }
  state.pedidos.push(row);
  state.pedidoItemsCache[row.id] = [];
  PrepSync.cacheSet('pedidos', state.pedidos);
  logAudit('abrir_pedido', (barra?'tab barra':'mesa '+mesa.numero)+' · #'+row.ticket_num, row.id);
  toast((queued?'Sin conexión · ':'Va · ') + (barra ? 'tab ' + (tabNombre || '#'+row.ticket_num) + ' en barra' : 'pedido #' + row.ticket_num + ' en mesa ' + mesa.numero) + (queued?' (se sincroniza luego)':''), queued?'warn':'ok');
  closeSheet();
  abrirPedidoScreen(row.id);
}

async function venderGiftCard() {

    comprador_nombre: ($('#gc-comp-nombre').value || '').trim() || null,
    comprador_telefono: ($('#gc-comp-tel').value || '').trim() || null,

    expira_at: $('#gc-expira').value || null,
  };

    toast('Atrás: ' + (error.code === '23505' ? 'ese código ya existe' : error.message), 'err');

  }

async function buscarGiftCardRecarga() {
  const codigo = (gcState.recarga.codigo || $('#gc-rec-codigo').value || '').trim().toUpperCase();
  gcState.recarga.codigo = codigo;
  if (!codigo) { gcState.recarga.error = 'Ingresa un código'; gcState.recarga.card = null; renderGestorGiftCards(); return; }
  const { data, error } = await sb.from('ca_gift_cards')
    .select('id, codigo, saldo, estado, expira_at')
    .eq('marca_id', MARCA).eq('codigo', codigo).maybeSingle();

  else if (data.estado === 'anulada') { gcState.recarga = { codigo, card: null, error: 'Gift card anulada' }; }
  else { gcState.recarga = { codigo, card: data, error: null }; }

}

async function recargarGiftCard() {

      if (!confirm('Descartar cambios al plano?')) return;
    }
    await loadMesas(); await loadFloorPlan();
    state.screen = 'floor';
    state.edit = { selected:null, dirtyMesas:{}, dirtyMuebles:false, deletedMesas:new Set(), nuevasMesas:[] };
    render();
    closeSheet();
    return;
  }
  await saveLayout();
}

async function saveLayout() {
  const tasks = [];
  // UPDATE mesas dirty
  for (const id in state.edit.dirtyMesas) {
    tasks.push(sb.from('ca_mesas').update(state.edit.dirtyMesas[id]).eq('id', id));
  }
  // DELETE-style: soft delete via activa=false
  state.edit.deletedMesas.forEach(id => {
    tasks.push(sb.from('ca_mesas').update({ activa: false }).eq('id', id));
  });
  // INSERT nuevas mesas
  for (const m of state.edit.nuevasMesas) {
    tasks.push(sb.from('ca_mesas').insert({ ...m, marca_id: MARCA, local_id: LOCAL, activa: true }));
  }
  // UPSERT layout
  if (state.edit.dirtyMuebles && state.floorPlan) {
    const newLayout = {
      ...(state.floorPlan.layout || {}),
      muebles: state.muebles,
      canvas: { ancho: 580, alto: 320 },
    };
    if (state.zonas) newLayout.zonas = state.zonas;
    tasks.push(sb.from('ms_floor_plans').update({
      layout: newLayout, updated_at: new Date().toISOString(),
    }).eq('id', state.floorPlan.id));
  }

  if (tasks.length === 0) {
    toast('Sin cambios', 'warn');
    state.screen = 'floor'; render(); closeSheet(); return;
  }

  const results = await Promise.all(tasks);
  const failed = results.find(r => r.error);
  if (failed) { toast('Atrás: ' + failed.error.message, 'err'); return; }

  toast('Servido · plano guardado · ' + tasks.length + ' cambio(s)', 'ok');
  await loadMesas(); await loadFloorPlan();
  state.screen = 'floor';
  state.edit = { selected:null, dirtyMesas:{}, dirtyMuebles:false, deletedMesas:new Set(), nuevasMesas:[] };
  render();
  closeSheet();
}

function setupDragAndDrop() {
  const canvas = $('#canvas-inner');
  if (!canvas) return;
  let drag = null;
  const SNAP = 5; // snap a 5px

  canvas.addEventListener('pointerdown', (e) => {
    const target = e.target.closest('.mesa, .mueble');
    if (!target) return;
    e.preventDefault();
    const scale = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--canvas-scale')) || 1;
    drag = {
      el: target,
      kind: target.dataset.kind,
      id: target.dataset.id,
      startX: e.clientX, startY: e.clientY,
      origX: parseFloat(target.style.left), origY: parseFloat(target.style.top),
      scale,
      moved: false,
    };
    try { target.setPointerCapture(e.pointerId); } catch(_) {}
  });
  canvas.addEventListener('pointermove', (e) => {
    if (!drag) return;
    const dx = (e.clientX - drag.startX) / drag.scale;
    const dy = (e.clientY - drag.startY) / drag.scale;
    if (Math.abs(dx) > 1 || Math.abs(dy) > 1) drag.moved = true;
    let nx = Math.round((drag.origX + dx) / SNAP) * SNAP;
    let ny = Math.round((drag.origY + dy) / SNAP) * SNAP;
    drag.el.style.left = nx + 'px';
    drag.el.style.top  = ny + 'px';
  });
  canvas.addEventListener('pointerup', (e) => {
    if (!drag) return;
    if (drag.moved) {
      const nx = parseFloat(drag.el.style.left);
      const ny = parseFloat(drag.el.style.top);
      if (drag.kind === 'mesa') {
        const m = state.mesas.find(x => x.id === drag.id);
        if (m) { m.pos_x = nx; m.pos_y = ny; }
        state.edit.dirtyMesas[drag.id] = { ...(state.edit.dirtyMesas[drag.id]||{}), pos_x: nx, pos_y: ny };
      } else {
        const mu = state.muebles.find(x => x.id === drag.id);
        if (mu) { mu.x = nx; mu.y = ny; state.edit.dirtyMuebles = true; }
      }
      drag.el.dataset.justDragged = '1'; // bloquea el click subsiguiente
    }
    drag = null;
  });
  canvas.addEventListener('pointercancel', () => { drag = null; });
}

    if (!confirm('Eliminar mesa ' + m.numero + '? Se ocultará del plano.')) return;
    if (m.id.startsWith('new_')) {

      state.edit.nuevasMesas = state.edit.nuevasMesas.filter(x => x.id !== m.id);

function addMesa() {
  const existingNums = state.mesas.map(m => m.numero);
  let n = 1;
  while (existingNums.includes('M' + n)) n++;
  const id = 'new_' + uuid().slice(0, 8);
  const nueva = {
    id, numero: 'M' + n, capacidad: 4, forma: 'rectangular', zona: 'salón',
    pos_x: 200, pos_y: 150, ancho: 80, alto: 60, activa: true,
  };
  state.mesas.push(nueva);
  state.edit.nuevasMesas.push(nueva);
  state.edit.selected = { kind:'mesa', id };
  renderFloorScreen();
  openEditPanel('mesa', id);
  toast('Mesa nueva creada · ajusta posición y propiedades', 'ok');
}

function addMueble() {
  const id = 'fnew_' + uuid().slice(0, 8);
  const nuevo = { id, tipo:'pared', x:200, y:150, w:80, h:8, label:null };
  state.muebles.push(nuevo);
  state.edit.dirtyMuebles = true;
  state.edit.selected = { kind:'mueble', id };
  renderFloorScreen();
  openEditPanel('mueble', id);
}

async function abrirPedidoScreen(pedidoId) {
  state.pedidoAbiertoId = pedidoId;
  state.screen = 'pedido';
  state.sillaActiva = 1;
  await loadPedidoItems(pedidoId);

/* ========= ASIGNAR COMENSAL AL PEDIDO (CRM) ========= */
function abrirAsignarComensal(ped) {
  const actual = ped.cliente_id ? state.clientesCache[ped.cliente_id] : null;
  $('#item-modal-inner').innerHTML = `
    <div class="modal-head">
      <span class="icon">👤</span>
      <h3>Comensal del pedido</h3>
      <button class="sheet-close" id="ac-close"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div class="modal-body">
      ${actual ? `<div class="sheet-section">
        <div class="sheet-section-label">Asignado</div>
        <div class="item-row" style="border:2px solid var(--outline);border-radius:12px">
          <span class="nm"><strong>${nombreClientePOS(actual)}</strong>
            <span class="notas">${actual.telefono||''} · ${actual.total_visitas||0} visitas · ${actual.segmento||''}</span></span>
          <button class="ico-btn" id="ac-quitar" title="Quitar"><span class="material-symbols-outlined" style="font-size:16px">link_off</span></button>
        </div>
      </div>` : ''}
      <div class="sheet-section">
        <div class="sheet-section-label">Buscar comensal</div>
        <input class="input" id="ac-search" placeholder="Nombre o teléfono…" autocomplete="off">
        <div id="ac-results" style="margin-top:8px;display:flex;flex-direction:column;gap:6px"></div>
      </div>
      <div class="sheet-section">
        <div class="sheet-section-label">¿No está registrado?</div>
        <div style="display:flex;gap:8px">
          <input class="input" id="ac-nuevo-nombre" placeholder="Nombre" style="flex:1">
          <input class="input" id="ac-nuevo-tel" placeholder="Teléfono" style="flex:1" inputmode="tel">
        </div>
        <button class="btn dark" id="ac-crear" style="margin-top:8px"><span class="material-symbols-outlined">person_add</span>Crear y asignar</button>
      </div>
    </div>
    <div class="modal-foot"><button class="btn ghost" id="ac-cancel">Cerrar</button></div>
  `;
  $('#item-modal').classList.add('open');
  const cerrar = () => $('#item-modal').classList.remove('open');
  $('#ac-close').onclick = cerrar;
  $('#ac-cancel').onclick = cerrar;
  if ($('#ac-quitar')) $('#ac-quitar').onclick = () => asignarComensal(ped, null);
  const inp = $('#ac-search');
  inp.oninput = async () => {
    const q = inp.value.trim();
    const res = $('#ac-results');
    if (q.length < 2) { res.innerHTML = ''; return; }
    const { data } = await sb.from('ms_clientes')
      .select('id,nombre,apellidos,telefono,alergias,tags,segmento,total_visitas,ticket_promedio,platos_favoritos')
      .eq('marca_id', MARCA).or(`nombre.ilike.%${q}%,apellidos.ilike.%${q}%,telefono.ilike.%${q}%`).limit(8);
    res.innerHTML = (data||[]).map(c => `<button class="btn ghost" data-cid="${c.id}" style="justify-content:space-between">
        <span>${nombreClientePOS(c)} ${(c.tags||[]).some(t=>/vip/i.test(t))?'⭐':''}</span>
        <span class="mono" style="opacity:.6;font-size:11px">${c.telefono||''} · ${c.total_visitas||0}v</span></button>`).join('')
      || '<div class="empty-state" style="padding:14px">Sin resultados</div>';
    (data||[]).forEach(c => state.clientesCache[c.id] = c);
    $$('#ac-results [data-cid]').forEach(b => b.onclick = () => asignarComensal(ped, b.dataset.cid));
  };
  $('#ac-crear').onclick = async () => {
    const nombre = ($('#ac-nuevo-nombre').value||'').trim();
    if (!nombre) { toast('Ingresa un nombre', 'warn'); return; }
    const partes = nombre.split(' ');
    const { data, error } = await sb.from('ms_clientes').insert({
      marca_id: MARCA, nombre: partes.shift(), apellidos: partes.join(' ')||null,
      telefono: ($('#ac-nuevo-tel').value||'').trim()||null, origen:'manual',
    }).select().single();
    if (error) { toast('Atrás: '+error.message,'err'); return; }
    state.clientesCache[data.id] = data;
    asignarComensal(ped, data.id);
  };
}
async function asignarComensal(ped, clienteId) {
  const { error } = await sb.from('ca_pedidos').update({ cliente_id: clienteId }).eq('id', ped.id);
  if (error) { toast('Atrás: '+error.message,'err'); return; }
  ped.cliente_id = clienteId;
  const p = state.pedidos.find(x => x.id === ped.id); if (p) p.cliente_id = clienteId;
  $('#item-modal').classList.remove('open');
  if (clienteId) {
    const c = await cargarClienteCache(clienteId);
    render();
    toast('Va · comensal ' + nombreClientePOS(c) + ' asignado', 'ok');
    if (c && (c.alergias||[]).length) toast('⚠ Alergias de ' + nombreClientePOS(c) + ': ' + c.alergias.join(', '), 'warn');
  } else {
    render();
    toast('Comensal desvinculado', 'warn');
  }
}

function renderPedidoScreen() {
  const ped = state.pedidos.find(p => p.id === state.pedidoAbiertoId);
  if (!ped) { state.screen = 'floor'; render(); return; }
  const items = state.pedidoItemsCache[ped.id] || [];

  // Lista agrupada por silla
  const grupos = {};
  items.forEach(it => {
    const s = it.seat_position == null ? 0 : it.seat_position; // 0 = centro/compartido
    if (!grupos[s]) grupos[s] = [];
    grupos[s].push(it);
  });
  const sillas = Object.keys(grupos).map(Number).sort((a,b)=>a-b);

  const totalSilla = (s) => grupos[s].filter(it => !it.es_cortesia).reduce((acc, it) => acc + Number(it.precio_total||0), 0);

  // Alergias por silla (CA-22)
  const alergias = ped.alergias_por_silla || {};

  // CA-02: pendientes (oído) por curso → botones de marchar por tiempo
  const pendientesPorCurso = {};
  items.filter(it => it.estado === 'oido').forEach(it => {
    const c = it.course_step || 2; pendientesPorCurso[c] = (pendientesPorCurso[c]||0) + 1;
  });
  const courseMarcharBar = COURSES.filter(c => pendientesPorCurso[c.step]).map(c =>
    `<button class="btn-ico warn" data-marchar-course="${c.step}" style="margin:0 6px 8px 0">
       <span class="material-symbols-outlined">local_fire_department</span>
       <span>Marchar ${c.label} (${pendientesPorCurso[c.step]})</span>
     </button>`).join('');

  const grupoHtml = sillas.length === 0
    ? '<div class="empty-state">Pedido vacío.<br>Tap un ítem del menú para agregarlo.</div>'
    : sillas.map(s => {
        const items = grupos[s];
        const alergS = (alergias[String(s)] || []).join(', ');
        const isCentro = s === 0;
        const label = isCentro ? 'Centro · compartido' : 'Silla ' + s;
        return `
          <div class="silla-group">
            <div class="silla-head">
              <span class="badge ${isCentro?'centro':''}">${isCentro ? '★' : s}</span>
              <h3>${label}</h3>
              ${alergS ? `<span class="alergias"><span class="material-symbols-outlined" style="font-size:11px">warning</span>${alergS}</span>` : ''}
              <span class="total">${money(totalSilla(s))}</span>
            </div>
            ${items.map(it => `
              <div class="item-row ${it.urgente?'urgente':''}" data-iid="${it.id}">
                <span class="qty">×${it.qty}</span>
                <span class="nm">
                  <span class="estado" style="background:var(--gray-soft);color:var(--ink);margin-right:6px">${courseDe(it.course_step||2).short}</span>${it.nombre}
                  ${(Array.isArray(it.modificadores)&&it.modificadores.length)?`<span class="notas"><span class="material-symbols-outlined" style="font-size:10px">tune</span> ${it.modificadores.map(m=>m.nombre+(m.precio>0?' +'+money(m.precio):'')).join(' · ')}</span>`:''}
                  ${it.notas ? `<span class="notas"><span class="material-symbols-outlined" style="font-size:10px">edit_note</span> ${it.notas}</span>` : ''}
                </span>
                <span class="estado ${it.estado}">${({oido:'Oído',va:'Va',fuego:'En fuego',servido:'Servido',cancelado:'Cancelado'})[it.estado] || it.estado}</span>
                <span class="price">${money(it.precio_total)}</span>
                ${it.estado === 'oido' ? `
                  <button class="ico-btn" title="Eliminar" data-act="del">
                    <span class="material-symbols-outlined" style="font-size:16px">delete</span>
                  </button>` : ''}
              </div>
            `).join('')}
          </div>
        `;
      }).join('');

  // Menú
  const cats = subcategoriasMenu(state.menuTab);
  if (!cats.includes(state.menuSubtab)) state.menuSubtab = cats[0] || null;
  const recetasShown = recetasDe(state.menuTab, state.menuSubtab);

  // Sillas que existen en el pedido (CA-19): centro + 1..comensales
  const numSillas = ped.comensales || 1;
  const sillaBtns = [
    `<button class="silla-pick-btn centro ${state.sillaActiva===0?'active':''}" data-s="0">★<span class="sub">CENTRO</span></button>`,
    ...Array.from({length: numSillas}, (_, i) => i + 1).map(s =>
      `<button class="silla-pick-btn ${state.sillaActiva===s?'active':''}" data-s="${s}">${s}</button>`)
  ].join('');

  // Totals
  const sub = items.filter(it => !it.es_cortesia).reduce((a,it) => a + Number(it.precio_total||0), 0);
  const serv = sub * 0.10;
  const total = sub + serv;
  const igvIncluido = sub * 18 / 118;

  $('#screen').innerHTML = `
    <div class="pedido-screen">
      <div class="pedido-head">
        <div class="ticket-mark">${state.mesas.find(m => m.id === ped.mesa_id)?.numero || '?'}</div>
        <div class="info">

            ${ped.tab_nombre ? `<span>TAB · #${ped.ticket_num}</span>` : ''}

            <span>${items.filter(it=>it.estado==='oido').length} sin marchar</span>
            <span>Silla activa: ${state.sillaActiva===0?'CENTRO':state.sillaActiva}</span>
            ${ped.cliente_id && state.clientesCache[ped.cliente_id] ? `<span style="color:var(--primary);font-weight:700">👤 ${nombreClientePOS(state.clientesCache[ped.cliente_id])}</span>` : ''}
          </div>
        </div>
        <div class="actions">
          <button class="btn-ico ${ped.cliente_id?'primary':''}" id="btn-comensal-ped">

          <button class="btn-ico" id="btn-alergias-ped">

            <span>Alergias</span>
          </button>
          <button class="btn-ico" id="btn-precuenta-ped">
            <span class="material-symbols-outlined">receipt_long</span>
            <span>Pre-cuenta</span>
          </button>
          <button class="btn-ico ghost" id="btn-suspender-ped">
            <span class="material-symbols-outlined">pause</span>
            <span>Suspender</span>
          </button>
        </div>
      </div>

      <div class="items-col">
        <div class="sheet-section-label" style="padding:0 4px 8px">
          Asignar siguiente ítem a:
        </div>
        <div class="silla-picker" style="margin-bottom:14px; padding:0 4px">
          ${sillaBtns}

        <div class="menu-tabs">
          <button class="menu-tab ${state.menuTab==='cocina'?'active':''}" data-m="cocina">Cocina</button>

          ${recetasShown.map(r => `
