async function validarGiftCard() {
  const codigo = (state.cobro.gift_input.codigo || '').trim().toUpperCase();
  if (!codigo) { state.cobro.gift_input.error = 'Ingresa un código'; render(); return; }
  const { data, error } = await sb.from('ca_gift_cards')
    .select('id, saldo, estado, expira_at')
    .eq('marca_id', MARCA).eq('codigo', codigo).maybeSingle();
  if (error || !data) {
    state.cobro.gift_input = { codigo, saldo:null, gift_id:null, error:'No existe esta gift card' }; render(); return;
  }
  if (data.estado !== 'activa') {
    state.cobro.gift_input = { codigo, saldo:null, gift_id:null, error:'Gift card ' + data.estado }; render(); return;
  }
  if (data.expira_at && new Date(data.expira_at) < new Date()) {
    state.cobro.gift_input = { codigo, saldo:null, gift_id:null, error:'Gift card expirada' }; render(); return;
  }
  if (Number(data.saldo) <= 0) {
    state.cobro.gift_input = { codigo, saldo:0, gift_id:data.id, error:'Sin saldo' }; render(); return;
  }
  state.cobro.gift_input = { codigo, saldo:Number(data.saldo), gift_id:data.id, error:null };
  render();
}

function agregarPagoLocal(monto, recibido, vuelto) {
  if (monto <= 0) { toast('Monto inválido', 'warn'); return; }
  const M = state.cobro.metodo_actual;
  const pago = { metodo: M, monto: +monto.toFixed(2) };
  if (M === 'efectivo') {
    if (recibido < monto) { toast('Recibido menor al monto', 'warn'); return; }
    pago.recibido = +recibido.toFixed(2);
    pago.vuelto = +vuelto.toFixed(2);
  } else if (M === 'gift_card') {
    const G = state.cobro.gift_input;
    if (!G.gift_id) { toast('Valida la gift card primero', 'warn'); return; }
    if (monto > G.saldo) { toast('Monto excede el saldo de la gift card', 'warn'); return; }
    pago.gift_card = { id: G.gift_id, codigo: G.codigo, saldo_previo: G.saldo };
  } else if (['yape','plin','mercadopago','izipay'].includes(M)) {
    if (!state.cobro.ref_input) { toast('Ingresa el código de operación', 'warn'); return; }
    pago.ref_externa = state.cobro.ref_input;
  } else if (['visa','mastercard','amex'].includes(M)) {
    pago.ref_externa = state.cobro.ref_input || null;
  }
  state.cobro.pagos.push(pago);
  state.cobro.monto_input = '';
  state.cobro.ref_input = '';
  state.cobro.recibido_input = '';
  state.cobro.gift_input = { codigo:'', saldo:null, gift_id:null, error:null };
  toast('Va · pago de ' + money(monto) + ' (' + pagoLabel(M) + ')', 'ok');
  render();
}

function abrirDialogoCortesia(itemId) {
  const ped = state.pedidos.find(p => p.id === state.pedidoAbiertoId);
  const items = state.pedidoItemsCache[ped.id] || [];
  const item = items.find(it => it.id === itemId);
  if (!item) return;

  const cortesiaLocal = state.cobro.cortesias.find(c => c.item_id === itemId);
  const cortesiaPersist = state.cobro.cortesiasPersistidas.find(c => c.item_id === itemId);

  if (cortesiaLocal) {
    if (confirm('Quitar cortesía de "' + item.nombre + '"?')) {
      state.cobro.cortesias = state.cobro.cortesias.filter(c => c.item_id !== itemId);
      render();
    }
    return;
  }
  if (cortesiaPersist) {
    toast('Esta cortesía ya fue aprobada y registrada', 'warn');
    return;
  }

  $('#sheet-mark').textContent = '🎁';
  $('#sheet-mark').style.background = 'var(--green-soft)';
  $('#sheet-mark').style.color = 'var(--ink)';
  $('#sheet-title').textContent = 'Cortesía';
  $('#sheet-meta').textContent = item.nombre + ' · ' + money(item.precio_total);
  const motivos = ['Cumpleaños', 'Cliente recurrente', 'Demora en cocina', 'Plato no satisfactorio', 'Cortesía de la casa', 'Promoción', 'Otra'];
  $('#sheet-body').innerHTML = `
    <div class="sheet-section">
      <div class="sheet-section-label">¿Por qué se invita este ítem?</div>
      <div class="chips" id="motivo-chips">
        ${motivos.map(m => `<button class="chip" data-m="${m}">${m}</button>`).join('')}
      </div>
      <textarea class="input" id="motivo-notas" rows="2" placeholder="Notas adicionales (opcional)" style="margin-top:10px"></textarea>
    </div>
    <div class="sheet-section">
      <div class="sheet-section-label">Monto a invitar</div>
      <div class="prop-row">
        <label>Invitar 100% (${money(item.precio_total)})</label>
        <button class="btn primary" style="width:auto;min-width:120px" id="cort-full">Aplicar</button>
      </div>
      <div class="prop-row" style="gap:8px">
        <label style="flex:0 0 auto">Parcial</label>
        <input class="input" id="cort-parcial" type="number" step="0.10" max="${item.precio_total}" placeholder="0.00" style="max-width:120px">
        <button class="btn warn" id="cort-parcial-go" style="width:auto;min-width:100px">Aplicar</button>
      </div>
    </div>
    <div class="sheet-section">
      <div style="font-size:11px;font-family:var(--font-mono);opacity:0.65;padding:10px;background:var(--amber-soft);border:1px dashed var(--outline);border-radius:8px">
        ⚠ La cortesía queda registrada en auditoría con el mozo en turno como solicitante. En producción debe aprobarla un gerente.
      </div>
    </div>
    <div class="sheet-section">
      <button class="btn ghost" id="cort-cancel">Atrás</button>
    </div>
  `;
  $('#sheet-backdrop').classList.add('open');
  $('#sheet').classList.add('open');

  let motivoSel = null;
  $$('#motivo-chips .chip').forEach(b => b.onclick = () => {
    $$('#motivo-chips .chip').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    motivoSel = b.dataset.m;
  });
  const aplicar = (montoCort) => {
    if (!motivoSel) { toast('Selecciona un motivo', 'warn'); return; }
    if (!(montoCort > 0) || montoCort > Number(item.precio_total) + 0.01) { toast('Monto inválido', 'warn'); return; }
    const notas = $('#motivo-notas').value;
    state.cobro.cortesias.push({
      tmp_id: 'cort_' + Date.now(),
      item_id: itemId,
      monto: +montoCort.toFixed(2),
      motivo: motivoSel + (notas ? ' · ' + notas : ''),
    });
    closeSheet();
    render();
    toast('Va · cortesía aplicada', 'ok');
  };
  $('#cort-full').onclick = () => aplicar(Number(item.precio_total));
  $('#cort-parcial-go').onclick = () => aplicar(+$('#cort-parcial').value);
  $('#cort-cancel').onclick = closeSheet;
}

async function confirmarCobro() {
  const ped = state.pedidos.find(p => p.id === state.pedidoAbiertoId);
  if (!ped) return;
  const T = calcularTotalesCobro(ped);
  if (T.pendiente > 0.01) { toast('Aún falta ' + money(T.pendiente), 'warn'); return; }

  const C = state.cobro.comprobante;
  if (C.tipo === 'factura') {
    if (!(C.doc||'').match(/^\d{11}$/)) { toast('RUC inválido (11 dígitos)', 'err'); return; }
    if (!(C.nombre||'').trim()) { toast('Razón social requerida', 'err'); return; }
  }
  if (C.tipo === 'boleta' && C.doc && !(C.doc||'').match(/^\d{8}$/)) {
    toast('DNI inválido (8 dígitos) — déjalo vacío si no aplica', 'err'); return;
  }
  if (!confirm('Cerrar mesa y registrar cobro?\nTotal: ' + money(T.total) + '\nPagos: ' + (state.cobro.pagos.length+state.cobro.pagosPersistidos.length))) return;

  const pagado_at = new Date().toISOString();
  try {
    // 1. ca_pagos
    const pagosInsert = state.cobro.pagos.map(p => ({
      pedido_id: ped.id,
      metodo: p.metodo,
      monto: p.monto,
      moneda: 'PEN',
      ref_externa: p.ref_externa || null,
      gift_card_id: p.gift_card ? p.gift_card.id : null,
      recibido: p.recibido || null,
      vuelto: p.vuelto || null,
      pagado_at,
    }));
    if (pagosInsert.length) {
      const r = await sb.from('ca_pagos').insert(pagosInsert);
      if (r.error) throw new Error('Pagos: ' + r.error.message);
    }
    // 2. Gift cards (decrementar saldo)
    for (const p of state.cobro.pagos) {
      if (p.gift_card) {
        const nuevoSaldo = +(p.gift_card.saldo_previo - p.monto).toFixed(2);
        const r = await sb.from('ca_gift_cards').update({
          saldo: nuevoSaldo,
          estado: nuevoSaldo <= 0.01 ? 'agotada' : 'activa',
        }).eq('id', p.gift_card.id);
        if (r.error) throw new Error('Gift card: ' + r.error.message);
      }
    }
    // 3. ca_cortesias
    const cortesiasInsert = state.cobro.cortesias.map(c => ({
      pedido_id: ped.id,
      item_id: c.item_id || null,
      tipo: c.item_id ? 'item' : 'global',
      monto: c.monto,
      motivo: c.motivo,
      solicitada_por: state.mozoId || null,
      aprobada_por: state.mozoId || null,
      aprobada_at: pagado_at,
    }));
    if (cortesiasInsert.length) {
      const r = await sb.from('ca_cortesias').insert(cortesiasInsert);
      if (r.error) throw new Error('Cortesías: ' + r.error.message);
    }
    // 4. ca_propinas
    if (T.propina > 0) {
      const metodoPropina = state.cobro.pagos[0]?.metodo || 'mixto';
      const r = await sb.from('ca_propinas').insert({
        pedido_id: ped.id,
        mozo_id: ped.mozo_id,
        turno_id: state.turno?.id || null,
        monto: T.propina,
        metodo: metodoPropina,
      });
      if (r.error) throw new Error('Propina: ' + r.error.message);
    }
    // 5. Cierre del pedido
    const updPed = {
      subtotal: T.sub_neto,
      descuento: T.cortesias_total,
      igv: T.igv_incl,
      servicio_monto: T.servicio_monto,
      propina_monto: T.propina,
      total: T.total,
      estado: 'pagada',
      estado_servicio: 'pagada',
      cerrada_at: pagado_at,
      pagado_at,
      comprobante_tipo: C.tipo,
      comprobante_doc: C.doc || null,
      comprobante_nombre: C.nombre || null,
      comprobante_email: C.email || null,
      comprobante_emitido: false,
    };
    const r5 = await sb.from('ca_pedidos').update(updPed).eq('id', ped.id);
    if (r5.error) throw new Error('Pedido: ' + r5.error.message);

    toast('Servido · mesa cerrada · ' + money(T.total), 'ok');
    await loadPedidos();
    state.screen = 'floor';
    state.pedidoAbiertoId = null;
    render();
  } catch (err) {
    console.error(err);
    toast('Atrás · ' + (err.message || 'fallo al cobrar'), 'err');
  }
}

/* ========= REALTIME ========= */
function subscribe() {
  if (state.channel) sb.removeChannel(state.channel);
  state.channel = sb.channel('pos_v2_floor_' + LOCAL)
    .on('postgres_changes', { event: '*', schema:'public', table:'ca_pedidos', filter:'local_id=eq.'+LOCAL },
        async () => {
          await loadPedidos();
          render();
          if (state.mesaAbierta && $('#sheet').classList.contains('open')) openSheet(state.mesaAbierta.id);
        })
    .on('postgres_changes', { event: '*', schema:'public', table:'ca_mesas', filter:'local_id=eq.'+LOCAL },
        async () => { if (state.screen !== 'edit') { await loadMesas(); render(); } })
    .on('postgres_changes', { event: '*', schema:'public', table:'ca_pedido_items' },
        async (payload) => {
          // Solo reaccionar si el pedido afectado está en cache o abierto
          const pedidoId = payload.new?.pedido_id || payload.old?.pedido_id;
          if (state.pedidoItemsCache[pedidoId] || state.pedidoAbiertoId === pedidoId) {
            await loadPedidoItems(pedidoId);
            if (state.screen === 'pedido' && state.pedidoAbiertoId === pedidoId) render();
          }
        })
    .subscribe();
}

/* ========= WIRE UP ========= */
$('#sheet-backdrop').addEventListener('click', () => { closeSheet(); if (state.screen==='edit') { state.edit.selected=null; renderFloorScreen(); } });
$('#sheet-close').addEventListener('click', () => { closeSheet(); if (state.screen==='edit') { state.edit.selected=null; renderFloorScreen(); } });
$('#mozo-dialog-close').addEventListener('click', () => $('#mozo-dialog').classList.remove('open'));
$('#mozo-dialog').addEventListener('click', (e) => { if (e.target === $('#mozo-dialog')) $('#mozo-dialog').classList.remove('open'); });
$('#item-modal').addEventListener('click', (e) => { if (e.target === $('#item-modal')) $('#item-modal').classList.remove('open'); });
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeSheet();
    $('#mozo-dialog').classList.remove('open');
    $('#item-modal').classList.remove('open');
    if (state.screen==='edit') { state.edit.selected=null; renderFloorScreen(); }
  }
});

/* ========= BOOT ========= */
loadAll().catch(err => {
  console.error(err);
  $('#boot .msg').textContent = 'Atrás · ' + (err.message || 'fallo de conexión');
  $('#boot .spinner').style.borderTopColor = 'var(--secondary)';
});
</script>

</body>
