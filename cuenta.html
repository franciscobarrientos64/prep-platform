<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#fcf9f8">
<title>Mi cuenta · Prep!</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231e5af9'/><text x='50' y='70' font-family='sans-serif' font-weight='900' font-size='60' fill='%23fcf9f8' text-anchor='middle'>p!</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="manifest" href="/manifest.webmanifest">
<script src="/offline.js"></script>
<script src="/auth-guard.js"></script>
<style>
:root{--primary:#1e5af9;--secondary:#ff3b30;--tertiary:#ffcc00;--bg:#fcf9f8;--surface:#fff;--ink:#171c20;--outline:#000;--primary-soft:#d6e2ff;--gray-soft:#dfe3e8;--green:#10b981;--shadow-sm:4px 4px 0 0 #000;--shadow:8px 8px 0 0 #000;--font-display:'Bagel Fat One',system-ui,sans-serif;--font-body:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',ui-monospace,monospace;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh}
.material-symbols-outlined{font-size:20px;line-height:1;vertical-align:middle}
.header{background:var(--bg);border-bottom:2px solid var(--outline);padding:10px 16px;display:flex;align-items:center;gap:14px;min-height:60px}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{position:relative;width:92px;height:30px;display:block}.brand-logo .l{position:absolute;inset:0;-webkit-mask:url(/logo.png) left center/contain no-repeat;mask:url(/logo.png) left center/contain no-repeat;background:var(--ink)}
.brand-txt .cli{font-weight:700;font-size:14px}.brand-txt .mod{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;opacity:.6}
.wrap{max-width:440px;margin:30px auto;padding:0 16px}
.card{background:var(--surface);border:2px solid var(--outline);border-radius:18px;box-shadow:var(--shadow);padding:24px}
h1{font-family:var(--font-display);font-size:24px;margin-bottom:4px}
.who{font-family:var(--font-mono);font-size:12px;opacity:.65;margin-bottom:20px}
label{font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;opacity:.6;display:block;margin:14px 0 6px}
input{width:100%;padding:12px 14px;border:2px solid var(--outline);border-radius:12px;font-size:15px;font-family:var(--font-body);background:var(--surface)}
.btn{width:100%;margin-top:20px;padding:14px;border:2px solid var(--outline);border-radius:14px;font-weight:700;font-size:15px;background:var(--primary);color:#fff;box-shadow:var(--shadow-sm);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn.ghost{background:var(--surface);color:var(--ink);box-shadow:none;border-style:dashed;margin-top:10px}
.msg{margin-top:14px;font-size:13px;text-align:center;min-height:18px;font-weight:600}.msg.err{color:var(--secondary)}.msg.ok{color:var(--green)}
.hint{font-family:var(--font-mono);font-size:11px;opacity:.55;margin-top:6px}
</style>
</head>
<body>
<header class="header">
  <div class="brand"><a href="/" class="brand-logo"><span class="l"></span></a><div class="brand-txt"><div class="cli"></div><div class="mod">Mi cuenta</div></div></div>
</header>
<div class="wrap">
  <div class="card">
    <h1>Cambiar contraseña</h1>
    <div class="who" id="who">—</div>
    <label>Nueva contraseña</label>
    <input id="np" type="password" autocomplete="new-password" placeholder="Mínimo 6 caracteres">
    <label>Repite la nueva contraseña</label>
    <input id="np2" type="password" autocomplete="new-password" placeholder="••••••••">
    <div class="hint">Tip: usa una frase fácil de recordar y difícil de adivinar.</div>
    <button class="btn" id="save"><span class="material-symbols-outlined">lock_reset</span>Guardar contraseña</button>
    <button class="btn ghost" id="back">← Volver al inicio</button>
    <div class="msg" id="msg"></div>
  </div>
</div>
<script>
const SB_URL='https://jmkvphayyhwzootlybde.supabase.co',SB_KEY='sb_publishable_0-znERv1Ok0Dw-Re44eksw_QAOqDc8M';
const sb=supabase.createClient(SB_URL,SB_KEY);
const $=s=>document.querySelector(s);
function msg(t,cls){const m=$('#msg');m.textContent=t;m.className='msg '+(cls||'')}
(async()=>{
  let sess=null;try{sess=(await sb.auth.getSession()).data.session;}catch(e){}
  if(!sess||!sess.user){location.href='/login?next=/cuenta';return}
  $('#who').textContent=sess.user.email;
})();
$('#back').onclick=()=>location.href='/';
$('#save').onclick=async()=>{
  const a=$('#np').value,b=$('#np2').value;
  if(a.length<6){msg('Mínimo 6 caracteres','err');return}
  if(a!==b){msg('Las contraseñas no coinciden','err');return}
  msg('Guardando…');
  const{error}=await sb.auth.updateUser({password:a});
  if(error){msg(error.message,'err');return}
  try{await sb.rpc('prep_clear_must_change')}catch(e){}
  msg('✓ Contraseña actualizada','ok');
  $('#np').value='';$('#np2').value='';
};
</script>
</body>
</html>
