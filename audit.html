<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#fcf9f8">
<title>Auditoría · POS · Prep</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231e5af9'/><text x='50' y='70' font-family='sans-serif' font-weight='900' font-size='60' fill='%23fcf9f8' text-anchor='middle'>p!</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="manifest" href="/manifest.webmanifest">
<script src="/offline.js"></script>
<script src="/auth-guard.js"></script>
<script src="/tenant.js"></script>
<script src="/client-name.js"></script>
<style>
:root{--primary:#1e5af9;--secondary:#ff3b30;--bg:#fcf9f8;--surface:#fff;--ink:#171c20;--mut:#6b7280;--shadow-sm:4px 4px 0 0 #000;--font-display:'Bagel Fat One',system-ui,sans-serif;--font-body:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink)}
.header{background:var(--bg);border-bottom:2px solid #000;padding:12px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.brand-logo{position:relative;display:block;width:96px;height:30px;flex-shrink:0}.brand-logo .l{position:absolute;inset:0;-webkit-mask:url(/logo.png) left center/contain no-repeat;mask:url(/logo.png) left center/contain no-repeat;background:var(--ink)}
.brand-txt .cli{font-weight:700;font-size:14px}.brand-txt .mod{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;opacity:.6}
.wrap{max-width:900px;margin:0 auto;padding:18px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:7px 13px;border:2px solid #000;border-radius:999px;background:var(--surface);font-weight:600;font-size:12px;cursor:pointer}.chip.active{background:var(--primary);color:#fff}
.row{background:var(--surface);border:2px solid #000;border-radius:12px;box-shadow:var(--shadow-sm);padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px}
.row .ic{width:34px;height:34px;border-radius:9px;border:2px solid #000;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.row .b{flex:1;min-width:0}.row .ac{font-weight:700;font-size:14px;text-transform:capitalize}.row .de{font-family:var(--font-mono);font-size:12px;color:var(--mut)}
.row .rt{text-align:right;font-family:var(--font-mono);font-size:11px;color:var(--mut)}
.empty{text-align:center;padding:50px;font-family:var(--font-mono);color:var(--mut)}
</style>
</head>
<body>
<header class="header"><a href="/pos" class="brand-logo"><span class="l"></span></a><div class="brand-txt"><div class="cli"></div><div class="mod">Auditoría · POS</div></div></header>
<main class="wrap"><div class="chips" id="filtros"></div><div id="list"><div class="empty">Cargando…</div></div></main>
<script>
const SB_URL='https://jmkvphayyhwzootlybde.supabase.co',SB_KEY='sb_publishable_0-znERv1Ok0Dw-Re44eksw_QAOqDc8M';
const sb=supabase.createClient(SB_URL,SB_KEY);
const MARCA=(window.PREP_MARCA||'m6'),LOCAL=(window.PREP_LOCAL||'l11');
const $=s=>document.querySelector(s),$$=s=>Array.from(document.querySelectorAll(s));
const money=n=>'S/ '+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const ICO={abrir_pedido:['table_restaurant','#1e5af9'],agregar_item:['add','#10b981'],cobro:['point_of_sale','#0d3d34'],cancelar_pedido:['cancel','#ff3b30'],cortesia:['redeem','#d4a000']};
let data=[],filtro='todas';
function fechaHora(ts){const d=new Date(ts);return d.toLocaleDateString('es-PE')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
async function load(){
  const{data:d}=await sb.from('ca_audit').select('*').eq('local_id',LOCAL).order('created_at',{ascending:false}).limit(300);
  data=d||[];render();
}
function render(){
  const accs=['todas',...new Set(data.map(x=>x.accion))];
  $('#filtros').innerHTML=accs.map(a=>`<button class="chip ${filtro===a?'active':''}" data-f="${a}">${a==='todas'?'Todas':a.replace('_',' ')}</button>`).join('');
  $$('#filtros .chip').forEach(b=>b.onclick=()=>{filtro=b.dataset.f;render()});
  const fl=filtro==='todas'?data:data.filter(x=>x.accion===filtro);
  $('#list').innerHTML=fl.length?fl.map(x=>{const ic=ICO[x.accion]||['history','#6b7280'];
    return `<div class="row"><div class="ic" style="color:${ic[1]}"><span class="material-symbols-outlined">${ic[0]}</span></div><div class="b"><div class="ac">${x.accion.replace('_',' ')}</div><div class="de">${x.detalle||''}${x.monto!=null?(' · '+money(x.monto)):''}</div></div><div class="rt">${x.usuario||'—'}<br>${fechaHora(x.created_at)}</div></div>`}).join(''):'<div class="empty">Sin registros.</div>';
}
load();
</script>
</body>
</html>
