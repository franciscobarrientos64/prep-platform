<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#171c20">
<title>Prep · Negocio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231e5af9'/><text x='50' y='70' font-family='sans-serif' font-weight='900' font-size='60' fill='%23fcf9f8' text-anchor='middle'>p!</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="manifest" href="/manifest.webmanifest">
<script src="/offline.js"></script>
<script src="/auth-guard.js"></script>
<style>
:root{--primary:#1e5af9;--secondary:#ff3b30;--tertiary:#ffcc00;--bg:#11151a;--surface:#1c2128;--ink:#f3f5f7;--green:#10b981;--amber:#d4a000;--muted:#8b949e;--shadow-sm:4px 4px 0 0 #000;--shadow:6px 6px 0 0 #000;--font-display:'Bagel Fat One',system-ui,sans-serif;--font-body:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',ui-monospace,monospace;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
.material-symbols-outlined{font-size:20px;line-height:1;vertical-align:middle}.mono{font-family:var(--font-mono)}
.header{background:#0c0f13;border-bottom:2px solid #000;padding:12px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.brand-logo{position:relative;display:block;width:96px;height:30px;flex-shrink:0}.brand-logo .l{position:absolute;inset:0;-webkit-mask:url(/logo.png) left center/contain no-repeat;mask:url(/logo.png) left center/contain no-repeat;background:#fff}
.brand-txt .cli{font-weight:700;font-size:14px}.brand-txt .mod{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
a.linkbtn{margin-left:auto;display:inline-flex;gap:6px;align-items:center;font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--ink);text-decoration:none;border:2px solid #000;border-radius:999px;padding:6px 12px;background:var(--surface)}
.wrap{max-width:1100px;margin:0 auto;padding:18px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{padding:8px 16px;border:2px solid #000;border-radius:999px;background:var(--surface);color:var(--ink);font-weight:700;font-size:13px;cursor:pointer}.tab.active{background:var(--primary);color:#fff}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:var(--surface);border:2px solid #000;border-radius:14px;padding:14px 16px}.kpi .v{font-family:var(--font-display);font-size:24px;color:var(--primary)}.kpi .l{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;color:var(--muted);margin-top:4px}
.kpi.good .v{color:var(--green)}.kpi.bad .v{color:var(--secondary)}
.row{background:var(--surface);border:2px solid #000;border-radius:14px;box-shadow:var(--shadow-sm);padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.row .info{flex:1;min-width:160px}.row .info h3{font-size:16px;font-weight:700}.row .info .meta{font-family:var(--font-mono);font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;margin-top:3px}
.row .price{font-family:var(--font-display);font-size:20px}
.badge{font-family:var(--font-mono);font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 9px;border-radius:999px;border:2px solid #000}
.badge.activo{background:var(--green);color:#fff}.badge.trial{background:var(--tertiary)}.badge.moroso{background:var(--secondary);color:#fff}.badge.cancelado{background:#3a4250}
.mini-btn{display:inline-flex;align-items:center;gap:4px;padding:7px 11px;border:2px solid #000;border-radius:999px;background:var(--surface);color:var(--ink);font-weight:700;font-size:12px;cursor:pointer}
.mini-btn.pri{background:var(--primary);color:#fff}
.empty{text-align:center;padding:40px;font-family:var(--font-mono);font-size:13px;color:var(--muted)}
.inp,select.inp{padding:10px 12px;border:2px solid #000;border-radius:10px;background:var(--surface);color:var(--ink);font-size:14px;width:100%;font-family:var(--font-body)}
.lbl{font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);margin:10px 0 6px;display:block}
.chips{display:flex;gap:6px;flex-wrap:wrap}.chip{padding:7px 12px;border:2px solid #000;border-radius:999px;background:var(--surface);color:var(--ink);font-weight:700;font-size:12px;cursor:pointer}.chip.active{background:var(--primary);color:#fff}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border:2px solid #000;border-radius:12px;font-weight:700;background:var(--primary);color:#fff;cursor:pointer;margin-top:8px}
.btn.ghost{background:var(--surface);color:var(--ink)}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:80;opacity:0;pointer-events:none;transition:opacity .18s}.backdrop.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:90;background:var(--surface);border-top:3px solid #000;border-radius:24px 24px 0 0;transform:translateY(100%);transition:transform .25s;max-height:92vh;display:flex;flex-direction:column;max-width:560px;margin:0 auto}
.sheet.open{transform:translateY(0)}.sheet-head{padding:16px 22px 12px;border-bottom:2px solid #000;display:flex;justify-content:space-between;align-items:center}.sheet-head h2{font-family:var(--font-display);font-size:20px}
.sheet-close{width:36px;height:36px;border:2px solid #000;border-radius:50%;background:var(--surface);color:var(--ink);cursor:pointer}
.sheet-body{padding:16px 22px 26px;overflow-y:auto}
.toast{position:fixed;top:16px;right:16px;z-index:200;background:#000;color:#fff;border:2px solid var(--primary);border-radius:12px;padding:11px 16px;font-weight:600}
.boot{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:300;transition:opacity .3s}.boot.gone{opacity:0;pointer-events:none}.boot .l{width:200px;height:60px;-webkit-mask:url(/logo.png) center/contain no-repeat;mask:url(/logo.png) center/contain no-repeat;background:#fff}
</style>
</head>
<body>
<div id="boot" class="boot"><div class="l"></div></div>
<header class="header">
  <a href="/" class="brand-logo" title="Inicio"><span class="l"></span></a>
  <div class="brand-txt"><div class="cli">Prep · Negocio</div><div class="mod">Suscripciones · Pagos · Facturación</div></div>
  <a class="linkbtn" href="/prep"><span class="material-symbols-outlined" style="font-size:16px">tune</span>Consola</a>
</header>
<main class="wrap" id="screen"></main>
<div class="backdrop" id="backdrop"></div>
<aside class="sheet" id="sheet"><div class="sheet-head"><h2 id="st">—</h2><button class="sheet-close" id="sc">✕</button></div><div class="sheet-body" id="sb"></div></aside>
<script>
const SB_URL='https://jmkvphayyhwzootlybde.supabase.co',SB_KEY='sb_publishable_0-znERv1Ok0Dw-Re44eksw_QAOqDc8M';
const sb=supabase.createClient(SB_URL,SB_KEY);
const $=s=>document.querySelector(s),$$=s=>Array.from(document.querySelectorAll(s));
const PRECIO_MODULO=49; const PLANES=['Starter','Pro','Full'];
const state={marcas:[],subs:[],pagos:[],mm:[],view:'subs'};
function money(n){return 'S/ '+Number(n||0).toLocaleString('en-US',{maximumFractionDigits:0})}
function hoyISO(){const d=new Date();return d.toISOString().slice(0,10)}
function mesAct(){return hoyISO().slice(0,7)}
function addMes(iso,n){const[y,m,d]=iso.split('-').map(Number);const dt=new Date(y,(m-1)+n,d);return dt.toISOString().slice(0,10)}
function toast(m){const e=document.createElement('div');e.className='toast';e.textContent=m;document.body.appendChild(e);setTimeout(()=>{e.style.opacity='0';e.style.transition='opacity .3s';setTimeout(()=>e.remove(),300)},2000)}
function openS(){$('#backdrop').classList.add('open');$('#sheet').classList.add('open')}
function closeS(){$('#backdrop').classList.remove('open');$('#sheet').classList.remove('open')}
function marcaNom(id){const m=state.marcas.find(x=>x.id===id);return m?m.nombre:id}
function sub(id){return state.subs.find(s=>s.marca_id===id)}
function modCount(id){return state.mm.filter(x=>x.marca_id===id&&x.activo).length}

async function guard(){let s=null;try{s=(await sb.auth.getSession()).data.session;}catch(e){}
  if(s&&s.user){const me=(await sb.from('prep_usuarios').select('rol_sistema').eq('email',s.user.email).maybeSingle()).data;if(!me||me.rol_sistema!=='superadmin'){alert('Solo Super Admin.');location.href='/';return false}}return true}
async function load(){
  if(!(await guard()))return;
  const[ma,su,pa,mm]=await Promise.all([sb.from('inv_marcas').select('*').order('id'),sb.from('prep_suscripciones').select('*'),sb.from('prep_pagos').select('*').order('fecha',{ascending:false}),sb.from('prep_marca_modulos').select('*')]);
  state.marcas=ma.data||[];state.subs=su.data||[];state.pagos=pa.data||[];state.mm=mm.data||[];
  render();$('#boot').classList.add('gone');
}
function render(){
  const mrr=state.subs.filter(s=>s.estado==='activo').reduce((a,s)=>a+Number(s.precio_mensual||0),0);
  const recMes=state.pagos.filter(p=>(p.fecha||'').slice(0,7)===mesAct()&&p.estado==='pagado').reduce((a,p)=>a+Number(p.monto||0),0);
  const morosos=state.subs.filter(s=>s.estado==='moroso');
  $('#screen').innerHTML=`
    <div class="kpis">
      <div class="kpi good"><div class="v">${money(mrr)}</div><div class="l">MRR (ingreso mensual)</div></div>
      <div class="kpi"><div class="v">${money(mrr*12)}</div><div class="l">ARR proyectado</div></div>
      <div class="kpi"><div class="v">${state.subs.filter(s=>s.estado==='activo').length}</div><div class="l">Clientes activos</div></div>
      <div class="kpi"><div class="v">${state.subs.filter(s=>s.estado==='trial').length}</div><div class="l">En trial</div></div>
      <div class="kpi bad"><div class="v">${morosos.length}</div><div class="l">Morosos (${money(morosos.reduce((a,s)=>a+Number(s.precio_mensual||0),0))})</div></div>
      <div class="kpi"><div class="v">${money(recMes)}</div><div class="l">Recaudado este mes</div></div>
    </div>
    <div class="tabs"><button class="tab ${state.view==='subs'?'active':''}" data-v="subs">Suscripciones</button><button class="tab ${state.view==='pagos'?'active':''}" data-v="pagos">Pagos & facturación</button></div>
    <div id="body"></div>`;
  $$('#screen .tab').forEach(b=>b.onclick=()=>{state.view=b.dataset.v;render()});
  state.view==='subs'?renderSubs():renderPagos();
}
function renderSubs(){
  $('#body').innerHTML=state.marcas.map(m=>{const s=sub(m.id);const est=s?s.estado:'cancelado';
    return `<div class="row"><div class="info"><h3>${m.emoji||''} ${m.nombre}</h3><div class="meta"><span>${s?s.plan:'sin plan'}</span><span>${modCount(m.id)} módulos</span><span>${s&&s.proximo_cobro?('próx. cobro '+s.proximo_cobro):''}</span></div></div>
      <span class="badge ${est}">${est}</span><span class="price">${money(s?s.precio_mensual:0)}<span style="font-size:11px;font-family:var(--font-mono);color:var(--muted)">/mes</span></span>
      <button class="mini-btn pri" data-pay="${m.id}">Registrar pago</button><button class="mini-btn" data-edit="${m.id}">Editar</button></div>`;
  }).join('');
  $$('#body [data-edit]').forEach(b=>b.onclick=()=>editarSub(b.dataset.edit));
  $$('#body [data-pay]').forEach(b=>b.onclick=()=>registrarPago(b.dataset.pay));
}
function renderPagos(){
  const tot=state.pagos.reduce((a,p)=>a+Number(p.monto||0),0);
  $('#body').innerHTML=`<div class="row" style="font-family:var(--font-mono);font-size:12px;color:var(--muted)">Total histórico registrado: <strong style="color:var(--ink);margin-left:6px">${money(tot)}</strong></div>`+
    state.pagos.map(p=>`<div class="row"><div class="info"><h3>${marcaNom(p.marca_id)}</h3><div class="meta"><span>${p.periodo||''}</span><span>${p.fecha}</span><span>${p.metodo||''}</span></div></div><span class="badge ${p.estado==='pagado'?'activo':'trial'}">${p.estado}</span><span class="price">${money(p.monto)}</span></div>`).join('')||'<div class="empty">Sin pagos</div>';
}
function editarSub(marcaId){
  const m=state.marcas.find(x=>x.id===marcaId);const s=sub(marcaId)||{marca_id:marcaId,plan:'Full',estado:'activo',precio_mensual:modCount(marcaId)*PRECIO_MODULO,ciclo:'mensual',proximo_cobro:addMes(hoyISO(),1)};
  const c=Object.assign({},s);
  $('#st').textContent='Suscripción · '+(m?m.nombre:marcaId);
  const draw=()=>{$('#sb').innerHTML=`
    <span class="lbl">Plan</span><div class="chips" id="e-plan">${PLANES.map(p=>`<button class="chip ${c.plan===p?'active':''}" data-p="${p}">${p}</button>`).join('')}</div>
    <span class="lbl">Estado</span><div class="chips" id="e-est">${['activo','trial','moroso','cancelado'].map(p=>`<button class="chip ${c.estado===p?'active':''}" data-e="${p}">${p}</button>`).join('')}</div>
    <div class="grid2"><div><span class="lbl">Precio mensual (S/)</span><input class="inp" id="e-precio" type="number" value="${c.precio_mensual||0}"></div><div><span class="lbl">Próximo cobro</span><input class="inp" id="e-prox" type="date" value="${c.proximo_cobro||''}"></div></div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:6px">Sugerido por módulos activos: ${modCount(marcaId)} × ${money(PRECIO_MODULO)} = <strong style="color:var(--ink)">${money(modCount(marcaId)*PRECIO_MODULO)}</strong> <button class="mini-btn" id="e-sug" style="margin-left:6px">Usar sugerido</button></div>
    <button class="btn" id="e-save">Guardar suscripción</button>`;
    $$('#e-plan .chip').forEach(b=>b.onclick=()=>{c.plan=b.dataset.p;draw()});
    $$('#e-est .chip').forEach(b=>b.onclick=()=>{c.estado=b.dataset.e;draw()});
    $('#e-precio').oninput=e=>c.precio_mensual=Number(e.target.value)||0;
    $('#e-prox').onchange=e=>c.proximo_cobro=e.target.value;
    $('#e-sug').onclick=()=>{c.precio_mensual=modCount(marcaId)*PRECIO_MODULO;draw()};
    $('#e-save').onclick=()=>guardarSub(c);
  };draw();openS();
}
async function guardarSub(c){
  c.precio_mensual=Number($('#e-precio').value)||c.precio_mensual;
  const{error}=await sb.from('prep_suscripciones').upsert({marca_id:c.marca_id,plan:c.plan,estado:c.estado,precio_mensual:c.precio_mensual,ciclo:c.ciclo||'mensual',proximo_cobro:c.proximo_cobro||null,updated_at:new Date().toISOString()},{onConflict:'marca_id'});
  if(error){toast('Error: '+error.message);return}closeS();await load();toast('Suscripción guardada')}
function registrarPago(marcaId){
  const s=sub(marcaId);const c={marca_id:marcaId,monto:s?s.precio_mensual:0,metodo:'transferencia',periodo:mesAct(),fecha:hoyISO()};
  $('#st').textContent='Registrar pago · '+marcaNom(marcaId);
  $('#sb').innerHTML=`<div class="grid2"><div><span class="lbl">Monto (S/)</span><input class="inp" id="p-monto" type="number" value="${c.monto}"></div><div><span class="lbl">Periodo</span><input class="inp" id="p-per" value="${c.periodo}"></div></div>
    <div class="grid2"><div><span class="lbl">Fecha</span><input class="inp" id="p-fecha" type="date" value="${c.fecha}"></div><div><span class="lbl">Método</span><select class="inp" id="p-met"><option>transferencia</option><option>tarjeta</option><option>yape</option><option>plin</option><option>efectivo</option></select></div></div>
    <button class="btn" id="p-save">Registrar pago + avanzar cobro</button>`;
  $('#p-save').onclick=async()=>{const monto=Number($('#p-monto').value)||0;if(!(monto>0)){toast('Monto inválido');return}
    const{error}=await sb.from('prep_pagos').insert({marca_id:marcaId,periodo:$('#p-per').value,monto,fecha:$('#p-fecha').value,metodo:$('#p-met').value,estado:'pagado'});
    if(error){toast('Error: '+error.message);return}
    if(s)await sb.from('prep_suscripciones').update({estado:'activo',proximo_cobro:addMes(s.proximo_cobro||hoyISO(),1),updated_at:new Date().toISOString()}).eq('marca_id',marcaId);
    closeS();await load();toast('Pago registrado ✓')};
  openS();
}
$('#sc').onclick=closeS;$('#backdrop').onclick=closeS;
load().catch(e=>{console.error(e);$('#boot').classList.add('gone');$('#screen').innerHTML='<div class="empty">Error al cargar</div>'});
</script>
</body>
</html>
