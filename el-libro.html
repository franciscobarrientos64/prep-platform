<script>
const SB_URL='https://jmkvphayyhwzootlybde.supabase.co',SB_KEY='sb_publishable_0-znERv1Ok0Dw-Re44eksw_QAOqDc8M',MARCA=(window.PREP_MARCA||'m6'),LOCAL=(window.PREP_LOCAL||'l11');
const sb=supabase.createClient(SB_URL,SB_KEY);
const state={posts:[],checklists:[],runs:[],bitacora:[],lecturas:[],view:'tablon',cat:'todas',channel:null,equipo:[],eventos:[],examPanel:[],examNotas:[],thetalk:[],calMonth:null,briefings:[],eventualidades:[]};
function lectorName(){let n=localStorage.getItem('lb_lector');if(!n){n=(prompt('Tu nombre (para confirmar lectura):')||'').trim();if(n)localStorage.setItem('lb_lector',n);}return n;}
const $=s=>document.querySelector(s),$$=s=>Array.from(document.querySelectorAll(s));
function hoyISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function nowISO(){return new Date().toISOString()}
function fechaCorta(ts){if(!ts)return'';const d=new Date(ts),n=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];return d.getDate()+' '+n[d.getMonth()]}
function toast(m,t=''){const e=document.createElement('div');e.className='toast '+t;const i=t==='ok'?'check_circle':t==='err'?'error':t==='warn'?'warning':'info';e.innerHTML='<span class="material-symbols-outlined">'+i+'</span><span>'+m+'</span>';$('#toasts').appendChild(e);setTimeout(()=>{e.style.transition='opacity .3s,transform .3s';e.style.opacity='0';e.style.transform='translateX(120%)';setTimeout(()=>e.remove(),300)},2600)}
function openSheet(){$('#backdrop').classList.add('open');$('#sheet').classList.add('open')}
function closeSheet(){$('#backdrop').classList.remove('open');$('#sheet').classList.remove('open')}
function setHead(mk,t,m){$('#sheet-mark').textContent=mk;$('#sheet-title').textContent=t;$('#sheet-meta').textContent=m||''}

async function loadPosts(){const{data}=await sb.from('lb_posts').select('*').eq('local_id',LOCAL).eq('vigente',true).order('fijado',{ascending:false}).order('created_at',{ascending:false});state.posts=data||[]}
async function loadChecklists(){const{data}=await sb.from('lb_checklists').select('*').eq('local_id',LOCAL).eq('activo',true).order('turno');state.checklists=data||[]}
async function loadRuns(){const{data}=await sb.from('lb_checklist_runs').select('*').eq('local_id',LOCAL).eq('fecha',hoyISO());state.runs=data||[]}
async function loadBitacora(){const{data}=await sb.from('lb_bitacora').select('*').eq('local_id',LOCAL).order('created_at',{ascending:false}).limit(60);state.bitacora=data||[]}
async function loadLecturas(){const{data}=await sb.from('lb_lecturas').select('*').eq('local_id',LOCAL);state.lecturas=data||[]}
function lecturasDe(id){return state.lecturas.filter(l=>l.post_id===id)}
function yaLeido(id){const n=localStorage.getItem('lb_lector');return n&&state.lecturas.some(l=>l.post_id===id&&l.empleado===n)}
async function confirmarLectura(id){const n=lectorName();if(!n)return;const{error}=await sb.from('lb_lecturas').insert({post_id:id,marca_id:MARCA,local_id:LOCAL,empleado:n});if(error&&!String(error.message).includes('duplicate')){toast('Atrás: '+error.message,'err');return}await loadLecturas();render();toast('Servido · lectura confirmada','ok')}
async function loadRecetario(){
  try{
    const[r,p]=await Promise.all([
      sb.from('inv_recetas').select('id,nombre,emoji,categoria_menu,tipo,etapas,ingredientes,activo,rendimiento,porciones').eq('marca_id',MARCA),
      sb.from('inv_productos').select('id,nombre,unidad').eq('marca_id',MARCA)]);
    state.recetario=(r.data||[]).filter(x=>x.activo!==false);
    state.prodMap={};(p.data||[]).forEach(x=>state.prodMap[x.id]=x);
  }catch(e){state.recetario=state.recetario||[];state.prodMap=state.prodMap||{}}
}
async function loadExamenes(){const[e,r]=await Promise.all([sb.from('rrhh_examenes').select('*').eq('local_id',LOCAL).eq('activo',true).order('created_at',{ascending:false}),sb.from('rrhh_examen_resultados').select('*').eq('local_id',LOCAL).order('created_at',{ascending:false}).limit(50)]);state.examenes=e.data||[];state.examResult=r.data||[]}

async function loadEventos(){const{data}=await sb.from('lb_eventos').select('*').eq('local_id',LOCAL).order('fecha');state.eventos=data||[]}
async function loadExamPanel(){try{const[e,n]=await Promise.all([sb.from('lb_examenes').select('*').eq('local_id',LOCAL).order('orden'),sb.from('lb_examen_notas').select('*')]);state.examPanel=e.data||[];state.examNotas=n.data||[]}catch(e){state.examPanel=[];state.examNotas=[]}}
async function loadThetalk(){const{data}=await sb.from('lb_thetalk').select('*').eq('local_id',LOCAL).order('fecha',{ascending:false});state.thetalk=data||[]}
async function loadBriefings(){const{data}=await sb.from('lb_briefings').select('*').eq('local_id',LOCAL).order('fecha',{ascending:false}).order('created_at',{ascending:false}).limit(60);state.briefings=data||[]}
async function loadEventualidades(){const{data}=await sb.from('lb_eventualidades').select('*').eq('local_id',LOCAL).order('fecha',{ascending:false}).order('created_at',{ascending:false}).limit(80);state.eventualidades=data||[]}
async function loadAll(){await Promise.all([loadPosts(),loadChecklists(),loadRuns(),loadBitacora(),loadLecturas(),loadRecetario(),loadExamenes(),loadEquipo(),loadEventos(),loadExamPanel(),loadThetalk(),loadBriefings(),loadEventualidades()]);render();subscribe();$('#boot').classList.add('gone')}

function render(){
  const pend=state.checklists.filter(c=>!runCompleto(c)).length;
  $('#hinfo').innerHTML=`<span class="tagx cat">${state.posts.length} publicaciones</span>`+(pend?`<span class="tagx alta">${pend} checklist pendientes</span>`:'');
  $('#tabs').innerHTML=[['tablon','Tablón','campaign'],['equipo','Equipo','groups'],['procedimientos','Procedimientos','menu_book'],['recetario','Recetario','restaurant_menu'],['plantillas','Plantillas','library_books'],['cursos','Cursos','school'],['examenes','Exámenes','quiz'],['briefing','Briefing','flag'],['checklists','Checklists','checklist'],['eventualidades','Eventualidades','report'],['calendario','Calendario','calendar_month'],['thetalk','The Talk','forum'],['politicas','Políticas','gavel'],['bitacora','Bitácora','history_edu']].map(([k,l,i])=>`<button class="tab ${state.view===k?'active':''}" data-v="${k}"><span class="material-symbols-outlined" style="font-size:16px">${i}</span>${l}</button>`).join('');

}

const PLANTILLAS=[
  {titulo:'Checklist de apertura',categoria:'Apertura',emoji:'🌅',contenido:'☐ Encender equipos (cocina, hornos, refrigeración)\n☐ Verificar temperaturas — HACCP\n☐ Mise en place completo\n☐ Caja con fondo y vuelto\n☐ Limpieza de salón y baños\n☐ Revisar reservas del día\n☐ Briefing con el equipo'},

  let banner='';
  if(dia){const lec=lecturasDe(dia.id).length, leido=yaLeido(dia.id);
    banner=`<div class="post fij" style="border-left-color:var(--primary);margin-bottom:14px" data-dia="${dia.id}">
      <div class="meta" style="margin-top:0"><span class="tagx cat">📣 Mensaje del día</span>${dia.prioridad==='alta'?'<span class="tagx alta">Importante</span>':''}</div>
      <h3 style="margin-top:6px">${(dia.titulo||'').replace(/</g,'&lt;')}</h3>
      <div class="ex">${(dia.contenido||'').replace(/</g,'&lt;')}</div>
      <div class="meta"><span>👁 ${lec} leyeron</span></div>
      <div style="margin-top:10px">${leido?'<span class="prog full">✓ Leído</span>':'<button class="btn primary" id="dia-leer" style="width:auto;min-height:40px;padding:8px 16px">Confirmar lectura</button>'}</div>
    </div>`;
  }
  $('#screen').innerHTML=banner+(list.map(postCard).join('')||'<div class="empty">Sin comunicados</div>');
  const lb=$('#dia-leer');if(lb)lb.onclick=(e)=>{e.stopPropagation();confirmarLectura(dia.id)};
  $$('#screen .post[data-id]').forEach(c=>c.onclick=()=>verPost(state.posts.find(p=>p.id===c.dataset.id)));
  const db=$('#screen .post[data-dia]');if(db)db.onclick=()=>verPost(dia);
}
function renderProcs(){
  const list=state.posts.filter(p=>p.tipo==='procedimiento');
  const cats=['todas',...new Set(list.map(p=>p.categoria).filter(Boolean))];
  const fl=state.cat==='todas'?list:list.filter(p=>p.categoria===state.cat);
  $('#screen').innerHTML=`<div class="chips">${cats.map(c=>`<button class="chip ${state.cat===c?'active':''}" data-c="${c}">${c==='todas'?'Todas':c}</button>`).join('')}</div>`+(fl.map(postCard).join('')||'<div class="empty">Sin procedimientos</div>');
  $$('#screen .chip[data-c]').forEach(b=>b.onclick=()=>{state.cat=b.dataset.c;renderProcs()});
  $$('#screen .post').forEach(c=>c.onclick=()=>verPost(state.posts.find(p=>p.id===c.dataset.id)));
}
function verPost(p){
  setHead(p.tipo==='procedimiento'?'📖':p.tipo==='politica'?'📋':'📣',p.titulo,(p.categoria||'')+' · '+(p.autor||'')+' · '+fechaCorta(p.created_at));
  const lec=lecturasDe(p.id), leido=yaLeido(p.id);
  const lecBlock=(p.tipo==='comunicado'||p.tipo==='politica')?`<div class="sheet-section">
      <div class="field-lbl">Confirmación de lectura (${lec.length})</div>
      ${leido?'<div class="prog full" style="display:inline-block">✓ Ya confirmaste tu lectura</div>':'<button class="btn primary" id="p-leer"><span class="material-symbols-outlined">done_all</span>Confirmar lectura</button>'}
      ${lec.length?`<div class="meta" style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px">${lec.map(l=>`<span class="tagx cat">${(l.empleado||'').replace(/</g,'&lt;')}</span>`).join('')}</div>`:'<div class="empty" style="padding:14px">Nadie ha confirmado aún</div>'}
    </div>`:'';
  $('#sheet-body').innerHTML=`<div class="sheet-section"><div class="contenido">${(p.contenido||'').replace(/</g,'&lt;')}</div></div>
    ${p.adjunto_url?`<div class="sheet-section"><a class="btn ghost" href="${p.adjunto_url}" target="_blank" rel="noopener"><span class="material-symbols-outlined">attach_file</span>Ver adjunto</a></div>`:''}
    ${lecBlock}
    <div class="sheet-section"><div class="grid2"><button class="btn ghost" id="p-edit"><span class="material-symbols-outlined">edit</span>Editar</button>${p.tipo==='comunicado'?`<button class="btn ghost" id="p-fij">${p.fijado?'Desfijar':'Fijar 📌'}</button>`:'<div></div>'}</div></div>`;
  openSheet();
  if($('#p-leer'))$('#p-leer').onclick=async()=>{await confirmarLectura(p.id);verPost(state.posts.find(x=>x.id===p.id)||p);};
  $('#p-edit').onclick=()=>editarPost(p);
  if($('#p-fij'))$('#p-fij').onclick=async()=>{await sb.from('lb_posts').update({fijado:!p.fijado}).eq('id',p.id);await loadPosts();closeSheet();render();toast('Va · actualizado','ok')};
}
function editarPost(p){
  const ed=!!p;const tipo=p?p.tipo:(state.view==='procedimientos'?'procedimiento':'comunicado');
  const c=Object.assign({titulo:'',categoria:'',contenido:'',autor:'Gerencia',prioridad:'normal'},p||{});
  setHead('✏️',ed?'Editar':'Nuevo '+(tipo==='procedimiento'?'procedimiento':'comunicado'),'El Libro');
  $('#sheet-body').innerHTML=`
    <div class="sheet-section"><div class="field-lbl">Título</div><input class="input" id="x-tit" value="${(c.titulo||'').replace(/"/g,'&quot;')}"></div>
    ${tipo==='procedimiento'?`<div class="sheet-section"><div class="field-lbl">Categoría</div><div class="chips" id="x-catchips">${['HACCP','Manual de posición','Onboarding','Seguridad','Cocina','Salón','Bar','General'].map(x=>`<button class="chip ${c.categoria===x?'active':''}" data-cc="${x}">${x}</button>`).join('')}</div></div>`:''}
    <div class="sheet-section grid2"><div><div class="field-lbl">Categoría${tipo==='procedimiento'?' (o escribe otra)':''}</div><input class="input" id="x-cat" value="${c.categoria||''}" placeholder="Cocina, Salón…"></div><div><div class="field-lbl">Autor</div><input class="input" id="x-aut" value="${c.autor||''}"></div></div>
    ${tipo!=='procedimiento'?`<div class="sheet-section"><div class="field-lbl">Prioridad</div><div class="chips" id="x-pri">${['normal','alta'].map(x=>`<button class="chip ${c.prioridad===x?'active':''}" data-p="${x}">${x}</button>`).join('')}</div></div>`:''}
    <div class="sheet-section"><div class="field-lbl">Contenido</div><textarea class="input" id="x-cont" placeholder="Escribe aquí…">${c.contenido||''}</textarea></div>
    <div class="sheet-section"><button class="btn primary" id="x-save"><span class="material-symbols-outlined">save</span>Guardar</button></div>`;
  let pri=c.prioridad;if($('#x-pri'))$$('#x-pri .chip').forEach(b=>b.onclick=()=>{pri=b.dataset.p;$$('#x-pri .chip').forEach(x=>x.classList.toggle('active',x.dataset.p===pri))});
  $$('#x-catchips .chip').forEach(b=>b.onclick=()=>{$('#x-cat').value=b.dataset.cc;$$('#x-catchips .chip').forEach(x=>x.classList.toggle('active',x.dataset.cc===b.dataset.cc))});
  $('#x-save').onclick=async()=>{const tit=$('#x-tit').value;if(!tit){toast('Falta título','warn');return}
    const payload={marca_id:MARCA,local_id:LOCAL,tipo,titulo:tit,categoria:$('#x-cat').value,autor:$('#x-aut').value,contenido:$('#x-cont').value,prioridad:pri,updated_at:nowISO()};
    const{error}=ed?await sb.from('lb_posts').update(payload).eq('id',p.id):await sb.from('lb_posts').insert(payload);
    if(error){toast('Atrás: '+error.message,'err');return}closeSheet();await loadPosts();render();toast('Servido · publicado','ok')};
  openSheet();
}

function runDe(cl){return state.runs.find(r=>r.checklist_id===cl.id)}
function items(cl){return Array.isArray(cl.items)?cl.items:[]}
function runCompleto(cl){const r=runDe(cl);if(!r)return false;const e=r.estados||{};return items(cl).length>0&&items(cl).every((_,i)=>e[i])}
function runHechos(cl){const r=runDe(cl);if(!r)return 0;const e=r.estados||{};return items(cl).filter((_,i)=>e[i]).length}
function renderChecklists(){
  $('#screen').innerHTML=`<div class="grp-t">Checklists de hoy · ${hoyISO()}</div>`+(state.checklists.map(cl=>{const tot=items(cl).length,h=runHechos(cl);const cls=h===0?'none':h===tot?'full':'part';
    return `<div class="clk" data-id="${cl.id}"><div><div style="font-weight:700;font-size:15px">${cl.nombre}</div><div style="font-family:var(--font-mono);font-size:11px;opacity:.6">${cl.area||''} · ${cl.turno||''}</div></div><span class="prog ${cls}">${h}/${tot}</span></div>`;
  }).join('')||'<div class="empty">Sin checklists</div>');
  $$('#screen .clk').forEach(c=>c.onclick=()=>abrirChecklist(state.checklists.find(x=>x.id===c.dataset.id)));
}
function abrirChecklist(cl){
  const its=items(cl);let r=runDe(cl);let est=Object.assign({},(r&&r.estados)||{});
  setHead('✅',cl.nombre,(cl.area||'')+' · '+(cl.turno||'')+' · hoy');
  const draw=()=>{const h=its.filter((_,i)=>est[i]).length;
    $('#sheet-body').innerHTML=`<div class="sheet-section"><div class="field-lbl">${h}/${its.length} completado</div>
      ${its.map((it,i)=>`<div class="chkitem ${est[i]?'on':''}" data-i="${i}"><div class="box ${est[i]?'on':''}">${est[i]?'<span class="material-symbols-outlined" style="font-size:18px">check</span>':''}</div><span class="tx">${it}</span></div>`).join('')}</div>
      <div class="sheet-section"><div class="field-lbl">Responsable</div><input class="input" id="ck-resp" value="${(r&&r.completado_por)||''}" placeholder="Quién lo completa"></div>
      <div class="sheet-section"><button class="btn primary" id="ck-save"><span class="material-symbols-outlined">save</span>Guardar checklist</button></div>`;
    $$('#sheet-body .chkitem').forEach(el=>el.onclick=()=>{const i=el.dataset.i;est[i]=!est[i];draw()});
    $('#ck-save').onclick=()=>guardarRun(cl,est,$('#ck-resp').value);
  };draw();openSheet();
}
async function guardarRun(cl,est,resp){
  const payload={checklist_id:cl.id,local_id:LOCAL,fecha:hoyISO(),turno:cl.turno,completado_por:resp||null,estados:est};
  const{error}=await sb.from('lb_checklist_runs').upsert(payload,{onConflict:'checklist_id,fecha'});
  if(error){toast('Atrás: '+error.message,'err');return}closeSheet();await loadRuns();render();toast('Servido · checklist guardado','ok');
}

function renderBitacora(){
  $('#screen').innerHTML=state.bitacora.map(b=>`<div class="bit ${b.tipo}"><div style="font-size:14px">${b.contenido}</div><div class="meta"><span class="tagx ${b.tipo==='incidencia'?'alta':'cat'}">${b.tipo}</span><span>${b.autor||''}</span><span>${b.turno||''}</span><span>${fechaCorta(b.created_at)}</span></div></div>`).join('')||'<div class="empty">Sin registros de bitácora</div>';
}
function abrirBitacora(){
  let tipo='nota',turno='cena';setHead('📝','Nueva entrada de bitácora','El Libro');
  $('#sheet-body').innerHTML=`
    <div class="sheet-section"><div class="field-lbl">Tipo</div><div class="chips" id="b-tipo">${['nota','incidencia','novedad'].map(x=>`<button class="chip ${tipo===x?'active':''}" data-t="${x}">${x}</button>`).join('')}</div></div>
    <div class="sheet-section grid2"><div><div class="field-lbl">Turno</div><select class="select" id="b-turno"><option>almuerzo</option><option selected>cena</option></select></div><div><div class="field-lbl">Autor</div><input class="input" id="b-aut" placeholder="Tu nombre"></div></div>
    <div class="sheet-section"><div class="field-lbl">Detalle</div><textarea class="input" id="b-cont" placeholder="Novedad, incidencia, nota del turno…"></textarea></div>
    <div class="sheet-section"><button class="btn primary" id="b-save"><span class="material-symbols-outlined">save</span>Registrar</button></div>`;
  $$('#b-tipo .chip').forEach(b=>b.onclick=()=>{tipo=b.dataset.t;$$('#b-tipo .chip').forEach(x=>x.classList.toggle('active',x.dataset.t===tipo))});
  $('#b-save').onclick=async()=>{const cont=$('#b-cont').value;if(!cont){toast('Escribe el detalle','warn');return}
    const{error}=await sb.from('lb_bitacora').insert({marca_id:MARCA,local_id:LOCAL,fecha:hoyISO(),turno:$('#b-turno').value,autor:$('#b-aut').value,tipo,contenido:cont});
    if(error){toast('Atrás: '+error.message,'err');return}closeSheet();await loadBitacora();render();toast('Servido · bitácora registrada','ok')};
  openSheet();
}

function nuevo(){if(state.view==='checklists'){abrirChecklistNuevo()}else if(state.view==='bitacora'){abrirBitacora()}else if(state.view==='examenes'){crearExamen()}else if(state.view==='calendario'){agregarEvento()}else if(state.view==='thetalk'){nuevoTalk()}else if(state.view==='briefing'){briefingSheet(null)}else if(state.view==='eventualidades'){eventSheet(null)}else if(state.view==='equipo'||state.view==='politicas'){/* sin acción */}else{editarPost(null)}}
function abrirChecklistNuevo(){
  setHead('✅','Nuevo checklist','El Libro');let items=[''];
  const draw=()=>{$('#sheet-body').innerHTML=`
    <div class="sheet-section grid2"><div><div class="field-lbl">Nombre</div><input class="input" id="c-nom"></div><div><div class="field-lbl">Área</div><input class="input" id="c-area" placeholder="Cocina, Salón…"></div></div>
    <div class="sheet-section"><div class="field-lbl">Turno</div><select class="select" id="c-turno"><option>apertura</option><option>cierre</option><option>limpieza</option></select></div>
    <div class="sheet-section"><div class="field-lbl">Ítems</div><div id="c-items">${items.map((it,i)=>`<input class="input" data-i="${i}" value="${(it||'').replace(/"/g,'&quot;')}" placeholder="Ítem ${i+1}" style="margin-bottom:6px">`).join('')}</div><button class="btn ghost" id="c-add">+ Agregar ítem</button></div>
    <div class="sheet-section"><button class="btn primary" id="c-save">Guardar checklist</button></div>`;
    $$('#c-items [data-i]').forEach(el=>el.oninput=()=>{items[el.dataset.i]=el.value});
    $('#c-add').onclick=()=>{items.forEach((_,i)=>{const el=document.querySelector('#c-items [data-i="'+i+'"]');if(el)items[i]=el.value});items.push('');draw()};
    $('#c-save').onclick=async()=>{const its=items.map(x=>x.trim()).filter(Boolean);const n=$('#c-nom').value;if(!n||!its.length){toast('Falta nombre o ítems','warn');return}
      const{error}=await sb.from('lb_checklists').insert({marca_id:MARCA,local_id:LOCAL,nombre:n,area:$('#c-area').value,turno:$('#c-turno').value,items:its});
      if(error){toast('Atrás: '+error.message,'err');return}closeSheet();await loadChecklists();render();toast('Servido · checklist creado','ok')};
  };draw();openSheet();
}

function subscribe(){if(state.channel)sb.removeChannel(state.channel);state.channel=sb.channel('lb_'+LOCAL)
  .on('postgres_changes',{event:'*',schema:'public',table:'lb_posts',filter:'local_id=eq.'+LOCAL},async()=>{await loadPosts();render()})
  .on('postgres_changes',{event:'*',schema:'public',table:'lb_bitacora',filter:'local_id=eq.'+LOCAL},async()=>{await loadBitacora();render()})
  .on('postgres_changes',{event:'*',schema:'public',table:'lb_lecturas',filter:'local_id=eq.'+LOCAL},async()=>{await loadLecturas();render()})
  .subscribe()}
$('#sheet-close').addEventListener('click',closeSheet);$('#backdrop').addEventListener('click',closeSheet);$('#h-add').addEventListener('click',nuevo);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSheet()});
loadAll().catch(err=>{console.error(err);$('#boot .msg').textContent='Atrás · '+(err.message||'fallo')});
</script>
</body>
</html>
