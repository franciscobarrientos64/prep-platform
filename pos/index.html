<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#fcf9f8" />
  <meta name="description" content="Prep! POS · Casa Italia" />
  <title>Prep! · Casa Italia</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231e5af9'/><text x='50' y='70' font-family='sans-serif' font-weight='900' font-size='60' fill='%23fcf9f8' text-anchor='middle'>p!</text></svg>" />

  <!-- Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

  <link rel="stylesheet" href="./css/brand.css" />
  <link rel="stylesheet" href="./css/pos.css" />

  <script src="./env.js"></script>
</head>
<body>
  <div id="app">
    <!-- Loading skeleton inicial -->
    <div style="min-height: 100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap: 16px;">
      <div style="font-family: 'Bagel Fat One', sans-serif; font-size: 3rem; color: #1e5af9; line-height: 1;">prep!</div>
      <div class="mono" style="font-size: 0.75rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.1em;">Mise en place…</div>
    </div>
  </div>

  <script type="module">
    import { restaurarSesion, CTX } from './js/supabase-client.js';
    import { bootstrap } from './js/state.js';
    import { renderLogin } from './js/login.js';
    import { renderFloorPlan } from './js/floor-plan.js';
    import { toast } from './js/utils.js';

    const app = document.getElementById('app');

    async function start() {
      // Recuperar nombre del operador (separado de la sesión)
      try {
        const raw = localStorage.getItem('prep_sesion');
        if (raw) {
          const s = JSON.parse(raw);
          if (s.nombre) CTX.nombre = s.nombre;
        }
      } catch {}

      const sesionOk = await restaurarSesion();
      if (!sesionOk) {
        renderLogin(app, () => start());
        return;
      }

      try {
        await bootstrap();
        renderFloorPlan(app);
      } catch (err) {
        console.error('[bootstrap]', err);
        toast('Error cargando datos: ' + err.message, 'error', 5000);
      }
    }

    start();

    // Prevenir gestos de zoom en iOS al hacer doble-tap
    document.addEventListener('gesturestart', e => e.preventDefault());
  </script>
</body>
</html>
