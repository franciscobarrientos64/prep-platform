<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#fcf9f8">
<title>Mercado · Casa Italia · Prep!</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231e5af9'/><text x='50' y='70' font-family='sans-serif' font-weight='900' font-size='60' fill='%23fcf9f8' text-anchor='middle'>p!</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --primary:#1e5af9;--secondary:#ff3b30;--tertiary:#ffcc00;--bg:#fcf9f8;--surface:#fff;--ink:#171c20;--outline:#000;
  --primary-soft:#d6e2ff;--gray-soft:#dfe3e8;--green:#10b981;--green-soft:#d1fae5;--amber-soft:#fef3c7;--red-soft:#fee2e2;
  --shadow-sm:4px 4px 0 0 #000;--shadow:6px 6px 0 0 #000;--shadow-lg:10px 10px 0 0 #000;
  --font-display:'Bagel Fat One',system-ui,sans-serif;--font-body:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;display:flex;flex-direction:column;min-height:100%}
button{font-family:inherit;cursor:pointer}
.material-symbols-outlined{font-size:20px;line-height:1;vertical-align:middle;user-select:none}
.mono{font-family:var(--font-mono)}
.header{flex-shrink:0;background:var(--bg);border-bottom:2px solid var(--outline);padding:10px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;min-height:60px}
.brand{display:flex;align-items:baseline;gap:8px}
.brand .logo{font-family:var(--font-display);font-size:26px;color:var(--primary);line-height:.9}
.brand .logo .accent{color:var(--secondary)}
.brand .mod{font-family:var(--font-mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;opacity:.55}
.header-info{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:11px;font-family:var(--font-mono)}
.pill.alert{background:var(--secondary);color:#fff}
.btn-ico{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);color:var(--ink);font-weight:600;font-size:13px;box-shadow:var(--shadow-sm);transition:transform .1s,box-shadow .1s}
.btn-ico:active{transform:translate(2px,2px);box-shadow:none}
.btn-ico.primary{background:var(--primary);color:#fff}.btn-ico.dark{background:var(--ink);color:var(--bg)}.btn-ico.ghost{background:transparent;box-shadow:none;border-style:dashed}
.tabs{flex-shrink:0;display:flex;gap:8px;padding:10px 16px;background:var(--bg);border-bottom:2px solid var(--outline);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);font-weight:600;font-size:13px;box-shadow:var(--shadow-sm)}
.tab.active{background:var(--ink);color:var(--bg);transform:translate(2px,2px);box-shadow:none}
.tab .count{font-family:var(--font-mono);font-size:11px;background:var(--tertiary);color:var(--ink);padding:1px 7px;border-radius:999px;border:1.5px solid var(--outline)}
.main{flex:1;overflow-y:auto;padding:16px}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--surface);border:2px solid var(--outline);border-radius:14px;box-shadow:var(--shadow-sm);padding:12px 14px}
.kpi .val{font-family:var(--font-display);font-size:24px;line-height:1;color:var(--primary)}
.kpi .lbl{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;opacity:.6;margin-top:4px}
.kpi.alert .val{color:var(--secondary)}
.seg{display:inline-flex;border:2px solid var(--outline);border-radius:999px;overflow:hidden;box-shadow:var(--shadow-sm)}
.seg button{padding:8px 14px;background:var(--surface);border:none;font-weight:600;font-size:13px;border-right:2px solid var(--outline)}
.seg button:last-child{border-right:none}
.seg button.active{background:var(--primary);color:#fff}
.input,.select,textarea.input{padding:10px 12px;border:2px solid var(--outline);border-radius:10px;background:var(--surface);font-family:var(--font-body);font-size:14px;box-shadow:var(--shadow-sm);width:100%}
.field-lbl{font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;opacity:.6;margin-bottom:6px;display:block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stack{display:flex;flex-direction:column;gap:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 18px;border:2px solid var(--outline);border-radius:14px;font-weight:600;font-size:14px;background:var(--surface);box-shadow:var(--shadow-sm);transition:transform .1s,box-shadow .1s;width:100%;min-height:50px}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn.primary{background:var(--primary);color:#fff}.btn.danger{background:var(--secondary);color:#fff}.btn.warn{background:var(--tertiary)}.btn.dark{background:var(--ink);color:var(--bg)}.btn.ghost{background:transparent;box-shadow:none;border-style:dashed}
.btn[disabled]{opacity:.4;pointer-events:none}
/* rows / cards */
.row-card{background:var(--surface);border:2px solid var(--outline);border-radius:14px;box-shadow:var(--shadow-sm);padding:12px 14px;margin-bottom:8px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center}
.row-emoji{font-size:26px}
.row-main h3{font-size:15px;font-weight:700}
.row-meta{font-family:var(--font-mono);font-size:11px;opacity:.7;margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.row-right{text-align:right;display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.stockbig{font-family:var(--font-display);font-size:20px;line-height:1}
.badge{font-family:var(--font-mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:999px;border:2px solid var(--outline)}
.badge.ok{background:var(--green-soft)}.badge.bajo{background:var(--tertiary)}.badge.sin{background:var(--secondary);color:#fff}
.badge.borrador{background:var(--gray-soft)}.badge.enviada{background:var(--primary-soft)}.badge.aprobada{background:var(--amber-soft)}.badge.recibida{background:var(--green);color:#fff}.badge.cancelada{background:var(--gray-soft);opacity:.6}
.mini-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);font-weight:600;font-size:12px;box-shadow:2px 2px 0 0 var(--outline)}
.mini-btn:active{transform:translate(1px,1px);box-shadow:none}
.mini-btn.primary{background:var(--primary);color:#fff}.mini-btn.danger{background:var(--secondary);color:#fff}.mini-btn.warn{background:var(--tertiary)}.mini-btn.ghost{background:transparent;box-shadow:none;border-style:dashed}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 12px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);font-size:12px;font-weight:600;box-shadow:2px 2px 0 0 var(--outline)}
.chip:active{transform:translate(1px,1px);box-shadow:none}.chip.active{background:var(--ink);color:var(--bg)}
.tbl{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface);border:2px solid var(--outline);border-radius:12px;overflow:hidden}
.tbl th{text-align:left;background:var(--ink);color:var(--bg);padding:8px 12px;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.05em}
.tbl td{padding:8px 12px;border-bottom:1px dashed var(--gray-soft)}
.tbl tr.best td{background:var(--green-soft)}
.empty-state{text-align:center;padding:50px 20px;font-family:var(--font-mono);font-size:12px;opacity:.55;text-transform:uppercase;letter-spacing:.08em}
.com-stepper{display:flex;align-items:center;gap:12px}
.com-stepper button{width:44px;height:44px;border:2px solid var(--outline);border-radius:50%;background:var(--surface);box-shadow:var(--shadow-sm);font-size:22px;font-family:var(--font-display);line-height:0}
.com-stepper .num{font-family:var(--font-display);font-size:30px;min-width:70px;text-align:center}
/* sheet */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:80;opacity:0;pointer-events:none;transition:opacity .18s}
.backdrop.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:90;background:var(--surface);border-top:3px solid var(--outline);border-radius:24px 24px 0 0;box-shadow:0 -10px 0 0 var(--outline);transform:translateY(100%);transition:transform .25s cubic-bezier(.32,.72,0,1);max-height:90vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom,0)}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:48px;height:5px;background:var(--outline);border-radius:999px;margin:12px auto 8px;opacity:.3}
.sheet-head{padding:6px 24px 14px;border-bottom:2px solid var(--outline);display:flex;align-items:center;gap:14px}
.sheet-mark{width:50px;height:50px;border:2px solid var(--outline);border-radius:12px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.sheet-title{flex:1}.sheet-title h2{font-family:var(--font-display);font-size:22px;line-height:1;margin-bottom:4px}
.sheet-title .meta{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;opacity:.65}
.sheet-close{width:40px;height:40px;border:2px solid var(--outline);border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
.sheet-body{padding:18px 24px 28px;overflow-y:auto}
.sheet-section+.sheet-section{margin-top:16px}
.info-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--gray-soft);font-size:14px}
.info-row strong{font-family:var(--font-mono);font-weight:600}
.toast-container{position:fixed;top:76px;right:16px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--ink);color:var(--bg);border:2px solid var(--outline);border-radius:12px;padding:12px 18px;font-size:14px;font-weight:600;box-shadow:var(--shadow);animation:tin .3s;display:flex;align-items:center;gap:10px;max-width:340px}
.toast.ok{background:var(--primary);color:#fff}.toast.err{background:var(--secondary);color:#fff}.toast.warn{background:var(--tertiary)}
@keyframes tin{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.boot{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:300;transition:opacity .3s}
.boot.gone{opacity:0;pointer-events:none}
.boot .logo{font-family:var(--font-display);font-size:64px;color:var(--primary)}.boot .logo .accent{color:var(--secondary)}
.boot .msg{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.12em;opacity:.6}
.boot .spinner{width:34px;height:34px;border:4px solid var(--outline);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:640px){.row-card{grid-template-columns:auto 1fr}.row-right{grid-column:1/-1;flex-direction:row;justify-content:space-between;align-items:center}}
</style>
</head>
<body>
<div id="boot" class="boot"><div class="logo">prep<span class="accent">!</span></div><div class="spinner"></div><div class="msg">Oído · mise en place</div></div>
<header class="header" id="app-header"></header>
<nav class="tabs" id="tabs"></nav>
<main class="main" id="screen"></main>
<div class="backdrop" id="backdrop"></div>
<aside class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-head"><div class="sheet-mark" id="sheet-mark">—</div><div class="sheet-title"><h2 id="sheet-title">—</h2><div class="meta" id="sheet-meta">—</div></div><button class="sheet-close" id="sheet-close"><span class="material-symbols-outlined">close</span></button></div>
  <div class="sheet-body" id="sheet-body"></div>
</aside>
<div class="toast-container" id="toasts"></div>
<script>
/* ===== PREP! · Módulo 05 · MERCADO (Compras + Inventario) ===== */
const SB_URL='https://jmkvphayyhwzootlybde.supabase.co';
const SB_KEY='sb_publishable_0-znERv1Ok0Dw-Re44eksw_QAOqDc8M';
const MARCA='m6', LOCAL='l11';
const sb=supabase.createClient(SB_URL,SB_KEY);
const ESTADOS_OC=['borrador','enviada','aprobada','recibida','cancelada'];
const MOTIVOS_MERMA=['Vencimiento','Daño/rotura','Mala manipulación','Robo/faltante','Cocción fallida','Devolución'];

const state={productos:[],proveedores:[],provProd:[],movs:[],mermas:[],ordenes:[],
  view:'inventario',cat:'todas',q:'',comprasTab:'proveedores',comparaPid:null,
  pedidoQty:{},pedidoCat:'todas',channel:null};

const $=(s,r=document)=>r.querySelector(s);const $$=(s,r=document)=>Array.from(r.querySelectorAll(s));
function money(n){return 'S/ '+Number(n||0).toFixed(2)}
function num(n){return Number(n||0).toLocaleString('es-PE',{maximumFractionDigits:2})}
function hoyISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function nowISO(){return new Date().toISOString()}
function uuid(){return crypto.randomUUID?crypto.randomUUID():'tmp_'+Math.random().toString(36).slice(2)}
function prod(id){return state.productos.find(p=>p.id===id)}
function prov(id){return state.proveedores.find(p=>p.id===id)}
function toast(m,t=''){const e=document.createElement('div');e.className='toast '+t;const i=t==='ok'?'check_circle':t==='err'?'error':t==='warn'?'warning':'info';e.innerHTML=`<span class="material-symbols-outlined">${i}</span><span>${m}</span>`;$('#toasts').appendChild(e);setTimeout(()=>{e.style.transition='opacity .3s,transform .3s';e.style.opacity='0';e.style.transform='translateX(120%)';setTimeout(()=>e.remove(),300)},2800)}
function openSheet(){$('#backdrop').classList.add('open');$('#sheet').classList.add('open')}
function closeSheet(){$('#backdrop').classList.remove('open');$('#sheet').classList.remove('open')}
function setHead(mk,t,m,bg='var(--primary-soft)'){$('#sheet-mark').textContent=mk;$('#sheet-mark').style.background=bg;$('#sheet-title').textContent=t;$('#sheet-meta').textContent=m||''}

/* ===== LOAD ===== */
async function loadAll(){
  await Promise.all([loadProductos(),loadProveedores(),loadProvProd(),loadMovs(),loadMermas(),loadOrdenes()]);
  render();subscribe();$('#boot').classList.add('gone');
}
async function loadProductos(){const{data,error}=await sb.from('inv_productos').select('*').eq('marca_id',MARCA);if(error)return toast('Atrás: '+error.message,'err');state.productos=(data||[]).sort((a,b)=>(a.categoria||'').localeCompare(b.categoria||'')||a.nombre.localeCompare(b.nombre))}
async function loadProveedores(){const{data}=await sb.from('inv_proveedores').select('*');state.proveedores=(data||[]).filter(p=>p.activo!==false)}
async function loadProvProd(){const{data}=await sb.from('inv_proveedor_productos').select('*');state.provProd=data||[]}
async function loadMovs(){const{data}=await sb.from('inv_movimientos').select('*').eq('local_id',LOCAL).order('fecha',{ascending:false}).limit(300);state.movs=data||[]}
async function loadMermas(){const{data}=await sb.from('inv_mermas').select('*').eq('local_id',LOCAL).order('fecha',{ascending:false}).limit(100);state.mermas=data||[]}
async function loadOrdenes(){const{data}=await sb.from('inv_ordenes_compra').select('*').eq('local_id',LOCAL).order('created_at',{ascending:false});state.ordenes=data||[]}

/* ===== DERIVED ===== */
const _stock={};
function recalcStock(){for(const k in _stock)delete _stock[k];state.movs.forEach(m=>{_stock[m.producto_id]=(_stock[m.producto_id]||0)+Number(m.cantidad||0)})}
function stock(pid){return _stock[pid]||0}
function estadoStock(p){const s=stock(p.id);if(s<=0)return'sin';if(s<Number(p.par_level||0))return'bajo';return'ok'}
function valorInventario(){return state.productos.reduce((a,p)=>a+stock(p.id)*Number(p.costo||0),0)}
function categorias(){return Array.from(new Set(state.productos.map(p=>p.categoria||'Otros')))}

/* ===== ROUTER ===== */
function render(){recalcStock();renderHeader();renderTabs();
  if(state.view==='inventario')renderInventario();
  else if(state.view==='pedido')renderPedido();
  else if(state.view==='compras')renderCompras();
  else if(state.view==='mermas')renderMermas();
  else if(state.view==='movimientos')renderMovimientos();
}
function renderHeader(){
  const bajo=state.productos.filter(p=>estadoStock(p)!=='ok').length;
  $('#app-header').innerHTML=`
    <div class="brand"><span class="logo">prep<span class="accent">!</span></span><span class="mod">Mercado · Casa Italia</span></div>
    <div class="header-info">
      <span class="pill">${money(valorInventario())} en stock</span>
      <span class="pill ${bajo?'alert':''}">${bajo} bajo par</span>
    </div>
    <button class="btn-ico primary" id="h-entrada"><span class="material-symbols-outlined">add</span><span>Entrada</span></button>
    <button class="btn-ico" id="h-merma"><span class="material-symbols-outlined">delete_sweep</span><span>Merma</span></button>`;
  $('#h-entrada').onclick=()=>abrirMovimiento(null,'entrada');
  $('#h-merma').onclick=()=>abrirMerma(null);
}
function renderTabs(){
  const nPedido=Object.values(state.pedidoQty).filter(q=>q>0).length;
  const tabs=[{k:'inventario',l:'Inventario',ico:'inventory_2',n:state.productos.length},
    {k:'pedido',l:'Armar pedido',ico:'list_alt',n:nPedido||null},
    {k:'compras',l:'Compras',ico:'shopping_cart',n:state.ordenes.filter(o=>o.estado!=='recibida'&&o.estado!=='cancelada').length},
    {k:'mermas',l:'Mermas',ico:'delete_sweep',n:state.mermas.length},
    {k:'movimientos',l:'Movimientos',ico:'sync_alt'}];
  $('#tabs').innerHTML=tabs.map(t=>`<button class="tab ${state.view===t.k?'active':''}" data-v="${t.k}"><span class="material-symbols-outlined" style="font-size:16px">${t.ico}</span>${t.l}${t.n!=null?`<span class="count">${t.n}</span>`:''}</button>`).join('');
  $$('#tabs .tab').forEach(b=>b.onclick=()=>{state.view=b.dataset.v;render()});
}

/* ===== INVENTARIO (ME-07) ===== */
function renderInventario(){
  const cats=['todas',...categorias()];
  const list=state.productos.filter(p=>(state.cat==='todas'||p.categoria===state.cat)&&(!state.q||(p.nombre+' '+p.categoria).toLowerCase().includes(state.q.toLowerCase())));
  const bajo=state.productos.filter(p=>estadoStock(p)==='bajo').length, sin=state.productos.filter(p=>estadoStock(p)==='sin').length;
  $('#screen').innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="val">${state.productos.length}</div><div class="lbl">Productos</div></div>
      <div class="kpi"><div class="val">${money(valorInventario())}</div><div class="lbl">Valor inventario</div></div>
      <div class="kpi ${bajo?'alert':''}"><div class="val">${bajo}</div><div class="lbl">Bajo par</div></div>
      <div class="kpi ${sin?'alert':''}"><div class="val">${sin}</div><div class="lbl">Sin stock</div></div>
    </div>
    <div class="toolbar">
      <input class="input" id="inv-q" placeholder="Buscar producto…" value="${state.q}" style="max-width:280px">
      <div class="chips">${cats.map(c=>`<button class="chip ${state.cat===c?'active':''}" data-cat="${c}">${c==='todas'?'Todas':c}</button>`).join('')}</div>
    </div>
    ${list.map(invCard).join('')||'<div class="empty-state">Sin productos</div>'}`;
  $('#inv-q').oninput=e=>{state.q=e.target.value;renderInventario()};
  $$('#screen .chip[data-cat]').forEach(b=>b.onclick=()=>{state.cat=b.dataset.cat;renderInventario()});
  $$('#screen .row-card [data-act]').forEach(b=>b.onclick=()=>{const pid=b.closest('.row-card').dataset.pid;const a=b.dataset.act;
    if(a==='pedir')abrirAgregarPedido(pid);else if(a==='entrada')abrirMovimiento(pid,'entrada');else if(a==='salida')abrirMovimiento(pid,'salida');else if(a==='ajuste')abrirMovimiento(pid,'ajuste');else if(a==='merma')abrirMerma(pid);else if(a==='ficha')abrirFichaProducto(pid)});
}
function invCard(p){const s=stock(p.id),est=estadoStock(p);const lbl={ok:'En stock',bajo:'Bajo par',sin:'Sin stock'}[est];
  const col=est==='ok'?'var(--green)':est==='bajo'?'#c98a00':'var(--secondary)';
  const enPedido=state.pedidoQty[p.id]||0;

      ${tipo==='entrada'?`<div class="sheet-section"><div class="field-lbl">Proveedor (opcional)</div><select class="select" id="m-prov"><option value="">—</option>${state.proveedores.map(v=>`<option value="${v.id}" ${provId===v.id?'selected':''}>${v.nombre}</option>`).join('')}</select></div>`:''}

    if($('#m-obj'))$('#m-obj').oninput=e=>objetivo=Number(e.target.value)||0;
    if($('#m-prov'))$('#m-prov').onchange=e=>provId=e.target.value;
    $('#m-cancel').onclick=closeSheet;
    $('#m-save').onclick=()=>guardarMovimiento(prodId,tipo,tipo==='ajuste'?(objetivo-s):cant,provId);

async function guardarMovimiento(pid,tipo,delta,provId){
  const p=prod(pid);if(!p){toast('Elige un producto','warn');return}
  delta=Number(delta||0);
  if(tipo!=='ajuste'&&delta<=0){toast('Cantidad inválida','warn');return}
  let signed=tipo==='entrada'?Math.abs(delta):tipo==='salida'?-Math.abs(delta):delta; // ajuste: delta ya es objetivo-actual
  if(tipo==='ajuste'&&signed===0){toast('Sin cambios','warn');return}
  const{error}=await sb.from('inv_movimientos').insert({local_id:LOCAL,producto_id:pid,tipo,cantidad:signed,unidad:p.unidad,
    costo_unitario:p.costo,valor_total:+(signed*Number(p.costo||0)).toFixed(2),fecha:hoyISO(),proveedor_id:provId||null,
    motivo:tipo==='ajuste'?'Ajuste de conteo':null,responsable:'Mercado'});
  if(error){toast('Atrás: '+error.message,'err');return}
  closeSheet();await loadMovs();render();
  toast('Va · '+tipo+' '+p.nombre+' ('+(signed>0?'+':'')+num(signed)+')','ok');
}

/* ===== ARMAR PEDIDO (formulario por categoría → consolidado por proveedor) ===== */
// Sabe a quién pedir: proveedor preferido, si no el de menor precio.
function proveedorDe(pid){
  const opts=state.provProd.filter(pp=>pp.producto_id===pid);
  if(!opts.length)return null;
  return opts.find(o=>o.preferido)||opts.slice().sort((a,b)=>Number(a.costo)-Number(b.costo))[0];
}
function sugerido(p){return Math.max(0,Number(p.par_level||0)-stock(p.id))}
function consolidadoPedido(){
  const porProv={};let sinProv=[];
  Object.entries(state.pedidoQty).forEach(([pid,q])=>{q=Number(q);if(!(q>0))return;const p=prod(pid);if(!p)return;
    const pp=proveedorDe(pid);
    if(!pp){sinProv.push({p,q});return;}
    const costo=Number(pp.costo);
    (porProv[pp.proveedor_id]=porProv[pp.proveedor_id]||{items:[],monto:0});
    porProv[pp.proveedor_id].items.push({producto_id:pid,nombre:p.nombre,cantidad:q,costo_unit:costo});
    porProv[pp.proveedor_id].monto+=q*costo;});
  return {porProv,sinProv};
}
function renderPedido(){
  const cats=['todas',...categorias()];
  const list=state.productos.filter(p=>state.pedidoCat==='todas'||p.categoria===state.pedidoCat);
  $('#screen').innerHTML=`
    <div class="toolbar">
      <div class="chips">${cats.map(c=>`<button class="chip ${state.pedidoCat===c?'active':''}" data-pc="${c}">${c==='todas'?'Todas':c}</button>`).join('')}</div>
      <button class="btn-ico" id="ped-sug" style="margin-left:auto"><span class="material-symbols-outlined">auto_fix_high</span><span>Autocompletar sugeridos</span></button>
      <button class="btn-ico ghost" id="ped-clear"><span class="material-symbols-outlined">close</span><span>Limpiar</span></button>
    </div>
    <div style="font-family:var(--font-mono);font-size:11px;opacity:.65;margin-bottom:10px">Indica cuánto pedir de cada producto. El sugerido = par − stock. Abajo se consolida por proveedor.</div>
    ${list.map(pedRow).join('')||'<div class="empty-state">Sin productos</div>'}
    <div id="ped-resumen" style="margin-top:18px"></div>`;
  $$('#screen .chip[data-pc]').forEach(b=>b.onclick=()=>{state.pedidoCat=b.dataset.pc;renderPedido()});
  $('#ped-sug').onclick=()=>{list.forEach(p=>{const s=sugerido(p);if(s>0)state.pedidoQty[p.id]=s});renderPedido()};
  $('#ped-clear').onclick=()=>{state.pedidoQty={};renderPedido()};
  $$('#screen [data-pq]').forEach(inp=>inp.oninput=()=>{state.pedidoQty[inp.dataset.pq]=Number(inp.value)||0;renderResumenPedido()});
  renderResumenPedido();
}
function pedRow(p){const s=stock(p.id),sug=sugerido(p),pp=proveedorDe(p.id),q=state.pedidoQty[p.id]||'';
  const provLbl=pp?(prov(pp.proveedor_id)?.nombre||pp.proveedor_id):'⚠ sin proveedor';
  return `<div class="row-card" data-pid="${p.id}">
    <span class="row-emoji">${p.emoji||'📦'}</span>
    <div class="row-main"><h3>${p.nombre}</h3>
      <div class="row-meta"><span>stock ${num(s)} ${p.unidad||''}</span><span>par ${num(p.par_level)}</span><span>sug. ${num(sug)}</span><span>${pp?money(pp.costo)+' · ':''}${provLbl}</span></div></div>
    <div class="row-right"><input class="input" data-pq="${p.id}" type="number" min="0" step="0.5" value="${q}" placeholder="${sug||0}" style="width:90px;text-align:right"></div>
  </div>`;
}
function renderResumenPedido(){
  const el=$('#ped-resumen');if(!el)return;
  const {porProv,sinProv}=consolidadoPedido();
  const provIds=Object.keys(porProv);
  const totalMonto=provIds.reduce((a,id)=>a+porProv[id].monto,0);
  const totalItems=provIds.reduce((a,id)=>a+porProv[id].items.length,0);
  if(!provIds.length&&!sinProv.length){el.innerHTML='';return;}
  el.innerHTML=`
    <div style="background:var(--surface);border:2px solid var(--outline);border-radius:14px;box-shadow:var(--shadow);padding:14px 16px">
      <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:10px">

        <div style="font-family:var(--font-mono);font-size:12px;opacity:.7">${provIds.length} proveedor(es) · ${totalItems} ítems · ${money(totalMonto)}</div>
      </div>
      ${provIds.map(id=>{const g=porProv[id];return `<div style="border:1px solid var(--gray-soft);border-radius:10px;padding:10px 12px;margin-bottom:8px">

      <button class="btn primary" id="ped-generar" ${provIds.length?'':'disabled'}><span class="material-symbols-outlined">send</span>Generar ${provIds.length} orden(es) de compra</button>
    </div>`;
  $('#ped-generar').onclick=generarOrdenesPedido;
}
async function generarOrdenesPedido(){
  const {porProv}=consolidadoPedido();const provIds=Object.keys(porProv);
  if(!provIds.length){toast('No hay nada para pedir','warn');return}
  if(!confirm('¿Generar '+provIds.length+' orden(es) de compra (borrador), una por proveedor?'))return;
  // numeración base
  const{data:nums}=await sb.from('inv_ordenes_compra').select('numero').eq('local_id',LOCAL).order('created_at',{ascending:false}).limit(1);
  let n=(parseInt((nums&&nums[0]?.numero||'').replace(/\D/g,''))||0);
  const rows=provIds.map(id=>{const g=porProv[id];const subtotal=+g.monto.toFixed(2);const igv=+(subtotal*0.18).toFixed(2);n++;
    return {numero:'OC-'+String(n).padStart(4,'0'),local_id:LOCAL,proveedor_id:id,estado:'borrador',items:g.items,subtotal,igv,total:+(subtotal+igv).toFixed(2),fecha_emision:hoyISO(),responsable:'Mercado'};});
  const{error}=await sb.from('inv_ordenes_compra').insert(rows);
  if(error){toast('Atrás: '+error.message,'err');return}
  state.pedidoQty={};await loadOrdenes();state.view='compras';state.comprasTab='ordenes';render();
  toast('Servido · '+rows.length+' orden(es) generada(s) como borrador','ok');
}

    $('#ap-minus').onclick=()=>{qty=Math.max(0,+(qty-1));draw()};
    $('#ap-plus').onclick=()=>{qty=+(qty+1);draw()};
    $$('#sheet-body [data-add]').forEach(b=>b.onclick=()=>{qty=+(qty+Number(b.dataset.add));draw()});
    $$('#sheet-body [data-set]').forEach(b=>b.onclick=()=>{qty=sugerido(p)||1;draw()});
    $('#ap-in').oninput=e=>{qty=Number(e.target.value)||0};
    $('#ap-cancel').onclick=closeSheet;
    $('#ap-save').onclick=()=>{if(!(qty>0)){toast('Cantidad inválida','warn');return}state.pedidoQty[pid]=qty;closeSheet();render();toast('🛒 '+p.nombre+' × '+num(qty)+' al pedido','ok')};
  };draw();openSheet();
}
// PDF + envío de orden al proveedor (email / WhatsApp)
function buildOrderText(o){const p=prov(o.proveedor_id);let t='Casa Italia — Orden de compra '+(o.numero||'')+'\n';
  t+='Proveedor: '+(p?.nombre||o.proveedor_id)+'\nFecha: '+(o.fecha_emision||hoyISO())+'\n\nÍtems:\n';
  (o.items||[]).forEach(it=>{t+='• '+it.nombre+' x'+num(it.cantidad)+' @ '+money(it.costo_unit)+' = '+money(it.cantidad*it.costo_unit)+'\n'});
  t+='\nSubtotal: '+money(o.subtotal)+'\nIGV 18%: '+money(o.igv)+'\nTOTAL: '+money(o.total)+'\n\nGracias · Casa Italia (vía Prep!)';return t;}
function imprimirA4(titulo,html){const f=document.createElement('iframe');f.style.cssText='position:fixed;right:0;bottom:0;width:0;height:0;border:0;';document.body.appendChild(f);
  const d=f.contentWindow.document;d.open();
  d.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>'+titulo+'</title><style>@page{size:A4;margin:18mm}*{box-sizing:border-box}body{font-family:Arial,Helvetica,sans-serif;color:#111;font-size:13px}table td,table th{padding:7px 8px}tbody td{border-bottom:1px solid #ddd}hr{border:none;border-top:2px solid #111;margin:10px 0}</style></head><body>'+html+'</body></html>');
  d.close();let done=false;const cl=()=>{if(done)return;done=true;setTimeout(()=>f.remove(),600)};f.contentWindow.onafterprint=cl;setTimeout(()=>{try{f.contentWindow.focus();f.contentWindow.print()}catch(e){}setTimeout(cl,3000)},250);}
function imprimirOrden(o){const p=prov(o.proveedor_id);
  const filas=(o.items||[]).map(it=>`<tr><td>${it.nombre}</td><td style="text-align:right">${num(it.cantidad)}</td><td style="text-align:right">${money(it.costo_unit)}</td><td style="text-align:right">${money(it.cantidad*it.costo_unit)}</td></tr>`).join('');
  imprimirA4('Orden '+(o.numero||''),`
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><div style="font-size:28px;font-weight:800">Casa Italia</div><div style="color:#666">Orden de compra</div></div>
      <div style="text-align:right"><div style="font-size:20px;font-weight:700">${o.numero||''}</div><div>${o.fecha_emision||hoyISO()}</div></div></div>
    <hr>
    <div style="margin-bottom:6px"><strong>Proveedor:</strong> ${p?.nombre||o.proveedor_id}${p?.ruc?' · RUC '+p.ruc:''}</div>
    <div style="color:#555">${p?.telefono?'Tel '+p.telefono:''}${p?.email?' · '+p.email:''}</div>
    <table style="width:100%;border-collapse:collapse;margin-top:14px">
      <thead><tr style="background:#111;color:#fff"><th style="text-align:left">Producto</th><th style="text-align:right">Cant.</th><th style="text-align:right">Costo</th><th style="text-align:right">Subtotal</th></tr></thead>
      <tbody>${filas}</tbody></table>
    <div style="text-align:right;margin-top:14px;line-height:1.7">Subtotal: ${money(o.subtotal)}<br>IGV 18%: ${money(o.igv)}<br><strong style="font-size:18px">TOTAL: ${money(o.total)}</strong></div>
    <p style="margin-top:30px;color:#999;font-size:11px">Generado por Prep! · ${o.numero||''}</p>`);
}
function enviarOrden(o,canal){const p=prov(o.proveedor_id);const txt=buildOrderText(o);
  if(canal==='email'){const to=p?.email||'';window.open('mailto:'+to+'?subject='+encodeURIComponent('Orden de compra '+(o.numero||'')+' — Casa Italia')+'&body='+encodeURIComponent(txt));toast(to?'Abriendo email a '+to:'Proveedor sin email — adjunta el PDF','warn');}
  else{const tel=(p?.telefono||'').replace(/\D/g,'');const dest=tel?(tel.length<=9?'51'+tel:tel):'';window.open('https://wa.me/'+dest+'?text='+encodeURIComponent(txt),'_blank');toast(tel?'Abriendo WhatsApp':'Proveedor sin teléfono','warn');}
}

/* ===== COMPRAS (proveedores + comparativo + órdenes) ===== */
function renderCompras(){
  const sub=`<div class="seg" style="margin-bottom:14px">
    <button class="${state.comprasTab==='proveedores'?'active':''}" data-ct="proveedores">Proveedores</button>
    <button class="${state.comprasTab==='comparativo'?'active':''}" data-ct="comparativo">Comparativo</button>
    <button class="${state.comprasTab==='ordenes'?'active':''}" data-ct="ordenes">Órdenes</button></div>`;
  let body='';
  if(state.comprasTab==='proveedores'){
    body=state.proveedores.map(v=>`<div class="row-card"><span class="row-emoji">🏬</span><div class="row-main"><h3>${v.nombre}</h3><div class="row-meta">${v.ruc?`<span>RUC ${v.ruc}</span>`:''}${v.telefono?`<span>${v.telefono}</span>`:''}<span>${(v.categorias||[]).join(', ')}</span></div></div><div class="row-right"><span class="mono" style="font-size:11px">${state.provProd.filter(pp=>pp.proveedor_id===v.id).length} productos</span></div></div>`).join('')||'<div class="empty-state">Sin proveedores</div>';
  }else if(state.comprasTab==='comparativo'){
    const pid=state.comparaPid||state.productos[0]?.id;
    const precios=state.provProd.filter(pp=>pp.producto_id===pid).sort((a,b)=>Number(a.costo)-Number(b.costo));
    body=`<div class="field-lbl">Comparar precios de:</div>
      <select class="select" id="cmp-prod" style="max-width:340px;margin-bottom:14px">${state.productos.map(p=>`<option value="${p.id}" ${pid===p.id?'selected':''}>${p.emoji||''} ${p.nombre}</option>`).join('')}</select>
      ${precios.length?`<table class="tbl"><tr><th>Proveedor</th><th>Precio</th><th>Unidad compra</th><th>Entrega</th><th></th></tr>
        ${precios.map((pp,i)=>`<tr class="${i===0?'best':''}"><td>${prov(pp.proveedor_id)?.nombre||pp.proveedor_id}${pp.preferido?' ⭐':''}</td><td><strong>${money(pp.costo)}</strong></td><td>${pp.unidad_compra||''} ×${num(pp.unidades_por_compra||1)}</td><td>${pp.tiempo_entrega_dias||'?'} días</td><td>${i===0?'<span class="badge ok">mejor precio</span>':''}</td></tr>`).join('')}</table>
        <div class="row-meta" style="margin-top:8px">Ahorro vs más caro: ${money((Number(precios[precios.length-1].costo)-Number(precios[0].costo)))} por unidad</div>`
        :'<div class="empty-state">Este producto no tiene precios de proveedor cargados</div>'}`;
  }else{
    body=`<div class="toolbar"><button class="btn-ico primary" id="oc-add"><span class="material-symbols-outlined">add</span><span>Nueva orden</span></button></div>
      ${state.ordenes.map(o=>`<div class="row-card" data-oid="${o.id}"><span class="row-emoji">🧾</span>
        <div class="row-main"><h3>${o.numero||'OC'} · ${prov(o.proveedor_id)?.nombre||o.proveedor_id}</h3>
          <div class="row-meta"><span>${(o.items||[]).length} ítems</span><span>${money(o.total)}</span><span>emisión ${o.fecha_emision||'—'}</span></div></div>
        <div class="row-right"><span class="badge ${o.estado}">${o.estado}</span>
          <div class="chips" style="justify-content:flex-end;margin-top:4px">
            ${o.estado==='borrador'?'<button class="mini-btn" data-oc="enviar">Enviar</button>':''}
            ${o.estado==='enviada'?'<button class="mini-btn warn" data-oc="aprobar">Aprobar</button>':''}
            ${o.estado==='aprobada'?'<button class="mini-btn primary" data-oc="recibir">Recibir</button>':''}
            <button class="mini-btn ghost" data-oc="ver">Ver</button>
          </div></div></div>`).join('')||'<div class="empty-state">Sin órdenes de compra</div>'}`;
  }
  $('#screen').innerHTML=sub+body;
  $$('#screen .seg [data-ct]').forEach(b=>b.onclick=()=>{state.comprasTab=b.dataset.ct;render()});
  if($('#cmp-prod'))$('#cmp-prod').onchange=e=>{state.comparaPid=e.target.value;render()};
  if($('#oc-add'))$('#oc-add').onclick=()=>abrirOrdenCompra();
  $$('#screen .row-card [data-oc]').forEach(b=>b.onclick=()=>{const oid=b.closest('.row-card').dataset.oid;const o=state.ordenes.find(x=>x.id===oid);const a=b.dataset.oc;
    if(a==='ver')verOrden(o);else accionOrden(o,a)});
}

/* ===== ORDEN DE COMPRA (ME-13) ===== */
function abrirOrdenCompra(){
  let provId='',items=[];
  setHead('🧾','Nueva orden de compra','Compras');
  const draw=()=>{
    const provProds=provId?state.provProd.filter(pp=>pp.proveedor_id===provId):[];
    const subtotal=items.reduce((a,it)=>a+it.cantidad*it.costo_unit,0);const igv=+(subtotal*0.18).toFixed(2);
    $('#sheet-body').innerHTML=`
      <div class="sheet-section"><div class="field-lbl">Proveedor</div><select class="select" id="oc-prov"><option value="">Elegir…</option>${state.proveedores.map(v=>`<option value="${v.id}" ${provId===v.id?'selected':''}>${v.nombre}</option>`).join('')}</select></div>
      ${provId?`<div class="sheet-section"><div class="field-lbl">Agregar producto</div>
        <select class="select" id="oc-prod"><option value="">Elegir producto…</option>${state.productos.map(p=>{const pp=provProds.find(x=>x.producto_id===p.id);return `<option value="${p.id}" data-costo="${pp?pp.costo:p.costo}">${p.emoji||''} ${p.nombre} — ${money(pp?pp.costo:p.costo)}</option>`}).join('')}</select></div>`:''}
      ${items.length?`<div class="sheet-section"><div class="field-lbl">Ítems</div><table class="tbl"><tr><th>Producto</th><th>Cant</th><th>Costo</th><th>Subt.</th><th></th></tr>
        ${items.map((it,i)=>`<tr><td>${it.nombre}</td><td>${num(it.cantidad)}</td><td>${money(it.costo_unit)}</td><td>${money(it.cantidad*it.costo_unit)}</td><td><button class="mini-btn danger" data-del="${i}">×</button></td></tr>`).join('')}</table>
        <div class="info-row"><span>Subtotal</span><strong>${money(subtotal)}</strong></div><div class="info-row"><span>IGV 18%</span><strong>${money(igv)}</strong></div><div class="info-row"><span>Total</span><strong>${money(subtotal+igv)}</strong></div></div>`:''}
      <div class="sheet-section"><div class="grid2"><button class="btn ghost" id="oc-cancel">Atrás</button><button class="btn primary" id="oc-save" ${(!provId||!items.length)?'disabled':''}>Crear orden (borrador)</button></div></div>`;
    $('#oc-prov').onchange=e=>{provId=e.target.value;draw()};
    if($('#oc-prod'))$('#oc-prod').onchange=e=>{const opt=e.target.selectedOptions[0];const pid=e.target.value;if(!pid)return;const p=prod(pid);const costo=Number(opt.dataset.costo)||Number(p.costo);const ex=items.find(x=>x.producto_id===pid);if(ex)ex.cantidad++;else items.push({producto_id:pid,nombre:p.nombre,cantidad:1,costo_unit:costo});draw()};
    $$('#sheet-body [data-del]').forEach(b=>b.onclick=()=>{items.splice(+b.dataset.del,1);draw()});
    $('#oc-cancel').onclick=closeSheet;$('#oc-save').onclick=()=>guardarOrden(provId,items,subtotal,igv);
  };draw();openSheet();
}
async function guardarOrden(provId,items,subtotal,igv){
  if(!provId||!items.length){toast('Faltan datos','warn');return}
  const{data:nums}=await sb.from('inv_ordenes_compra').select('numero').eq('local_id',LOCAL).order('created_at',{ascending:false}).limit(1);
  const next='OC-'+String((parseInt((nums&&nums[0]?.numero||'').replace(/\D/g,''))||0)+1).padStart(4,'0');
  const{error}=await sb.from('inv_ordenes_compra').insert({numero:next,local_id:LOCAL,proveedor_id:provId,estado:'borrador',
    items:items,subtotal,igv,total:+(subtotal+igv).toFixed(2),fecha_emision:hoyISO(),responsable:'Mercado'});
  if(error){toast('Atrás: '+error.message,'err');return}
  closeSheet();await loadOrdenes();render();toast('Va · orden '+next+' creada','ok');
}
function verOrden(o){
  setHead('🧾',o.numero||'Orden',prov(o.proveedor_id)?.nombre||'');
  $('#sheet-body').innerHTML=`
    <div class="sheet-section"><div class="info-row"><span>Estado</span><strong>${o.estado}</strong></div>
      <div class="info-row"><span>Emisión</span><strong>${o.fecha_emision||'—'}</strong></div>
      <div class="info-row"><span>Total</span><strong>${money(o.total)}</strong></div></div>
    <div class="sheet-section"><div class="field-lbl">Ítems</div><table class="tbl"><tr><th>Producto</th><th>Cant</th><th>Costo</th><th>Subt.</th></tr>
      ${(o.items||[]).map(it=>`<tr><td>${it.nombre}</td><td>${num(it.cantidad)}</td><td>${money(it.costo_unit)}</td><td>${money(it.cantidad*it.costo_unit)}</td></tr>`).join('')}</table></div>
    <div class="sheet-section"><div class="field-lbl">Enviar al proveedor</div>
      <div class="chips">
        <button class="mini-btn" id="ov-pdf"><span class="material-symbols-outlined" style="font-size:14px">picture_as_pdf</span>PDF</button>
        <button class="mini-btn" id="ov-mail"><span class="material-symbols-outlined" style="font-size:14px">mail</span>Email</button>
        <button class="mini-btn" id="ov-wa" style="background:#25d366;color:#fff;border-color:#000"><span class="material-symbols-outlined" style="font-size:14px">chat</span>WhatsApp</button>
      </div></div>
    <div class="sheet-section">${o.estado==='borrador'?'<button class="btn" id="ov-act">Marcar enviada al proveedor</button>':o.estado==='enviada'?'<button class="btn warn" id="ov-act">Aprobar orden</button>':o.estado==='aprobada'?'<button class="btn primary" id="ov-act">Recibir (ingresar a stock)</button>':'<div class="row-meta">Orden '+o.estado+'</div>'}</div>`;
  openSheet();
  $('#ov-pdf').onclick=()=>imprimirOrden(o);
  $('#ov-mail').onclick=()=>enviarOrden(o,'email');
  $('#ov-wa').onclick=()=>enviarOrden(o,'whatsapp');
  if($('#ov-act'))$('#ov-act').onclick=()=>{const map={borrador:'enviar',enviada:'aprobar',aprobada:'recibir'};accionOrden(o,map[o.estado])};
}
async function accionOrden(o,accion){
  if(accion==='recibir'){
    if(!confirm('¿Recibir orden e ingresar todo a stock?'))return;
    const now=hoyISO();
    for(const it of (o.items||[])){const p=prod(it.producto_id);
      await sb.from('inv_movimientos').insert({local_id:LOCAL,producto_id:it.producto_id,tipo:'entrada',cantidad:Math.abs(it.cantidad),unidad:p?.unidad||'u',costo_unitario:it.costo_unit,valor_total:+(it.cantidad*it.costo_unit).toFixed(2),fecha:now,proveedor_id:o.proveedor_id,referencia:o.numero});}
    await sb.from('inv_ordenes_compra').update({estado:'recibida',fecha_entrega:now}).eq('id',o.id);
    closeSheet();await Promise.all([loadOrdenes(),loadMovs()]);render();toast('Servido · '+o.numero+' recibida e ingresada a stock','ok');return;
  }
  const nuevo=accion==='enviar'?'enviada':accion==='aprobar'?'aprobada':o.estado;
  const{error}=await sb.from('inv_ordenes_compra').update({estado:nuevo}).eq('id',o.id);
  if(error){toast('Atrás: '+error.message,'err');return}
  closeSheet();await loadOrdenes();render();toast('Va · '+o.numero+' → '+nuevo,'ok');
}

/* ===== REALTIME ===== */
function subscribe(){if(state.channel)sb.removeChannel(state.channel);
  state.channel=sb.channel('mercado_'+LOCAL)
    .on('postgres_changes',{event:'*',schema:'public',table:'inv_movimientos',filter:'local_id=eq.'+LOCAL},async()=>{await loadMovs();render()})
    .on('postgres_changes',{event:'*',schema:'public',table:'inv_ordenes_compra',filter:'local_id=eq.'+LOCAL},async()=>{await loadOrdenes();render()})
    .subscribe();
}
$('#sheet-close').addEventListener('click',closeSheet);
$('#backdrop').addEventListener('click',closeSheet);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSheet()});
loadAll().catch(err=>{console.error(err);$('#boot .msg').textContent='Atrás · '+(err.message||'fallo');$('#boot .spinner').style.borderTopColor='var(--secondary)'});
</script>
