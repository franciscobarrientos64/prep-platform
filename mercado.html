<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#fcf9f8">
<title>Mercado · Casa Italia · Prep!</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231e5af9'/><text x='50' y='70' font-family='sans-serif' font-weight='900' font-size='60' fill='%23fcf9f8' text-anchor='middle'>p!</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/auth-guard.js"></script>
<style>
:root{
  --primary:#1e5af9;--secondary:#ff3b30;--tertiary:#ffcc00;--bg:#fcf9f8;--surface:#fff;--ink:#171c20;--outline:#000;
  --primary-soft:#d6e2ff;--gray-soft:#dfe3e8;--green:#10b981;--green-soft:#d1fae5;--amber-soft:#fef3c7;--red-soft:#fee2e2;
  --shadow-sm:4px 4px 0 0 #000;--shadow:6px 6px 0 0 #000;--shadow-lg:10px 10px 0 0 #000;
  --font-display:'Bagel Fat One',system-ui,sans-serif;--font-body:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;display:flex;flex-direction:column;min-height:100%}
button{font-family:inherit;cursor:pointer}
.material-symbols-outlined{font-size:20px;line-height:1;vertical-align:middle;user-select:none}
.mono{font-family:var(--font-mono)}
.header{flex-shrink:0;background:var(--bg);border-bottom:2px solid var(--outline);padding:10px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;min-height:60px}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{position:relative;width:92px;height:30px;flex-shrink:0;display:block;text-decoration:none}
.brand-logo .l,.boot .logo .l{position:absolute;inset:0;-webkit-mask:url(/logo.png) left center/contain no-repeat;mask:url(/logo.png) left center/contain no-repeat}
.brand-logo .l.base,.boot .logo .l.base{background:var(--ink)}
.brand-logo .l.bang,.boot .logo .l.bang{background:var(--ink);clip-path:inset(0 0 0 86%)}
.brand-txt .cli{font-weight:700;font-size:14px;line-height:1.1}
.brand-txt .mod{font-family:var(--font-mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;opacity:.6;line-height:1.15}
.header-info{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:11px;font-family:var(--font-mono)}
.pill.alert{background:var(--secondary);color:#fff}
.btn-ico{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);color:var(--ink);font-weight:600;font-size:13px;box-shadow:var(--shadow-sm);transition:transform .1s,box-shadow .1s}
.btn-ico:active{transform:translate(2px,2px);box-shadow:none}
.btn-ico.primary{background:var(--primary);color:#fff}.btn-ico.dark{background:var(--ink);color:var(--bg)}.btn-ico.ghost{background:transparent;box-shadow:none;border-style:dashed}
.tabs{flex-shrink:0;display:flex;gap:8px;padding:10px 16px;background:var(--bg);border-bottom:2px solid var(--outline);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);font-weight:600;font-size:13px;box-shadow:var(--shadow-sm)}
.tab.active{background:var(--ink);color:var(--bg);transform:translate(2px,2px);box-shadow:none}
.tab .count{font-family:var(--font-mono);font-size:11px;background:var(--tertiary);color:var(--ink);padding:1px 7px;border-radius:999px;border:1.5px solid var(--outline)}
.main{flex:1;overflow-y:auto;padding:16px}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--surface);border:2px solid var(--outline);border-radius:14px;box-shadow:var(--shadow-sm);padding:12px 14px}
.kpi .val{font-family:var(--font-display);font-size:24px;line-height:1;color:var(--primary)}
.kpi .lbl{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;opacity:.6;margin-top:4px}
.kpi.alert .val{color:var(--secondary)}
.seg{display:inline-flex;border:2px solid var(--outline);border-radius:999px;overflow:hidden;box-shadow:var(--shadow-sm)}
.seg button{padding:8px 14px;background:var(--surface);border:none;font-weight:600;font-size:13px;border-right:2px solid var(--outline)}
.seg button:last-child{border-right:none}
.seg button.active{background:var(--primary);color:#fff}
.input,.select,textarea.input{padding:10px 12px;border:2px solid var(--outline);border-radius:10px;background:var(--surface);font-family:var(--font-body);font-size:14px;box-shadow:var(--shadow-sm);width:100%}
.field-lbl{font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;opacity:.6;margin-bottom:6px;display:block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stack{display:flex;flex-direction:column;gap:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 18px;border:2px solid var(--outline);border-radius:14px;font-weight:600;font-size:14px;background:var(--surface);box-shadow:var(--shadow-sm);transition:transform .1s,box-shadow .1s;width:100%;min-height:50px}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn.primary{background:var(--primary);color:#fff}.btn.danger{background:var(--secondary);color:#fff}.btn.warn{background:var(--tertiary)}.btn.dark{background:var(--ink);color:var(--bg)}.btn.ghost{background:transparent;box-shadow:none;border-style:dashed}
.btn[disabled]{opacity:.4;pointer-events:none}
/* rows / cards */
.row-card{background:var(--surface);border:2px solid var(--outline);border-radius:14px;box-shadow:var(--shadow-sm);padding:12px 14px;margin-bottom:8px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center}
.row-emoji{font-size:26px}
.row-main h3{font-size:15px;font-weight:700}
.row-meta{font-family:var(--font-mono);font-size:11px;opacity:.7;margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.row-right{text-align:right;display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.stockbig{font-family:var(--font-display);font-size:20px;line-height:1}
.badge{font-family:var(--font-mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:999px;border:2px solid var(--outline)}
.badge.ok{background:var(--green-soft)}.badge.bajo{background:var(--tertiary)}.badge.sin{background:var(--secondary);color:#fff}
.badge.borrador{background:var(--gray-soft)}.badge.enviada{background:var(--primary-soft)}.badge.aprobada{background:var(--amber-soft)}.badge.recibida{background:var(--green);color:#fff}.badge.cancelada{background:var(--gray-soft);opacity:.6}
.mini-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);font-weight:600;font-size:12px;box-shadow:2px 2px 0 0 var(--outline)}
.mini-btn:active{transform:translate(1px,1px);box-shadow:none}
.mini-btn.primary{background:var(--primary);color:#fff}.mini-btn.danger{background:var(--secondary);color:#fff}.mini-btn.warn{background:var(--tertiary)}.mini-btn.ghost{background:transparent;box-shadow:none;border-style:dashed}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 12px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);font-size:12px;font-weight:600;box-shadow:2px 2px 0 0 var(--outline)}
.chip:active{transform:translate(1px,1px);box-shadow:none}.chip.active{background:var(--ink);color:var(--bg)}
.tbl{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface);border:2px solid var(--outline);border-radius:12px;overflow:hidden}
.tbl th{text-align:left;background:var(--ink);color:var(--bg);padding:8px 12px;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.05em}
.tbl td{padding:8px 12px;border-bottom:1px dashed var(--gray-soft)}
.tbl tr.best td{background:var(--green-soft)}
.tbl tr.rojo td{background:var(--red-soft)}
.tbl tr.amar td{background:var(--amber-soft)}
.empty-state{text-align:center;padding:50px 20px;font-family:var(--font-mono);font-size:12px;opacity:.55;text-transform:uppercase;letter-spacing:.08em}
.com-stepper{display:flex;align-items:center;gap:12px}
.com-stepper button{width:44px;height:44px;border:2px solid var(--outline);border-radius:50%;background:var(--surface);box-shadow:var(--shadow-sm);font-size:22px;font-family:var(--font-display);line-height:0}
.com-stepper .num{font-family:var(--font-display);font-size:30px;min-width:70px;text-align:center}
/* sheet */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:80;opacity:0;pointer-events:none;transition:opacity .18s}
.backdrop.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:90;background:var(--surface);border-top:3px solid var(--outline);border-radius:24px 24px 0 0;box-shadow:0 -10px 0 0 var(--outline);transform:translateY(100%);transition:transform .25s cubic-bezier(.32,.72,0,1);max-height:90vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom,0)}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:48px;height:5px;background:var(--outline);border-radius:999px;margin:12px auto 8px;opacity:.3}
.sheet-head{padding:6px 24px 14px;border-bottom:2px solid var(--outline);display:flex;align-items:center;gap:14px}
.sheet-mark{width:50px;height:50px;border:2px solid var(--outline);border-radius:12px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.sheet-title{flex:1}.sheet-title h2{font-family:var(--font-display);font-size:22px;line-height:1;margin-bottom:4px}
.sheet-title .meta{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;opacity:.65}
.sheet-close{width:40px;height:40px;border:2px solid var(--outline);border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
.sheet-body{padding:18px 24px 28px;overflow-y:auto}
.sheet-section+.sheet-section{margin-top:16px}
.info-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--gray-soft);font-size:14px}
.info-row strong{font-family:var(--font-mono);font-weight:600}
.toast-container{position:fixed;top:76px;right:16px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--ink);color:var(--bg);border:2px solid var(--outline);border-radius:12px;padding:12px 18px;font-size:14px;font-weight:600;box-shadow:var(--shadow);animation:tin .3s;display:flex;align-items:center;gap:10px;max-width:340px}
.toast.ok{background:var(--primary);color:#fff}.toast.err{background:var(--secondary);color:#fff}.toast.warn{background:var(--tertiary)}
@keyframes tin{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.boot{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:300;transition:opacity .3s}
.boot.gone{opacity:0;pointer-events:none}
.boot .logo{position:relative;width:220px;height:73px}
.boot .msg{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.12em;opacity:.6}
.boot .spinner{width:34px;height:34px;border:4px solid var(--outline);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:640px){.row-card{grid-template-columns:auto 1fr}.row-right{grid-column:1/-1;flex-direction:row;justify-content:space-between;align-items:center}}
</style>
</head>
<body>
<div id="boot" class="boot"><div class="logo"><span class="l base"></span><span class="l bang"></span></div><div class="spinner"></div><div class="msg">Oído · mise en place</div></div>
<header class="header" id="app-header"></header>
<nav class="tabs" id="tabs"></nav>
<main class="main" id="screen"></main>
<div class="backdrop" id="backdrop"></div>
<aside class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-head"><div class="sheet-mark" id="sheet-mark">—</div><div class="sheet-title"><h2 id="sheet-title">—</h2><div class="meta" id="sheet-meta">—</div></div><button class="sheet-close" id="sheet-close"><span class="material-symbols-outlined">close</span></button></div>
  <div class="sheet-body" id="sheet-body"></div>
</aside>
<div class="toast-container" id="toasts"></div>
<script>
/* ===== PREP! · Módulo 05 · MERCADO (Compras + Inventario) ===== */
const SB_URL='https://jmkvphayyhwzootlybde.supabase.co';
const SB_KEY='sb_publishable_0-znERv1Ok0Dw-Re44eksw_QAOqDc8M';
const MARCA='m6', LOCAL='l11';
const sb=supabase.createClient(SB_URL,SB_KEY);
const ESTADOS_OC=['borrador','enviada','aprobada','recibida','cancelada'];
const MOTIVOS_MERMA=['Vencimiento','Daño/rotura','Mala manipulación','Robo/faltante','Cocción fallida','Devolución'];

const state={productos:[],proveedores:[],provProd:[],movs:[],mermas:[],ordenes:[],stockMap:{},preciosMercado:[],sesiones:[],recetas:[],ventasItems:[],teoPeriodo:'7d',
  view:'inventario',cat:'todas',q:'',comprasTab:'proveedores',comparaPid:null,
  pedidoQty:{},pedidoCat:'todas',pedidoInit:false,
  cargaMode:'recepcion',cargaCat:'todas',cargaVals:{},cargaCiego:false,channel:null};
const UNIDADES=['unidad','kg','g','l','ml','lata','botella','atado','caja','paquete','docena','bolsa'];

const $=(s,r=document)=>r.querySelector(s);const $$=(s,r=document)=>Array.from(r.querySelectorAll(s));
function money(n){return 'S/ '+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function num(n){return Number(n||0).toLocaleString('en-US',{maximumFractionDigits:2})}
function hoyISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function nowISO(){return new Date().toISOString()}
function uuid(){return crypto.randomUUID?crypto.randomUUID():'tmp_'+Math.random().toString(36).slice(2)}
function prod(id){return state.productos.find(p=>p.id===id)}
function prov(id){return state.proveedores.find(p=>p.id===id)}
function toast(m,t=''){const e=document.createElement('div');e.className='toast '+t;const i=t==='ok'?'check_circle':t==='err'?'error':t==='warn'?'warning':'info';e.innerHTML=`<span class="material-symbols-outlined">${i}</span><span>${m}</span>`;$('#toasts').appendChild(e);setTimeout(()=>{e.style.transition='opacity .3s,transform .3s';e.style.opacity='0';e.style.transform='translateX(120%)';setTimeout(()=>e.remove(),300)},2800)}
function openSheet(){$('#backdrop').classList.add('open');$('#sheet').classList.add('open')}
function closeSheet(){$('#backdrop').classList.remove('open');$('#sheet').classList.remove('open')}
function setHead(mk,t,m,bg='var(--primary-soft)'){$('#sheet-mark').textContent=mk;$('#sheet-mark').style.background=bg;$('#sheet-title').textContent=t;$('#sheet-meta').textContent=m||''}

/* ===== LOAD ===== */
async function loadAll(){
  await Promise.all([loadProductos(),loadProveedores(),loadProvProd(),loadMovs(),loadMermas(),loadOrdenes(),loadPreciosMercado(),loadSesiones(),loadRecetas(),loadVentasItems()]);
  const h=location.hash.replace('#','');if(['inventario','carga','pedido','compras','mermas','movimientos','reportes'].includes(h))state.view=h;
  render();subscribe();$('#boot').classList.add('gone');
}
async function loadSesiones(){const{data}=await sb.from('inv_sesiones_conteo').select('*').eq('local_id',LOCAL).eq('estado','tomado').order('iniciada_at',{ascending:false});state.sesiones=data||[]}
async function loadRecetas(){const{data}=await sb.from('inv_recetas').select('id,nombre,ingredientes,rendimiento').eq('marca_id',MARCA);state.recetas=data||[]}
function teoDesde(){const d=new Date();if(state.teoPeriodo==='hoy')return d.toISOString().slice(0,10)+'T00:00:00';if(state.teoPeriodo==='mes'){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01T00:00:00'}d.setDate(d.getDate()-7);return d.toISOString().slice(0,10)+'T00:00:00'}
async function loadVentasItems(){const{data:peds}=await sb.from('ca_pedidos').select('id').eq('local_id',LOCAL).gte('created_at',teoDesde());const ids=(peds||[]).map(p=>p.id);if(!ids.length){state.ventasItems=[];return}const{data}=await sb.from('ca_pedido_items').select('receta_id,nombre,qty,estado,pedido_id').in('pedido_id',ids).neq('estado','cancelado');state.ventasItems=data||[]}
function diffPct(c,r){if(r<=0)return c>0?1:0;return Math.abs(c-r)/r}
function esAnomalia(c,r){if(isNaN(c))return false;return diffPct(c,r)>=0.5||(r>0&&c===0)} // ≥50% de diferencia o quiebre total
async function loadStockMap(){const{data}=await sb.from('inv_stock_actual').select('*').eq('local_id',LOCAL);const m={};(data||[]).forEach(r=>m[r.producto_id]=Number(r.stock||0));state.stockMap=m;}
async function loadPreciosMercado(){const{data}=await sb.from('inv_precios_mercado').select('*').eq('marca_id',MARCA);state.preciosMercado=data||[]}
async function loadProductos(){const{data,error}=await sb.from('inv_productos').select('*').eq('marca_id',MARCA);if(error)return toast('Atrás: '+error.message,'err');state.productos=(data||[]).sort((a,b)=>(a.categoria||'').localeCompare(b.categoria||'')||a.nombre.localeCompare(b.nombre))}
async function loadProveedores(){const{data}=await sb.from('inv_proveedores').select('*');state.proveedores=(data||[]).filter(p=>p.activo!==false)}
async function loadProvProd(){const{data}=await sb.from('inv_proveedor_productos').select('*');state.provProd=data||[]}
async function loadMovs(){const{data}=await sb.from('inv_movimientos').select('*').eq('local_id',LOCAL).order('fecha',{ascending:false}).limit(300);state.movs=data||[];await loadStockMap();}
async function loadMermas(){const{data}=await sb.from('inv_mermas').select('*').eq('local_id',LOCAL).order('fecha',{ascending:false}).limit(100);state.mermas=data||[]}
async function loadOrdenes(){const{data}=await sb.from('inv_ordenes_compra').select('*').eq('local_id',LOCAL).order('created_at',{ascending:false});state.ordenes=data||[]}

/* ===== DERIVED ===== */
function stock(pid){return state.stockMap[pid]||0}
function estadoStock(p){const s=stock(p.id);if(s<=0)return'sin';if(s<Number(p.par_level||0))return'bajo';return'ok'}
function valorInventario(){return state.productos.reduce((a,p)=>a+stock(p.id)*Number(p.costo||0),0)}
function categorias(){return Array.from(new Set(state.productos.map(p=>p.categoria||'Otros')))}

/* ===== ROUTER ===== */
function render(){renderHeader();renderTabs();
  if(state.view==='inventario')renderInventario();
  else if(state.view==='carga')renderCarga();
  else if(state.view==='pedido')renderPedido();
  else if(state.view==='compras')renderCompras();
  else if(state.view==='mermas')renderMermas();
  else if(state.view==='movimientos')renderMovimientos();
  else if(state.view==='reportes')renderReportes();
  else if(state.view==='teorico')renderTeorico();
}
function renderHeader(){
  const bajo=state.productos.filter(p=>estadoStock(p)!=='ok').length;
  $('#app-header').innerHTML=`
    <div class="brand"><a href="/" class="brand-logo" title="Inicio · módulos"><span class="l base"></span><span class="l bang"></span></a><div class="brand-txt"><div class="cli">Casa Italia</div><div class="mod">Módulo Mercado</div></div></div>
    <div class="header-info">
      <span class="pill">${money(valorInventario())} en stock</span>
      <span class="pill ${bajo?'alert':''}">${bajo} bajo par</span>
    </div>
    <button class="btn-ico primary" id="h-entrada"><span class="material-symbols-outlined">add</span><span>Entrada</span></button>
    <button class="btn-ico" id="h-merma"><span class="material-symbols-outlined">delete_sweep</span><span>Merma</span></button>`;
  $('#h-entrada').onclick=()=>abrirMovimiento(null,'entrada');
  $('#h-merma').onclick=()=>abrirMerma(null);
}
function renderTabs(){
  const nPedido=Object.values(state.pedidoQty).filter(q=>q>0).length;
  const tabs=[{k:'inventario',l:'Inventario',ico:'inventory_2',n:state.productos.length},
    {k:'carga',l:'Carga rápida',ico:'bolt'},
    {k:'pedido',l:'Armar pedido',ico:'list_alt',n:nPedido||null},

/* ===== MOVIMIENTOS (entrada/salida/ajuste) ===== */
function abrirMovimiento(pid,tipo){
  let prodId=pid||'', cant=1, objetivo=0, provId='';
  const titulo={entrada:'Entrada de stock',salida:'Salida de stock',ajuste:'Ajustar stock'}[tipo];
  setHead(tipo==='entrada'?'📥':tipo==='salida'?'📤':'⚖️',titulo,'Inventario');
  const draw=()=>{
    const p=prod(prodId);const s=p?stock(prodId):0;
    $('#sheet-body').innerHTML=`
      <div class="sheet-section"><div class="field-lbl">Producto</div>
        <select class="select" id="m-prod"><option value="">Elegir…</option>${state.productos.map(x=>`<option value="${x.id}" ${prodId===x.id?'selected':''}>${x.emoji||''} ${x.nombre} (${num(stock(x.id))} ${x.unidad||''})</option>`).join('')}</select></div>
      ${p?`<div class="sheet-section"><div class="info-row"><span>Stock actual</span><strong>${num(s)} ${p.unidad||''}</strong></div></div>`:''}
      ${tipo==='ajuste'?`
        <div class="sheet-section"><div class="field-lbl">Stock real contado (${p?p.unidad||'':''})</div><input class="input" id="m-obj" type="number" step="0.01" value="${objetivo}"></div>`:`
        <div class="sheet-section"><div class="field-lbl">Cantidad (${p?p.unidad||'':''})</div>
          <div class="com-stepper"><button id="m-minus">−</button><span class="num" id="m-cant">${cant}</span><button id="m-plus">+</button></div>
          <input class="input" id="m-cant-in" type="number" step="0.01" value="${cant}" style="margin-top:8px"></div>`}
      ${tipo==='entrada'?`<div class="sheet-section"><div class="field-lbl">Proveedor (opcional)</div><select class="select" id="m-prov"><option value="">—</option>${state.proveedores.map(v=>`<option value="${v.id}" ${provId===v.id?'selected':''}>${v.nombre}</option>`).join('')}</select></div>`:''}
      <div class="sheet-section"><div class="grid2"><button class="btn ghost" id="m-cancel">Atrás</button><button class="btn primary" id="m-save">${titulo}</button></div></div>`;
    $('#m-prod').onchange=e=>{prodId=e.target.value;objetivo=prodId?stock(prodId):0;draw()};
    if($('#m-minus')){$('#m-minus').onclick=()=>{cant=Math.max(0,+(cant-1));$('#m-cant').textContent=cant;$('#m-cant-in').value=cant};$('#m-plus').onclick=()=>{cant=+(cant+1);$('#m-cant').textContent=cant;$('#m-cant-in').value=cant};$('#m-cant-in').oninput=e=>{cant=Number(e.target.value)||0;$('#m-cant').textContent=cant}}
    if($('#m-obj'))$('#m-obj').oninput=e=>objetivo=Number(e.target.value)||0;
    if($('#m-prov'))$('#m-prov').onchange=e=>provId=e.target.value;
    $('#m-cancel').onclick=closeSheet;
    $('#m-save').onclick=()=>guardarMovimiento(prodId,tipo,tipo==='ajuste'?(objetivo-s):cant,provId);
  };
  draw();openSheet();
}
async function guardarMovimiento(pid,tipo,delta,provId){
  const p=prod(pid);if(!p){toast('Elige un producto','warn');return}
  delta=Number(delta||0);
  if(tipo!=='ajuste'&&delta<=0){toast('Cantidad inválida','warn');return}
  let signed=tipo==='entrada'?Math.abs(delta):tipo==='salida'?-Math.abs(delta):delta; // ajuste: delta ya es objetivo-actual
  if(tipo==='ajuste'&&signed===0){toast('Sin cambios','warn');return}
  const{error}=await sb.from('inv_movimientos').insert({local_id:LOCAL,producto_id:pid,tipo,cantidad:signed,unidad:p.unidad,
    costo_unitario:p.costo,valor_total:+(signed*Number(p.costo||0)).toFixed(2),fecha:hoyISO(),proveedor_id:provId||null,
    motivo:tipo==='ajuste'?'Ajuste de conteo':null,responsable:'Mercado'});
  if(error){toast('Atrás: '+error.message,'err');return}
  closeSheet();await loadMovs();render();
  toast('Va · '+tipo+' '+p.nombre+' ('+(signed>0?'+':'')+num(signed)+')','ok');
}

async function guardarMerma(pid,cant,motivo,area,resp,notas){
  const p=prod(pid);if(!p){toast('Elige un producto','warn');return}
  if(!(cant>0)){toast('Cantidad inválida','warn');return}
  if(!motivo){toast('Elige un motivo','warn');return}
  const valor=+(cant*Number(p.costo||0)).toFixed(2);
  const r1=await sb.from('inv_mermas').insert({local_id:LOCAL,producto_id:pid,cantidad:cant,motivo,valor_perdido:valor,area:area||null,responsable:resp||null,notas:notas||null,fecha:hoyISO()});
  if(r1.error){toast('Atrás: '+r1.error.message,'err');return}
  // descontar del stock vía movimiento
  await sb.from('inv_movimientos').insert({local_id:LOCAL,producto_id:pid,tipo:'merma',cantidad:-Math.abs(cant),unidad:p.unidad,costo_unitario:p.costo,valor_total:-valor,fecha:hoyISO(),motivo,responsable:resp||null});
  closeSheet();await Promise.all([loadMermas(),loadMovs()]);render();
  toast('Servido · merma registrada (−'+money(valor)+')','warn');
}

async function enviarConteoAprobacion(){
  const entries=Object.entries(state.cargaVals).filter(([pid,v])=>v!==''&&v!=null);
  if(!entries.length){toast('Nada que enviar','warn');return}
  const quien=prompt('¿Quién tomó el inventario? (tu nombre)');if(!quien)return;
  const lineas=[];let difs=0,valDif=0;
  for(const [pid,vRaw] of entries){const p=prod(pid);if(!p)continue;const c=Number(vRaw);if(isNaN(c))continue;const reg=stock(pid);const diff=+(c-reg).toFixed(2);
    if(diff!==0)difs++;valDif+=Math.abs(diff)*Number(p.costo||0);
    lineas.push({producto_id:pid,nombre:p.nombre,unidad:p.unidad,contado:c,registrado:reg,diff,valor:+(diff*Number(p.costo||0)).toFixed(2),anomalia:esAnomalia(c,reg)});}
  if(!lineas.length){toast('Sin datos','warn');return}
  const{error}=await sb.from('inv_sesiones_conteo').insert({local_id:LOCAL,area:'general',modo:'conteo',estado:'tomado',iniciado_por:quien,iniciada_at:nowISO(),total_productos:lineas.length,total_diferencias:difs,valor_diferencia:+valDif.toFixed(2),lineas});
  if(error){toast('Atrás: '+error.message,'err');return}
  state.cargaVals={};await loadSesiones();render();
  toast('Servido · conteo enviado a aprobación del jefe ('+lineas.length+' productos)','ok');
}

/* ===== ARMAR PEDIDO (formulario por categoría → consolidado por proveedor) ===== */
// Sabe a quién pedir: proveedor preferido, si no el de menor precio.
function proveedorDe(pid){
  const opts=state.provProd.filter(pp=>pp.producto_id===pid);
  if(!opts.length)return null;
  return opts.find(o=>o.preferido)||opts.slice().sort((a,b)=>Number(a.costo)-Number(b.costo))[0];
}
// Precios combinados: proveedores + webs del país, ordenados de más barato a más caro
function preciosDe(pid){
  const sup=state.provProd.filter(pp=>pp.producto_id===pid).map(pp=>({fuente:prov(pp.proveedor_id)?.nombre||pp.proveedor_id,tipo:'proveedor',precio:Number(pp.costo),preferido:!!pp.preferido,entrega:pp.tiempo_entrega_dias,url:null}));
  const web=state.preciosMercado.filter(w=>w.producto_id===pid).map(w=>({fuente:w.fuente,tipo:'web',precio:Number(w.precio),url:w.url}));
  return [...sup,...web].sort((a,b)=>a.precio-b.precio);
}
function precioPreferido(pid){const pp=proveedorDe(pid);return pp?Number(pp.costo):null}
// Alerta si existe una fuente más barata que el proveedor que usamos
function alertaPrecio(pid){const pref=precioPreferido(pid);if(pref==null)return null;const best=preciosDe(pid)[0];if(best&&best.precio<pref-0.001)return{best,pref,ahorro:+(pref-best.precio).toFixed(2)};return null;}
function sugerido(p){return Math.max(0,Number(p.par_level||0)-stock(p.id))}
function mermaTotal(pid){return state.mermas.filter(m=>m.producto_id===pid).reduce((a,m)=>a+Number(m.cantidad||0),0)}
function mermaAlta(p){const m=mermaTotal(p.id),par=Number(p.par_level||0);return m>0&&par>0&&m>=par*0.3} // merma ≥ 30% del par
function parSugerido(p){return Math.ceil(Number(p.par_level||0)+mermaTotal(p.id))} // recalculo simple por merma
function consolidadoPedido(){
  const porProv={};let sinProv=[];
  Object.entries(state.pedidoQty).forEach(([pid,q])=>{q=Number(q);if(!(q>0))return;const p=prod(pid);if(!p)return;
    const pp=proveedorDe(pid);
    if(!pp){sinProv.push({p,q});return;}
    const costo=Number(pp.costo);
    (porProv[pp.proveedor_id]=porProv[pp.proveedor_id]||{items:[],monto:0});
    porProv[pp.proveedor_id].items.push({producto_id:pid,nombre:p.nombre,cantidad:q,costo_unit:costo});
    porProv[pp.proveedor_id].monto+=q*costo;});
  return {porProv,sinProv};
}

function pedRow(p){const s=stock(p.id),sug=sugerido(p),pp=proveedorDe(p.id),q=Number(state.pedidoQty[p.id]||0);
  const provLbl=pp?(prov(pp.proveedor_id)?.nombre||pp.proveedor_id):'⚠ sin proveedor';
  const overpar=q>0&&(s+q)>Number(p.par_level||0)*1.2;
  const alertas=[];
  if(mermaAlta(p))alertas.push('<span class="badge sin">⚠ mucha merma · recalcular par</span>');
  if(overpar)alertas.push('<span class="badge bajo">⚠ supera el par +20%</span>');
  return `<div class="row-card" data-pid="${p.id}">

}
function renderResumenPedido(){
  const el=$('#ped-resumen');if(!el)return;

async function generarOrdenesPedido(){
  const {porProv}=consolidadoPedido();const provIds=Object.keys(porProv);
  if(!provIds.length){toast('No hay nada para pedir','warn');return}
  if(!confirm('¿Generar '+provIds.length+' orden(es) de compra (borrador), una por proveedor?'))return;
  // numeración base
  const{data:nums}=await sb.from('inv_ordenes_compra').select('numero').eq('local_id',LOCAL).order('created_at',{ascending:false}).limit(1);
  let n=(parseInt((nums&&nums[0]?.numero||'').replace(/\D/g,''))||0);
  const rows=provIds.map(id=>{const g=porProv[id];const subtotal=+g.monto.toFixed(2);const igv=+(subtotal*0.18).toFixed(2);n++;
    return {numero:'OC-'+String(n).padStart(4,'0'),local_id:LOCAL,proveedor_id:id,estado:'borrador',items:g.items,subtotal,igv,total:+(subtotal+igv).toFixed(2),fecha_emision:hoyISO(),responsable:'Mercado'};});
  const{error}=await sb.from('inv_ordenes_compra').insert(rows);
  if(error){toast('Atrás: '+error.message,'err');return}
  state.pedidoQty={};await loadOrdenes();state.view='compras';state.comprasTab='ordenes';render();
  toast('Servido · '+rows.length+' orden(es) generada(s) como borrador','ok');
}

/* ===== CONFIGURAR INSUMO (par, costo, proveedor preferido, recálculo por merma) ===== */
function abrirConfigProducto(pid){
  const p=prod(pid);if(!p)return;
  const opts=state.provProd.filter(pp=>pp.producto_id===pid).sort((a,b)=>Number(a.costo)-Number(b.costo));
  const sug=parSugerido(p);
  setHead(p.emoji||'⚙️','Configurar insumo',p.nombre+' · '+(p.categoria||''));
  $('#sheet-body').innerHTML=`
    <div class="sheet-section">
      <div class="info-row"><span>Stock actual</span><strong>${num(stock(pid))} ${p.unidad||''}</strong></div>
      <div class="info-row"><span>Merma acumulada</span><strong style="color:${mermaAlta(p)?'var(--secondary)':''}">${num(mermaTotal(pid))} ${p.unidad||''}</strong></div>
    </div>
    ${mermaAlta(p)?`<div class="sheet-section"><div style="background:var(--red-soft);border:1px dashed var(--secondary);border-radius:10px;padding:10px 12px;font-size:12px">⚠ <strong>Mucha merma</strong> en este insumo. Considera subir el par para no quedarte corto. Sugerido: <strong>${num(sug)} ${p.unidad||''}</strong> <button class="mini-btn" id="cfg-usesug" style="margin-left:6px">Usar sugerido</button></div></div>`:''}
    <div class="sheet-section grid2">
      <div><div class="field-lbl">Par level (${p.unidad||''})</div><input class="input" id="cfg-par" type="number" min="0" step="0.5" value="${Number(p.par_level||0)}"></div>
      <div><div class="field-lbl">Costo (S/)</div><input class="input" id="cfg-costo" type="number" min="0" step="0.5" value="${Number(p.costo||0)}"></div>
    </div>
    <div class="sheet-section"><div class="field-lbl">Proveedor preferido (a quién se le pide)</div>
      ${opts.length?opts.map(pp=>`<button class="btn ${pp.preferido?'primary':'ghost'}" data-pref="${pp.proveedor_id}" style="justify-content:space-between;margin-bottom:6px"><span>${prov(pp.proveedor_id)?.nombre||pp.proveedor_id}</span><span class="mono">${money(pp.costo)} ${pp.preferido?'⭐':''}</span></button>`).join(''):'<div class="row-meta">Sin proveedores cargados. Agrégalos en Compras→Comparativo.</div>'}</div>
    <div class="sheet-section"><div class="grid2"><button class="btn ghost" id="cfg-cancel">Atrás</button><button class="btn primary" id="cfg-save">Guardar configuración</button></div></div>`;
  openSheet();

  $$('#sheet-body [data-pref]').forEach(b=>b.onclick=()=>marcarPreferido(pid,b.dataset.pref));
  $('#cfg-cancel').onclick=closeSheet;

}
async function marcarPreferido(pid,provId){
  await sb.from('inv_proveedor_productos').update({preferido:false}).eq('producto_id',pid);
  await sb.from('inv_proveedor_productos').update({preferido:true}).eq('producto_id',pid).eq('proveedor_id',provId);

async function guardarConfigProducto(pid,par,costo){

async function subirComprobante(o,file){
  if(!file)return;toast('Subiendo comprobante…');
  const ext=(file.name.split('.').pop()||'bin').toLowerCase();
  const path=LOCAL+'/'+o.id+'_'+Date.now()+'.'+ext;
  const up=await sb.storage.from('compras-files').upload(path,file,{upsert:true,contentType:file.type||undefined});
  if(up.error){toast('Atrás: '+up.error.message,'err');return}
  const url=sb.storage.from('compras-files').getPublicUrl(path).data.publicUrl;
  const{error}=await sb.from('inv_ordenes_compra').update({comprobante_url:url,comprobante_nombre:file.name}).eq('id',o.id);
  if(error){toast('Atrás: '+error.message,'err');return}
  await loadOrdenes();render();verOrden(state.ordenes.find(x=>x.id===o.id)||o);
  toast('Servido · comprobante adjuntado','ok');
}
function abrirPagoOC(o){
  let monto=Number(o.pago_monto||o.total||0),metodo=o.pago_metodo||'transferencia',fecha=o.pago_fecha||hoyISO();
  const metodos=['efectivo','transferencia','yape','plin','tarjeta','crédito'];
  setHead('💳','Registrar pago',(o.numero||'')+' · '+(prov(o.proveedor_id)?.nombre||''));
  $('#sheet-body').innerHTML=`
    <div class="sheet-section grid2">
      <div><div class="field-lbl">Monto pagado (S/)</div><input class="input" id="pg-monto" type="number" step="0.01" value="${monto}"></div>
      <div><div class="field-lbl">Fecha</div><input class="input" id="pg-fecha" type="date" value="${fecha}"></div></div>
    <div class="sheet-section"><div class="field-lbl">Método</div><div class="chips" id="pg-met">${metodos.map(m=>`<button class="chip ${metodo===m?'active':''}" data-m="${m}">${m}</button>`).join('')}</div></div>
    <div class="sheet-section"><div class="grid2"><button class="btn ghost" id="pg-cancel">Atrás</button><button class="btn primary" id="pg-save">Marcar como pagado</button></div></div>`;
  $$('#pg-met .chip').forEach(b=>b.onclick=()=>{metodo=b.dataset.m;$$('#pg-met .chip').forEach(x=>x.classList.toggle('active',x.dataset.m===metodo))});

  $('#pg-save').onclick=async()=>{const m=Number($('#pg-monto').value)||0;if(!(m>0)){toast('Monto inválido','warn');return}
    const{error}=await sb.from('inv_ordenes_compra').update({pago_estado:'pagado',pago_monto:m,pago_metodo:metodo,pago_fecha:$('#pg-fecha').value||hoyISO()}).eq('id',o.id);
    if(error){toast('Atrás: '+error.message,'err');return}
    await loadOrdenes();render();closeSheet();toast('Servido · pago registrado ('+money(m)+')','ok')};
  openSheet();

async function accionOrden(o,accion){
  if(accion==='recibir'){
    if(!confirm('¿Recibir orden e ingresar todo a stock?'))return;
    const now=hoyISO();
    for(const it of (o.items||[])){const p=prod(it.producto_id);
      await sb.from('inv_movimientos').insert({local_id:LOCAL,producto_id:it.producto_id,tipo:'entrada',cantidad:Math.abs(it.cantidad),unidad:p?.unidad||'u',costo_unitario:it.costo_unit,valor_total:+(it.cantidad*it.costo_unit).toFixed(2),fecha:now,proveedor_id:o.proveedor_id,referencia:o.numero});}
    await sb.from('inv_ordenes_compra').update({estado:'recibida',fecha_entrega:now}).eq('id',o.id);
    closeSheet();await Promise.all([loadOrdenes(),loadMovs()]);render();toast('Servido · '+o.numero+' recibida e ingresada a stock','ok');return;
  }
  const nuevo=accion==='enviar'?'enviada':accion==='aprobar'?'aprobada':o.estado;
  const{error}=await sb.from('inv_ordenes_compra').update({estado:nuevo}).eq('id',o.id);
  if(error){toast('Atrás: '+error.message,'err');return}
  closeSheet();await loadOrdenes();render();toast('Va · '+o.numero+' → '+nuevo,'ok');
}

/* ===== INVENTARIO TEÓRICO vs REAL (consumo por recetas / auto-depleción) ===== */
function consumoTeorico(){
  const m={};
  state.ventasItems.forEach(it=>{const r=state.recetas.find(x=>x.id===it.receta_id);if(!r||!Array.isArray(r.ingredientes))return;const q=Number(it.qty||1);
    r.ingredientes.forEach(ing=>{if(!ing.pid)return;const merma=Number(ing.merma||0);const factor=(merma>0&&merma<100)?1/(1-merma/100):1;const cant=Number(ing.cantidad||0)*q*factor;if(!m[ing.pid])m[ing.pid]={cant:0};m[ing.pid].cant+=cant;});});
  return m;
}
function renderTeorico(){
  const cons=consumoTeorico();
  const pids=Object.keys(cons).filter(pid=>prod(pid));
  const platos=state.ventasItems.reduce((a,it)=>a+Number(it.qty||0),0);
  const valorCons=pids.reduce((a,pid)=>a+cons[pid].cant*Number(prod(pid).costo||0),0);
  const sinReceta=state.ventasItems.filter(it=>!state.recetas.find(r=>r.id===it.receta_id&&Array.isArray(r.ingredientes)&&r.ingredientes.length)).reduce((a,it)=>a+Number(it.qty||0),0);
  const per=[['hoy','Hoy'],['7d','7 días'],['mes','Mes']];
  $('#screen').innerHTML=`
    <div class="toolbar"><div class="chips">${per.map(p=>`<button class="chip ${state.teoPeriodo===p[0]?'active':''}" data-tp="${p[0]}">${p[1]}</button>`).join('')}</div></div>
    <div style="font-family:var(--font-mono);font-size:11px;opacity:.65;margin-bottom:10px">Inventario <b>real</b> = lo que hay físico (conteos/compras). Inventario <b>virtual</b> = real − consumo teórico de las recetas vendidas. La diferencia al hacer un conteo = merma real.</div>
    <div class="kpis">
      <div class="kpi"><div class="val">${num(platos)}</div><div class="lbl">Platos vendidos</div></div>
      <div class="kpi"><div class="val">${money(valorCons)}</div><div class="lbl">Consumo teórico</div></div>
      <div class="kpi ${sinReceta?'alert':''}"><div class="val">${num(sinReceta)}</div><div class="lbl">Vendidos sin receta costeada</div></div>
    </div>
    ${pids.length?`<table class="tbl"><tr><th>Insumo</th><th>Consumo teórico</th><th>Valor</th><th>Stock real</th><th>Virtual</th></tr>
      ${pids.sort((a,b)=>cons[b].cant*Number(prod(b).costo||0)-cons[a].cant*Number(prod(a).costo||0)).map(pid=>{const p=prod(pid);const c=cons[pid].cant;const real=stock(pid);const virt=real-c;
        return `<tr><td>${p.emoji||''} ${p.nombre}</td><td>${num(c)} ${p.unidad||''}</td><td>${money(c*Number(p.costo||0))}</td><td>${num(real)}</td><td style="color:${virt<0?'var(--secondary)':''}">${num(virt)}</td></tr>`}).join('')}</table>
      <div class="row-meta" style="margin-top:10px">Si registras el consumo, se generan salidas por el teórico y el stock real baja a su nivel "virtual".</div>
      <button class="btn primary" id="teo-aplicar" style="margin-top:10px"><span class="material-symbols-outlined">remove_circle</span>Registrar consumo del período a inventario</button>`
      :'<div class="empty-state">Sin ventas con receta costeada en el período. Costea recetas en el módulo Recetas para ver el consumo.</div>'}`;
  $$('#screen .chip[data-tp]').forEach(b=>b.onclick=async()=>{state.teoPeriodo=b.dataset.tp;await loadVentasItems();render()});
  if($('#teo-aplicar'))$('#teo-aplicar').onclick=()=>aplicarConsumoTeorico(cons);
}
async function aplicarConsumoTeorico(cons){
  const pids=Object.keys(cons).filter(pid=>prod(pid)&&cons[pid].cant>0);
  if(!pids.length)return;
  if(!confirm('Registrar el consumo teórico de '+pids.length+' insumo(s) como salidas? Hazlo una vez por período para no duplicar.'))return;
  const now=hoyISO();const rows=pids.map(pid=>{const p=prod(pid);const c=+cons[pid].cant.toFixed(3);return{local_id:LOCAL,producto_id:pid,tipo:'salida',cantidad:-c,unidad:p.unidad,costo_unitario:p.costo,valor_total:+(-c*Number(p.costo||0)).toFixed(2),fecha:now,motivo:'Consumo teórico ('+state.teoPeriodo+')',responsable:'Sistema'}});
  const{error}=await sb.from('inv_movimientos').insert(rows);
  if(error){toast('Atrás: '+error.message,'err');return}
  await loadMovs();render();toast('Servido · consumo aplicado al inventario','ok');
}

/* ===== REPORTES (optimizar compras · proveedores · control de inventario) ===== */
function renderReportes(){
  const prods=state.productos;
  const card=(t,inner)=>`<div style="background:#fff;border:2px solid var(--outline);border-radius:14px;box-shadow:var(--shadow-sm);padding:14px 16px;margin-bottom:12px"><div style="font-family:var(--font-display);font-size:18px;margin-bottom:10px">${t}</div>${inner}</div>`;
  const bar=(lbl,v,max,c='var(--primary)',attr='')=>`<div ${attr} style="margin-bottom:6px;${attr?'cursor:pointer':''}"><div style="display:flex;justify-content:space-between;font-size:12px"><span>${lbl}${attr?' <span class="material-symbols-outlined" style="font-size:12px;opacity:.4">chevron_right</span>':''}</span><span class="mono">${typeof v==='number'?money(v):v}</span></div><div style="height:7px;border-radius:99px;background:var(--gray-soft);overflow:hidden"><div style="width:${max>0?Math.round((typeof v==='number'?v:0)/max*100):0}%;height:100%;background:${c}"></div></div></div>`;
  // valor por categoría
  const porCat={};prods.forEach(p=>{const c=p.categoria||'Otros';porCat[c]=(porCat[c]||0)+stock(p.id)*Number(p.costo||0)});
  const catArr=Object.entries(porCat).sort((a,b)=>b[1]-a[1]);const maxCat=Math.max(1,...catArr.map(x=>x[1]));
  // quiebres / reposición
  const bajo=prods.filter(p=>estadoStock(p)!=='ok').map(p=>({p,falta:sugerido(p),costo:sugerido(p)*Number(p.costo||0)})).sort((a,b)=>b.costo-a.costo);
  const costoReponer=bajo.reduce((a,x)=>a+x.costo,0);
  // mermas
  const mermaTot=state.mermas.reduce((a,m)=>a+Number(m.valor_perdido||0),0);
  const mermaMot={};state.mermas.forEach(m=>{mermaMot[m.motivo]=(mermaMot[m.motivo]||0)+Number(m.valor_perdido||0)});
  const mermaArr=Object.entries(mermaMot).sort((a,b)=>b[1]-a[1]);const maxMer=Math.max(1,...mermaArr.map(x=>x[1]));
  // consumo (salidas + mermas) por producto
  const consumo={};state.movs.filter(m=>['salida','merma'].includes(m.tipo)).forEach(m=>{consumo[m.producto_id]=(consumo[m.producto_id]||0)+Math.abs(Number(m.valor_total||0))});
  const consArr=Object.entries(consumo).sort((a,b)=>b[1]-a[1]).slice(0,6);const maxCons=Math.max(1,...consArr.map(x=>x[1]));
  // compras por proveedor (entradas)
  const compra={};state.movs.filter(m=>m.tipo==='entrada'&&m.proveedor_id).forEach(m=>{compra[m.proveedor_id]=(compra[m.proveedor_id]||0)+Math.abs(Number(m.valor_total||0))});
  const compraArr=Object.entries(compra).sort((a,b)=>b[1]-a[1]);const maxCompra=Math.max(1,...compraArr.map(x=>x[1]));
  // mejores precios / ahorro potencial
  const alertas=prods.map(p=>({p,al:alertaPrecio(p.id)})).filter(x=>x.al).sort((a,b)=>b.al.ahorro-a.al.ahorro);
  // vendor scoring (ME-06)
  const scoring=state.proveedores.map(v=>{const pps=state.provProd.filter(pp=>pp.proveedor_id===v.id);if(!pps.length)return null;
    const entrega=pps.reduce((a,pp)=>a+(pp.tiempo_entrega_dias||0),0)/pps.length;
    const baratos=pps.filter(pp=>{const sup=state.provProd.filter(x=>x.producto_id===pp.producto_id);const min=Math.min(...sup.map(x=>Number(x.costo)));return Number(pp.costo)<=min+0.001}).length;
    return {v,nprod:pps.length,entrega,baratos,score:Math.round(baratos/pps.length*60+Math.max(0,30-entrega*4)+10)};}).filter(Boolean).sort((a,b)=>b.score-a.score);

  $('#screen').innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="val">${money(valorInventario())}</div><div class="lbl">Valor inventario</div></div>
      <div class="kpi ${bajo.length?'alert':''}"><div class="val">${bajo.length}</div><div class="lbl">Bajo par</div></div>
      <div class="kpi"><div class="val">${money(costoReponer)}</div><div class="lbl">Costo reponer par</div></div>
      <div class="kpi alert"><div class="val">${money(mermaTot)}</div><div class="lbl">Mermas</div></div>
      <div class="kpi"><div class="val">${alertas.length}</div><div class="lbl">Precios mejorables</div></div>
    </div>
    ${card('💸 Mejores precios — ahorro potencial', alertas.length?`<div style="font-size:12px;opacity:.7;margin-bottom:8px">Productos donde hay una fuente más barata que tu proveedor actual:</div>
      <table class="tbl"><tr><th>Producto</th><th>Tu precio</th><th>Más barato</th><th>Ahorro/u</th></tr>
      ${alertas.map(x=>`<tr class="rojo"><td>${x.p.emoji||''} ${x.p.nombre}</td><td>${money(x.al.pref)}</td><td>${money(x.al.best.precio)} · ${x.al.best.fuente}${x.al.best.url?` <a href="${x.al.best.url}" target="_blank" rel="noopener">↗</a>`:''}</td><td><strong style="color:var(--secondary)">−${money(x.al.ahorro)}</strong></td></tr>`).join('')}</table>`
      :'<div class="row-meta">Tus proveedores ya tienen el mejor precio en todos los productos. 👌</div>')}
    ${card('🛒 Sugerencia de reposición (completar el par)', bajo.length?`<table class="tbl"><tr><th>Producto</th><th>Stock/par</th><th>Falta</th><th>Costo</th></tr>
      ${bajo.map(x=>`<tr><td>${x.p.emoji||''} ${x.p.nombre}</td><td>${num(stock(x.p.id))}/${num(x.p.par_level)}</td><td>${num(x.falta)} ${x.p.unidad||''}</td><td>${money(x.costo)}</td></tr>`).join('')}
      <tr><td colspan="3" style="text-align:right;font-weight:700">Total</td><td style="font-weight:700">${money(costoReponer)}</td></tr></table>`
      :'<div class="row-meta">Todo el inventario está en o sobre el par. ✅')}
    ${card('🏆 Vendor scoring', scoring.length?`<table class="tbl"><tr><th>Proveedor</th><th>Productos</th><th>Mejor precio en</th><th>Entrega</th><th>Score</th></tr>
      ${scoring.map(s=>`<tr><td>${s.v.nombre}</td><td>${s.nprod}</td><td>${s.baratos}</td><td>${s.entrega.toFixed(1)}d</td><td><span class="badge ${s.score>=70?'ok':s.score>=50?'bajo':'sin'}">${s.score}</span></td></tr>`).join('')}</table>
      <div class="row-meta" style="margin-top:6px">Score = competitividad de precio + rapidez de entrega.</div>`:'<div class="row-meta">Sin datos de proveedores.</div>')}
    ${card('📦 Valor de inventario por categoría', catArr.map(([c,v])=>bar(c,v,maxCat,'var(--primary)','data-rep="cat" data-key="'+c+'"')).join('')||'<div class="row-meta">Sin stock.</div>')}
    ${card('🔥 Consumo / rotación (salidas + mermas)', consArr.length?consArr.map(([pid,v])=>bar((prod(pid)?.nombre||pid),v,maxCons,'var(--secondary)','data-rep="cons" data-key="'+pid+'"')).join(''):'<div class="row-meta">Aún sin salidas registradas.</div>')}
    ${card('🤝 Compras por proveedor', compraArr.length?compraArr.map(([id,v])=>bar(prov(id)?.nombre||id,v,maxCompra,'var(--green)','data-rep="prov" data-key="'+id+'"')).join(''):'<div class="row-meta">Aún sin compras (entradas) con proveedor.</div>')}
    ${card('🗑️ Mermas por motivo', mermaArr.length?mermaArr.map(([m,v])=>bar(m,v,maxMer,'var(--secondary)','data-rep="merma" data-key="'+m+'"')).join(''):'<div class="row-meta">Sin mermas. ✅</div>')}
    <div style="font-family:var(--font-mono);font-size:11px;opacity:.55;text-align:center;padding:8px">Estos reportes se reflejarán también en el módulo Directorio (Reportes ejecutivos). Toca cualquier barra para ver el detalle.</div>`;
  document.querySelectorAll('#screen [data-rep]').forEach(el=>el.onclick=()=>abrirDetalleReporte(el.dataset.rep,el.dataset.key));
}
function abrirDetalleReporte(rep,key){
  let titulo='',filas='';
  if(rep==='merma'){
    const items=state.mermas.filter(m=>m.motivo===key);
    titulo='Mermas · '+key;
    filas=`<table class="tbl"><tr><th>Fecha</th><th>Producto</th><th>Cant.</th><th>Valor</th><th>Resp.</th></tr>${items.map(m=>`<tr><td>${m.fecha}</td><td>${prod(m.producto_id)?.nombre||m.producto_id}</td><td>${num(m.cantidad)}</td><td>${money(m.valor_perdido)}</td><td>${m.responsable||'—'}</td></tr>${m.notas?`<tr><td></td><td colspan="4" style="opacity:.65;font-size:11px">» ${m.notas}</td></tr>`:''}`).join('')}</table>`;
  }else if(rep==='prov'){
    const items=state.movs.filter(m=>m.tipo==='entrada'&&m.proveedor_id===key);
    titulo='Compras · '+(prov(key)?.nombre||key);
    filas=`<table class="tbl"><tr><th>Fecha</th><th>Producto</th><th>Cant.</th><th>Valor</th><th>Ref.</th></tr>${items.map(m=>`<tr><td>${m.fecha}</td><td>${prod(m.producto_id)?.nombre||m.producto_id}</td><td>${num(m.cantidad)}</td><td>${money(Math.abs(m.valor_total||0))}</td><td>${m.referencia||''}</td></tr>`).join('')||'<tr><td colspan="5" style="text-align:center;opacity:.5;padding:14px">Sin compras</td></tr>'}</table>`;
  }else if(rep==='cons'){
    const items=state.movs.filter(m=>m.producto_id===key&&['salida','merma'].includes(m.tipo));
    titulo='Consumo · '+(prod(key)?.nombre||key);
    filas=`<table class="tbl"><tr><th>Fecha</th><th>Tipo</th><th>Cant.</th><th>Valor</th><th>Motivo</th></tr>${items.map(m=>`<tr><td>${m.fecha}</td><td>${m.tipo}</td><td>${num(Math.abs(m.cantidad))}</td><td>${money(Math.abs(m.valor_total||0))}</td><td>${m.motivo||''}</td></tr>`).join('')||'<tr><td colspan="5" style="text-align:center;opacity:.5;padding:14px">Sin movimientos</td></tr>'}</table>`;
  }else if(rep==='cat'){
    const items=state.productos.filter(p=>(p.categoria||'Otros')===key);
    titulo='Categoría · '+key;
    filas=`<table class="tbl"><tr><th>Producto</th><th>Stock</th><th>Costo</th><th>Valor</th></tr>${items.map(p=>`<tr><td>${p.emoji||''} ${p.nombre}</td><td>${num(stock(p.id))} ${p.unidad||''}</td><td>${money(p.costo)}</td><td>${money(stock(p.id)*Number(p.costo||0))}</td></tr>`).join('')}</table>`;
  }
  setHead('🔎',titulo,'Detalle del reporte');
  $('#sheet-body').innerHTML=filas+'<div class="sheet-section"><button class="btn ghost" id="dr-close">Cerrar</button></div>';
  openSheet();$('#dr-close').onclick=closeSheet;
}

/* ===== REALTIME ===== */
function subscribe(){if(state.channel)sb.removeChannel(state.channel);
  state.channel=sb.channel('mercado_'+LOCAL)
    .on('postgres_changes',{event:'*',schema:'public',table:'inv_movimientos',filter:'local_id=eq.'+LOCAL},async()=>{await loadMovs();render()})
    .on('postgres_changes',{event:'*',schema:'public',table:'inv_ordenes_compra',filter:'local_id=eq.'+LOCAL},async()=>{await loadOrdenes();render()})
    .subscribe();
}
$('#sheet-close').addEventListener('click',closeSheet);
$('#backdrop').addEventListener('click',closeSheet);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSheet()});
loadAll().catch(err=>{console.error(err);$('#boot .msg').textContent='Atrás · '+(err.message||'fallo');$('#boot .spinner').style.borderTopColor='var(--secondary)'});
</script>
