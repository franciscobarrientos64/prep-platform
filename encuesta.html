<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1e5af9">
<title>Tu opinión · Prep!</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231e5af9'/><text x='50' y='70' font-family='sans-serif' font-weight='900' font-size='60' fill='%23fcf9f8' text-anchor='middle'>p!</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#1e5af9;--secondary:#ff3b30;--tertiary:#ffcc00;--bg:#fcf9f8;--surface:#fff;--ink:#171c20;--outline:#000;--primary-soft:#d6e2ff;--gray-soft:#dfe3e8;--green:#10b981;--shadow-sm:4px 4px 0 0 #000;--shadow:6px 6px 0 0 #000;--font-display:'Bagel Fat One',system-ui,sans-serif;--font-body:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',ui-monospace,monospace;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh}
.material-symbols-outlined{font-size:20px;line-height:1;vertical-align:middle}
.wrap{max-width:560px;margin:0 auto;padding:18px 16px 60px}
.top{display:flex;align-items:center;gap:10px;padding:6px 0 18px}
.logo{font-family:var(--font-display);font-size:26px;color:var(--primary)}.logo span{color:var(--secondary)}
h1{font-family:var(--font-display);font-size:24px;line-height:1.15;margin:6px 0}
.desc{opacity:.7;font-size:14px;margin-bottom:12px}
.q{background:var(--surface);border:2px solid var(--outline);border-radius:16px;box-shadow:var(--shadow-sm);padding:16px;margin-bottom:14px}
.q .t{font-weight:700;font-size:15px;margin-bottom:12px}.q .req{color:var(--secondary)}
.scale{display:flex;gap:6px;flex-wrap:wrap}
.dot{flex:1;min-width:40px;height:46px;border:2px solid var(--outline);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;background:var(--surface);cursor:pointer;box-shadow:2px 2px 0 0 var(--outline)}
.dot.on{background:var(--primary);color:#fff;transform:translate(2px,2px);box-shadow:none}
.nps{display:flex;gap:4px;flex-wrap:wrap}.nps .dot{min-width:34px;height:40px;font-size:14px}
.nps-lbl{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;opacity:.55;margin-top:6px}
.opt{display:flex;flex-wrap:wrap;gap:8px}
.opt button{padding:10px 16px;border:2px solid var(--outline);border-radius:999px;background:var(--surface);font-weight:600;font-size:14px;box-shadow:2px 2px 0 0 var(--outline);cursor:pointer}
.opt button.on{background:var(--ink);color:var(--bg);transform:translate(2px,2px);box-shadow:none}
textarea{width:100%;min-height:90px;padding:12px;border:2px solid var(--outline);border-radius:12px;font-family:var(--font-body);font-size:15px;resize:vertical}
.send{width:100%;padding:16px;border:2px solid var(--outline);border-radius:16px;background:var(--primary);color:#fff;font-weight:700;font-size:16px;box-shadow:var(--shadow);cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px}
.send:active{transform:translate(2px,2px);box-shadow:none}
.center{text-align:center;padding:60px 20px}
.center .big{font-family:var(--font-display);font-size:30px;margin:14px 0 8px}
.emoji{font-size:54px}
.msg{font-family:var(--font-mono);font-size:12px;opacity:.6;margin-top:10px}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="center"><div class="msg">Cargando…</div></div></div>
<script>
const SB_URL='https://jmkvphayyhwzootlybde.supabase.co';
const SB_KEY='sb_publishable_0-znERv1Ok0Dw-Re44eksw_QAOqDc8M';
const sb=supabase.createClient(SB_URL,SB_KEY);
const ID=new URLSearchParams(location.search).get('id');
const MESA=new URLSearchParams(location.search).get('mesa')||null;
const MOZO=new URLSearchParams(location.search).get('mozo')||null;
let ENC=null, PREG=[], VAL={}, CONTACT={nombre:'',telefono:''};
const app=document.getElementById('app');
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function init(){
  if(!ID){app.innerHTML=msgBox('link','Encuesta no encontrada','Revisa el enlace o el código QR.');return;}
  const {data:e}=await sb.from('vc_encuestas').select('*').eq('id',ID).eq('activo',true).maybeSingle();
  if(!e){app.innerHTML=msgBox('event_busy','Encuesta no disponible','Puede haber finalizado. ¡Gracias por tu interés!');return;}
  ENC=e;
  const {data:p}=await sb.from('vc_preguntas').select('*').eq('encuesta_id',ID).order('orden');
  PREG=p||[];
  render();
}
function msgBox(ic,big,sub){return `<div class="center"><div class="emoji"><span class="material-symbols-outlined" style="font-size:54px;color:var(--primary)">${ic}</span></div><div class="big">${esc(big)}</div><div class="msg">${esc(sub)}</div></div>`;}

function render(){
  let h=`<div class="top"><span class="logo">prep<span>!</span></span></div>
   <h1>${esc(ENC.titulo)}</h1>${ENC.descripcion?`<div class="desc">${esc(ENC.descripcion)}</div>`:''}`;
  PREG.forEach(p=>{
    h+=`<div class="q"><div class="t">${esc(p.texto)}${p.requerida?' <span class="req">*</span>':''}</div>`;
    if(p.tipo==='nps'){
      h+=`<div class="nps">`;for(let i=0;i<=10;i++)h+=`<div class="dot ${VAL[p.id]===i?'on':''}" onclick="setNum('${p.id}',${i})">${i}</div>`;
      h+=`</div><div class="nps-lbl"><span>Nada probable</span><span>Muy probable</span></div>`;
    }else if(p.tipo==='csat'||p.tipo==='escala5'){
      h+=`<div class="scale">`;for(let i=1;i<=5;i++)h+=`<div class="dot ${VAL[p.id]===i?'on':''}" onclick="setNum('${p.id}',${i})">${i}</div>`;h+=`</div>`;
    }else if(p.tipo==='opciones'){
      h+=`<div class="opt">`+(p.opciones||[]).map(o=>`<button class="${VAL[p.id]===o?'on':''}" onclick="setTxt('${p.id}',this.textContent)">${esc(o)}</button>`).join('')+`</div>`;
    }else{
      h+=`<textarea oninput="VAL['${p.id}']=this.value" placeholder="Escribe aquí…">${esc(VAL[p.id]||'')}</textarea>`;
    }
    h+=`</div>`;
  });
  // Contacto opcional — permite al restaurante responder si algo salió mal
  h+=`<div class="q"><div class="t">¿Te contactamos si podemos mejorar tu experiencia? <span style="font-weight:400;opacity:.6">(opcional)</span></div>
    <input id="c_nombre" placeholder="Tu nombre" value="${esc(CONTACT.nombre)}" oninput="CONTACT.nombre=this.value"
      style="width:100%;padding:12px;border:2px solid var(--outline);border-radius:12px;font-family:var(--font-body);font-size:15px;margin-bottom:8px">
    <input id="c_tel" placeholder="WhatsApp / teléfono" inputmode="tel" value="${esc(CONTACT.telefono)}" oninput="CONTACT.telefono=this.value"
      style="width:100%;padding:12px;border:2px solid var(--outline);border-radius:12px;font-family:var(--font-body);font-size:15px"></div>`;
  h+=`<button class="send" onclick="enviar()"><span class="material-symbols-outlined">send</span>Enviar</button>`;
  app.innerHTML=h;
}
function setNum(id,n){VAL[id]=n;render();}
function setTxt(id,t){VAL[id]=t;render();}

async function enviar(){
  for(const p of PREG){if(p.requerida&&(VAL[p.id]===undefined||VAL[p.id]==='')){alert('Por favor responde: '+p.texto);return;}}
  const btn=document.querySelector('.send');if(btn){btn.textContent='Enviando…';btn.style.opacity=.6;}
  // Generamos el id en el cliente: anon NO puede leer vc_respuestas (privacidad),
  // así que no usamos .select()/RETURNING (violaría RLS). Insert directo.
  const rid=(window.crypto&&crypto.randomUUID)?crypto.randomUUID():'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return (c==='x'?r:(r&0x3|0x8)).toString(16);});
  const {error}=await sb.from('vc_respuestas').insert({id:rid,encuesta_id:ID,marca_id:ENC.marca_id,local_id:ENC.local_id,canal:'qr',mesa:MESA,mozo:MOZO,contacto_nombre:CONTACT.nombre||null,contacto_telefono:CONTACT.telefono||null});
  if(error){if(btn){btn.textContent='Reintentar';btn.style.opacity=1;}return;}
  const items=PREG.filter(p=>VAL[p.id]!==undefined&&VAL[p.id]!=='').map(p=>({respuesta_id:rid,pregunta_id:p.id,
    valor_num:(p.tipo==='nps'||p.tipo==='csat'||p.tipo==='escala5')?VAL[p.id]:null,
    valor_texto:(p.tipo==='opciones'||p.tipo==='abierta')?String(VAL[p.id]):null}));
  if(items.length)await sb.from('vc_resp_items').insert(items);
  app.innerHTML=msgBox('favorite','¡Gracias!','Tu opinión nos ayuda a mejorar. ¡Te esperamos pronto! 🍝');
}
init();
</script>
</body>
</html>
